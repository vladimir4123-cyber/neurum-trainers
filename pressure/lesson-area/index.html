<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 2 «Больше площадь — меньше давление» (Пёрышкин §16).
   Интерактив: слайдер площади опоры — человечек проваливается
   в снег глубже или мельче. F = 600 Н (масса 60 кг), p = F/S.
   ============================================================ */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
function rr(ctx, x, y, w2, h2, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w2, y, x + w2, y + h2, r);
  ctx.arcTo(x + w2, y + h2, x, y + h2, r);
  ctx.arcTo(x, y + h2, x, y, r);
  ctx.arcTo(x, y, x + w2, y, r);
  ctx.closePath();
}
function shade(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}

/* ============================================================
   ИНТЕРАКТИВ: снег и площадь опоры
   ============================================================ */
const FORCE = 600;                       // вес человечка, Н
const S_MIN = 0.04, S_MAX = 0.30;        // ботинки … лыжи, м²
/* canvas не понимает var() в font — берём уже вычисленное семейство */
const FONT = getComputedStyle(document.body).fontFamily || "'Aeonik Pro', sans-serif";

function startSnow(root, done) {
  const canvas = root.querySelector('#snowCanvas');
  const hint = root.querySelector('#snowHint');
  const range = root.querySelector('#areaRange');
  const ctx = canvas.getContext('2d');

  let S = S_MIN;                 // текущая площадь
  let sinkCur = 0;               // плавная глубина
  let sawSmall = true, sawBig = false, doneShown = false;

  range.addEventListener('input', () => {
    S = S_MIN + (S_MAX - S_MIN) * (range.value / 100);
    if (S < 0.07) sawSmall = true;
    if (S > 0.24) sawBig = true;
    if (sawSmall && sawBig && !doneShown) {
      doneShown = true;
      hint.innerHTML = '⚡ Вес тот же, а на лыжах давление в <b>7,5 раза меньше</b> — снег держит!';
      done();
    }
  });

  const fmtP = p => (Math.round(p / 100) * 100).toLocaleString('ru-RU');

  function draw() {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 300);
    ctx.clearRect(0, 0, w, h);

    const u = w / 560;                                    // дизайн-единицы → device px
    const snowTop = h * 0.55, ground = h * 0.94;
    const p = FORCE / S;                                  // Па
    const sinkMax = snowTop ? (ground - snowTop) * 0.85 : 0;
    const sinkTarget = sinkMax * (S_MIN / S) * 1.0;       // ∝ давлению
    sinkCur += (sinkTarget - sinkCur) * 0.15;

    /* небо-фон панели уже светлый; рисуем снег */
    rr(ctx, w * 0.03, snowTop, w * 0.94, ground - snowTop, 18);
    ctx.fillStyle = '#EAF2FC'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#C7DBF3'; ctx.stroke();

    const cx = w * 0.5;
    const supW = w * (0.10 + 0.55 * (S - S_MIN) / (S_MAX - S_MIN)); // ширина опоры
    const supY = snowTop + sinkCur;

    /* яма в снегу под опорой */
    ctx.save();
    rr(ctx, w * 0.03, snowTop, w * 0.94, ground - snowTop, 18);
    ctx.clip();
    ctx.beginPath();
    ctx.moveTo(cx - supW / 2 - 16 * u, snowTop);
    ctx.lineTo(cx - supW / 2 - 4 * u, supY + 12 * u);
    ctx.lineTo(cx + supW / 2 + 4 * u, supY + 12 * u);
    ctx.lineTo(cx + supW / 2 + 16 * u, snowTop);
    ctx.closePath();
    ctx.fillStyle = '#D6E6F8'; ctx.fill();
    ctx.restore();

    /* опора: узкая = ботинки, широкая = лыжи */
    const isSki = S > 0.17;
    rr(ctx, cx - supW / 2, supY, supW, 13 * u, 6 * u);
    ctx.fillStyle = isSki ? '#E5484D' : '#3E434C';
    ctx.fill();
    ctx.lineWidth = 2 * u; ctx.strokeStyle = isSki ? '#B23A3F' : '#232323'; ctx.stroke();

    /* человечек (дизайн-единицы × u — крупно) */
    const py = supY - 2 * u;
    ctx.strokeStyle = '#6240FF'; ctx.lineWidth = 8 * u; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx, py - 38 * u); ctx.lineTo(cx, py - 92 * u); ctx.stroke();      // корпус
    ctx.beginPath(); ctx.moveTo(cx, py - 78 * u); ctx.lineTo(cx - 26 * u, py - 52 * u); ctx.stroke(); // руки
    ctx.beginPath(); ctx.moveTo(cx, py - 78 * u); ctx.lineTo(cx + 26 * u, py - 52 * u); ctx.stroke();
    ctx.strokeStyle = '#4A2FD9';
    ctx.beginPath(); ctx.moveTo(cx, py - 38 * u); ctx.lineTo(cx - 15 * u, py); ctx.stroke();      // ноги
    ctx.beginPath(); ctx.moveTo(cx, py - 38 * u); ctx.lineTo(cx + 15 * u, py); ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, py - 108 * u, 16 * u, 0, Math.PI * 2);
    ctx.fillStyle = '#F3C89E'; ctx.fill();
    ctx.lineWidth = 2.5 * u; ctx.strokeStyle = '#D9A876'; ctx.stroke();

    /* табло значений */
    ctx.font = '500 ' + Math.round(w * 0.038) + 'px ' + FONT;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#6B7180';
    ctx.fillText('F = ' + FORCE + ' Н (вес)', w * 0.05, h * 0.10);
    ctx.fillStyle = shade('#2F80ED', 0.15);
    ctx.fillText('S = ' + S.toFixed(2).replace('.', ',') + ' м²', w * 0.05, h * 0.10 + Math.round(w * 0.052));
    ctx.fillStyle = shade('#E5484D', 0.1);
    ctx.fillText('p = F/S ≈ ' + fmtP(p) + ' Па', w * 0.05, h * 0.10 + Math.round(w * 0.104));
    /* подпись опоры */
    ctx.textAlign = 'center';
    ctx.fillStyle = '#6B7180';
    ctx.font = '500 ' + Math.round(w * 0.034) + 'px ' + FONT;
    ctx.fillText(isSki ? 'лыжи' : 'ботинки', cx, ground + (h - ground) * 0.8);
    ctx.textAlign = 'start';

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ============================================================
   ШАГИ УРОКА
   ============================================================ */
const steps = [

  },

    text: 'В ботинках площадь опоры около <b>0,04 м²</b>: давление 600 Н / 0,04 м² = <b>15 000 Па</b> — снег проминается. На лыжах площадь <b>0,3 м²</b>: давление 600 Н / 0,3 м² = <b>2000 Па</b> — снег выдерживает. Та же сила, площадь больше в 7,5 раза — давление меньше в 7,5 раза.',
  },
  {

  },
  {
    phase: 'theory', type: 'info', visual: 'knife', big: true,
    title: 'А если давление нужно УВЕЛИЧИТЬ?',
    text: 'Тогда всё наоборот: <b>уменьшай площадь</b>. Нож точат, чтобы лезвие стало тоньше, — давление растёт, и резать легко. Игла, гвоздь, зубья пилы, шипы на бутсах — всюду одна идея: собрать силу на крошечной площади.',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Два вопроса — и тема твоя.',
  },

    phase: 'check', type: 'question',
    title: 'Вопрос',
    text: 'Зачем трактору широкие гусеницы вместо колёс?',
    options: [
      { id: 'a', text: 'Чтобы увеличить площадь опоры и уменьшить давление на грунт', correct: true },
      { id: 'b', text: 'Чтобы увеличить силу, с которой трактор давит на землю', correct: false },
      { id: 'c', text: 'Чтобы трактор весил меньше', correct: false },
    ],
    right: 'Вес трактора распределяется по большой площади гусениц — давление падает, и машина не вязнет.',
    wrong: 'Вес трактора гусеницы не меняют. Они увеличивают площадь опоры — а чем больше площадь, тем меньше давление.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос',
    text: 'Почему острый нож режет легче тупого?',
    options: [
      { id: 'a', text: 'Острый нож тяжелее, поэтому давит сильнее', correct: false },
      { id: 'b', text: 'У острого лезвия меньше площадь — давление больше', correct: true },
      { id: 'c', text: 'Острый нож скользит быстрее по продукту', correct: false },
    ],
    right: 'Тонкое лезвие собирает ту же силу руки на меньшей площади — давление больше, резать легче.',
    wrong: 'Дело не в весе и не в скорости. У острого лезвия крошечная площадь кромки — при той же силе давление гораздо больше.',
  },
];

/* ---------- визуалы шагов ---------- */

        <rect x="14" y="96" width="112" height="48" rx="10" fill="#EAF2FC" stroke="#C7DBF3" stroke-width="2.5"/>
        <path d="M52 96 L58 124 L82 124 L88 96 Z" fill="#D6E6F8"/>

          <animate attributeName="y" values="112;118;112" dur="2s" repeatCount="indefinite"/>
        </rect>
        <text x="70" y="30" text-anchor="middle" font-size="15" fill="#3E434C">0,04 м²</text>
        <text x="70" y="52" text-anchor="middle" font-size="17" fill="#B23A3F">15 000 Па</text>
        <text x="70" y="162" text-anchor="middle" font-size="14" fill="#6B7180">проваливается</text>
        <!-- лыжи: мелкий след -->
        <rect x="154" y="96" width="112" height="48" rx="10" fill="#EAF2FC" stroke="#C7DBF3" stroke-width="2.5"/>
        <rect x="162" y="94" width="96" height="8" rx="4" fill="#E5484D">
          <animate attributeName="y" values="93;96;93" dur="2s" repeatCount="indefinite"/>
        </rect>
        <text x="210" y="30" text-anchor="middle" font-size="15" fill="#3E434C">0,3 м²</text>
        <text x="210" y="52" text-anchor="middle" font-size="17" fill="#30A46C">2000 Па</text>
        <text x="210" y="162" text-anchor="middle" font-size="14" fill="#6B7180">снег держит</text>
        <text x="140" y="78" text-anchor="middle" font-size="15" fill="#6240FF">F = 600 Н — одинаковая</text>
      </g>
    </svg>`,
  machines: () => `

        <rect x="10" y="118" width="126" height="22" rx="8" fill="#CBE3D2"/>
        <g>

          <rect x="76" y="52" width="24" height="24" rx="5" fill="#8B6FFF" stroke="#6240FF" stroke-width="2.5"/>

          <rect x="182" y="64" width="56" height="42" rx="4" fill="#F0B23C" stroke="#C98A2E" stroke-width="2.5"/>
          <path d="M176 66 L210 40 L244 66 Z" fill="#E5484D" stroke="#B23A3F" stroke-width="2.5" stroke-linejoin="round"/>
          <rect x="202" y="82" width="16" height="24" rx="3" fill="#8A5A2E"/>

/* ---------- интерактивы ---------- */
function onInteract(step, ctx) {
  if (step.id === 'snow') startSnow(ctx.root, ctx.done);
}

</script>
