<!doctype html>
<html lang="ru">
<head>

<title>Формула p = F/S · Давление</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩰</text></svg>">

<link rel="stylesheet" href="../../assets/lesson/lesson.css?v=3">
<style>
  .step-visual{ flex-direction: column; }
  /* пульт расчёта давления */
  .calc-panel{

  .calc-row .nm{

    font-family: var(--font-display); font-size: 20px; color: var(--fg-3);
    font-variant-numeric: tabular-nums;
  }
  .calc-out .res{
    font-family: var(--font-display); font-size: 30px; font-weight: 500; color: var(--purple-1);

<body>

<div class="top">

<div class="bottom">

<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 3 «Формула p = F/S» (Пёрышкин §16).
   Паскаль, живой расчёт на слайдерах и дуэль
   «слон против балерины» — контринтуитивный финал.
   Проверка арифметики: слон 50 000 Н / (4 × 0,1 м²) = 125 000 Па;
   балерина 500 Н / 0,0002 м² = 2 500 000 Па — в 20 раз больше.
   ============================================================ */

const fmtRu = n => Math.round(n).toLocaleString('ru-RU');

/* ============================================================
   ИНТЕРАКТИВ: пульт p = F/S
   ============================================================ */
function startCalc(root, done) {
  const fR = root.querySelector('#fRange');
  const sR = root.querySelector('#sRange');
  const fV = root.querySelector('#fVal');
  const sV = root.querySelector('#sVal');
  const eq = root.querySelector('#calcEq');
  const res = root.querySelector('#calcRes');
  const hint = root.querySelector('#calcHint');
  const touched = new Set();
  let doneShown = false;

  function update() {
    const F = +fR.value;                          // 100…1000 Н, шаг 50
    const S = +sR.value / 100;                    // 0,05…1,00 м²
    const p = F / S;
    fV.textContent = F + ' Н';
    sV.textContent = S.toFixed(2).replace('.', ',') + ' м²';
    eq.textContent = 'p = ' + F + ' / ' + S.toFixed(2).replace('.', ',') + ' =';
    res.textContent = fmtRu(p) + ' Па';
  }
  function onMove(which) {
    touched.add(which);
    update();
    if (touched.size >= 2 && !doneShown) {
      doneShown = true;
      hint.innerHTML = '⚡ Видишь закономерность: <b>F больше → p больше</b>, <b>S больше → p меньше</b>.';
      done();
    }
  }
  fR.addEventListener('input', () => onMove('f'));
  sR.addEventListener('input', () => onMove('s'));
  update();
}

/* ============================================================
   ШАГИ УРОКА
   ============================================================ */
const steps = [
  {

    title: 'Формула давления',

  },

    title: 'Покрути формулу руками',
    text: 'Перед тобой живая формула. Двигай оба слайдера и следи за давлением: что происходит, когда растёт сила? А когда растёт площадь?',
  },
  {
    phase: 'theory', type: 'info', visual: 'pascal', big: true,
    title: 'Паскаль — очень маленькая величина',

  },
  {
    phase: 'theory', type: 'info', visual: 'duel', big: true,

  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',

  },

    title: 'Вопрос',
    text: 'Так кто же давит на пол сильнее: слон (50 000 Н на 4 ноги по 0,1 м²) или балерина на пуанте (500 Н на 0,0002 м²)?',
    options: [
      { id: 'a', text: 'Слон — он же в 100 раз тяжелее', correct: false },
      { id: 'b', text: 'Балерина — её давление в 20 раз больше', correct: true },
      { id: 'c', text: 'Давление одинаковое', correct: false },
    ],
    right: 'Слон: 50 000 / 0,4 = 125 000 Па. Балерина: 500 / 0,0002 = 2 500 000 Па. Крошечная площадь пуанта побеждает огромный вес!',
    wrong: 'Считаем: слон — 50 000 Н / (4 × 0,1 м²) = 125 000 Па. Балерина — 500 Н / 0,0002 м² = 2 500 000 Па. Давление балерины в 20 раз больше!',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос',
    text: 'Шкаф весом 800 Н опирается на пол площадью 0,2 м². Какое давление он создаёт?',
    options: [
      { id: 'a', text: '160 Па', correct: false },
      { id: 'b', text: '4000 Па', correct: true },
      { id: 'c', text: '16 000 Па', correct: false },
    ],
    right: 'p = F/S = 800 Н / 0,2 м² = 4000 Па. Делим силу на площадь — и всё.',
    wrong: 'По формуле p = F/S: 800 / 0,2 = 4000 Па. Не перемножай и не путай местами — сила делится на площадь.',
  },
];

/* ---------- визуалы шагов ---------- */

        <line x1="210" y1="74" x2="192" y2="90" stroke="#6240FF" stroke-width="5" stroke-linecap="round"/>
        <line x1="210" y1="74" x2="228" y2="90" stroke="#6240FF" stroke-width="5" stroke-linecap="round"/>

          <ellipse cx="72" cy="98" rx="46" ry="34" fill="#9AA0AA"/>

        <text x="140" y="172" text-anchor="middle" font-size="18" fill="#6240FF">у кого давление больше?

    </svg>`,
};

/* ---------- интерактивы ---------- */
function onInteract(step, ctx) {
  if (step.id === 'calc') startCalc(ctx.root, ctx.done);
}

runLesson({
  lessonId: 'formula',
  storageKey: 'pressure-progress',
  homeHref: '../demo/',
  steps, visuals, onInteract,
});
</script>

</body>
</html>
