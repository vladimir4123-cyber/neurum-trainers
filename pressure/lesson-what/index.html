<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 1 «Что такое давление» (Пёрышкин §16, зацепка).
   Интерактив: дави на кнопку с двух сторон — остриё втыкается,
   шляпка нет. Плоский стиль §8.
   ============================================================ */

/* ---------- общие рисовалки ---------- */
function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
function rr(ctx, x, y, w2, h2, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w2, y, x + w2, y + h2, r);
  ctx.arcTo(x + w2, y + h2, x, y + h2, r);
  ctx.arcTo(x, y + h2, x, y, r);
  ctx.arcTo(x, y, x + w2, y, r);
  ctx.closePath();
}
function shade(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}

const WOOD = '#E9D7BC', WOOD_E = '#C9B191';
const METAL = '#AEB4C2', METAL_E = '#8A8F9C';
const HEAD = '#6240FF', HEAD_E = '#4A2FD9';
const SKIN = '#F3C89E', SKIN_E = '#D9A876';
const RED = '#E5484D';
/* canvas не понимает var() в font — берём уже вычисленное семейство */
const FONT = getComputedStyle(document.body).fontFamily || "'Aeonik Pro', sans-serif";

/* ============================================================
   ИНТЕРАКТИВ: кнопка остриём и шляпкой
   ============================================================ */
function startTack(root, done) {
  const canvas = root.querySelector('#tackCanvas');
  const hint = root.querySelector('#tackHint');
  const btnPoint = root.querySelector('#btnPoint');
  const btnHead = root.querySelector('#btnHead');
  const btnReset = root.querySelector('#tackReset');
  const ctx = canvas.getContext('2d');

  let mode = null;            // 'point' | 'head'
  let animT = -9;             // время старта анимации, сек
  const tried = new Set();
  let doneShown = false;

  function press(m) {
    mode = m;
    animT = performance.now() / 1000;
    tried.add(m);
  }
  btnPoint.addEventListener('click', () => press('point'));
  btnHead.addEventListener('click', () => press('head'));
  btnReset.addEventListener('click', () => {
    mode = null; animT = -9; tried.clear(); doneShown = false;
    hint.innerHTML = 'Одна и та же рука, одна и та же сила. Попробуй <b>оба способа</b>.';
  });

  /* прогресс нажатия: 0 → 1 (вниз) → лёгкий отскок */
  function pressAmount(t) {
    const dt = t - animT;
    if (dt < 0) return 0;
    if (dt < 0.5) return dt / 0.5;                 // едем вниз
    if (dt < 0.8) return 1 - (dt - 0.5) / 0.3 * 0.12; // лёгкий отжим
    return 0.88;
  }

  /* размеры в «дизайн-единицах» × u (u = w/560): крупно с задней парты */
  const TACK = { HW: 100, HH: 22, NW: 52, NH: 16, PL: 50 };
  const tackTotal = u => (TACK.NH + TACK.HH + TACK.PL - 4) * u;

  function drawTack(cx, topY, pointDown, u) {
    const HW = TACK.HW * u, HH = TACK.HH * u, NW = TACK.NW * u,
          NH = TACK.NH * u, PL = TACK.PL * u;
    ctx.save();
    ctx.translate(cx, topY);
    if (pointDown) {
      /* рука держит сверху, остриё внизу */
      rr(ctx, -NW / 2, 0, NW, NH, 8 * u);
      ctx.fillStyle = '#8B6FFF'; ctx.fill();
      ctx.lineWidth = 2.5 * u; ctx.strokeStyle = HEAD; ctx.stroke();
      rr(ctx, -HW / 2, NH - 2 * u, HW, HH, 10 * u);
      ctx.fillStyle = HEAD; ctx.fill();
      ctx.strokeStyle = HEAD_E; ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-8 * u, NH + HH - 4 * u);
      ctx.lineTo(0, NH + HH - 4 * u + PL);
      ctx.lineTo(8 * u, NH + HH - 4 * u);
      ctx.closePath();
      ctx.fillStyle = METAL; ctx.fill();
      ctx.lineWidth = 2 * u; ctx.strokeStyle = METAL_E; ctx.stroke();
    } else {
      /* перевёрнута: остриё вверх, шляпка внизу */
      ctx.beginPath();
      ctx.moveTo(-8 * u, PL);
      ctx.lineTo(0, 0);
      ctx.lineTo(8 * u, PL);
      ctx.closePath();
      ctx.fillStyle = METAL; ctx.fill();
      ctx.lineWidth = 2 * u; ctx.strokeStyle = METAL_E; ctx.stroke();
      rr(ctx, -NW / 2, PL - 2 * u, NW, NH, 8 * u);
      ctx.fillStyle = '#8B6FFF'; ctx.fill();
      ctx.lineWidth = 2.5 * u; ctx.strokeStyle = HEAD; ctx.stroke();
      rr(ctx, -HW / 2, PL + NH - 4 * u, HW, HH, 10 * u);
      ctx.fillStyle = HEAD; ctx.fill();
      ctx.strokeStyle = HEAD_E; ctx.stroke();
    }
    ctx.restore();
  }

  function drawHand(cx, y, u, ouch) {
    /* ладонь — плоская округлая, давит сверху */
    rr(ctx, cx - 55 * u, y - 60 * u, 110 * u, 60 * u, 26 * u);
    ctx.fillStyle = SKIN; ctx.fill();
    ctx.lineWidth = 2.5 * u; ctx.strokeStyle = SKIN_E; ctx.stroke();
    /* пальцы — три полоски */
    for (let i = -1; i <= 1; i++) {
      rr(ctx, (cx - 12 * u) + i * 30 * u, y - 22 * u, 24 * u, 22 * u, 10 * u);
      ctx.fillStyle = SKIN; ctx.fill();
      ctx.strokeStyle = SKIN_E; ctx.stroke();
    }
    if (ouch) {
      /* больно: красные чёрточки */
      ctx.strokeStyle = RED; ctx.lineWidth = 3 * u; ctx.lineCap = 'round';
      [[-66, -32], [66, -32], [-58, -58], [58, -58]].forEach(d => {
        ctx.beginPath();
        ctx.moveTo(cx + d[0] * u, y + d[1] * u);
        ctx.lineTo(cx + d[0] * 1.16 * u, y + d[1] * 1.3 * u);
        ctx.stroke();
      });
    }
  }

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 280);
    ctx.clearRect(0, 0, w, h);

    const u = w / 560;                      // дизайн-единицы → device px
    const boardY = h * 0.70, boardH = h * 0.22;
    const cx = w * 0.5;
    const p = mode ? pressAmount(t) : 0;
    const TT = tackTotal(u);

    /* доска */
    rr(ctx, w * 0.08, boardY, w * 0.84, boardH, 14 * u);
    ctx.fillStyle = WOOD; ctx.fill();
    ctx.lineWidth = 3 * u; ctx.strokeStyle = WOOD_E; ctx.stroke();
    ctx.strokeStyle = '#D8C3A2'; ctx.lineWidth = 2.5 * u; ctx.lineCap = 'round';
    [[0.14, 0.4], [0.62, 0.35], [0.3, 0.72], [0.7, 0.75]].forEach(f => {
      ctx.beginPath();
      ctx.moveTo(w * f[0], boardY + boardH * f[1]);
      ctx.lineTo(w * f[0] + w * 0.12, boardY + boardH * f[1]);
      ctx.stroke();
    });

    let handTop = 0;
    if (!mode) {
      /* кнопка лежит и ждёт */
      const topY = boardY - TT + 2 * u;
      drawTack(cx, topY, true, u);
      drawHand(cx, topY - 6 * u, u, false);
      handTop = topY - 66 * u;
    } else if (mode === 'point') {
      const sink = p * 34 * u;                   // остриё входит в доску
      const topY = boardY - TT + 2 * u + sink;
      /* лунка */
      if (sink > 5 * u) {
        ctx.beginPath();
        ctx.moveTo(cx - 9 * u, boardY);
        ctx.lineTo(cx, boardY + sink * 0.8);
        ctx.lineTo(cx + 9 * u, boardY);
        ctx.closePath();
        ctx.fillStyle = WOOD_E; ctx.fill();
      }
      drawTack(cx, topY, true, u);
      drawHand(cx, topY - 6 * u, u, false);
      handTop = topY - 66 * u;
      if (p > 0.8) {
        ctx.font = '500 ' + Math.round(w * 0.04) + 'px ' + FONT;
        ctx.fillStyle = shade('#F0B23C', 0.3);
        ctx.textAlign = 'center';
        ctx.fillText('Вошла!', cx + w * 0.26, boardY - 16 * u);
        ctx.textAlign = 'start';
      }
    } else {
      /* шляпкой вниз: не втыкается, руке больно */
      const dip = p * 6 * u;                      // еле заметная вмятина
      const topY = boardY - TT + 2 * u + dip;
      drawTack(cx, topY, false, u);
      drawHand(cx, topY - 2 * u, u, p > 0.55);
      handTop = topY - 62 * u;
      if (p > 0.8) {
        ctx.font = '500 ' + Math.round(w * 0.038) + 'px ' + FONT;
        ctx.fillStyle = shade(RED, 0.1);
        ctx.textAlign = 'center';
        ctx.fillText('Не входит!', cx + w * 0.26, boardY - 16 * u - Math.round(w * 0.052));
        ctx.fillText('Остриё колет руку', cx + w * 0.26, boardY - 16 * u);
        ctx.textAlign = 'start';
      }
    }

    /* стрелка силы — одинаковая в обоих случаях */
    if (mode) {
      const ay = h * 0.05;
      const len = Math.max(h * 0.1, handTop - ay - 26 * u);
      ctx.fillStyle = RED;
      rr(ctx, cx - 7 * u, ay, 14 * u, len, 7 * u);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx, ay + len + 18 * u);
      ctx.lineTo(cx - 16 * u, ay + len);
      ctx.lineTo(cx + 16 * u, ay + len);
      ctx.closePath();
      ctx.fill();
      ctx.font = '500 ' + Math.round(w * 0.04) + 'px ' + FONT;
      ctx.fillStyle = shade(RED, 0.15);
      ctx.fillText('F — сила та же', cx + 26 * u, ay + len * 0.6);
    }

    /* сообщения */
    if (tried.size === 1 && !doneShown && (performance.now() / 1000 - animT) > 0.9) {
      hint.innerHTML = mode === 'point'
        ? 'Остриё <b>вошло в доску</b>. Теперь переверни кнопку — дави шляпкой.'
        : 'Шляпка <b>не входит</b>. Теперь попробуй остриём.';
    }
    if (tried.size >= 2 && !doneShown) {
      doneShown = true;
      hint.innerHTML = '⚡ Сила одна и та же, а результат разный. Всё дело в <b>площади</b>!';
      done();
    }
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ШАГИ УРОКА
   ============================================================ */
const steps = [

  },
  {
    phase: 'theory', type: 'info', visual: 'twoWays', big: true,
    title: 'Сила одна — результат разный',
    text: 'Остриё крошечное: вся сила собирается на <b>маленькой площади</b> — и кнопка легко протыкает дерево. Шляпка широкая: та же сила «размазывается» по <b>большой площади</b> — и доске хоть бы что. Значит, результат действия силы зависит не только от силы, но и от площади опоры.',
  },
  {
    phase: 'theory', type: 'info', visual: 'define', big: true,
    title: 'Знакомься: давление',
    text: 'Физики придумали величину, которая учитывает и силу, и площадь сразу. <b>Давление</b> — это величина, равная отношению силы, действующей перпендикулярно поверхности, к площади этой поверхности. Чем меньше площадь при той же силе — тем больше давление.',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Два вопроса — и тема твоя.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос',
    text: 'Почему кнопка легко входит в доску остриём, но не входит шляпкой?',
    options: [
      { id: 'a', text: 'Остриё давит с большей силой, чем шляпка', correct: false },
      { id: 'b', text: 'Площадь острия мала, поэтому давление огромно', correct: true },
      { id: 'c', text: 'Шляпка сделана из более мягкого материала', correct: false },
    ],
    right: 'Сила одинаковая, но у острия она собрана на крошечной площади — давление в тысячи раз больше.',
    wrong: 'Сила в обоих случаях одна и та же — рука-то одна. Разная только площадь: у острия она крошечная, поэтому давление огромно.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос',
    text: 'Одна и та же сила действует сначала на маленькую площадь, потом на большую. Где давление больше?',
    options: [
      { id: 'a', text: 'На маленькой площади', correct: true },
      { id: 'b', text: 'На большой площади', correct: false },
      { id: 'c', text: 'Давление одинаковое — сила же одна', correct: false },
    ],
    right: 'Именно! Та же сила на меньшей площади — большее давление. Поэтому острый нож режет, а тупой — нет.',
    wrong: 'Давление — это сила, делённая на площадь. Делим на меньшее число — получаем большее давление.',
  },
];

/* ---------- визуалы шагов ---------- */
const visuals = {

    <div class="mini-actions">
      <button class="mini-play-btn" id="btnPoint">📌 Давить остриём</button>
      <button class="mini-play-btn" id="btnHead">Давить шляпкой</button>
      <button class="chip-btn" id="tackReset">↺ Сначала</button>
    </div>`,

/* ---------- интерактивы ---------- */
function onInteract(step, ctx) {
  if (step.id === 'tack') startTack(ctx.root, ctx.done);
