<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 1 «Почему что-то всплывает».
   Зацепка: мяч под водой рвётся вверх, а камень спокойно лежит
   на дне. Интерактив — утопи мяч пальцем и отпусти.
   ============================================================ */

/* ---------- общие рисовалки (плоский стиль §8) ---------- */
function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
function shade(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}
/* стрелка силы: вертикальный «столб + наконечник», плоская */
function arrowV(ctx, x, yFrom, yTo, color, width) {
  const dir = yTo > yFrom ? 1 : -1;
  const len = Math.abs(yTo - yFrom);
  if (len < 6) return;
  const hHead = Math.min(len * 0.45, width * 2.4);
  ctx.fillStyle = color;
  const shaftLen = len - hHead;
  const sy = dir > 0 ? yFrom : yFrom - shaftLen;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - width / 2, sy, width, shaftLen, width / 2);
  else ctx.rect(x - width / 2, sy, width, shaftLen);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, yTo);
  ctx.lineTo(x - width * 1.3, yTo - dir * hHead);
  ctx.lineTo(x + width * 1.3, yTo - dir * hHead);
  ctx.closePath();
  ctx.fill();
}

const BALL = '#F0B23C', BALL_EDGE = '#C98A2E';
const STONE = '#8A8F9C', STONE_EDGE = '#5A5F6E';
const WATER = '#BFDCF9', WATER_EDGE = '#5D9BE0';
const PURPLE = '#6240FF', GRAY = '#6B7180';
/* canvas не понимает var() в font — разворачиваем токен руками */
const FONT = '"Aeonik Pro", "Inter", sans-serif';

/* ============================================================
   ИНТЕРАКТИВ: утопи мяч — отпусти — выпрыгивает
   ============================================================ */
function startBall(root, done) {
  const canvas = root.querySelector('#ballCanvas');
  const hint = root.querySelector('#ballHint');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, ys = 0, R = 0;
  const ball = { x: 0.42, y: 0, vy: 0 };   // x в долях ширины, y/vy — в px
  let inited = false;
  let dragging = false, wasDeep = false, jumped = false;
  const drops = [];   // брызги
  let lastT = 0;

  const ptr = e => {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) / r.width * W, y: (e.clientY - r.top) / r.height * H };
  };
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    const p = ptr(e);
    if (Math.hypot(p.x - ball.x * W, p.y - ball.y) < R * 2.2) {
      dragging = true;
      try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (!dragging) return;
    const p = ptr(e);
    ball.x = Math.min(0.92, Math.max(0.08, p.x / W));
    ball.y = Math.min(H - R * 1.1, Math.max(R, p.y));
    ball.vy = 0;
    const f = subFrac();
    if (f > 0.95 && !wasDeep) {
      wasDeep = true;
      hint.innerHTML = 'Чувствуешь, как вода давит? Теперь <b>отпусти</b>!';
    }
  });
  ['pointerup', 'pointercancel'].forEach(ev => canvas.addEventListener(ev, () => { dragging = false; }));

  /* доля мяча под водой: 0 — весь в воздухе, 1 — весь под водой */
  function subFrac() {
    const top = ball.y - R, bottom = ball.y + R;
    if (bottom <= ys) return 0;
    if (top >= ys) return 1;
    return (bottom - ys) / (2 * R);
  }

  function splash(n, power) {
    for (let i = 0; i < n; i++) {
      drops.push({
        x: ball.x * W + (Math.random() - 0.5) * R * 2,
        y: ys, vx: (Math.random() - 0.5) * power, vy: -Math.random() * power,
        life: 1,
      });
    }
  }

  function draw(t) {
    if (!canvas.isConnected) return;
    const dt = Math.min(0.033, t - lastT || 0.016);
    lastT = t;
    const s = fit(canvas, 300);
    W = s.w; H = s.h;
    ys = H * 0.40;
    R = H * 0.115;
    if (!inited) { ball.y = ys - R * 0.5 + R * 0.75 * 0.5; inited = true; }
    ctx.clearRect(0, 0, W, H);

    /* физика мяча (лёгкий: на плаву погружён на ~25%) */
    if (!dragging) {
      const f = subFrac();
      const g = H * 2.6;                 // px/s²
      let a = g - g * 4 * f;             // при f=0.25 — равновесие
      ball.vy += a * dt;
      /* сопротивление воды */
      if (f > 0) ball.vy *= Math.exp(-2.6 * dt);
      const prevUnder = ball.y + R > ys;
      ball.y += ball.vy * dt;
      const nowUnder = ball.y + R > ys;
      if (prevUnder !== nowUnder && Math.abs(ball.vy) > H * 0.9) splash(10, H * 0.9);
      if (ball.y < R) { ball.y = R; ball.vy = Math.abs(ball.vy) * 0.4; }
      if (ball.y > H - R) { ball.y = H - R; ball.vy = -Math.abs(ball.vy) * 0.3; }
      /* выпрыгнул: центр выше поверхности на радиус */
      if (wasDeep && !jumped && ball.y < ys - R * 1.6) {
        jumped = true;
        hint.innerHTML = '🌊 Вода <b>вытолкнула</b> мяч — да так, что он выпрыгнул! А камень как лежал, так и лежит.';
        done();
      }
    }

    /* вода */
    ctx.fillStyle = WATER;
    ctx.fillRect(0, ys, W, H - ys);
    ctx.strokeStyle = WATER_EDGE;
    ctx.lineWidth = 4;
    ctx.beginPath();
    const wob = Math.sin(t * 2) * 3;
    ctx.moveTo(0, ys);
    ctx.quadraticCurveTo(W * 0.25, ys + wob, W * 0.5, ys);
    ctx.quadraticCurveTo(W * 0.75, ys - wob, W, ys);
    ctx.stroke();

    /* дно */
    ctx.fillStyle = '#E8D9A8';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, H - 18);
    ctx.quadraticCurveTo(W * 0.5, H - 34, W, H - 18);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    /* камень на дне */
    const stx = W * 0.78, sty = H - 26 - H * 0.075;
    ctx.beginPath();
    ctx.moveTo(stx - H * 0.11, sty + H * 0.075);
    ctx.quadraticCurveTo(stx - H * 0.12, sty - H * 0.05, stx - H * 0.02, sty - H * 0.075);
    ctx.quadraticCurveTo(stx + H * 0.10, sty - H * 0.06, stx + H * 0.11, sty + H * 0.02);
    ctx.quadraticCurveTo(stx + H * 0.11, sty + H * 0.075, stx, sty + H * 0.08);
    ctx.closePath();
    ctx.fillStyle = STONE;
    ctx.fill();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = STONE_EDGE;
    ctx.stroke();
    /* стрелки на камне: вес заметно больше выталкивания */
    arrowV(ctx, stx - H * 0.05, sty - H * 0.01, sty + H * 0.10, GRAY, 8);
    arrowV(ctx, stx + H * 0.06, sty - H * 0.02, sty - H * 0.075, PURPLE, 7);

    /* стрелки на мяче: пока под водой — выталкивание растёт */
    const f = subFrac();
    if (f > 0.08) {
      arrowV(ctx, ball.x * W + R * 0.65, ball.y, ball.y - R * (0.9 + 2.2 * f), PURPLE, 9);
      arrowV(ctx, ball.x * W - R * 0.65, ball.y, ball.y + R * 1.0, GRAY, 7);
    }

    /* мяч */
    ctx.beginPath();
    ctx.arc(ball.x * W, ball.y, R, 0, Math.PI * 2);
    ctx.fillStyle = BALL;
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = BALL_EDGE;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ball.x * W - R * 0.75, ball.y - R * 0.45);
    ctx.quadraticCurveTo(ball.x * W, ball.y - R * 0.95, ball.x * W + R * 0.75, ball.y - R * 0.45);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ball.x * W - R * 0.75, ball.y + R * 0.45);
    ctx.quadraticCurveTo(ball.x * W, ball.y + R * 0.95, ball.x * W + R * 0.75, ball.y + R * 0.45);
    ctx.stroke();

    /* брызги */
    for (let i = drops.length - 1; i >= 0; i--) {
      const d = drops[i];
      d.vy += H * 3 * dt;
      d.x += d.vx * dt; d.y += d.vy * dt; d.life -= dt * 1.4;
      if (d.life <= 0 || d.y > ys + 10) { drops.splice(i, 1); continue; }
      ctx.globalAlpha = Math.max(0, d.life);
      ctx.beginPath();
      ctx.arc(d.x, d.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#8FC0EE';
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    /* подписи сил */
    ctx.font = '500 ' + Math.round(W * 0.036) + 'px ' + FONT;
    ctx.textAlign = 'left';
    ctx.fillStyle = PURPLE;
    ctx.fillText('выталкивание', W * 0.03, H * 0.09);
    ctx.fillStyle = GRAY;
    ctx.fillText('вес', W * 0.03, H * 0.09 + Math.round(W * 0.05));
    ctx.textAlign = 'start';

    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ШАГИ УРОКА
   ============================================================ */
const steps = [
  {
    phase: 'theory', type: 'interact', id: 'ball', visual: 'ball',
    title: 'Утопи мяч — если сможешь',
    text: 'Мяч лежит на воде и в упор не хочет тонуть. Схвати его, утащи на самое дно, подержи — а потом отпусти и смотри, что сделает вода.',
  },
  {
    phase: 'theory', type: 'info', visual: 'push', big: true,
    title: 'Вода выталкивает всё',
    text: 'Ты чувствовал это руками: чем глубже мяч, тем упорнее вода его выпихивает. Эта сила называется <b>выталкивающей</b>. Она действует на всё, что погружено в жидкость: на мяч, на подводную лодку — и даже на камень.',
  },
  {
    phase: 'theory', type: 'info', visual: 'stone', big: true,
    title: 'А почему камень тонет?',
    text: 'Камень вода тоже толкает вверх — просто его <b>вес больше</b> выталкивающей силы, и камень выигрывает это перетягивание каната. Так что вопрос не «выталкивает или нет», а <b>хватает ли силы</b>.',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Один вопрос — и тема твоя.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос',
    text: 'На дне пруда лежит камень. Действует ли на него выталкивающая сила?',
    options: [
      { id: 'a', text: 'Нет — раз утонул, значит, вода его не выталкивает', correct: false },
      { id: 'b', text: 'Да, но она меньше веса камня', correct: true },
      { id: 'c', text: 'Да, и она больше веса — просто камень застрял в иле', correct: false },
    ],
    right: 'Выталкивающая сила действует на любое погружённое тело. Камень на дне, потому что его вес больше этой силы.',
    wrong: 'Вспомни интерактив: вверх вода толкает и мяч, и камень. Просто у камня вес больше выталкивающей силы — поэтому он на дне.',
  },
];

/* ---------- визуалы шагов ---------- */
const visuals = {
  ball: () => `
    <div class="canvas-panel"><canvas id="ballCanvas" height="300"></canvas></div>
    <p class="canvas-hint" id="ballHint">Хватай мяч и <b>утащи под воду</b>. Потом отпусти!</p>`,
  push: () => `
    <svg viewBox="0 0 260 160" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="64" width="240" height="88" rx="10" fill="#BFDCF9"/>
      <path d="M10 68 Q130 76 250 68" fill="none" stroke="#5D9BE0" stroke-width="3" stroke-linecap="round"/>
      <circle cx="70" cy="106" r="24" fill="#F0B23C" stroke="#C98A2E" stroke-width="3"/>
      <rect x="150" y="92" width="34" height="28" rx="6" fill="#C9975C" stroke="#9C7040" stroke-width="2.5"/>
      <path d="M206 96 q10 -8 22 -2 q8 4 14 14 q-12 4 -22 0 q-10 -4 -14 -12 Z" fill="#8A8F9C" stroke="#5A5F6E" stroke-width="2.5"/>
      <g fill="#6240FF">
        <rect x="66" y="34" width="8" height="26" rx="4"/><path d="M70 22 L58 40 L82 40 Z"/>
        <rect x="163" y="46" width="8" height="24" rx="4"/><path d="M167 34 L155 52 L179 52 Z"/>
        <rect x="219" y="56" width="8" height="20" rx="4"/><path d="M223 44 L211 62 L235 62 Z"/>
        <animate attributeName="opacity" values=".45;1;.45" dur="2s" repeatCount="indefinite"/>
      </g>
      <text x="14" y="24" font-family="var(--font-display), sans-serif" font-weight="500" font-size="15" fill="#6240FF">выталкивающая сила — на всех</text>
    </svg>`,
  stone: () => `
    <svg viewBox="0 0 260 170" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="30" width="240" height="130" rx="10" fill="#BFDCF9"/>
      <path d="M10 34 Q130 42 250 34" fill="none" stroke="#5D9BE0" stroke-width="3" stroke-linecap="round"/>
      <!-- мяч: выталкивание побеждает -->
      <circle cx="72" cy="84" r="22" fill="#F0B23C" stroke="#C98A2E" stroke-width="3">
        <animate attributeName="cy" values="84;78;84" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <g fill="#6240FF">
        <rect x="94" y="46" width="9" height="30" rx="4.5"/><path d="M98.5 34 L85 52 L112 52 Z"/>
        <animate attributeName="opacity" values=".55;1;.55" dur="2.4s" repeatCount="indefinite"/>
      </g>
      <g fill="#6B7180"><rect x="52" y="96" width="7" height="16" rx="3.5"/><path d="M55.5 122 L44 106 L67 106 Z"/></g>
      <!-- камень: вес побеждает -->
      <path d="M170 120 q12 -14 30 -8 q16 6 18 22 q-14 8 -32 4 q-16 -4 -16 -18 Z" fill="#8A8F9C" stroke="#5A5F6E" stroke-width="2.5"/>
      <g fill="#6B7180"><rect x="206" y="116" width="9" height="26" rx="4.5"/><path d="M210.5 152 L197 136 L224 136 Z"/></g>
      <g fill="#6240FF">
        <rect x="180" y="98" width="7" height="14" rx="3.5"/><path d="M183.5 88 L173 102 L194 102 Z"/>
        <animate attributeName="opacity" values=".55;1;.55" dur="2.4s" repeatCount="indefinite"/>
      </g>
      <text x="46" y="20" font-family="var(--font-display), sans-serif" font-weight="500" font-size="15" fill="#6B7180">кто кого перетянет?</text>
    </svg>`,
};

/* ---------- интерактивы ---------- */
function onInteract(step, ctx) {
  if (step.id === 'ball') startBall(ctx.root, ctx.done);
}

runLesson({
  lessonId: 'why',
  storageKey: 'buoyancy-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-archimedes/',
  steps, visuals, onInteract,
});
</script>

</body>
