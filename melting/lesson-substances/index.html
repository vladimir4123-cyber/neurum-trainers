<script type="module">
import { runLesson } from '/assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 3 «У каждого вещества — своя полочка».
   График с переключением веществ — из монолита melting/legacy.html,
   перекрашен в светлую Neuroom-тему.
   ============================================================ */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}

const TXT = '#6B7180', AXIS = '#8A8F9C', LINE = '#6240FF', SHELF = '#E8590C';

function graphFrame(ctx, X0, Y0, W, H, o) {
  const L = X0 + o.left, R = X0 + W - (o.right || 16);
  const T = Y0 + (o.top || 16), B = Y0 + H - (o.bottom || 46);
  const gx = v => L + (v / o.xMax) * (R - L);
  const gy = v => B - ((v - o.yMin) / (o.yMax - o.yMin)) * (B - T);
  ctx.font = Math.round(W * 0.034) + 'px var(--font-display), sans-serif';
  ctx.textAlign = 'right';
  (o.yTicks || []).forEach(v => {
    const y = gy(v);
    ctx.strokeStyle = '#E4E7F0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(L, y); ctx.lineTo(R, y); ctx.stroke();
    ctx.fillStyle = AXIS;
    ctx.fillText(String(v), L - 8, y + 7);
  });
  ctx.textAlign = 'center';
  ctx.strokeStyle = AXIS;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(L, T); ctx.lineTo(L, B); ctx.lineTo(R, B); ctx.stroke();
  ctx.fillStyle = TXT;
  if (o.xLabel) ctx.fillText(o.xLabel, (L + R) / 2, Y0 + H - 4);
  if (o.yLabel) {
    ctx.save();
    ctx.translate(X0 + 18, (T + B) / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(o.yLabel, 0, 0);
    ctx.restore();
  }
  ctx.textAlign = 'start';
  return { gx, gy, L, R, T, B };
}

/* T(x): рост → полочка (0.35..0.65) → рост */
function substTAt(x, cfg) {
  if (x < 0.35) return cfg.start + (cfg.melt - cfg.start) * (x / 0.35);
  if (x < 0.65) return cfg.melt;
  return cfg.melt + (cfg.end - cfg.melt) * ((x - 0.65) / 0.35);
}

function drawSubstGraph(ctx, w, h, cfg, animProg) {
  const fr = graphFrame(ctx, 0, 0, w, h, {
    left: 88, right: 20, top: 20, bottom: 52,
    yMin: cfg.yMin, yMax: cfg.yMax, yTicks: cfg.ticks,
    xMax: 1, xLabel: 'время →', yLabel: 't, °C'
  });
  // пунктир температуры плавления
  const my = fr.gy(cfg.melt);
  ctx.setLineDash([7, 7]);
  ctx.strokeStyle = 'rgba(232,89,12,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(fr.L, my); ctx.lineTo(fr.R, my); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font = '700 ' + Math.round(w * 0.034) + 'px var(--font-display), sans-serif';
  ctx.fillStyle = SHELF;
  ctx.textAlign = 'right';
  ctx.fillText('t пл = ' + cfg.melt + ' °C', fr.R - 6, my - 10);
  ctx.textAlign = 'start';
  // кривая до animProg; полочка — оранжевым
  const steps = 120;
  let prev = null;
  for (let i = 1; i <= steps; i++) {
    const x = i / steps;
    if (x > animProg) break;
    const x0 = (i - 1) / steps;
    const p0 = prev || { px: fr.gx(x0), py: fr.gy(substTAt(x0, cfg)) };
    const p1 = { px: fr.gx(x), py: fr.gy(substTAt(x, cfg)) };
    const onShelf = x0 >= 0.35 && x <= 0.66;
    ctx.beginPath();
    ctx.strokeStyle = onShelf ? SHELF : LINE;
    ctx.lineWidth = onShelf ? 5 : 4;
    ctx.lineCap = 'round';
    ctx.moveTo(p0.px, p0.py);
    ctx.lineTo(p1.px, p1.py);
    ctx.stroke();
    prev = p1;
  }
  // бегущая точка
  if (animProg > 0 && animProg < 1) {
    const px = fr.gx(animProg), py = fr.gy(substTAt(animProg, cfg));
    ctx.beginPath();
    ctx.arc(px, py, 7, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = LINE;
    ctx.lineWidth = 3;
    ctx.fill();
    ctx.stroke();
  }
}

const SUBSTANCES = [
  { name: 'Лёд', melt: 0, start: -20, end: 40, yMin: -30, yMax: 50, ticks: [-20, 0, 20, 40],
    note: 'Лёд: полочка на 0 °C. Поэтому лимонад со льдом и держит ноль!' },
  { name: 'Парафин', melt: 55, start: 20, end: 90, yMin: 0, yMax: 100, ticks: [0, 25, 50, 75, 100],
    note: 'Парафин плавится примерно при 55 °C — поэтому свечка «плачет» уже от пламени фитиля.' },
  { name: 'Свинец', melt: 327, start: 20, end: 450, yMin: 0, yMax: 480, ticks: [0, 100, 200, 300, 400],
    note: 'Свинец: 327 °C. Его можно расплавить даже на плите — этим пользуются рыбаки, отливая грузила.' },
  { name: 'Железо', melt: 1539, start: 20, end: 1800, yMin: 0, yMax: 1900, ticks: [0, 500, 1000, 1500],
    note: 'Железо держится до 1539 °C — вот зачем металлургам домны и защитные костюмы.' }
];

/* ============================================================
   ИНТЕРАКТИВ: переключай вещества — график перестраивается
   ============================================================ */
function startSubst(root, done) {
  const canvas = root.querySelector('#substCanvas');
  const hint = root.querySelector('#substHint');
  const chips = [...root.querySelectorAll('.subst-chip')];
  const ctx = canvas.getContext('2d');
  let sel = 0, animStart = 0;
  const seen = new Set([0]);
  let doneFired = false;

  chips.forEach(ch => ch.addEventListener('click', () => {
    sel = +ch.dataset.i;
    animStart = performance.now() / 1000;
    chips.forEach(c => c.classList.remove('active'));
    ch.classList.add('active');
    hint.textContent = SUBSTANCES[sel].note;
    seen.add(sel);
    if (seen.size >= 3 && !doneFired) {
      doneFired = true;
      done();
    }
  }));

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 200);
    ctx.clearRect(0, 0, w, h);
    const cfg = SUBSTANCES[sel];
    const anim = animStart === 0 ? 1 : Math.min(1, (t - animStart) / 1.2);
    drawSubstGraph(ctx, w, h, cfg, anim);
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ШАГИ УРОКА
   ============================================================ */
const steps = [
  {
    phase: 'theory', type: 'interact', id: 'subst', visual: 'subst',
    title: 'У каждого вещества — своя полочка',
    text: 'Температура плавления — это <b>паспорт вещества</b>. Лёд сдаётся уже при 0 °C, а железо держится до 1539 °C. Переключи хотя бы три вещества и сравни высоту полочек.',
  },
  {
    phase: 'theory', type: 'info', visual: 'table', big: true,
    title: 'Шпаргалка: температуры плавления',
    text: 'Высота полочки на графике — это число из таблицы. Запомни четвёрку с картинками: лёд, парафин, свинец, железо. Она встретится в практике.',
  },
  {
    phase: 'theory', type: 'info', visual: 'freeze', big: true,
    title: 'А если наоборот — остывание?',
    text: 'Кристаллизация — зеркальный процесс плавления. Вода при 0 °C начинает замерзать, и температура снова <b>стоит на полочке</b> — только теперь энергия не поглощается, а <b>выделяется</b>: связи решётки собираются обратно. Полочка у замерзания и плавления одна и та же.',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Два вопроса — и разгадка лимонада твоя.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос 1',
    text: 'Вода при 0 °C начинает замерзать — кристаллизоваться. Что при этом происходит?',
    options: [
      { id: 'a', text: 'Температура резко падает ниже нуля', correct: false },
      { id: 'b', text: 'Температура держится на 0 °C, и вода отдаёт энергию', correct: true },
      { id: 'c', text: 'Вода поглощает энергию из воздуха', correct: false },
    ],
    right: 'Точно! Кристаллизация — зеркальный процесс: идёт при той же температуре 0 °C, только теперь энергия выделяется, а не поглощается.',
    wrong: 'Кристаллизация идёт при той же температуре, что и плавление, — 0 °C. И при этом энергия выделяется, а не поглощается.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос 2',
    text: 'Вернёмся к самой первой загадке: почему лёд в лимонаде не даёт ему нагреться, пока весь не растает?',
    options: [
      { id: 'a', text: 'Лёд отражает солнечные лучи от стакана', correct: false },
      { id: 'b', text: 'Всё приходящее тепло уходит на плавление льда, температура стоит на 0 °C', correct: true },
      { id: 'c', text: 'Лёд делает стекло холодным, и тепло не проходит внутрь', correct: false },
    ],
    right: 'Да! Пока в стакане есть лёд, всё приходящее тепло тратится на разрушение его решётки — и температура держится на 0 °C. Загадка разгадана!',
    wrong: 'Дело в плавлении: всё приходящее тепло уходит на разрушение решётки льда, поэтому температура стоит на 0 °C, пока лёд не растает.',
  },
];

/* ---------- визуалы шагов ---------- */
const visuals = {
  subst: () => `
    <div class="canvas-panel"><canvas id="substCanvas" height="200"></canvas></div>
    <div class="mini-actions">
      <button class="chip-btn subst-chip active" data-i="0">🧊 Лёд</button>
      <button class="chip-btn subst-chip" data-i="1">🕯 Парафин</button>
      <button class="chip-btn subst-chip" data-i="2">🔩 Свинец</button>
      <button class="chip-btn subst-chip" data-i="3">⚙️ Железо</button>
    </div>
    <p class="canvas-hint" id="substHint">${SUBSTANCES[0].note}</p>`,
  table: () => `
    <table class="melt-table">
      <tr><th>Вещество</th><th>t плавления</th></tr>
      <tr class="hl"><td>🧊 Лёд</td><td>0 °C</td></tr>
      <tr class="hl"><td>🕯 Парафин</td><td>≈ 55 °C</td></tr>
      <tr><td>Олово</td><td>232 °C</td></tr>
      <tr class="hl"><td>🔩 Свинец</td><td>327 °C</td></tr>
      <tr><td>Цинк</td><td>420 °C</td></tr>
      <tr><td>Медь</td><td>1085 °C</td></tr>
      <tr class="hl"><td>⚙️ Железо</td><td>1539 °C</td></tr>
      <tr><td>Вольфрам</td><td>3422 °C</td></tr>
    </table>`,
  freeze: () => `
    <svg viewBox="0 0 260 150" xmlns="http://www.w3.org/2000/svg">
      <line x1="36" y1="14" x2="36" y2="122" stroke="#8A8F9C" stroke-width="2.5"/>
      <line x1="36" y1="122" x2="244" y2="122" stroke="#8A8F9C" stroke-width="2.5"/>
      <line x1="36" y1="68" x2="244" y2="68" stroke="#2F80ED" stroke-width="1.5" stroke-dasharray="5 5" opacity=".5"/>
      <text x="30" y="73" text-anchor="end" font-family="var(--font-display), sans-serif" font-size="13" fill="#8A8F9C">0°</text>
      <polyline points="36,24 88,68" fill="none" stroke="#6240FF" stroke-width="4" stroke-linecap="round"/>
      <line x1="88" y1="68" x2="172" y2="68" stroke="#E8590C" stroke-width="5" stroke-linecap="round">
        <animate attributeName="opacity" values="1;.5;1" dur="1.8s" repeatCount="indefinite"/>
      </line>
      <polyline points="172,68 226,112" fill="none" stroke="#6240FF" stroke-width="4" stroke-linecap="round"/>
      <circle r="5.5" fill="#fff" stroke="#6240FF" stroke-width="3">
        <animateMotion path="M36,24 L88,68 L172,68 L226,112" dur="3.4s" repeatCount="indefinite"/>
      </circle>
      <text x="130" y="54" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="600" font-size="14" fill="#E8590C">кристаллизация</text>
      <g font-family="var(--font-display), sans-serif" font-size="12" fill="#6B7180">
        <text x="130" y="90" text-anchor="middle">энергия выделяется</text>
        <text x="140" y="142" text-anchor="middle">время →</text>
      </g>
    </svg>`,
};

/* ---------- интерактивы ---------- */
function onInteract(step, ctx) {
  if (step.id === 'subst') startSubst(ctx.root, ctx.done);
}

runLesson({
  lessonId: 'substances',
  storageKey: 'melting-progress',
  homeHref: '../demo/',
  steps, visuals, onInteract,
});
</script>
