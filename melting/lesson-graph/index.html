<script type="module">
import { runLesson } from '/assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 2 «Плавим лёд: график с полочкой».
   Живой график T(t) и кристаллическая решётка — из монолита,
   перекрашены в светлую Neuroom-тему.
   ============================================================ */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}

const FRAME = '#C9CEDA', TXT = '#6B7180', AXIS = '#8A8F9C';
const LINE = '#6240FF', SHELF = '#E8590C';

function drawThermo(ctx, cx, top, len, T, Tmin, Tmax) {
  const frac = Math.max(0, Math.min(1, (T - Tmin) / (Tmax - Tmin)));
  const tubeW = 12, bulbR = 14;
  const bottom = top + len;
  ctx.beginPath();
  ctx.roundRect(cx - tubeW / 2, top, tubeW, len, 6);
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();
  ctx.strokeStyle = FRAME;
  ctx.lineWidth = 2;
  ctx.stroke();
  const colH = frac * (len - 8);
  ctx.beginPath();
  ctx.roundRect(cx - 4, bottom - 4 - colH, 8, colH + 4, 4);
  ctx.fillStyle = '#E5484D';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, bottom + bulbR - 4, bulbR, 0, Math.PI * 2);
  ctx.fillStyle = '#E5484D';
  ctx.fill();
  ctx.strokeStyle = FRAME;
  ctx.stroke();
  ctx.font = '700 ' + Math.round(len * 0.12) + 'px var(--font-display), sans-serif';
  ctx.fillStyle = TXT;
  ctx.textAlign = 'center';
  ctx.fillText(Math.round(T) + ' °C', cx, top - 10);
  ctx.textAlign = 'start';
}

function drawFlame(ctx, cx, cy, size, t, intensity) {
  if (size <= 1 || intensity <= 0) return;
  const flick = 1 + Math.sin(t * 13 + cx) * 0.09 + Math.sin(t * 29) * 0.05;
  [
    { r: 1.0, color: 'rgba(232,89,12,0.45)' },
    { r: 0.68, color: 'rgba(245,185,59,0.8)' },
    { r: 0.36, color: 'rgba(255,244,214,0.95)' }
  ].forEach(L => {
    const hgt = size * L.r * flick;
    const wdt = size * 0.55 * L.r;
    ctx.beginPath();
    ctx.moveTo(cx, cy - hgt);
    ctx.bezierCurveTo(cx + wdt, cy - hgt * 0.45, cx + wdt * 0.8, cy, cx, cy);
    ctx.bezierCurveTo(cx - wdt * 0.8, cy, cx - wdt, cy - hgt * 0.45, cx, cy - hgt);
    ctx.fillStyle = L.color;
    ctx.fill();
  });
}

/* Оси графика в светлой палитре; возвращает мапперы координат */
function graphFrame(ctx, X0, Y0, W, H, o) {
  const L = X0 + o.left, R = X0 + W - (o.right || 16);
  const T = Y0 + (o.top || 16), B = Y0 + H - (o.bottom || 46);
  const gx = v => L + (v / o.xMax) * (R - L);
  const gy = v => B - ((v - o.yMin) / (o.yMax - o.yMin)) * (B - T);
  ctx.font = Math.round(W * 0.034) + 'px var(--font-display), sans-serif';
  ctx.textAlign = 'right';
  (o.yTicks || []).forEach(v => {
    const y = gy(v);
    ctx.strokeStyle = '#E4E7F0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(L, y); ctx.lineTo(R, y); ctx.stroke();
    ctx.fillStyle = AXIS;
    ctx.fillText(String(v), L - 8, y + 7);
  });
  ctx.textAlign = 'center';
  (o.xTicks || []).forEach(tk => {
    const x = gx(tk.v);
    ctx.strokeStyle = '#EDEFF5';
    ctx.beginPath(); ctx.moveTo(x, T); ctx.lineTo(x, B); ctx.stroke();
    ctx.fillStyle = AXIS;
    ctx.fillText(tk.l, x, B + 26);
  });
  ctx.strokeStyle = AXIS;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(L, T); ctx.lineTo(L, B); ctx.lineTo(R, B); ctx.stroke();
  ctx.fillStyle = TXT;
  if (o.xLabel) ctx.fillText(o.xLabel, (L + R) / 2, Y0 + H - 4);
  if (o.yLabel) {
    ctx.save();
    ctx.translate(X0 + 18, (T + B) / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(o.yLabel, 0, 0);
    ctx.restore();
  }
  ctx.textAlign = 'start';
  return { gx, gy, L, R, T, B };
}

/* Кристаллики льда */
function drawIceBlock(ctx, cx, bottomY, cols, rows, cell, amp, t, alpha) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const jx = Math.sin(t * 7 + r * 3.1 + c * 1.7) * amp;
      const jy = Math.cos(t * 6.3 + r * 1.3 + c * 2.9) * amp;
      const x = cx + (c - (cols - 1) / 2) * cell + jx;
      const y = bottomY - r * cell - cell / 2 + jy;
      const s = cell * 0.34;
      ctx.beginPath();
      ctx.moveTo(x, y - s);
      ctx.lineTo(x + s, y);
      ctx.lineTo(x, y + s);
      ctx.lineTo(x - s, y);
      ctx.closePath();
      ctx.fillStyle = `rgba(160,205,255,${0.85 * alpha})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(47,128,237,${0.7 * alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

/* ============================================================
   ИНТЕРАКТИВ 1: плавим лёд, график рисуется сам
   ============================================================ */
function startMelt(root, done) {
  const canvas = root.querySelector('#meltCanvas');
  const startBtn = root.querySelector('#meltStartBtn');
  const resetBtn = root.querySelector('#meltResetBtn');
  const chips = [...root.querySelectorAll('.speed-chip')];
  const label = root.querySelector('#meltHint');
  const ctx = canvas.getContext('2d');
  const MELT_XMAX = 21;
  const melt = {
    running: false, speed: 1, time: 0, T: -20,
    phase: 'idle', prog: 0, hist: [], prevT: null, shownPhase: ''
  };
  let doneFired = false;

  chips.forEach(ch => ch.addEventListener('click', () => {
    melt.speed = +ch.dataset.speed;
    chips.forEach(c => c.classList.remove('active'));
    ch.classList.add('active');
  }));

  function updateBtn() {
    startBtn.textContent = melt.running ? '⏸ Пауза'
      : melt.phase === 'idle' ? '▶ Начать нагрев'
      : melt.phase === 'done' ? '↺ Ещё раз' : '▶ Продолжить';
  }

  startBtn.addEventListener('click', () => {
    if (melt.phase === 'done') reset();
    melt.running = !melt.running;
    if (melt.running && melt.phase === 'idle') {
      melt.phase = 'ice';
      melt.hist.push({ x: 0, y: melt.T });
    }
    updateBtn();
  });
  resetBtn.addEventListener('click', reset);

  function reset() {
    melt.running = false; melt.time = 0; melt.T = -20;
    melt.phase = 'idle'; melt.prog = 0; melt.hist = []; melt.shownPhase = '';
    updateBtn();
    setLabel();
  }

  function setLabel() {
    if (melt.shownPhase === melt.phase) return;
    melt.shownPhase = melt.phase;
    label.innerHTML = {
      idle: 'Нажми «Начать нагрев» — и следи за графиком справа.',
      ice: '🔥 Лёд нагревается: −20 °C → 0 °C. Молекулы дрожат всё сильнее.',
      melt: '🧊→💧 <b>Плавление: температура замерла на 0 °C!</b> Хотя горелка работает на полную.',
      water: '💧 Весь лёд растаял — энергия снова разгоняет молекулы, температура растёт.',
      done: '✅ Готово! Рост → полочка → рост. Это и есть график плавления.'
    }[melt.phase];
    if ((melt.phase === 'water' || melt.phase === 'done') && !doneFired) {
      doneFired = true;
      done();
    }
  }

  function update(t) {
    let dt = 0;
    if (melt.prevT !== null) dt = Math.min(0.05, Math.max(0, t - melt.prevT));
    melt.prevT = t;
    if (!melt.running) return;
    const d = dt * melt.speed;
    if (melt.phase === 'ice') {
      melt.T += 10 * d;
      if (melt.T >= 0) { melt.T = 0; melt.phase = 'melt'; }
    } else if (melt.phase === 'melt') {
      melt.prog += d / 8;
      melt.T = 0;
      if (melt.prog >= 1) { melt.prog = 1; melt.phase = 'water'; }
    } else if (melt.phase === 'water') {
      melt.T += 6 * d;
      if (melt.T >= 60) { melt.T = 60; melt.phase = 'done'; melt.running = false; updateBtn(); }
    }
    melt.time += d;
    const last = melt.hist[melt.hist.length - 1];
    if (!last || melt.time - last.x >= 0.12 || melt.phase === 'done') {
      melt.hist.push({ x: melt.time, y: melt.T });
    }
    setLabel();
  }

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 230);
    ctx.clearRect(0, 0, w, h);
    update(t);

    // ── слева: стакан на горелке ──
    const bx = w * 0.035, bw = w * 0.24;
    const byT = h * 0.12, bh = h * 0.56;
    const bcx = bx + bw / 2, bBot = byT + bh;
    const waterFrac = melt.phase === 'ice' || melt.phase === 'idle' ? 0 : (melt.phase === 'melt' ? melt.prog : 1);
    const waterH = waterFrac * bh * 0.72;
    if (waterH > 1) {
      const warm = Math.max(0, melt.T) / 60;
      ctx.beginPath();
      ctx.rect(bx + 4, bBot - 4 - waterH, bw - 8, waterH);
      ctx.fillStyle = `rgba(${Math.round(47 + warm * 120)},${Math.round(128 - warm * 30)},237,0.3)`;
      ctx.fill();
      if (melt.T > 30) {
        for (let k = 0; k < 4; k++) {
          const bp = ((t * 0.5 + k * 0.26) % 1);
          ctx.beginPath();
          ctx.arc(bcx + Math.sin(k * 5.1) * bw * 0.28, bBot - 8 - bp * (waterH - 12), 2.5, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(47,128,237,0.4)';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
    }
    if (melt.phase === 'idle' || melt.phase === 'ice') {
      const amp = 1 + ((melt.T + 20) / 20) * 2.2;
      drawIceBlock(ctx, bcx, bBot - 8, 5, 4, bw / 6, melt.running ? amp : 1, t, 1);
    } else if (melt.phase === 'melt') {
      const remain = 1 - melt.prog;
      const rows = Math.max(1, Math.round(4 * remain));
      const cols = Math.max(1, Math.round(5 * remain));
      drawIceBlock(ctx, bcx, bBot - 6 - waterH, cols, rows, bw / 6, 2.6, t, 0.4 + remain * 0.6);
    }
    // стенки стакана
    ctx.beginPath();
    ctx.moveTo(bx, byT);
    ctx.lineTo(bx, bBot);
    ctx.lineTo(bx + bw, bBot);
    ctx.lineTo(bx + bw, byT);
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 3;
    ctx.stroke();
    // горелка
    const fy = h * 0.87;
    ctx.beginPath();
    ctx.roundRect(bx + bw * 0.25, fy, bw * 0.5, 7, 4);
    ctx.fillStyle = FRAME;
    ctx.fill();
    if (melt.running || (melt.phase !== 'idle' && melt.phase !== 'done')) {
      drawFlame(ctx, bcx, fy, h * 0.11 * (melt.running ? 1 : 0.4), t, 1);
    }

    drawThermo(ctx, w * 0.335, h * 0.14, h * 0.52, melt.T, -30, 80);

    // ── справа: живой график ──
    const gX = w * 0.40, gW = w * 0.60;
    const fr = graphFrame(ctx, gX, 0, gW, h, {
      left: 62, right: 14, top: 18, bottom: 50,
      yMin: -30, yMax: 80, yTicks: [-20, 0, 20, 40, 60, 80],
      xMax: MELT_XMAX,
      xTicks: [{ v: 0, l: '0' }, { v: 5, l: '5' }, { v: 10, l: '10' }, { v: 15, l: '15' }, { v: 20, l: '20' }],
      xLabel: 'время, с', yLabel: 't, °C'
    });
    const zy = fr.gy(0);
    ctx.setLineDash([6, 6]);
    ctx.strokeStyle = 'rgba(47,128,237,0.45)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fr.L, zy); ctx.lineTo(fr.R, zy); ctx.stroke();
    ctx.setLineDash([]);
    if (melt.hist.length > 1) {
      ctx.beginPath();
      ctx.strokeStyle = LINE;
      ctx.lineWidth = 4;
      melt.hist.forEach((p, i) => {
        const px = fr.gx(Math.min(p.x, MELT_XMAX)), py = fr.gy(p.y);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      });
      ctx.stroke();
      const lastP = melt.hist[melt.hist.length - 1];
      ctx.beginPath();
      ctx.arc(fr.gx(Math.min(lastP.x, MELT_XMAX)), fr.gy(lastP.y), 7, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = LINE;
      ctx.lineWidth = 3;
      ctx.fill();
      ctx.stroke();
    }
    if (melt.phase === 'melt' || melt.phase === 'water' || melt.phase === 'done') {
      ctx.font = '700 ' + Math.round(w * 0.034) + 'px var(--font-display), sans-serif';
      ctx.fillStyle = SHELF;
      ctx.fillText('полочка 0 °C', fr.gx(4.5), zy - 12);
    }
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  updateBtn();
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ИНТЕРАКТИВ 2: кристаллическая решётка — куда идёт энергия
   ============================================================ */
function startLattice(root, done) {
  const canvas = root.querySelector('#latCanvas');
  const slider = root.querySelector('#energySlider');
  const valEl = root.querySelector('#energyVal');
  const msg = root.querySelector('#latHint');
  const ctx = canvas.getContext('2d');
  const COLS = 8, ROWS = 4, N = COLS * ROWS;
  const order = [];
  for (let i = 0; i < N; i++) order.push((i * 13 + 7) % N);
  const free = [];
  for (let i = 0; i < N; i++) free.push({ free: false, x: 0, y: 0, vx: 0, vy: 0 });
  let prevT = null, msgBucket = -1, doneFired = false;

  slider.addEventListener('input', () => {
    const e = +slider.value;
    valEl.textContent = e + '%';
    const bucket = e === 0 ? 0 : e < 50 ? 1 : e < 100 ? 2 : 3;
    if (bucket !== msgBucket) {
      msgBucket = bucket;
      msg.innerHTML = [
        'Двигай ползунок — подводи энергию к решётке.',
        'Связи рвутся! А скорость частиц — <b>та же самая</b>. Термометр стоит на 0 °C.',
        'Уже половина решётки разрушена. Температура всё ещё 0 °C!',
        '<b>Решётка разрушена — лёд стал водой!</b> Теперь энергия снова будет разгонять молекулы.'
      ][bucket];
      if (bucket === 3 && !doneFired) {
        doneFired = true;
        done();
      }
    }
  });

  function site(i, w, h) {
    const c = i % COLS, r = (i / COLS) | 0;
    return {
      x: w * 0.14 + (c / (COLS - 1)) * w * 0.72,
      y: h * 0.16 + (r / (ROWS - 1)) * h * 0.44
    };
  }

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 210);
    ctx.clearRect(0, 0, w, h);
    let dt = 0.016;
    if (prevT !== null) dt = Math.min(0.05, Math.max(0, t - prevT));
    prevT = t;

    const e = +slider.value;
    const nBroken = Math.round(N * e / 100);
    const isBroken = i => order[i] < nBroken;

    // связи-пружинки между соседями
    ctx.lineWidth = 2;
    for (let i = 0; i < N; i++) {
      if (isBroken(i)) continue;
      const c = i % COLS, r = (i / COLS) | 0;
      const s1 = site(i, w, h);
      [[c + 1, r], [c, r + 1]].forEach(([nc, nr]) => {
        if (nc >= COLS || nr >= ROWS) return;
        const j = nr * COLS + nc;
        if (isBroken(j)) return;
        const s2 = site(j, w, h);
        const mx = (s1.x + s2.x) / 2 + Math.sin(t * 8 + i * 1.3) * 2;
        const my = (s1.y + s2.y) / 2 + Math.cos(t * 7 + i * 2.1) * 2;
        ctx.beginPath();
        ctx.moveTo(s1.x, s1.y);
        ctx.quadraticCurveTo(mx, my, s2.x, s2.y);
        ctx.strokeStyle = 'rgba(47,128,237,0.3)';
        ctx.stroke();
      });
    }

    // частицы: дрожь одинаковая = температура не растёт
    const JIT = 3.2, FREE_SPEED = 55;
    for (let i = 0; i < N; i++) {
      const s = site(i, w, h);
      const st = free[i];
      let px, py, freeNow = isBroken(i);
      if (freeNow && !st.free) {
        st.free = true;
        st.x = s.x; st.y = s.y;
        const a = (i * 2.39996) % (Math.PI * 2);
        st.vx = Math.cos(a) * FREE_SPEED;
        st.vy = Math.sin(a) * FREE_SPEED;
      }
      if (!freeNow && st.free) st.free = false;

      if (st.free) {
        st.x += st.vx * dt;
        st.y += st.vy * dt;
        const pad = 14;
        if (st.x < pad) { st.x = pad; st.vx = Math.abs(st.vx); }
        if (st.x > w - pad) { st.x = w - pad; st.vx = -Math.abs(st.vx); }
        if (st.y < pad) { st.y = pad; st.vy = Math.abs(st.vy); }
        if (st.y > h * 0.72) { st.y = h * 0.72; st.vy = -Math.abs(st.vy); }
        px = st.x + Math.sin(t * 9 + i) * JIT;
        py = st.y + Math.cos(t * 8 + i * 1.7) * JIT;
      } else {
        px = s.x + Math.sin(t * 9 + i * 2.3) * JIT;
        py = s.y + Math.cos(t * 8 + i * 1.7) * JIT;
      }
      ctx.beginPath();
      ctx.arc(px, py, 8, 0, Math.PI * 2);
      ctx.fillStyle = st.free ? '#2F80ED' : 'rgba(47,128,237,0.55)';
      ctx.fill();
    }

    // искры энергии снизу
    if (e > 0) {
      const nSp = Math.min(9, 1 + (e / 12) | 0);
      for (let k = 0; k < nSp; k++) {
        const cycle = h * 0.35;
        const yy = h * 0.98 - ((t * 60 + k * 91) % cycle);
        const xx = w * 0.1 + ((k * 137) % (w * 0.8 | 0)) + Math.sin(t * 4 + k) * 8;
        const alpha = (h * 0.98 - yy) / cycle;
        ctx.beginPath();
        ctx.arc(xx, yy, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232,89,12,${0.9 - alpha * 0.7})`;
        ctx.fill();
      }
      drawFlame(ctx, w * 0.5, h * 0.995, h * 0.07 + e * h * 0.0007, t, 1);
    }
    ctx.font = '600 ' + Math.round(w * 0.03) + 'px var(--font-display), sans-serif';
    ctx.fillStyle = TXT;
    ctx.textAlign = 'center';
    ctx.fillText('кристаллическая решётка льда · 0 °C', w / 2, h * 0.86);
    ctx.textAlign = 'start';
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}
