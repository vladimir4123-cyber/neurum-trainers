/* ============================================================
   ТЕМА 1 «Нагревание — разгон молекул».
   Интерактивы перенесены из старого монолита melting/legacy.html
   и перекрашены в светлую Neuroom-тему.
   ============================================================ */

/* ---------- общие рисовалки ---------- */
function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}

/* палитра на светлом фоне */
const COLD = { r: 47, g: 128, b: 237 };   // #2F80ED
const HOT  = { r: 229, g: 72, b: 77 };    // #E5484D
const FRAME = '#C9CEDA', TXT = '#6B7180';

function molColor(hot) {
  const R = Math.round(COLD.r + (HOT.r - COLD.r) * hot);
  const G = Math.round(COLD.g + (HOT.g - COLD.g) * hot);
  const B = Math.round(COLD.b + (HOT.b - COLD.b) * hot);
  return `rgba(${R},${G},${B},0.92)`;
}

function drawThermo(ctx, cx, top, len, T, Tmin, Tmax, label) {
  const frac = Math.max(0, Math.min(1, (T - Tmin) / (Tmax - Tmin)));
  const tubeW = 12, bulbR = 15;
  const bottom = top + len;
  ctx.beginPath();
  ctx.roundRect(cx - tubeW / 2, top, tubeW, len, 6);
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();
  ctx.strokeStyle = FRAME;
  ctx.lineWidth = 2;
  ctx.stroke();
  const colH = frac * (len - 8);
  ctx.beginPath();
  ctx.roundRect(cx - 4, bottom - 4 - colH, 8, colH + 4, 4);
  ctx.fillStyle = '#E5484D';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, bottom + bulbR - 4, bulbR, 0, Math.PI * 2);
  ctx.fillStyle = '#E5484D';
  ctx.fill();
  ctx.strokeStyle = FRAME;
  ctx.stroke();
  ctx.font = '700 ' + Math.round(len * 0.12) + 'px var(--font-display), sans-serif';
  ctx.fillStyle = TXT;
  ctx.textAlign = 'center';
  ctx.fillText((label !== undefined ? label : Math.round(T) + ' °C'), cx, top - 12);
  ctx.textAlign = 'start';
}

function drawFlame(ctx, cx, cy, size, t, intensity) {
  if (size <= 1 || intensity <= 0) return;
  const flick = 1 + Math.sin(t * 13 + cx) * 0.09 + Math.sin(t * 29) * 0.05;
  const layers = [
    { r: 1.0, color: 'rgba(232,89,12,0.45)' },
    { r: 0.68, color: 'rgba(245,185,59,0.8)' },
    { r: 0.36, color: 'rgba(255,244,214,0.95)' }
  ];
  layers.forEach(L => {
    const hgt = size * L.r * flick;
    const wdt = size * 0.55 * L.r;
    ctx.beginPath();
    ctx.moveTo(cx, cy - hgt);
    ctx.bezierCurveTo(cx + wdt, cy - hgt * 0.45, cx + wdt * 0.8, cy, cx, cy);
    ctx.bezierCurveTo(cx - wdt * 0.8, cy, cx - wdt, cy - hgt * 0.45, cx, cy - hgt);
    ctx.fillStyle = L.color;
    ctx.fill();
  });
}

/* ============================================================
   ИНТЕРАКТИВ 1: лимонад на жаре — термометр застрял на нуле
   ============================================================ */
function startHook(root, done) {
  const canvas = root.querySelector('#hookCanvas');
  const btn = root.querySelector('#hookBtn');
  const hint = root.querySelector('#hookHint');
  const ctx = canvas.getContext('2d');
  let minutes = 0, burstT = -9, finished = false;

  btn.addEventListener('click', () => {
    if (finished) return;
    minutes += 5;
    burstT = performance.now() / 1000;
    if (minutes === 5) {
      hint.innerHTML = 'Прошло 5 минут на солнце. Термометр… <b>всё ещё 0 °C</b>. Подожди ещё.';
    }
    if (minutes >= 10) {
      finished = true;
      btn.disabled = true;
      btn.textContent = 'Термометр так и стоит на нуле';
      hint.innerHTML = '🤔 10 минут жары — а лимонад держит <b>ровно 0 °C</b>, пока в нём есть лёд. Куда девается тепло? Разберёмся.';
      done();
    }
  });

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 210);
    ctx.clearRect(0, 0, w, h);
    const boost = Math.max(0, 1 - (t - burstT) / 1.2);   // вспышка солнца после клика

    // ── солнце ──
    const sx = w * 0.82, sy = h * 0.2, sr = h * 0.11;
    const pulse = 1 + Math.sin(t * 2) * 0.06 + boost * 0.25;
    for (let i = 0; i < 10; i++) {
      const a = t * 0.3 + (i / 10) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(a) * sr * 1.35 * pulse, sy + Math.sin(a) * sr * 1.35 * pulse);
      ctx.lineTo(sx + Math.cos(a) * sr * (1.75 + boost * 0.5 + Math.sin(t * 3 + i) * 0.12), sy + Math.sin(a) * sr * (1.75 + boost * 0.5 + Math.sin(t * 3 + i) * 0.12));
      ctx.strokeStyle = 'rgba(245,185,59,0.9)';
      ctx.lineWidth = 4;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(sx, sy, sr * pulse, 0, Math.PI * 2);
    ctx.fillStyle = '#F5B93B';
    ctx.fill();

    // ── тепловые волны от солнца к стакану ──
    const gx0 = w * 0.38, gy0 = h * 0.45;
    for (let k = 0; k < 3; k++) {
      const prog = ((t * 0.4 + k / 3) % 1);
      const px = sx + (gx0 - sx) * prog;
      const py = sy + (gy0 - sy) * prog + Math.sin(prog * 10 + t * 3) * 6;
      ctx.font = '22px serif';
      ctx.globalAlpha = (0.45 + boost * 0.4) * Math.sin(prog * Math.PI);
      ctx.fillStyle = '#E8590C';
      ctx.fillText('〜', px, py);
      ctx.globalAlpha = 1;
    }

    // ── стакан лимонада ──
    const gcx = w * 0.32, gTop = h * 0.22, gBot = h * 0.9;
    const gwTop = w * 0.20, gwBot = w * 0.16;
    const lemTop = gTop + (gBot - gTop) * 0.18;
    const lw1 = gwTop - (gwTop - gwBot) * 0.18;
    ctx.beginPath();
    ctx.moveTo(gcx - lw1 / 2, lemTop);
    ctx.lineTo(gcx - gwBot / 2, gBot - 4);
    ctx.lineTo(gcx + gwBot / 2, gBot - 4);
    ctx.lineTo(gcx + lw1 / 2, lemTop);
    ctx.closePath();
    ctx.fillStyle = 'rgba(245,185,59,0.28)';
    ctx.fill();
    // пузырьки
    for (let k = 0; k < 5; k++) {
      const bp = ((t * 0.25 + k * 0.21) % 1);
      const bx = gcx + Math.sin(k * 7.3) * gwBot * 0.32;
      const by = gBot - 10 - bp * (gBot - lemTop - 24);
      ctx.beginPath();
      ctx.arc(bx, by, 2.5 + (k % 3), 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(47,128,237,0.35)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    // кубики льда
    [[-0.28, 0.06, 0], [0.1, 0.02, 1.9], [0.3, 0.1, 4.1]].forEach(([dx, dy, ph]) => {
      const ix = gcx + dx * gwTop;
      const iy = lemTop + (0.06 + dy) * (gBot - gTop) + Math.sin(t * 1.6 + ph) * 3;
      const s = w * 0.035;
      ctx.save();
      ctx.translate(ix, iy);
      ctx.rotate(Math.sin(t * 0.9 + ph) * 0.14 + ph * 0.2);
      ctx.beginPath();
      ctx.roundRect(-s / 2, -s / 2, s, s, 5);
      ctx.fillStyle = 'rgba(160,205,255,0.9)';
      ctx.fill();
      ctx.strokeStyle = '#2F80ED';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    });
    // стенки стакана
    ctx.beginPath();
    ctx.moveTo(gcx - gwTop / 2, gTop);
    ctx.lineTo(gcx - gwBot / 2, gBot);
    ctx.lineTo(gcx + gwBot / 2, gBot);
    ctx.lineTo(gcx + gwTop / 2, gTop);
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 3;
    ctx.stroke();
    // трубочка
    ctx.beginPath();
    ctx.moveTo(gcx + gwTop * 0.18, lemTop + 10);
    ctx.lineTo(gcx + gwTop * 0.42, gTop - h * 0.06);
    ctx.strokeStyle = '#E5484D';
    ctx.lineWidth = 6;
    ctx.stroke();

    // ── термометр, застрявший на нуле ──
    drawThermo(ctx, w * 0.58, h * 0.3, h * 0.42, 0, -20, 40, '0 °C');
    ctx.font = '600 ' + Math.round(w * 0.032) + 'px var(--font-display), sans-serif';
    ctx.fillStyle = TXT;
    ctx.textAlign = 'center';
    ctx.fillText('и не растёт!', w * 0.58, h * 0.92);
    // счётчик минут
    ctx.textAlign = 'left';
    ctx.font = '700 ' + Math.round(w * 0.036) + 'px var(--font-display), sans-serif';
    ctx.fillStyle = '#6240FF';
    ctx.fillText('прошло: ' + minutes + ' мин', w * 0.04, h * 0.1);
    ctx.textAlign = 'start';

    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ИНТЕРАКТИВ 2: мощность горелки — молекулы разгоняются
   ============================================================ */
function startHeat(root, done) {
  const canvas = root.querySelector('#heatCanvas');
  const slider = root.querySelector('#powerSlider');
  const valEl = root.querySelector('#powerVal');
  const cap = root.querySelector('#heatHint');
  const ctx = canvas.getContext('2d');
  let heatT = 20, prevT = null, capBucket = -1, finished = false;

  const parts = [];
  for (let i = 0; i < 34; i++) {
    const a = Math.random() * Math.PI * 2;
    parts.push({ x: Math.random(), y: Math.random(), dx: Math.cos(a), dy: Math.sin(a) });
  }

  slider.addEventListener('input', () => {
    const v = +slider.value;
    valEl.textContent = v <= 3 ? 'слабая' : v <= 7 ? 'средняя' : 'сильная';
    if (v >= 9 && !finished) {
      finished = true;
      done();
    }
  });

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 200);
    ctx.clearRect(0, 0, w, h);

    let dt = 0.016;
    if (prevT !== null) dt = Math.min(0.05, Math.max(0, t - prevT));
    prevT = t;

    const power = +slider.value;
    const target = 20 + power * 8;   // 20..100 °C
    heatT += (target - heatT) * Math.min(1, dt * 0.6);

    // сосуд
    const bx = w * 0.1, byT = h * 0.08, bw = w * 0.6, bh = h * 0.62;
    ctx.beginPath();
    ctx.roundRect(bx, byT, bw, bh, 10);
    ctx.fillStyle = 'rgba(47,128,237,0.06)';
    ctx.fill();
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 3;
    ctx.stroke();

    // молекулы
    const sp = (0.06 + (heatT / 100) * 0.55) * dt * 60;
    const hot = heatT / 100;
    parts.forEach((p, i) => {
      p.x += p.dx * sp * 0.016;
      p.y += p.dy * sp * 0.016;
      if (p.x < 0.03) { p.x = 0.03; p.dx = Math.abs(p.dx); }
      if (p.x > 0.97) { p.x = 0.97; p.dx = -Math.abs(p.dx); }
      if (p.y < 0.05) { p.y = 0.05; p.dy = Math.abs(p.dy); }
      if (p.y > 0.95) { p.y = 0.95; p.dy = -Math.abs(p.dy); }
      const ang = Math.sin(t * 3 + i * 13.7) * 0.06;
      const ndx = p.dx * Math.cos(ang) - p.dy * Math.sin(ang);
      const ndy = p.dx * Math.sin(ang) + p.dy * Math.cos(ang);
      p.dx = ndx; p.dy = ndy;

      ctx.beginPath();
      ctx.arc(bx + 8 + p.x * (bw - 16), byT + 8 + p.y * (bh - 16), 5.5, 0, Math.PI * 2);
      ctx.fillStyle = molColor(hot);
      ctx.fill();
    });

    // горелка + пламя
    const fy = byT + bh + h * 0.21;
    ctx.beginPath();
    ctx.roundRect(bx + bw * 0.3, fy, bw * 0.4, 8, 4);
    ctx.fillStyle = FRAME;
    ctx.fill();
    drawFlame(ctx, bx + bw / 2, fy, h * 0.06 + power * h * 0.016, t, power);

    // термометр
    drawThermo(ctx, w * 0.85, h * 0.12, h * 0.55, heatT, 0, 110);

    // подпись состояния
    const bucket = heatT < 35 ? 0 : heatT < 65 ? 1 : 2;
    if (bucket !== capBucket && !finished) {
      capBucket = bucket;
      cap.innerHTML = [
        'Молекулы лениво покачиваются — вода прохладная.',
        'Молекулы двигаются заметно быстрее — вода нагрелась.',
        'Молекулы носятся как угорелые — <b>почти кипяток!</b>'
      ][bucket];
    }
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}
