<svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Сила трения: плоский стиль §8 — санки и след на снегу -->
  <!-- Снежный склон-подложка -->
  <path d="M0 168 Q80 150 160 162 Q240 174 320 158 L320 240 L0 240 Z" fill="#EEF0FF"/>
  <path d="M0 178 Q90 162 170 172 Q250 182 320 170 L320 240 L0 240 Z" fill="#E3E7FA"/>
  <!-- След от полозьев -->
  <g fill="none" stroke="#C9CEDA" stroke-width="4" stroke-linecap="round" stroke-dasharray="18 14">
    <path d="M18 196 Q90 184 170 191 Q240 197 292 189"/>
    <path d="M24 210 Q96 198 176 205 Q246 211 298 203"/>
  </g>
  <!-- Санки -->
  <g transform="translate(178,116) rotate(3)">
    <!-- полозья -->
    <path d="M-64 66 Q-78 66 -78 52 Q-78 42 -66 42 L-60 42" fill="none" stroke="#B04A38" stroke-width="7" stroke-linecap="round"/>
    <path d="M-64 66 L58 66 Q72 66 76 54" fill="none" stroke="#B04A38" stroke-width="7" stroke-linecap="round"/>
    <!-- стойки -->
    <g stroke="#C96A4A" stroke-width="7" stroke-linecap="round">
      <line x1="-42" y1="62" x2="-42" y2="34"/>
      <line x1="8" y1="62" x2="8" y2="34"/>
      <line x1="48" y1="62" x2="48" y2="34"/>
    </g>
    <!-- сиденье-настил -->
    <rect x="-58" y="20" width="118" height="16" rx="8" fill="#E58B4A"/>
    <rect x="-58" y="20" width="118" height="16" rx="8" fill="none" stroke="#C96A3A" stroke-width="2.5"/>
    <line x1="-30" y1="23" x2="-30" y2="33" stroke="#C96A3A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="23" x2="2" y2="33" stroke="#C96A3A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="34" y1="23" x2="34" y2="33" stroke="#C96A3A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- верёвка -->
    <path d="M-58 26 Q-92 6 -108 -8" fill="none" stroke="#9AA0AA" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-108" cy="-8" r="6" fill="#6240FF"/>
  </g>
  <!-- Стрелка скорости (вперёд) -->
  <g fill="#6240FF">
    <rect x="236" y="96" width="44" height="7" rx="3.5"/>
    <path d="M280 84 L302 99.5 L280 115 Z"/>
  </g>
  <!-- Стрелка силы трения (назад, против движения) -->
  <g fill="#E5484D">
    <rect x="96" y="196" width="34" height="6" rx="3"/>
    <path d="M96 188 L76 199 L96 210 Z"/>
  </g>
  <!-- Снежинки -->
  <g fill="#C9CEDA">
    <circle cx="46" cy="52" r="5"/>
    <circle cx="92" cy="30" r="3.5"/>
    <circle cx="268" cy="40" r="4.5"/>
    <circle cx="300" cy="72" r="3"/>
    <circle cx="30" cy="110" r="3.5"/>
  </g>
  <!-- Снежные комочки у полозьев -->
  <g fill="#FFFFFF" stroke="#C9CEDA" stroke-width="2">
    <circle cx="118" cy="186" r="7"/>
    <circle cx="132" cy="192" r="5"/>
  </g>
</svg>
