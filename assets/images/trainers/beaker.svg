<svg width="240" height="320" viewBox="0 0 240 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Мензурка: плоский стиль, палитра §8 (голубая жидкость #2F80ED + тинты) -->
  <!-- Тень-подложка -->
  <ellipse cx="120" cy="298" rx="78" ry="10" fill="#EEF0FF"/>
  <!-- Ножка -->
  <rect x="66" y="286" width="108" height="10" rx="5" fill="#C9CEDA"/>
  <rect x="106" y="270" width="28" height="20" rx="4" fill="#D9DDE7"/>
  <!-- Колба (стекло) -->
  <path d="M78 34 L78 258 Q78 274 94 274 L146 274 Q162 274 162 258 L162 34"
        fill="#F4F8FE" stroke="#C9CEDA" stroke-width="3" stroke-linecap="round"/>
  <!-- Носик -->
  <path d="M78 34 L66 24 M162 34 L168 30" stroke="#C9CEDA" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Жидкость -->
  <path d="M81 108 Q120 116 159 108 L159 258 Q159 271 146 271 L94 271 Q81 271 81 258 Z" fill="#BFDCF9"/>
  <!-- Мениск (нижний край — читаем по нему) -->
  <path d="M81 108 Q120 116 159 108" fill="none" stroke="#5D9BE0" stroke-width="3" stroke-linecap="round"/>
  <!-- Пузырьки -->
  <circle cx="104" cy="200" r="4" fill="#E3F0FC"/>
  <circle cx="134" cy="164" r="3" fill="#E3F0FC"/>
  <circle cx="116" cy="236" r="2.6" fill="#E3F0FC"/>
  <!-- Шкала: штрихи от левой стенки внутрь -->
  <g stroke="#5D6472" stroke-width="2" stroke-linecap="round">
    <line x1="84" y1="252" x2="102" y2="252"/>
    <line x1="84" y1="228" x2="94" y2="228"/>
    <line x1="84" y1="204" x2="102" y2="204"/>
    <line x1="84" y1="180" x2="94" y2="180"/>
    <line x1="84" y1="156" x2="102" y2="156"/>
    <line x1="84" y1="132" x2="94" y2="132"/>
    <line x1="84" y1="108" x2="102" y2="108"/>
    <line x1="84" y1="84"  x2="94" y2="84"/>
    <line x1="84" y1="60"  x2="102" y2="60"/>
  </g>
  <g font-family="'Aeonik Pro', 'Inter', sans-serif" font-size="15" font-weight="500" fill="#3E434C">
    <text x="108" y="257">0</text>
    <text x="108" y="209">50</text>
    <text x="108" y="161">100</text>
    <text x="108" y="113">150</text>
    <text x="108" y="65">200</text>
  </g>
  <!-- Подпись уровня -->
  <g>
    <path d="M166 108 L192 108" stroke="#6240FF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 6"/>
    <text x="197" y="113" font-family="'Aeonik Pro', 'Inter', sans-serif" font-size="17" font-weight="500" fill="#6240FF">150</text>
  </g>
</svg>
