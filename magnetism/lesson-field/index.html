/* ============================================================
   ТЕМА 2 «Поле можно увидеть».
   Сетка компасов и железные опилки — из монолита
   magnetism/legacy.html, перекрашены в светлую тему.
   ============================================================ */

/* ---------- палитра ---------- */
const POLE_N = '#E5484D', POLE_S = '#2F80ED';
const FIELD = '#6240FF', FILING = '#8A8F9C', TXT = '#6B7180';

/* ---------- общие рисовалки ---------- */
function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
function canvasPoint(c, e) {
  const rect = c.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (c.width / rect.width),
    y: (e.clientY - rect.top) * (c.height / rect.height),
  };
}
function lerpAngle(cur, target, k) {
  let d = target - cur;
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return cur + d * k;
}
function rrectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
/* Плоский стиль: сплошные заливки, БЕЗ градиентов и свечения, БЕЗ чёрного
   контура. Края — тонкие, того же цвета, но темнее (shade). */
function tint(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * t);
  g = Math.round(g + (255 - g) * t);
  b = Math.round(b + (255 - b) * t);
  return `rgb(${r},${g},${b})`;
}
function shade(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}
/* B(r) = (r-rN)/|r-rN|³ − (r-rS)/|r-rS|³ */
function fieldAt(px, py, m) {
  const ca = Math.cos(m.angle), sa = Math.sin(m.angle);
  const nx = m.x + ca * m.half, ny = m.y + sa * m.half;
  const sx = m.x - ca * m.half, sy = m.y - sa * m.half;
  const dxn = px - nx, dyn = py - ny;
  const dxs = px - sx, dys = py - sy;
  const rn = Math.max(Math.hypot(dxn, dyn), 4);
  const rs = Math.max(Math.hypot(dxs, dys), 4);
  const in3 = 1 / (rn * rn * rn), is3 = 1 / (rs * rs * rs);
  return { bx: dxn * in3 - dxs * is3, by: dyn * in3 - dys * is3 };
}
function drawMagnet(ctx, x, y, ang, len, wid, o = {}) {
  const colN = o.colN || POLE_N, colS = o.colS || POLE_S;
  const r = Math.min(9, wid * 0.28);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ang);
  // тело S — плоская заливка
  rrectPath(ctx, -len / 2, -wid / 2, len, wid, r);
  ctx.fillStyle = colS;
  ctx.fill();
  // половина N — обрезаем справа, свой тонкий край
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, -wid / 2 - 2, len / 2 + 2, wid + 4);
  ctx.clip();
  rrectPath(ctx, -len / 2, -wid / 2, len, wid, r);
  ctx.fillStyle = colN;
  ctx.fill();
  rrectPath(ctx, -len / 2, -wid / 2, len, wid, r);
  ctx.strokeStyle = shade(colN, 0.18);
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
  // тонкий край половины S
  ctx.save();
  ctx.beginPath();
  ctx.rect(-len / 2 - 2, -wid / 2 - 2, len / 2 + 2, wid + 4);
  ctx.clip();
  rrectPath(ctx, -len / 2, -wid / 2, len, wid, r);
  ctx.strokeStyle = shade(colS, 0.18);
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
  ctx.restore();
  if (o.labels !== false) {
    const ca = Math.cos(ang), sa = Math.sin(ang);
    ctx.font = `700 ${Math.round(wid * 0.78)}px var(--font-display), sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = shade(colN, 0.45);
    ctx.fillText('N', x + ca * len * 0.28, y + sa * len * 0.28);
    ctx.fillStyle = shade(colS, 0.45);
    ctx.fillText('S', x - ca * len * 0.28, y - sa * len * 0.28);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'start';
  }
}
function drawCompass(ctx, x, y, r, ang, o = {}) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = o.fill || '#FFFFFF';
  ctx.fill();
  ctx.strokeStyle = o.ring || '#C9CEDA';
  ctx.lineWidth = o.ringW || 1.6;
  ctx.stroke();
  const nx = Math.cos(ang), ny = Math.sin(ang);
  const px = -ny, py = nx;
  const L = r * 0.76, Wd = r * 0.22;
  ctx.beginPath();
  ctx.moveTo(x + nx * L, y + ny * L);
  ctx.lineTo(x + px * Wd, y + py * Wd);
  ctx.lineTo(x - px * Wd, y - py * Wd);
  ctx.closePath();
  ctx.fillStyle = o.needleN || POLE_N;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x - nx * L, y - ny * L);
  ctx.lineTo(x + px * Wd, y + py * Wd);
  ctx.lineTo(x - px * Wd, y - py * Wd);
  ctx.closePath();
  ctx.fillStyle = o.needleS || '#9AA0AA';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, Math.max(1.4, r * 0.12), 0, Math.PI * 2);
  ctx.fillStyle = TXT;
  ctx.fill();
}

/* ============================================================
   ИНТЕРАКТИВ 1: сетка из 117 компасов
   ============================================================ */
function startGrid(root, done) {
  const canvas = root.querySelector('#gridCanvas');
  const rotBtn = root.querySelector('#gridRotate');
  const hint = root.querySelector('#gridHint');
  const ctx = canvas.getContext('2d');
  const COLS = 13, ROWS = 9;
  const angles = new Array(COLS * ROWS).fill(0);
  const mag = { nx: 0.5, ny: 0.5, angle: 0, targetAngle: 0, dragging: false };
  let dragDist = 0, opened = false;

  rotBtn.addEventListener('click', () => { mag.targetAngle += Math.PI / 4; });

  canvas.addEventListener('pointerdown', e => {
    const p = canvasPoint(canvas, e);
    const { w, h } = fit(canvas, 270);
    const mx = mag.nx * w, my = mag.ny * h;
    if (Math.hypot(p.x - mx, p.y - my) < w * 0.14) {
      mag.dragging = true;
      try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
      e.preventDefault();
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (!mag.dragging) return;
    const p = canvasPoint(canvas, e);
    const { w, h } = fit(canvas, 270);
    const nx = Math.min(0.94, Math.max(0.06, p.x / w));
    const ny = Math.min(0.90, Math.max(0.10, p.y / h));
    dragDist += Math.hypot(nx - mag.nx, ny - mag.ny);
    mag.nx = nx; mag.ny = ny;
    if (!opened && dragDist > 0.9) {
      opened = true;
      hint.innerHTML = 'Видишь? У полюсов стрелки поворачиваются резко и дружно — там поле <b>сильнее всего</b>';
      done();
    }
  });
  ['pointerup', 'pointercancel'].forEach(ev => canvas.addEventListener(ev, () => { mag.dragging = false; }));

  function draw() {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 270);
    ctx.clearRect(0, 0, w, h);
    mag.angle = lerpAngle(mag.angle, mag.targetAngle, 0.12);
    const len = w * 0.17, wid = Math.min(h * 0.14, len * 0.42);
    const m = { x: mag.nx * w, y: mag.ny * h, angle: mag.angle, half: len * 0.46 };

    const cellW = w / COLS, cellH = h / ROWS;
    const cr = Math.min(cellW, cellH) * 0.33;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const idx = r * COLS + c;
        const cx = (c + 0.5) * cellW, cy = (r + 0.5) * cellH;
        if (Math.hypot(cx - m.x, cy - m.y) < len * 0.55) continue;
        const f = fieldAt(cx, cy, m);
        const target = Math.atan2(f.by, f.bx);
        angles[idx] = lerpAngle(angles[idx], target, 0.18);
        const mg = Math.hypot(f.bx, f.by);
        const strength = Math.min(1, mg * len * len * len * 0.05);
        drawCompass(ctx, cx, cy, cr, angles[idx], {
          ring: `rgba(98,64,255,${0.18 + strength * 0.72})`,
        });
      }
    }
    drawMagnet(ctx, m.x, m.y, m.angle, len, wid);
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ============================================================
   ИНТЕРАКТИВ 2: железные опилки
   ============================================================ */
function startFilings(root, done) {
  const canvas = root.querySelector('#filingsCanvas');
  const spawnBtn = root.querySelector('#filingsBtn');
  const clearBtn = root.querySelector('#filingsClear');
  const ctx = canvas.getContext('2d');
  let filings = [], poured = false;

  spawnBtn.addEventListener('click', () => {
    const { w, h } = fit(canvas, 250);
    const len = w * 0.24;
    filings = [];
    const now = performance.now() / 1000;
    for (let i = 0; i < 400; i++) {
      let x, y;
      do {
        x = w * 0.04 + Math.random() * w * 0.92;
        y = h * 0.06 + Math.random() * h * 0.88;
      } while (Math.abs(x - w / 2) < len * 0.55 && Math.abs(y - h / 2) < len * 0.24);
      filings.push({
        x, ty: y, y: y - 30 - Math.random() * 90,
        angle: Math.random() * Math.PI * 2,
        born: now + i * 0.0035,
      });
    }
    if (!poured) { poured = true; done(); }
  });
  clearBtn.addEventListener('click', () => { filings = []; });

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 250);
    ctx.clearRect(0, 0, w, h);
    const len = w * 0.24, wid = Math.min(h * 0.20, len * 0.42);
    const mag = { x: w / 2, y: h / 2, angle: 0, half: len * 0.46 };

    filings.forEach(p => {
      if (t < p.born) return;
      p.y += (p.ty - p.y) * 0.16;
      const f = fieldAt(p.x, p.y, mag);
      const target = Math.atan2(f.by, f.bx);
      p.angle = lerpAngle(p.angle, target, 0.10);
      const mg = Math.hypot(f.bx, f.by);
      const s = Math.min(1, mg * len * len * len * 0.06);
      const L = 5 + s * 6;
      const dx = Math.cos(p.angle) * L, dy = Math.sin(p.angle) * L;
      ctx.beginPath();
      ctx.moveTo(p.x - dx, p.y - dy);
      ctx.lineTo(p.x + dx, p.y + dy);
      ctx.strokeStyle = `rgba(138,143,156,${0.35 + s * 0.55})`;
      ctx.lineWidth = 2.2;
      ctx.stroke();
    });

    drawMagnet(ctx, mag.x, mag.y, 0, len, wid);
    if (!filings.length) {
      ctx.font = `700 ${Math.round(w * 0.036)}px var(--font-display), sans-serif`;
      ctx.fillStyle = TXT;
      ctx.textAlign = 'center';
      ctx.fillText('Нажми «Насыпать опилки» 👇', w / 2, h * 0.88);
      ctx.textAlign = 'start';
    }
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}
