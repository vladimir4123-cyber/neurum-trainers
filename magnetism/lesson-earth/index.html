<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 3 «Земля — гигантский магнит».
   Сцена с Землёй — из монолита magnetism/legacy.html; добавлен
   компас-путешественник, которого ученик таскает вокруг планеты.
   ============================================================ */

/* ---------- палитра ---------- */
const POLE_N = '#E5484D', POLE_S = '#2F80ED', TXT = '#6B7180';

/* ---------- общие рисовалки ---------- */
function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
function canvasPoint(c, e) {
  const rect = c.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (c.width / rect.width),
    y: (e.clientY - rect.top) * (c.height / rect.height),
  };
}
function lerpAngle(cur, target, k) {
  let d = target - cur;
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return cur + d * k;
}
function rrectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
/* Плоский стиль: сплошные заливки, БЕЗ градиентов и свечения, БЕЗ чёрного
   контура. Края — тонкие, того же цвета, но темнее (shade). */
function tint(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * t);
  g = Math.round(g + (255 - g) * t);
  b = Math.round(b + (255 - b) * t);
  return `rgb(${r},${g},${b})`;
}
function shade(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}
function fieldAt(px, py, m) {
  const ca = Math.cos(m.angle), sa = Math.sin(m.angle);
  const nx = m.x + ca * m.half, ny = m.y + sa * m.half;
  const sx = m.x - ca * m.half, sy = m.y - sa * m.half;
  const dxn = px - nx, dyn = py - ny;
  const dxs = px - sx, dys = py - sy;
  const rn = Math.max(Math.hypot(dxn, dyn), 4);
  const rs = Math.max(Math.hypot(dxs, dys), 4);
  const in3 = 1 / (rn * rn * rn), is3 = 1 / (rs * rs * rs);
  return { bx: dxn * in3 - dxs * is3, by: dyn * in3 - dys * is3 };
}
function drawMagnet(ctx, x, y, ang, len, wid, o = {}) {
  const r = Math.min(9, wid * 0.28);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ang);
  // тело S — плоская заливка
  rrectPath(ctx, -len / 2, -wid / 2, len, wid, r);
  ctx.fillStyle = POLE_S;
  ctx.fill();
  // половина N — обрезаем справа, свой тонкий край
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, -wid / 2 - 2, len / 2 + 2, wid + 4);
  ctx.clip();
  rrectPath(ctx, -len / 2, -wid / 2, len, wid, r);
  ctx.fillStyle = POLE_N;
  ctx.fill();
  rrectPath(ctx, -len / 2, -wid / 2, len, wid, r);
  ctx.strokeStyle = shade(POLE_N, 0.18);
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
  // тонкий край половины S
  ctx.save();
  ctx.beginPath();
  ctx.rect(-len / 2 - 2, -wid / 2 - 2, len / 2 + 2, wid + 4);
  ctx.clip();
  rrectPath(ctx, -len / 2, -wid / 2, len, wid, r);
  ctx.strokeStyle = shade(POLE_S, 0.18);
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
  ctx.restore();
  if (o.labels !== false) {
    const ca = Math.cos(ang), sa = Math.sin(ang);
    ctx.font = `700 ${Math.round(wid * 0.78)}px var(--font-display), sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = shade(POLE_N, 0.45);
    ctx.fillText('N', x + ca * len * 0.28, y + sa * len * 0.28);
    ctx.fillStyle = shade(POLE_S, 0.45);
    ctx.fillText('S', x - ca * len * 0.28, y - sa * len * 0.28);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'start';
  }
}
function drawCompass(ctx, x, y, r, ang, o = {}) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = o.fill || '#FFFFFF';
  ctx.fill();
  ctx.strokeStyle = o.ring || '#C9CEDA';
  ctx.lineWidth = o.ringW || 1.6;
  ctx.stroke();
  const nx = Math.cos(ang), ny = Math.sin(ang);
  const px = -ny, py = nx;
  const L = r * 0.76, Wd = r * 0.22;
  ctx.beginPath();
  ctx.moveTo(x + nx * L, y + ny * L);
  ctx.lineTo(x + px * Wd, y + py * Wd);
  ctx.lineTo(x - px * Wd, y - py * Wd);
  ctx.closePath();
  ctx.fillStyle = POLE_N;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x - nx * L, y - ny * L);
  ctx.lineTo(x + px * Wd, y + py * Wd);
  ctx.lineTo(x - px * Wd, y - py * Wd);
  ctx.closePath();
  ctx.fillStyle = '#9AA0AA';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, Math.max(1.4, r * 0.12), 0, Math.PI * 2);
  ctx.fillStyle = TXT;
  ctx.fill();
}

/* ============================================================
   ИНТЕРАКТИВ: Земля-магнит и компас-путешественник
   ============================================================ */
function startEarth(root, done) {
  const canvas = root.querySelector('#earthCanvas');
  const hint = root.querySelector('#earthHint');
  const ctx = canvas.getContext('2d');
  const TILT = 11 * Math.PI / 180;
  const orbitAngles = [];
  const traveler = { nx: 0.82, ny: 0.30, a: -Math.PI / 2, dragging: false };
  let dragDist = 0, opened = false;

  canvas.addEventListener('pointerdown', e => {
    const p = canvasPoint(canvas, e);
    const { w, h } = fit(canvas, 280);
    const tx = traveler.nx * w, ty = traveler.ny * h;
    if (Math.hypot(p.x - tx, p.y - ty) < Math.max(40, w * 0.09)) {
      traveler.dragging = true;
      try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
      e.preventDefault();
    }
  });
  canvas.addEventListener('pointermove', e => {
    if (!traveler.dragging) return;
    const p = canvasPoint(canvas, e);
    const { w, h } = fit(canvas, 280);
    const nx = Math.min(0.95, Math.max(0.05, p.x / w));
    const ny = Math.min(0.93, Math.max(0.07, p.y / h));
    dragDist += Math.hypot(nx - traveler.nx, ny - traveler.ny);
    traveler.nx = nx; traveler.ny = ny;
    if (!opened && dragDist > 0.6) {
      opened = true;
      hint.innerHTML = 'В любой точке планеты стрелка встаёт вдоль поля Земли — <b>вот и вся разгадка компаса</b>';
      done();
    }
  });
  ['pointerup', 'pointercancel'].forEach(ev => canvas.addEventListener(ev, () => { traveler.dragging = false; }));

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 280);
    ctx.clearRect(0, 0, w, h);
    const cx = w / 2, cy = h * 0.55;
    const R = Math.min(h * 0.26, w * 0.18);
    // ось магнита направлена на N-полюс (внизу!), S — вверху
    const magAngle = Math.PI / 2 + TILT;
    const mag = { x: cx, y: cy, angle: magAngle, half: R * 0.62 };

    // подпись сверху
    ctx.font = `700 ${Math.round(w * 0.036)}px var(--font-display), sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = TXT;
    ctx.fillText('⬆ географический север', cx, h * 0.07);

    // линии поля (дуги)
    ctx.strokeStyle = 'rgba(98,64,255,0.30)';
    ctx.lineWidth = 1.6;
    [1.35, 1.75, 2.2].forEach(k => {
      ctx.beginPath();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(TILT);
      ctx.ellipse(0, 0, R * k * 0.72, R * k, 0, 0, Math.PI * 2);
      ctx.restore();
      ctx.stroke();
    });

    // орбитальные компасы
    const orbits = [[-90, 1.85], [-38, 1.8], [38, 1.8], [90, 1.85], [142, 1.8], [218, 1.8]];
    orbits.forEach(([deg, k], i) => {
      const a = deg * Math.PI / 180 - Math.PI / 2;
      const px = cx + Math.cos(a) * R * k * 1.35;
      const py = cy + Math.sin(a) * R * k;
      const f = fieldAt(px, py, mag);
      const target = Math.atan2(f.by, f.bx);
      if (orbitAngles[i] === undefined) orbitAngles[i] = target;
      orbitAngles[i] = lerpAngle(orbitAngles[i], target, 0.1);
      drawCompass(ctx, px, py, Math.min(h * 0.05, w * 0.030), orbitAngles[i]);
    });

    // Земля — плоская заливка, тонкий край того же цвета
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = '#9EC9F5';
    ctx.fill();
    ctx.strokeStyle = shade('#9EC9F5', 0.2);
    ctx.lineWidth = 2;
    ctx.stroke();
    // «континенты»
    ctx.fillStyle = 'rgba(7,190,126,0.45)';
    [[-0.35, -0.25, 0.38], [0.3, 0.15, 0.3], [-0.1, 0.45, 0.22]].forEach(([ox, oy, r]) => {
      ctx.beginPath();
      ctx.ellipse(cx + ox * R, cy + oy * R, R * r, R * r * 0.62, 0.5, 0, Math.PI * 2);
      ctx.fill();
    });

    // ось вращения (вертикальный пунктир)
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(cx, cy - R * 1.22);
    ctx.lineTo(cx, cy + R * 1.22);
    ctx.strokeStyle = '#9AA0AA';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);

    // магнит внутри (наклонён)
    ctx.globalAlpha = 0.92;
    drawMagnet(ctx, cx, cy, magAngle, R * 1.3, R * 0.42);
    ctx.globalAlpha = 1;

    // подписи полюсов магнита
    ctx.font = `700 ${Math.round(w * 0.026)}px var(--font-display), sans-serif`;
    ctx.textAlign = 'center';
    const sX = cx - Math.cos(magAngle) * R * 0.95, sY = cy - Math.sin(magAngle) * R * 0.95;
    const nX = cx + Math.cos(magAngle) * R * 0.95, nY = cy + Math.sin(magAngle) * R * 0.95;
    ctx.fillStyle = POLE_S;
    ctx.fillText('S — южный магнитный!', sX, sY - R * 0.30);
    ctx.fillStyle = POLE_N;
    ctx.fillText('N — северный магнитный', nX, nY + R * 0.40);

    // компас-путешественник (крупный, таскается)
    const tx = traveler.nx * w, ty = traveler.ny * h;
    const f = fieldAt(tx, ty, mag);
    traveler.a = lerpAngle(traveler.a, Math.atan2(f.by, f.bx), 0.12);
    const tr = Math.max(26, Math.min(h * 0.085, w * 0.05));
    drawCompass(ctx, tx, ty, tr, traveler.a, { ring: '#F5B93B', ringW: 3.5 });
    if (!opened) {
      const pulse = 1 + Math.sin(t * 3) * 0.12;
      ctx.beginPath();
      ctx.arc(tx, ty, tr * 1.35 * pulse, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(245,185,59,0.6)';
      ctx.setLineDash([5, 6]);
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.textAlign = 'start';
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

   ШАГИ УРОКА
   ============================================================ */
