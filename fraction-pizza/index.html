<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пиццерия дробей 🍕</title>
<style>
  :root{
    --bg:#0b1130; --panel:#141b40; --panel2:#1a2150; --accent:#ffd166;
    --tomato:#e17055; --cheese:#fdcb6e; --ink:#eef1ff; --muted:#8892c9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100vh; display:flex; justify-content:center;
    padding:14px; user-select:none; -webkit-user-select:none;
  }
  .wrap{width:100%; max-width:880px;}
  .panel{background:var(--panel); border-radius:20px; padding:18px; box-shadow:0 8px 30px rgba(0,0,0,.35);}
  .hidden{display:none !important;}

  /* ---------- buttons ---------- */
  .btn{
    background:var(--accent); color:#3a2a00; border:none; border-radius:14px;
    padding:13px 20px; font-size:17px; font-weight:700; cursor:pointer;
    font-family:inherit; touch-action:manipulation;
    box-shadow:0 4px 0 #b78a2e; transition:transform .08s, box-shadow .08s;
  }
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 #b78a2e;}
  .btn.sec{background:var(--panel2); color:var(--ink); box-shadow:0 4px 0 #0d1233; border:1px solid #2b3573;}
  .btn.big{font-size:20px; padding:16px 30px;}
  #controls{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:14px; min-height:52px;}

  /* ---------- HUD ---------- */
  #hud{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:10px;}
  #hud .dots{font-size:20px; letter-spacing:4px;}
  #hud .tips{font-size:18px; font-weight:700; color:var(--accent); background:var(--panel2); padding:6px 14px; border-radius:12px;}
  #sndBtn{background:none; border:1px solid #2b3573; border-radius:10px; font-size:18px; padding:5px 9px; cursor:pointer;}

  /* ---------- clients & bubble ---------- */
  #bubble{
    background:#fff; color:#20242e; border-radius:16px; padding:12px 16px;
    font-size:17px; line-height:1.45; max-width:640px; margin:0 auto 6px;
    position:relative; animation:popin .25s ease-out; text-align:center;
  }
  #bubble::after{
    content:""; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
    border:10px solid transparent; border-top-color:#fff; border-bottom:none;
  }
  #clients{display:flex; justify-content:center; gap:26px; margin:12px 0 6px; min-height:70px; flex-wrap:wrap;}
  .client{text-align:center;}
  .client .face{font-size:52px; line-height:1; transition:transform .15s;}
  .client .cap{font-size:15px; color:var(--muted); margin-top:4px;}
  .client.pick{cursor:pointer; background:var(--panel2); border:2px solid #2b3573; border-radius:16px; padding:12px 22px;}
  .client.pick:hover .face, .client.pick:active .face{transform:scale(1.15);}
  .client.pick:hover{border-color:var(--accent);}
  .client.shake{animation:shake .5s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  @keyframes popin{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

  /* ---------- canvas ---------- */
  #cv{display:block; width:100%; height:auto; touch-action:manipulation; border-radius:14px;}

  /* ---------- strip (guests fed) ---------- */
  #strip{display:flex; justify-content:center; align-items:center; gap:6px; flex-wrap:wrap; min-height:34px; font-size:26px; margin-top:4px;}
  #strip .fed{animation:popin .3s ease-out;}
  #strip .cnt{font-size:17px; color:var(--accent); font-weight:700; margin-left:8px;}
  #strip .guest{opacity:.9; position:relative;}
  #strip .guest.done::after{content:"🍕"; position:absolute; font-size:14px; bottom:-4px; right:-6px;}

  /* ---------- hint ---------- */
  #hint{
    background:rgba(225,112,85,.15); border:1px solid rgba(225,112,85,.5);
    color:#ffd9cd; border-radius:12px; padding:10px 14px; margin-top:12px;
    font-size:16px; line-height:1.45; text-align:center; animation:popin .25s;
  }

  /* ---------- fraction rendering ---------- */
  .frac{display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 3px; line-height:1.1; font-weight:700;}
  .frac .fn{padding:0 5px;}
  .frac .fd{padding:0 5px; border-top:2px solid currentColor;}

  /* ---------- bridge overlay ---------- */
  #bridge{position:fixed; inset:0; background:rgba(5,8,25,.75); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;}
  .bridge-panel{
    background:var(--panel); border:2px solid var(--accent); border-radius:22px;
    max-width:560px; width:100%; padding:24px; text-align:center;
    animation:popin .3s ease-out; max-height:92vh; overflow-y:auto;
  }
  .bridge-panel h2{margin:0 0 6px; color:var(--accent); font-size:24px;}
  .tip-earn{font-size:19px; color:var(--accent); margin:8px 0; font-weight:700;}
  .tip-none{font-size:16px; color:var(--muted); margin:8px 0;}
  .bridge-math{
    background:var(--panel2); border-radius:14px; padding:16px; margin:14px 0;
    font-size:18px; line-height:1.7;
  }
  .bridge-math .lead{color:var(--muted); font-size:14px; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;}
  .big-eq{font-size:30px; font-weight:800; color:var(--accent); margin:10px 0;}
  .pies{display:flex; justify-content:center; gap:24px; margin:10px 0; flex-wrap:wrap;}
  .pies .pie{text-align:center; font-size:17px;}

  /* ---------- start / final ---------- */
  .hero{text-align:center; padding:40px 20px;}
  .hero h1{font-size:38px; margin:0 0 10px; color:var(--accent);}
  .hero .pizza-big{font-size:80px; margin-bottom:8px; display:inline-block; animation:sway 3s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  .hero p{font-size:19px; line-height:1.6; color:var(--ink); max-width:460px; margin:0 auto 24px;}
  .hero .stars-final{font-size:34px; margin:14px 0; letter-spacing:6px;}
  .hero .rank{font-size:27px; font-weight:800; margin:8px 0 4px;}

  .confetti{position:fixed; top:-50px; z-index:99; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(112vh) rotate(720deg); opacity:.7;}}

  @media (max-width:520px){
    .hero h1{font-size:29px;}
    #bubble{font-size:15px;}
    .btn{font-size:15px; padding:11px 15px;}
    .client .face{font-size:44px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- START -->
  <div id="screen-start" class="panel hero">
    <div class="pizza-big">🍕</div>
    <h1>Пиццерия дробей</h1>
    <p>Смена в пиццерии! Тебя ждут <b>5 заказов</b>.<br>
       Режь, раскладывай и раздавай пиццу — а математика подтянется сама.<br>
       За каждый точный заказ клиент оставит <b>чаевые ⭐</b></p>
    <button class="btn big" id="startBtn">Начать смену 👨‍🍳</button>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="panel hidden">
    <div id="hud">
      <div class="dots" id="dots"></div>
      <div style="display:flex; gap:8px; align-items:center;">
        <div class="tips" id="tipsHud">⭐ 0</div>
        <button id="sndBtn" title="Звук">🔊</button>
      </div>
    </div>
    <div id="bubble"></div>
    <div id="clients"></div>
    <canvas id="cv" width="760" height="400"></canvas>
    <div id="strip"></div>
    <div id="hint" class="hidden"></div>
    <div id="controls"></div>
  </div>

  <!-- FINAL -->
  <div id="screen-final" class="panel hero hidden">
    <div id="finalBody"></div>
    <button class="btn big" id="againBtn">Новая смена 🔁</button>
  </div>

  <!-- BRIDGE -->
  <div id="bridge" class="hidden">
    <div class="bridge-panel">
      <h2 id="bridgeTitle">Заказ выполнен!</h2>
      <div id="bridgeStar"></div>
      <div class="bridge-math"><div class="lead">Математика повара</div><div id="bridgeMath"></div></div>
      <button class="btn big" id="bridgeNext">Дальше →</button>
    </div>
  </div>

</div>

<script>
"use strict";

/* ================= helpers ================= */
const $ = s => document.querySelector(s);
const TAU = Math.PI * 2;
const COL = {
  bg:'#0b1130', panel:'#141b40', accent:'#ffd166',
  tomato:'#e17055', cheese:'#fdcb6e',
  crust:'#c98a3d', outline:'#5a3a1a',
  board:'#3a2a17', boardRing:'#2c1f10',
  plate:'#dfe4ea', plateRing:'#b9c2cc'
};
const EMOJIS = ['👧','👦','👨','👩','🧑‍🦱','👵','👴','🧔','👱‍♀️'];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function gcd(a,b){ return b ? gcd(b, a%b) : a; }
function lcm(a,b){ return a*b/gcd(a,b); }
function easeInOut(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }
function easeOut(t){ return 1-Math.pow(1-t,3); }
function plural(n, forms){
  const m = Math.abs(n)%100, m1 = m%10;
  if(m>10 && m<20) return forms[2];
  if(m1>1 && m1<5) return forms[1];
  if(m1===1) return forms[0];
  return forms[2];
}
function fr(n,d){ return '<span class="frac"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span>'; }

/* ================= sound (WebAudio) ================= */
let audioOn = true, actx = null;
function beep(freq, dur, type, delay, vol){
  if(!audioOn) return;
  try{
    if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if(actx.state === 'suspended') actx.resume();
    const t0 = actx.currentTime + (delay||0);
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol||0.12, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t0); o.stop(t0+dur+0.05);
  }catch(e){}
}
const sfx = {
  pop(){ beep(620+Math.random()*160, .09, 'triangle', 0, .10); },
  slice(){ beep(340, .05, 'square', 0, .07); beep(280, .05, 'square', .06, .07); beep(230, .07, 'square', .12, .07); },
  error(){ beep(196, .22, 'sawtooth', 0, .08); beep(155, .28, 'sawtooth', .1, .08); },
  success(){ beep(523, .12); beep(659, .12, 'sine', .11); beep(784, .2, 'sine', .22); },
  star(){ beep(880, .1, 'triangle', 0, .1); beep(1175, .1, 'triangle', .1, .1); beep(1568, .25, 'triangle', .2, .1); }
};
$('#sndBtn').addEventListener('click', function(){
  audioOn = !audioOn;
  this.textContent = audioOn ? '🔊' : '🔇';
});

/* ================= canvas engine ================= */
const cv = $('#cv'), ctx = cv.getContext('2d');
const LW = 760, LH = 400;
function fitCanvas(){
  const dpr = window.devicePixelRatio || 1;
  cv.width = LW*dpr; cv.height = LH*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

const scene = { pizzas:[], plates:[], labels:[], windowBox:null, onSliceClick:null };
function resetScene(){
  scene.pizzas = []; scene.plates = []; scene.labels = [];
  scene.windowBox = null; scene.onSliceClick = null;
}

function makeToppings(a0, a1, full){
  const span = a1-a0;
  const count = full ? 7 : Math.max(1, Math.round(span/TAU*8));
  const list = [];
  for(let i=0;i<count;i++){
    list.push({
      a: a0 + span*(0.18 + 0.64*Math.random()),
      r: 0.34 + 0.38*Math.random(),
      s: 0.07 + 0.03*Math.random()
    });
  }
  return list;
}

function addPizza(cx, cy, r, cuts){
  const p = { cx:cx, cy:cy, r:r, cuts:0, slices:[], sep:0, sepT:1 };
  if(cuts>0) setCuts(p, cuts, false); else setUncut(p);
  scene.pizzas.push(p);
  return p;
}
function setUncut(p){
  p.cuts = 0; p.sep = 0; p.sepT = 1;
  p.slices = [{
    pz:p, i:0, a0:-Math.PI/2, a1:-Math.PI/2+TAU, state:'pizza',
    x:p.cx, y:p.cy, scale:1, rot:0, anim:null,
    toppings: makeToppings(-Math.PI/2, -Math.PI/2+TAU, true)
  }];
}
function setCuts(p, n, animate){
  p.cuts = n; p.slices = [];
  const span = TAU/n;
  for(let i=0;i<n;i++){
    const a0 = -Math.PI/2 + i*span;
    p.slices.push({
      pz:p, i:i, a0:a0, a1:a0+span, state:'pizza',
      x:p.cx, y:p.cy, scale:1, rot:0, anim:null,
      toppings: makeToppings(a0, a0+span, false)
    });
  }
  if(animate){ p.sepT = 0; p.sep = 0; } else { p.sepT = 1; p.sep = 4; }
}
function addPlate(cx, cy, r, caption){
  const pl = { cx:cx, cy:cy, r:r, sliceScale:0.72, slices:[], caption:caption||'' };
  scene.plates.push(pl);
  return pl;
}

function fly(s, to, dur, finalState, onDone){
  s.state = 'flying';
  s.anim = {
    from:{x:s.x, y:s.y, scale:s.scale, rot:s.rot},
    to:to, t:0, dur:dur,
    onDone:function(sl){ sl.state = finalState; if(onDone) onDone(sl); }
  };
}
function plateSlotTo(pl, s, slot){
  const span = s.a1 - s.a0;
  return { x:pl.cx, y:pl.cy, scale:pl.sliceScale, rot:(-Math.PI/2 + slot*span) - s.a0 };
}
function flyToPlate(s, pl, onDone){
  const slot = pl.slices.length;
  pl.slices.push(s);
  s.plate = pl; s.slot = slot;
  fly(s, plateSlotTo(pl, s, slot), 350, 'plate', onDone);
}
function refanPlate(pl){
  pl.slices.forEach(function(s, k){
    if(s.slot !== k){
      s.slot = k;
      fly(s, plateSlotTo(pl, s, k), 220, 'plate');
    }
  });
}
function flyBackToPizza(s){
  const pl = s.plate;
  if(pl){ const idx = pl.slices.indexOf(s); if(idx>=0) pl.slices.splice(idx,1); refanPlate(pl); }
  s.plate = null;
  fly(s, {x:s.pz.cx, y:s.pz.cy, scale:1, rot:0}, 300, 'pizza');
}

/* ---------- drawing ---------- */
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawPlate(pl){
  ctx.beginPath(); ctx.ellipse(pl.cx, pl.cy+pl.r*0.06, pl.r*1.04, pl.r*1.0, 0, 0, TAU);
  ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.fill();
  ctx.beginPath(); ctx.arc(pl.cx, pl.cy, pl.r, 0, TAU);
  ctx.fillStyle = COL.plate; ctx.fill();
  ctx.beginPath(); ctx.arc(pl.cx, pl.cy, pl.r*0.82, 0, TAU);
  ctx.strokeStyle = COL.plateRing; ctx.lineWidth = 2; ctx.stroke();
  if(pl.caption){
    ctx.fillStyle = '#8892c9'; ctx.font = '14px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(pl.caption, pl.cx, pl.cy - pl.r - 12);
  }
}
function drawBoard(p){
  ctx.beginPath(); ctx.arc(p.cx, p.cy, p.r+13, 0, TAU);
  ctx.fillStyle = COL.board; ctx.fill();
  ctx.beginPath(); ctx.arc(p.cx, p.cy, p.r+13, 0, TAU);
  ctx.strokeStyle = COL.boardRing; ctx.lineWidth = 4; ctx.stroke();
}
function drawWindow(){
  const b = scene.windowBox;
  rrect(b.x, b.y, b.w, b.h, 14);
  ctx.fillStyle = '#1a2150'; ctx.fill();
  ctx.strokeStyle = '#2b3573'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = COL.accent; ctx.font = '22px system-ui'; ctx.textAlign = 'center';
  ctx.fillText('🛎', b.x+b.w/2, b.y+30);
  ctx.fillStyle = '#8892c9'; ctx.font = '13px system-ui';
  ctx.fillText('выдача', b.x+b.w/2, b.y+50);
}
function drawGhost(s){
  const p = s.pz;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(p.cx, p.cy);
  ctx.arc(p.cx, p.cy, p.r, s.a0, s.a1);
  ctx.closePath();
  ctx.setLineDash([6,6]);
  ctx.strokeStyle = 'rgba(136,146,201,.4)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
}
function drawSlice(s){
  const p = s.pz, R = p.r*s.scale, span = s.a1-s.a0;
  const full = span >= TAU-0.001;
  let x = s.x, y = s.y;
  if(s.state==='pizza' && p.sep>0 && p.cuts>1){
    const mid = (s.a0+s.a1)/2 + s.rot;
    x += Math.cos(mid)*p.sep; y += Math.sin(mid)*p.sep;
  }
  const a0 = s.a0+s.rot, a1 = s.a1+s.rot;
  ctx.save();
  // cheese body
  ctx.beginPath();
  if(full){ ctx.arc(x,y,R,0,TAU); }
  else { ctx.moveTo(x,y); ctx.arc(x,y,R,a0,a1); ctx.closePath(); }
  ctx.fillStyle = COL.cheese; ctx.fill();
  // crust band along the outer arc
  ctx.beginPath(); ctx.arc(x, y, R - R*0.07, a0, full?a0+TAU:a1);
  ctx.strokeStyle = COL.crust; ctx.lineWidth = R*0.14; ctx.stroke();
  // outline
  ctx.beginPath();
  if(full){ ctx.arc(x,y,R,0,TAU); }
  else { ctx.moveTo(x,y); ctx.arc(x,y,R,a0,a1); ctx.closePath(); }
  ctx.strokeStyle = COL.outline; ctx.lineWidth = 2; ctx.stroke();
  // toppings (clipped inside cheese zone)
  ctx.beginPath();
  if(full){ ctx.arc(x,y,R*0.82,0,TAU); }
  else { ctx.moveTo(x,y); ctx.arc(x,y,R*0.82,a0,a1); ctx.closePath(); }
  ctx.clip();
  for(let i=0;i<s.toppings.length;i++){
    const t = s.toppings[i];
    const ang = t.a + s.rot, rr = t.r*R;
    const tx = x + Math.cos(ang)*rr, ty = y + Math.sin(ang)*rr;
    ctx.beginPath(); ctx.arc(tx, ty, R*t.s, 0, TAU);
    ctx.fillStyle = COL.tomato; ctx.fill();
    ctx.beginPath(); ctx.arc(tx - R*t.s*0.3, ty - R*t.s*0.3, R*t.s*0.32, 0, TAU);
    ctx.fillStyle = 'rgba(255,255,255,.3)'; ctx.fill();
  }
  ctx.restore();
}
function drawCutFlash(p){
  const alpha = (1 - p.sepT) * 0.9;
  if(alpha <= 0 || p.cuts < 2) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
  ctx.lineWidth = 2.5;
  const span = TAU/p.cuts;
  for(let i=0;i<p.cuts;i++){
    const a = -Math.PI/2 + i*span;
    ctx.beginPath();
    ctx.moveTo(p.cx, p.cy);
    ctx.lineTo(p.cx + Math.cos(a)*(p.r+10), p.cy + Math.sin(a)*(p.r+10));
    ctx.stroke();
  }
  ctx.restore();
}

let lastT = performance.now();
function update(dt){
  for(let pi=0; pi<scene.pizzas.length; pi++){
    const p = scene.pizzas[pi];
    if(p.sepT < 1){ p.sepT = Math.min(1, p.sepT + dt/450); p.sep = 4*easeOut(p.sepT); }
    for(let si=0; si<p.slices.length; si++){
      const s = p.slices[si];
      if(s.anim){
        s.anim.t = Math.min(1, s.anim.t + dt/s.anim.dur);
        const k = easeInOut(s.anim.t), A = s.anim.from, B = s.anim.to;
        s.x = A.x + (B.x-A.x)*k;
        s.y = A.y + (B.y-A.y)*k;
        s.scale = A.scale + (B.scale-A.scale)*k;
        s.rot = A.rot + (B.rot-A.rot)*k;
        if(s.anim.t >= 1){
          const cb = s.anim.onDone; s.anim = null;
          if(cb) cb(s);
        }
      }
    }
  }
}
function render(){
  ctx.clearRect(0,0,LW,LH);
  for(let i=0;i<scene.plates.length;i++) drawPlate(scene.plates[i]);
  if(scene.windowBox) drawWindow();
  const onPizza = [], onPlate = [], flying = [];
  for(let pi=0; pi<scene.pizzas.length; pi++){
    const p = scene.pizzas[pi];
    drawBoard(p);
    for(let si=0; si<p.slices.length; si++){
      const s = p.slices[si];
      if(s.state==='gone') continue;
      if(s.state==='ghost'){ drawGhost(s); continue; }
      if(s.state==='pizza') onPizza.push(s);
      else if(s.state==='plate') onPlate.push(s);
      else flying.push(s);
    }
  }
  onPizza.forEach(drawSlice); onPlate.forEach(drawSlice); flying.forEach(drawSlice);
  for(let i=0;i<scene.pizzas.length;i++) if(scene.pizzas[i].sepT<1) drawCutFlash(scene.pizzas[i]);

    ctx.font = (L.bold?'700 ':'') + (L.size||16) + 'px system-ui';
    ctx.fillText(L.text, L.x, L.y);

}

/* ---------- hit test ---------- */
cv.addEventListener('pointerdown', function(e){
  const rect = cv.getBoundingClientRect();
  const x = (e.clientX - rect.left) * LW / rect.width;
  const y = (e.clientY - rect.top) * LH / rect.height;
  const s = hitSlice(x,y);
  if(s && scene.onSliceClick) scene.onSliceClick(s);
});
function hitSlice(x,y){
  for(let pi=0; pi<scene.pizzas.length; pi++){
    const p = scene.pizzas[pi];
    for(let si=0; si<p.slices.length; si++){
      const s = p.slices[si];
      if(s.state!=='pizza' && s.state!=='plate') continue;
      const R = p.r*s.scale;
      const dx = x-s.x, dy = y-s.y;
      if(dx*dx+dy*dy > R*R) continue;
      const span = s.a1-s.a0;
      if(span >= TAU-0.001) return s;
      let rel = Math.atan2(dy,dx) - (s.a0+s.rot);
      rel = ((rel % TAU) + TAU) % TAU;
      if(rel <= span) return s;
    }
  }
  return null;
}

/* ---------- SVG pie for bridge ---------- */
function pieSVG(total, filled, color){
  const R = 52, C = 60;
  let paths = '';
  for(let i=0;i<total;i++){
    const a0 = -Math.PI/2 + i*TAU/total, a1 = a0 + TAU/total;
    const x0 = (C+R*Math.cos(a0)).toFixed(1), y0 = (C+R*Math.sin(a0)).toFixed(1);
    const x1 = (C+R*Math.cos(a1)).toFixed(1), y1 = (C+R*Math.sin(a1)).toFixed(1);
    paths += '<path d="M' + C + ',' + C + ' L' + x0 + ',' + y0 + ' A' + R + ',' + R + ' 0 0 1 ' + x1 + ',' + y1 + ' Z" fill="' + (i<filled ? color : '#232b5c') + '" stroke="#0b1130" stroke-width="1.5"/>';
  }
  return '<svg width="120" height="120" viewBox="0 0 120 120">' + paths + '</svg>';
}

/* ================= ORDER 1: cutting ================= */
function order1(){
  const v = shift.o1, n = v.n, d = v.d;

function order2(){
  const v = shift.o2;
  const eA = pick(EMOJIS);

  while(eB === eA) eB = pick(EMOJIS);
  const L = lcm(v.a.d, v.b.d);

  function choose(i){

      finishOrder(

  setClients([

        setTimeout(function(){
          finishOrder(
            '<p>Все <b>' + v.guests + '</b> гостей сыты, и ни куска не пропало — пицц было ровно столько, сколько нужно!</p>' +
            '<div class="big-eq">' + v.guests + ' × ' + fr(1,v.por) + ' = ' + fr(v.guests,v.por) + ' = ' + v.ans + '</div>' +
            '<p>' + v.guests + ' ' + plural(v.guests,['порция','порции','порций']) + ' по ' + fr(1,v.por) + ' складываются в ровно <b>' + v.ans + '</b> ' + plural(v.ans,['пиццу','пиццы','пицц']) + '. Умножить число на дробь — это собрать много одинаковых кусочков вместе.</p>'
          );
        }, 500);
      }
    });
  }
  scene.onSliceClick = function(s){
    if(phase === 'serve' && s.state === 'pizza') serveOne();
  };
}

/* ================= final ================= */
function confetti(n){
  const icons = ['🍕','⭐','🧀','🍅','🎉','✨'];
  for(let i=0;i<n;i++){
    const s = document.createElement('span');
    s.className = 'confetti';
    s.textContent = pick(icons);
    s.style.left = (Math.random()*100) + 'vw';
    s.style.fontSize = (16 + Math.random()*20) + 'px';
    s.style.animationDuration = (2.4 + Math.random()*2.2) + 's';
    s.style.animationDelay = (Math.random()*0.9) + 's';
    document.body.appendChild(s);
    setTimeout(function(){ s.remove(); }, 6000);
  }
}
function showFinal(){
  const stars = results.filter(Boolean).length;
  let rank, note;
  if(stars === 5){ rank = '👨‍🍳 Шеф-пиццайоло!'; note = 'Идеальная смена: ни одной ошибки. Дроби у тебя в руках — в прямом смысле!'; }
  else if(stars >= 3){ rank = '🍳 Уверенный повар!'; note = 'Отличная смена! Ещё пара тренировок — и станешь шефом.'; }
  else { rank = '🧢 Стажёр'; note = 'Смена была жаркая! Попробуй ещё раз — дроби любят тех, кто режет пиццу почаще.'; }
  $('#finalBody').innerHTML =
    '<div class="pizza-big">🍕</div>' +
    '<h1>Смена окончена!</h1>' +
    '<div class="stars-final">' + ('⭐'.repeat(stars) || '·') + '</div>' +
    '<div class="rank">' + rank + '</div>' +
    '<p>Чаевые за смену: <b>' + stars + ' из 5</b> ⭐<br>' + note + '</p>';
  $('#screen-game').classList.add('hidden');
  $('#screen-final').classList.remove('hidden');
  confetti(stars >= 5 ? 90 : (stars >= 3 ? 55 : 25));
  sfx.success();
  if(stars >= 3) setTimeout(function(){ sfx.star(); }, 400);
}

/* ================= start / restart ================= */
function newShift(){
  shift = genShift();
  results = [];
  $('#screen-start').classList.add('hidden');
  $('#screen-final').classList.add('hidden');
  $('#screen-game').classList.remove('hidden');
  startOrder(0);
}
$('#startBtn').addEventListener('click', newShift);
$('#againBtn').addEventListener('click', newShift);
</script>
</body>
