<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 1 «Что такое рычаг».
   Зацепка: ребёнок перевешивает взрослого на качелях.
   Доска наклоняется ЧЕСТНО: сравниваем произведения масса×плечо.
   ============================================================ */

/* ---------- общие рисовалки (плоский стиль §8) ---------- */
function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
function tint(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * t);
  g = Math.round(g + (255 - g) * t);
  b = Math.round(b + (255 - b) * t);
  return `rgb(${r},${g},${b})`;
}
function shade(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}
function rr(ctx, x, y, w2, h2, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w2, y, x + w2, y + h2, r);
  ctx.arcTo(x + w2, y + h2, x, y + h2, r);
  ctx.arcTo(x, y + h2, x, y, r);
  ctx.arcTo(x, y, x + w2, y, r);
  ctx.closePath();
}

const PLUS = '#E5484D', MINUS = '#2F80ED', WOOD = '#D9BC8E', SKIN = '#F3C89E';
/* canvas не понимает var() в ctx.font — берём уже вычисленный шрифт body */
const FONT = getComputedStyle(document.body).fontFamily || "'Aeonik Pro', 'Inter', sans-serif";
const fmt1 = v => String(Math.round(v * 10) / 10).replace('.', ',');

/* сидящая фигурка: цвет тела, масштаб s (1 = ребёнок) */
function drawPerson(ctx, x, y, s, color) {
  const edge = shade(color, 0.25);
  ctx.save();
  ctx.translate(x, y);
  // ноги (свисают вперёд)
  ctx.strokeStyle = edge;
  ctx.lineWidth = 7 * s;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-6 * s, -14 * s); ctx.lineTo(-15 * s, 8 * s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6 * s, -14 * s); ctx.lineTo(-3 * s, 10 * s); ctx.stroke();
  // тело
  rr(ctx, -14 * s, -46 * s, 28 * s, 36 * s, 10 * s);
  ctx.fillStyle = color; ctx.fill();
  ctx.lineWidth = 2.5; ctx.strokeStyle = edge; ctx.stroke();
  // голова
  ctx.beginPath();
  ctx.arc(0, -58 * s, 12 * s, 0, Math.PI * 2);
  ctx.fillStyle = SKIN; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = '#D9A876'; ctx.stroke();
  ctx.restore();
}

/* ============================================================
   ИНТЕРАКТИВ: качели — тащи ребёнка по доске
   ============================================================ */
function startSeesaw(root, done) {
  const canvas = root.querySelector('#seesawCanvas');
  const hint = root.querySelector('#seesawHint');
  const ctx = canvas.getContext('2d');

  const DAD_M = 80, DAD_D = 1.0;     // папа: 80 кг в 1 м от опоры (слева)
  const KID_M = 40;                  // ты: 40 кг
  let kidD = 0.6;                    // текущее плечо ребёнка, м (справа)
  let angle = 0;
  let dragging = false;
  let won = false;

  const geom = (w, h) => ({
    px: w * 0.5, py: h * 0.56,
    scale: w * 0.15,                 // пикселей в метре
    half: w * 0.46,
  });
  const ptr = e => {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) / r.width * canvas.width, y: (e.clientY - r.top) / r.height * canvas.height };
  };
  const setKid = p => {
    const { px, scale } = geom(canvas.width, canvas.height);
    kidD = Math.min(2.8, Math.max(0.3, (p.x - px) / scale));
  };
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    const p = ptr(e);
    if (p.x > canvas.width * 0.5) { dragging = true; setKid(p); }
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  });
  canvas.addEventListener('pointermove', e => { if (dragging) setKid(ptr(e)); });
  ['pointerup', 'pointercancel'].forEach(ev => canvas.addEventListener(ev, () => { dragging = false; }));

  function draw() {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 320);
    ctx.clearRect(0, 0, w, h);
    const { px, py, scale, half } = geom(w, h);

    // честная физика: сравниваем моменты масса×плечо
    const mDad = DAD_M * DAD_D;
    const mKid = KID_M * kidD;
    const target = Math.max(-0.16, Math.min(0.16, (mKid - mDad) * 0.004));
    angle += (target - angle) * 0.09;

    // земля и опора
    ctx.fillStyle = '#E3E6F2';
    ctx.fillRect(0, py + h * 0.24, w, h * 0.05);
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px - w * 0.05, py + h * 0.24);
    ctx.lineTo(px + w * 0.05, py + h * 0.24);
    ctx.closePath();
    ctx.fillStyle = '#C9CEDA'; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#A9AFBE'; ctx.stroke();

    // доска с фигурками — поворачиваем вокруг опоры
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(angle);
    // доска
    rr(ctx, -half, -9, half * 2, 18, 9);
    ctx.fillStyle = WOOD; ctx.fill();
    ctx.lineWidth = 2.5; ctx.strokeStyle = shade(WOOD, 0.25); ctx.stroke();
    // метки каждые 0,5 м
    ctx.strokeStyle = shade(WOOD, 0.3); ctx.lineWidth = 2;
    for (let d = 0.5; d <= 2.75; d += 0.5) {
      [-1, 1].forEach(s => {
        ctx.beginPath();
        ctx.moveTo(s * d * scale, -9); ctx.lineTo(s * d * scale, 9);
        ctx.stroke();
      });
    }
    // папа слева, ребёнок справа
    drawPerson(ctx, -DAD_D * scale, -9, 2.1, PLUS);
    drawPerson(ctx, kidD * scale, -9, 1.4, MINUS);
    ctx.restore();

    // живые числа: масса × плечо
    const fs = Math.round(w * 0.038);
    ctx.font = '700 ' + fs + 'px ' + FONT;
    ctx.textAlign = 'left';
    ctx.fillStyle = PLUS;
    ctx.fillText(`Папа: 80 кг × 1 м = 80`, w * 0.04, h * 0.10);
    ctx.textAlign = 'right';
    ctx.fillStyle = MINUS;
    ctx.fillText(`Ты: 40 кг × ${fmt1(kidD)} м = ${fmt1(mKid)}`, w * 0.96, h * 0.10);
    ctx.textAlign = 'start';

    // сообщения
    if (!won && mKid > mDad + 1) {
      won = true;
      hint.innerHTML = `🎉 Перевесил! <b>40 × ${fmt1(kidD)} = ${fmt1(mKid)} &gt; 80</b> — важна не масса, а произведение массы на расстояние до опоры.`;
      done();
    } else if (!won && Math.abs(mKid - mDad) <= 1) {
      hint.innerHTML = 'Ровно! <b>40 × 2 = 80 × 1</b>. А теперь сядь ещё дальше…';
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ============================================================
   ШАГИ УРОКА
   ============================================================ */
const steps = [
  {
    phase: 'theory', type: 'interact', id: 'seesaw', visual: 'seesaw',
    title: 'Как перевесить папу?',
    text: 'Папа тяжелее тебя в два раза, но качели его не слушаются. Перетащи <b>синюю фигурку</b> по доске и найди место, с которого ты перевесишь папу.',
  },
  {
    phase: 'theory', type: 'info', visual: 'stone', big: true,
    title: 'Древнейшая машина человечества',
    text: 'Задолго до колеса люди двигали камни весом в тонну простой палкой: подсунул под камень, подложил рядом бревно-опору, надавил на длинный конец — камень пошёл. Палка на опоре — это <b>рычаг</b>, одно из первых изобретений человека.',
  },
  {
    phase: 'theory', type: 'info', visual: 'parts', big: true,
    title: 'Что называют рычагом',
    text: '<b>Рычаг</b> — твёрдое тело, которое может поворачиваться вокруг неподвижной опоры. Расстояние от точки опоры до линии, вдоль которой действует сила, называют <b>плечом силы</b>. У качелей два плеча: твоё и папино — и выигрывает не тот, кто тяжелее, а тот, у кого больше произведение силы на плечо.',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Два вопроса — и тема твоя.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос 1',
    text: 'Почему ребёнок может перевесить взрослого на качелях?',
    options: [
      { id: 'a', text: 'Если раскачается посильнее', correct: false },
      { id: 'b', text: 'Если сядет дальше от точки опоры — у него будет больше плечо', correct: true },
      { id: 'c', text: 'Никак: кто тяжелее, тот всегда перевешивает', correct: false },
    ],
    right: 'Именно! Качели сравнивают не массы, а произведения «сила × плечо». Большое плечо компенсирует малую силу.',
    wrong: 'Вспомни интерактив: ты перевесил папу, просто отъехав дальше от опоры. Решает произведение «сила × плечо».',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос 2',
    text: 'Папа (80 кг) сел в 1 м от опоры. Где сесть ребёнку 40 кг, чтобы качели встали ровно?',
    options: [
      { id: 'a', text: 'В 0,5 м от опоры', correct: false },
      { id: 'b', text: 'В 1 м от опоры', correct: false },
      { id: 'c', text: 'В 2 м от опоры', correct: true },
    ],
    right: 'Да: 40 × 2 = 80 × 1. Масса вдвое меньше — плечо вдвое больше.',
    wrong: 'Нужно равенство произведений: 80 × 1 = 80, значит у ребёнка 40 × плечо = 80 → плечо 2 м.',
  },
];

/* ---------- визуалы шагов ---------- */
const visuals = {
  seesaw: () => `
    <div class="canvas-panel"><canvas id="seesawCanvas" height="320"></canvas></div>
    <p class="canvas-hint" id="seesawHint">Тащи <b>синюю фигурку</b> по правой половине доски и смотри на числа</p>`,
  stone: () => `
    <svg viewBox="0 0 260 160" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="138" width="260" height="8" rx="4" fill="#E3E6F2"/>
      <!-- камень -->
      <path d="M22 138 Q14 106 40 96 Q70 86 84 108 Q92 126 78 138 Z" fill="#B6BCC9" stroke="#8F96A6" stroke-width="3" stroke-linejoin="round">
        <animateTransform attributeName="transform" type="rotate" values="0 78 138; -6 78 138; 0 78 138" dur="2.6s" repeatCount="indefinite"/>
      </path>
      <!-- бревно-опора -->
      <circle cx="108" cy="126" r="12" fill="#C99B62" stroke="#A67B47" stroke-width="3"/>
      <!-- палка-рычаг -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="4 108 118; -5 108 118; 4 108 118" dur="2.6s" repeatCount="indefinite"/>
        <rect x="52" y="112" width="190" height="9" rx="4.5" fill="#D9BC8E" stroke="#B99862" stroke-width="2.5"/>
      </g>
      <!-- сила руки на длинном конце -->
      <g stroke="#E5484D" stroke-width="4" stroke-linecap="round" fill="#E5484D">
        <line x1="234" y1="66" x2="234" y2="94">
          <animate attributeName="y1" values="66;76;66" dur="2.6s" repeatCount="indefinite"/>
        </line>
        <path d="M234 104 l-7 -11 h14 z"/>
      </g>
      <text x="234" y="52" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="17" fill="#E5484D">сила</text>
      <text x="52" y="80" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="15" fill="#6B7180">камень</text>
      <text x="108" y="156" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="15" fill="#6B7180">опора</text>
    </svg>`,
  parts: () => `
    <svg viewBox="0 0 260 170" xmlns="http://www.w3.org/2000/svg">
      <path d="M130 96 L112 140 L148 140 Z" fill="#C9CEDA"/>
      <rect x="14" y="86" width="232" height="10" rx="5" fill="#D9BC8E" stroke="#B99862" stroke-width="2.5"/>
      <circle cx="130" cy="91" r="6" fill="#6240FF"/>
      <!-- силы -->
      <g stroke="#E5484D" stroke-width="4" stroke-linecap="round" fill="#E5484D">
        <line x1="30" y1="46" x2="30" y2="70">
          <animate attributeName="y1" values="46;52;46" dur="2s" repeatCount="indefinite"/>
        </line>
        <path d="M30 80 l-7 -11 h14 z"/>
      </g>
      <g stroke="#2F80ED" stroke-width="4" stroke-linecap="round" fill="#2F80ED">
        <line x1="230" y1="46" x2="230" y2="70">
          <animate attributeName="y1" values="46;52;46" dur="2s" repeatCount="indefinite" begin="1s"/>
        </line>
        <path d="M230 80 l-7 -11 h14 z"/>
      </g>
      <text x="30" y="36" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="18" fill="#E5484D">F₁</text>
      <text x="230" y="36" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="18" fill="#2F80ED">F₂</text>
      <!-- плечи -->
      <g stroke="#6240FF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 7">
        <path d="M34 112 L124 112"/>
        <path d="M136 112 L226 112"/>
      </g>
      <text x="79" y="132" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="17" fill="#6240FF">плечо l₁</text>
      <text x="196" y="132" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="17" fill="#6240FF">плечо l₂</text>
      <text x="130" y="164" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="15" fill="#6B7180">точка опоры</text>
    </svg>`,
};

/* ---------- интерактивы ---------- */
function onInteract(step, ctx) {
  if (step.id === 'seesaw') startSeesaw(ctx.root, ctx.done);
}

runLesson({
  lessonId: 'what',
  storageKey: 'lever-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-rule/',
  steps, visuals, onInteract,
});
</script>
