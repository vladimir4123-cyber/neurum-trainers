<!doctype html>

  /* панель+подсказка+кнопки визуала — колонкой, а не в ряд */

  .mini-actions{ display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .mini-play-btn{

  .chip-btn{

  .slider-row{

<body>

</div>

<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* canvas не понимает var() в ctx.font — разворачиваем токен шрифта заранее */
const FONT = (getComputedStyle(document.documentElement).getPropertyValue('--font-display') || '').replace(/\s+/g, ' ').trim() || '"Aeonik Pro", sans-serif';

/* ============================================================
   ТЕМА 3 «Кипение» (Пёрышкин §35).
   Пузырьки по всему объёму, полочка на 100 °C, горы.
   ============================================================ */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}

const FRAME = '#C9CEDA', TXT = '#6B7180', AXIS = '#8A8F9C';
const LINE = '#6240FF', SHELF = '#E8590C';

function drawThermo(ctx, cx, top, len, T, Tmin, Tmax) {
  const frac = Math.max(0, Math.min(1, (T - Tmin) / (Tmax - Tmin)));
  const tubeW = 12, bulbR = 14;
  const bottom = top + len;
  ctx.beginPath();
  ctx.roundRect(cx - tubeW / 2, top, tubeW, len, 6);
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();
  ctx.strokeStyle = FRAME;
  ctx.lineWidth = 2;
  ctx.stroke();
  const colH = frac * (len - 8);
  ctx.beginPath();
  ctx.roundRect(cx - 4, bottom - 4 - colH, 8, colH + 4, 4);
  ctx.fillStyle = '#E5484D';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, bottom + bulbR - 4, bulbR, 0, Math.PI * 2);
  ctx.fillStyle = '#E5484D';
  ctx.fill();
  ctx.strokeStyle = FRAME;
  ctx.stroke();
  ctx.font = '700 ' + Math.round(len * 0.12) + 'px ' + FONT;
  ctx.fillStyle = TXT;
  ctx.textAlign = 'center';
  ctx.fillText(Math.round(T) + ' °C', cx, top - 10);
  ctx.textAlign = 'start';
}

function drawFlame(ctx, cx, cy, size, t, intensity) {
  if (size <= 1 || intensity <= 0) return;
  const flick = 1 + Math.sin(t * 13 + cx) * 0.09 + Math.sin(t * 29) * 0.05;
  [
    { r: 1.0, color: 'rgba(232,89,12,0.45)' },
    { r: 0.68, color: 'rgba(245,185,59,0.8)' },
    { r: 0.36, color: 'rgba(255,244,214,0.95)' }
  ].forEach(L => {
    const hgt = size * L.r * flick;
    const wdt = size * 0.55 * L.r;
    ctx.beginPath();
    ctx.moveTo(cx, cy - hgt);
    ctx.bezierCurveTo(cx + wdt, cy - hgt * 0.45, cx + wdt * 0.8, cy, cx, cy);
    ctx.bezierCurveTo(cx - wdt * 0.8, cy, cx - wdt, cy - hgt * 0.45, cx, cy - hgt);
    ctx.fillStyle = L.color;
    ctx.fill();
  });
}

/* Оси графика; возвращает мапперы координат */
function graphFrame(ctx, X0, Y0, W, H, o) {
  const L = X0 + o.left, R = X0 + W - (o.right || 16);
  const T = Y0 + (o.top || 16), B = Y0 + H - (o.bottom || 46);
  const gx = v => L + (v / o.xMax) * (R - L);
  const gy = v => B - ((v - o.yMin) / (o.yMax - o.yMin)) * (B - T);
  ctx.font = Math.round(W * 0.034) + 'px ' + FONT;
  ctx.textAlign = 'right';
  (o.yTicks || []).forEach(v => {
    const y = gy(v);
    ctx.strokeStyle = '#E4E7F0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(L, y); ctx.lineTo(R, y); ctx.stroke();
    ctx.fillStyle = AXIS;
    ctx.fillText(String(v), L - 8, y + 7);
  });
  ctx.textAlign = 'center';
  (o.xTicks || []).forEach(tk => {
    const x = gx(tk.v);
    ctx.strokeStyle = '#EDEFF5';
    ctx.beginPath(); ctx.moveTo(x, T); ctx.lineTo(x, B); ctx.stroke();
    ctx.fillStyle = AXIS;
    ctx.fillText(tk.l, x, B + 26);
  });
  ctx.strokeStyle = AXIS;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(L, T); ctx.lineTo(L, B); ctx.lineTo(R, B); ctx.stroke();
  ctx.fillStyle = TXT;
  if (o.xLabel) ctx.fillText(o.xLabel, (L + R) / 2, Y0 + H - 4);
  if (o.yLabel) {
    ctx.save();
    ctx.translate(X0 + 18, (T + B) / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(o.yLabel, 0, 0);
    ctx.restore();
  }
  ctx.textAlign = 'start';
  return { gx, gy, L, R, T, B };
}

/* ============================================================
   ИНТЕРАКТИВ 1: кипятим воду, график рисуется сам
   ============================================================ */
function startBoil(root, done) {
  const canvas = root.querySelector('#boilCanvas');
  const startBtn = root.querySelector('#boilStartBtn');
  const resetBtn = root.querySelector('#boilResetBtn');
  const chips = [...root.querySelectorAll('.speed-chip')];
  const label = root.querySelector('#boilHint');
  const ctx = canvas.getContext('2d');
  const XMAX = 21;
  const sim = {
    running: false, speed: 1, time: 0, T: 20,
    phase: 'idle', hist: [], prevT: null, shownPhase: '', boilT: 0
  };
  let doneFired = false;
  const bubbles = [];

  chips.forEach(ch => ch.addEventListener('click', () => {
    sim.speed = +ch.dataset.speed;
    chips.forEach(c => c.classList.remove('active'));
    ch.classList.add('active');
  }));

  function updateBtn() {
    startBtn.textContent = sim.running ? '⏸ Пауза'
      : sim.phase === 'idle' ? '▶ Включить горелку'
      : sim.phase === 'done' ? '↺ Ещё раз' : '▶ Продолжить';
  }

  startBtn.addEventListener('click', () => {
    if (sim.phase === 'done') reset();
    sim.running = !sim.running;
    if (sim.running && sim.phase === 'idle') {
      sim.phase = 'heat';
      sim.hist.push({ x: 0, y: sim.T });
    }
    updateBtn();
  });
  resetBtn.addEventListener('click', reset);

  function reset() {
    sim.running = false; sim.time = 0; sim.T = 20;
    sim.phase = 'idle'; sim.hist = []; sim.shownPhase = ''; sim.boilT = 0;
    bubbles.length = 0;
    updateBtn();
    setLabel();
  }

  function setLabel() {
    if (sim.shownPhase === sim.phase) return;
    sim.shownPhase = sim.phase;
    label.innerHTML = {
      idle: 'Нажми «Включить горелку» — и следи за графиком справа.',
      heat: '🔥 Вода нагревается: 20 °C → 100 °C. На дне появляются первые пузырьки.',
      boil: '🫧 <b>Кипение: пузырьки пара по всему объёму!</b> Температура замерла на 100 °C.',
      done: '✅ Кипела всё это время — а термометр так и стоит на 100 °C. Полочка!'
    }[sim.phase];
    if ((sim.phase === 'boil' || sim.phase === 'done') && !doneFired) {
      doneFired = true;
      done();
    }
  }

  function update(t) {
    let dt = 0;
    if (sim.prevT !== null) dt = Math.min(0.05, Math.max(0, t - sim.prevT));
    sim.prevT = t;
    if (!sim.running) return;
    const d = dt * sim.speed;
    if (sim.phase === 'heat') {
      sim.T += 10 * d;
      if (sim.T >= 100) { sim.T = 100; sim.phase = 'boil'; }
    } else if (sim.phase === 'boil') {
      sim.T = 100;
      sim.boilT += d;
      if (sim.time >= XMAX - 1) { sim.phase = 'done'; sim.running = false; updateBtn(); }
    }
    sim.time += d;
    const last = sim.hist[sim.hist.length - 1];
    if (!last || sim.time - last.x >= 0.12 || sim.phase === 'done') {
      sim.hist.push({ x: Math.min(sim.time, XMAX - 1), y: sim.T });
    }
    setLabel();
  }

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 230);
    ctx.clearRect(0, 0, w, h);
    update(t);

    // ── слева: кастрюля на горелке ──
    const bx = w * 0.035, bw = w * 0.24;
    const byT = h * 0.14, bh = h * 0.54;
    const bcx = bx + bw / 2, bBot = byT + bh;
    // вода
    const warm = (sim.T - 20) / 80;
    ctx.beginPath();
    ctx.rect(bx + 4, byT + 10, bw - 8, bh - 14);
    ctx.fillStyle = `rgba(${Math.round(47 + warm * 60)},${Math.round(128 - warm * 10)},237,0.3)`;
    ctx.fill();

    // пузырьки
    const boiling = sim.phase === 'boil' || sim.phase === 'done';
    const warmBubbles = sim.T > 60 && sim.phase === 'heat';
    if (sim.running && (boiling || warmBubbles)) {
      const rate = boiling ? 6 : 1.5;
      if (bubbles.length < 26 && Math.random() < rate * 0.07) {
        bubbles.push({
          x: bx + 8 + Math.random() * (bw - 16),
          y: bBot - 8,
          r: boiling ? 2 + Math.random() * 2 : 1.5,
          v: 20 + Math.random() * 30,
        });
      }
    }
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      if (sim.running) {
        b.y -= b.v * 0.016 * sim.speed;
        if (boiling) b.r += 2.4 * 0.016 * sim.speed;   // пар: пузырь растёт при подъёме
      }
      if (b.y < byT + 16) { bubbles.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // пар над кастрюлей при кипении
    if (boiling) {
      for (let k = 0; k < 3; k++) {
        const prog = ((t * 0.35 + k / 3) % 1);
        ctx.beginPath();
        ctx.arc(bcx + Math.sin(prog * 6 + k * 2) * bw * 0.2, byT - 6 - prog * h * 0.1, 4 + prog * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(154,167,199,${0.6 * (1 - prog)})`;
        ctx.fill();
      }
    }

    // стенки кастрюли
    ctx.beginPath();
    ctx.moveTo(bx, byT);
    ctx.lineTo(bx, bBot);
    ctx.lineTo(bx + bw, bBot);
    ctx.lineTo(bx + bw, byT);
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 3;
    ctx.stroke();
    // ручки
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(bx - 8, byT + 8); ctx.lineTo(bx, byT + 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx + bw, byT + 8); ctx.lineTo(bx + bw + 8, byT + 8); ctx.stroke();
    // горелка
    const fy = h * 0.87;
    ctx.beginPath();
    ctx.roundRect(bx + bw * 0.25, fy, bw * 0.5, 7, 4);
    ctx.fillStyle = FRAME;
    ctx.fill();
    if (sim.running && sim.phase !== 'done') drawFlame(ctx, bcx, fy, h * 0.11, t, 1);

    drawThermo(ctx, w * 0.335, h * 0.14, h * 0.52, sim.T, 0, 120);

    // ── справа: живой график ──
    const gX = w * 0.40, gW = w * 0.60;
    const fr = graphFrame(ctx, gX, 0, gW, h, {
      left: 62, right: 14, top: 18, bottom: 50,
      yMin: 0, yMax: 120, yTicks: [20, 40, 60, 80, 100, 120],
      xMax: XMAX,
      xTicks: [{ v: 0, l: '0' }, { v: 5, l: '5' }, { v: 10, l: '10' }, { v: 15, l: '15' }, { v: 20, l: '20' }],
      xLabel: 'время, с', yLabel: 't, °C'
    });
    const zy = fr.gy(100);
    ctx.setLineDash([6, 6]);
    ctx.strokeStyle = 'rgba(229,72,77,0.45)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fr.L, zy); ctx.lineTo(fr.R, zy); ctx.stroke();
    ctx.setLineDash([]);
    if (sim.hist.length > 1) {
      ctx.beginPath();
      ctx.strokeStyle = LINE;
      ctx.lineWidth = 4;
      sim.hist.forEach((p, i) => {
        const px = fr.gx(Math.min(p.x, XMAX)), py = fr.gy(p.y);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      });
      ctx.stroke();
      const lastP = sim.hist[sim.hist.length - 1];
      ctx.beginPath();
      ctx.arc(fr.gx(Math.min(lastP.x, XMAX)), fr.gy(lastP.y), 7, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = LINE;
      ctx.lineWidth = 3;
      ctx.fill();
      ctx.stroke();
    }
    if (sim.phase === 'boil' || sim.phase === 'done') {
      ctx.font = '700 ' + Math.round(w * 0.034) + 'px ' + FONT;
      ctx.fillStyle = SHELF;
      ctx.fillText('полочка 100 °C', fr.gx(9), zy - 12);
    }
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  updateBtn();
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ИНТЕРАКТИВ 2: горы — кипяток, в котором не сварить яйцо
   Приближение: температура кипения падает ~на 1 °C
   на каждые 300 м подъёма (давление воздуха ниже).
   ============================================================ */
function startMount(root, done) {
  const canvas = root.querySelector('#mntCanvas');
  const slider = root.querySelector('#hSlider');
  const hVal = root.querySelector('#hVal');
  const hint = root.querySelector('#mntHint');
  const ctx = canvas.getContext('2d');
  let doneFired = false, msgBucket = -1;

  const tBoil = h => 100 - h / 295;

  slider.addEventListener('input', () => {
    const hgt = +slider.value;
    hVal.textContent = hgt + ' м';
    const tb = tBoil(hgt);
    const bucket = hgt < 500 ? 0 : hgt < 3500 ? 1 : hgt < 8000 ? 2 : 3;
    if (bucket !== msgBucket) {
      msgBucket = bucket;
      hint.innerHTML = [
        'На уровне моря вода кипит при <b>100 °C</b>. Яйцо вкрутую — 10 минут.',
        'Воздух разрежен, давит слабее — пузырькам пара легче раздуться. Кипит <b>раньше 100 °C</b>!',
        'На Эльбрусе (5642 м) кипяток — всего ~81 °C. Чай уже не тот, яйцо варится еле-еле.',
        '🏔 Эверест: кипяток ~70 °C. <b>Яйцо вкрутую не сварить</b> — белку нужно ~85 °C и выше!'
      ][bucket];
      if (bucket === 3 && !doneFired) {
        doneFired = true;
        done();
      }
    }
  });

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 220);
    ctx.clearRect(0, 0, w, h);
    const hgt = +slider.value;
    const frac = hgt / 8848;

    // ── гора ──
    const baseY = h * 0.88, peakY = h * 0.1;
    const px0 = w * 0.06, px1 = w * 0.62, peakX = w * 0.4;
    ctx.beginPath();
    ctx.moveTo(px0, baseY);
    ctx.quadraticCurveTo(w * 0.28, h * 0.62, peakX, peakY);
    ctx.quadraticCurveTo(w * 0.5, h * 0.55, px1, baseY);
    ctx.closePath();
    ctx.fillStyle = '#D9DDE7';
    ctx.fill();
    ctx.strokeStyle = '#B7BecD';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // снежная шапка
    ctx.beginPath();
    ctx.moveTo(peakX, peakY);
    ctx.quadraticCurveTo(w * 0.44, h * 0.28, w * 0.47, h * 0.3);
    ctx.quadraticCurveTo(w * 0.42, h * 0.34, w * 0.38, h * 0.3);
    ctx.quadraticCurveTo(w * 0.34, h * 0.32, w * 0.33, h * 0.28);
    ctx.quadraticCurveTo(w * 0.36, h * 0.2, peakX, peakY);
    ctx.closePath();
    ctx.fillStyle = '#FFFFFF';
    ctx.fill();
    // земля
    ctx.fillStyle = '#E8EAF2';
    ctx.fillRect(0, baseY, w, h - baseY);
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, baseY); ctx.lineTo(w, baseY); ctx.stroke();

    // отметки высот
    ctx.font = '500 ' + Math.round(w * 0.028) + 'px ' + FONT;
    ctx.fillStyle = TXT;
    ctx.textAlign = 'left';
    [[0, 'море · 100 °C'], [5642, 'Эльбрус · 81 °C'], [8848, 'Эверест · 70 °C']].forEach(([mh, lab]) => {
      const y = baseY - (mh / 8848) * (baseY - peakY);
      ctx.strokeStyle = 'rgba(138,143,156,0.5)';
      ctx.setLineDash([4, 6]);
      ctx.beginPath(); ctx.moveTo(w * 0.64, y); ctx.lineTo(w * 0.7, y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillText(lab, w * 0.715, y + 6);
    });
    ctx.textAlign = 'start';

    // ── котелок на текущей высоте ──
    const ky = baseY - frac * (baseY - peakY);
    const kx = px0 + (peakX - px0) * frac + w * 0.05;
    const kw = w * 0.07, kh = h * 0.07;
    // площадка
    ctx.strokeStyle = '#8A8F9C';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(kx - kw * 0.8, ky); ctx.lineTo(kx + kw * 0.8, ky); ctx.stroke();
    // котелок
    ctx.beginPath();
    ctx.roundRect(kx - kw / 2, ky - kh, kw, kh, 4);
    ctx.fillStyle = 'rgba(191,220,249,0.9)';
    ctx.fill();
    ctx.strokeStyle = '#5D9BE0';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // пар из котелка
    for (let k = 0; k < 2; k++) {
      const prog = ((t * 0.5 + k * 0.5) % 1);
      ctx.beginPath();
      ctx.arc(kx + Math.sin(prog * 6 + k * 3) * 6, ky - kh - 4 - prog * 24, 3 + prog * 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(154,167,199,${0.7 * (1 - prog)})`;
      ctx.fill();
    }

    // ── табло ──
    const tb = tBoil(hgt);
    ctx.font = '700 ' + Math.round(w * 0.042) + 'px ' + FONT;
    ctx.fillStyle = SHELF;
    ctx.textAlign = 'left';
    ctx.fillText('кипит при ' + Math.round(tb) + ' °C', w * 0.62, h * 0.58);
    ctx.font = '600 ' + Math.round(w * 0.03) + 'px ' + FONT;
    ctx.fillStyle = tb >= 95 ? '#07BE7E' : tb >= 85 ? '#D9A32B' : '#E5484D';
    ctx.fillText(tb >= 95 ? '🥚 яйцо сварится' : tb >= 85 ? '🥚 варить долго-долго' : '🥚 не сварить вкрутую!', w * 0.62, h * 0.67);
    ctx.textAlign = 'start';

    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}
