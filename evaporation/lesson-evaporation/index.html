<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* canvas не понимает var() в ctx.font — разворачиваем токен шрифта заранее */
const FONT = (getComputedStyle(document.documentElement).getPropertyValue('--font-display') || '').replace(/\s+/g, ' ').trim() || '"Aeonik Pro", sans-serif';

/* ============================================================
   ТЕМА 1 «Испарение — при любой температуре» (Пёрышкин §35).
   Лужа сохнет в холод → молекулы-беглецы → испарение охлаждает.
   ============================================================ */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}

const FRAME = '#C9CEDA', TXT = '#6B7180';
const COLD = { r: 47, g: 128, b: 237 };   // #2F80ED
const HOT  = { r: 229, g: 72, b: 77 };    // #E5484D

function molColor(hot) {
  const k = Math.max(0, Math.min(1, hot));
  const R = Math.round(COLD.r + (HOT.r - COLD.r) * k);
  const G = Math.round(COLD.g + (HOT.g - COLD.g) * k);
  const B = Math.round(COLD.b + (HOT.b - COLD.b) * k);
  return `rgb(${R},${G},${B})`;
}

/* ============================================================
   ИНТЕРАКТИВ 1: лужа сохнет даже в холодный день
   ============================================================ */
function startPuddle(root, done) {
  const canvas = root.querySelector('#pudCanvas');
  const btn = root.querySelector('#pudBtn');
  const hint = root.querySelector('#pudHint');
  const ctx = canvas.getContext('2d');
  let days = 0, finished = false;
  let size = 1, sizeTarget = 1;   // доля лужи

  btn.addEventListener('click', () => {
    if (finished) return;
    days++;
    sizeTarget = Math.max(0, 1 - days / 3);
    if (days === 1) hint.innerHTML = 'Лужа стала заметно меньше. И это при <b>+5 °C</b>, без всякого солнца!';
    if (days === 2) hint.innerHTML = 'Ещё меньше. Вода куда-то уходит, хотя до кипения ей далеко.';
    if (days >= 3) {
      finished = true;
      btn.disabled = true;
      btn.textContent = 'Лужа исчезла';
      hint.innerHTML = '🤔 Лужа <b>высохла в холод</b>. Кто унёс воду? Разберёмся на уровне молекул.';
      done();
    }
  });

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 210);
    ctx.clearRect(0, 0, w, h);
    size += (sizeTarget - size) * 0.06;

    // ── пасмурное небо: тучи ──
    [[w * 0.2, h * 0.16, 1], [w * 0.55, h * 0.12, 1.25], [w * 0.85, h * 0.18, 0.9]].forEach(([cx, cy, s], i) => {
      const dx = Math.sin(t * 0.3 + i * 2.1) * 6;
      ctx.fillStyle = '#E8EAF2';
      ctx.strokeStyle = FRAME;
      ctx.lineWidth = 2;
      [[0, 0, 30], [-26, 8, 20], [26, 8, 20]].forEach(([ox, oy, r]) => {
        ctx.beginPath();
        ctx.arc(cx + dx + ox * s, cy + oy * s, r * s, 0, Math.PI * 2);
        ctx.fill();
      });
    });

    // ── табло температуры ──
    ctx.font = '700 ' + Math.round(w * 0.042) + 'px ' + FONT;
    ctx.fillStyle = '#2F80ED';
    ctx.textAlign = 'left';
    ctx.fillText('+5 °C, пасмурно', w * 0.04, h * 0.1);
    ctx.font = '700 ' + Math.round(w * 0.036) + 'px ' + FONT;
    ctx.fillStyle = '#6240FF';
    ctx.fillText('прошло дней: ' + days, w * 0.04, h * 0.2);
    ctx.textAlign = 'start';

    // ── асфальт ──
    const gy = h * 0.78;
    ctx.fillStyle = '#D9DDE7';
    ctx.fillRect(0, gy, w, h - gy);
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();

    // ── лужа ──
    if (size > 0.02) {
      const rx = w * 0.3 * size + w * 0.04;
      const ry = h * 0.05 * size + h * 0.012;
      ctx.beginPath();
      ctx.ellipse(w * 0.5, gy + h * 0.07, rx, ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(191,220,249,0.95)';
      ctx.fill();
      ctx.strokeStyle = '#5D9BE0';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    } else {
      ctx.font = '600 ' + Math.round(w * 0.036) + 'px ' + FONT;
      ctx.fillStyle = TXT;
      ctx.textAlign = 'center';
      ctx.fillText('сухо!', w * 0.5, gy + h * 0.1);
      ctx.textAlign = 'start';
    }

    // ── улетающий пар (пока лужа есть) ──
    if (size > 0.02) {
      for (let k = 0; k < 4; k++) {
        const prog = ((t * 0.22 + k * 0.25) % 1);
        const px = w * (0.38 + 0.08 * k) + Math.sin(prog * 7 + k) * 8;
        const py = gy + h * 0.02 - prog * h * 0.42;
        ctx.beginPath();
        ctx.arc(px, py, 4.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(47,128,237,${0.7 * (1 - prog)})`;
        ctx.fill();
      }
    }
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ИНТЕРАКТИВ 2: капля — быстрые молекулы вылетают с поверхности
   ============================================================ */
function startEscape(root, done) {
  const canvas = root.querySelector('#escCanvas');
  const btn = root.querySelector('#escBtn');
  const hint = root.querySelector('#escHint');
  const ctx = canvas.getContext('2d');
  const N = 26;
  const parts = [];        // молекулы в капле: полярные координаты внутри капли
  const flying = [];       // улетевшие
  let escaped = 0, finished = false, prevT = null;

  for (let i = 0; i < N; i++) {
    parts.push({
      a: Math.random() * Math.PI * 2,      // угол в капле
      r: Math.sqrt(Math.random()) * 0.82,  // радиус (доля)
      sp: 0.35 + Math.random() * 0.65,     // «скорость» 0.35..1 — цвет и дрожь
      ph: Math.random() * Math.PI * 2,
    });
  }

  btn.addEventListener('click', () => {
    if (finished) return;
    // самый быстрый из верхней половины капли — беглец
    let best = -1;
    parts.forEach((p, i) => {
      const up = Math.sin(p.a) < 0 || p.r > 0.5;   // ближе к поверхности/верху
      if (!up) return;
      if (best < 0 || p.sp > parts[best].sp) best = i;
    });
    if (best < 0) best = 0;
    const p = parts.splice(best, 1)[0];
    escaped++;
    flying.push({ x: 0.5 + Math.cos(p.a) * p.r * 0.3, y: 0.42, vx: (Math.random() - 0.5) * 0.25, vy: -0.35 - p.sp * 0.2, sp: p.sp, life: 1 });
    const avg = parts.reduce((s, q) => s + q.sp, 0) / parts.length;
    if (escaped === 1) hint.innerHTML = 'Улетел самый быстрый! Смотри на шкалу: <b>средняя скорость оставшихся упала</b>.';
    if (escaped === 2) hint.innerHTML = 'Ещё один беглец. В капле остаются всё более медленные молекулы.';
    if (escaped >= 4) {
      finished = true;
      btn.disabled = true;
      btn.textContent = 'Беглецы улетели';
      hint.innerHTML = '💡 Быстрые улетают — средняя скорость падает. А скорость молекул — это температура: <b>капля охлаждается!</b>';
      done();
    } else if (escaped === 3) {
      hint.innerHTML = 'Средняя скорость — уже ' + Math.round(avg * 100) + '% от начальной. Выпусти ещё одного.';
    }
  });

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 220);
    ctx.clearRect(0, 0, w, h);
    let dt = 0.016;
    if (prevT !== null) dt = Math.min(0.05, Math.max(0, t - prevT));
    prevT = t;

    // ── капля ──
    const cx = w * 0.42, cy = h * 0.56, R = h * 0.33;
    ctx.beginPath();
    ctx.moveTo(cx, cy - R * 1.45);
    ctx.bezierCurveTo(cx + R * 0.95, cy - R * 0.5, cx + R, cy + R * 0.4, cx, cy + R * 0.72);
    ctx.bezierCurveTo(cx - R, cy + R * 0.4, cx - R * 0.95, cy - R * 0.5, cx, cy - R * 1.45);
    ctx.fillStyle = 'rgba(191,220,249,0.55)';
    ctx.fill();
    ctx.strokeStyle = '#5D9BE0';
    ctx.lineWidth = 3;
    ctx.stroke();

    // молекулы внутри
    parts.forEach(p => {
      p.a += Math.sin(t * 1.4 + p.ph) * 0.004 * p.sp * 60 * dt;
      const jx = Math.sin(t * (4 + p.sp * 9) + p.ph) * 4 * p.sp;
      const jy = Math.cos(t * (5 + p.sp * 8) + p.ph * 1.7) * 4 * p.sp;
      const px = cx + Math.cos(p.a) * p.r * R * 0.8 + jx;
      const py = cy - R * 0.2 + Math.sin(p.a) * p.r * R * 0.75 + jy;
      ctx.beginPath();
      ctx.arc(px, py, 7, 0, Math.PI * 2);
      ctx.fillStyle = molColor((p.sp - 0.35) / 0.65);
      ctx.fill();
    });

    // улетевшие
    for (let i = flying.length - 1; i >= 0; i--) {
      const f = flying[i];
      f.x += f.vx * dt; f.y += f.vy * dt; f.life -= dt * 0.5;
      if (f.life <= 0) { flying.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(cx + (f.x - 0.5) * w * 0.6, h * (f.y), 6.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(229,72,77,${Math.max(0, f.life)})`;
      ctx.fill();
    }

    // ── шкала средней скорости = температуры капли ──
    const avg = parts.length ? parts.reduce((s, q) => s + q.sp, 0) / parts.length : 0;
    const bx = w * 0.78, byT = h * 0.16, bh = h * 0.6, bw = 16;
    ctx.beginPath();
    ctx.roundRect(bx, byT, bw, bh, 8);
    ctx.fillStyle = '#FFFFFF';
    ctx.fill();
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 2;
    ctx.stroke();
    const fillH = Math.max(0, Math.min(1, avg)) * (bh - 6);
    ctx.beginPath();
    ctx.roundRect(bx + 3, byT + bh - 3 - fillH, bw - 6, fillH, 5);
    ctx.fillStyle = molColor(avg);
    ctx.fill();
    ctx.font = '600 ' + Math.round(w * 0.028) + 'px ' + FONT;
    ctx.fillStyle = TXT;
    ctx.textAlign = 'center';
    ctx.fillText('средняя', bx + bw / 2, byT + bh + 24);
    ctx.fillText('скорость', bx + bw / 2, byT + bh + 44);
    ctx.textAlign = 'start';

    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}
