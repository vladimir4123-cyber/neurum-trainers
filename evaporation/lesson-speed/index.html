<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* canvas не понимает var() в ctx.font — разворачиваем токен шрифта заранее */
const FONT = (getComputedStyle(document.documentElement).getPropertyValue('--font-display') || '').replace(/\s+/g, ' ').trim() || '"Aeonik Pro", sans-serif';

/* ============================================================
   ТЕМА 2 «От чего зависит скорость испарения» (Пёрышкин §35).
   Четыре ручки: температура, площадь, ветер, род жидкости —
   честная модель скорости и времени высыхания.
   ============================================================ */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}

const FRAME = '#C9CEDA', TXT = '#6B7180';

/* ============================================================
   ИНТЕРАКТИВ: лаборатория сушки
   Честная модель: скорость = f(T) · ветер · площадь · жидкость.
   Время высыхания ~ 1 / скорость (объём один и тот же).
   ============================================================ */
const LIQ = [
  { n: 'вода',  k: 1,    color: 'rgba(191,220,249,0.9)', edge: '#5D9BE0' },
  { n: 'спирт', k: 3,    color: 'rgba(214,204,255,0.9)', edge: '#8B6FFF' },
  { n: 'масло', k: 0.15, color: 'rgba(245,205,120,0.9)', edge: '#D9A32B' },
];
const WIND = [
  { n: 'штиль', k: 1 },
  { n: 'ветерок', k: 2 },
  { n: 'сильный ветер', k: 4 },
];

function startLab(root, done) {
  const canvas = root.querySelector('#labCanvas');
  const tSlider = root.querySelector('#tSlider');
  const tVal = root.querySelector('#tVal');
  const hint = root.querySelector('#labHint');
  const ctx = canvas.getContext('2d');
  const state = { T: 20, wind: 0, spread: 0, liq: 0 };
  const touched = new Set();
  let doneFired = false, evapPhase = 0, prevT = null;

  function tempF(T) { return 0.6 + (T - 10) * 0.06; }   // 10° → ×0.6, 40° → ×2.4
  function rate() { return LIQ[state.liq].k * tempF(state.T) * WIND[state.wind].k * (state.spread ? 3 : 1); }

  function fmtTime(min) {
    if (min >= 90) {
      const hrs = Math.round(min / 30) / 2;
      return ('' + hrs).replace('.', ',') + ' ч';
    }
    return Math.max(1, Math.round(min)) + ' мин';
  }

  function refresh() {
    const r = rate();
    const t = 50 / r;   // вода, 20 °C, штиль, капля ≈ 42 мин
    hint.innerHTML = `Скорость испарения: <b>×${('' + (Math.round(r * 10) / 10)).replace('.', ',')}</b> · высохнет примерно за <b>${fmtTime(t)}</b>`;
    if (touched.size >= 3 && !doneFired) {
      doneFired = true;
      done();
    }
  }

  tSlider.addEventListener('input', () => {
    state.T = +tSlider.value;
    tVal.textContent = state.T + ' °C';
    touched.add('T');
    refresh();
  });
  root.querySelectorAll('[data-wind]').forEach(b => b.addEventListener('click', () => {
    state.wind = +b.dataset.wind;
    root.querySelectorAll('[data-wind]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    touched.add('wind');
    refresh();
  }));
  root.querySelectorAll('[data-spread]').forEach(b => b.addEventListener('click', () => {
    state.spread = +b.dataset.spread;
    root.querySelectorAll('[data-spread]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    touched.add('spread');
    refresh();
  }));
  root.querySelectorAll('[data-liq]').forEach(b => b.addEventListener('click', () => {
    state.liq = +b.dataset.liq;
    root.querySelectorAll('[data-liq]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    touched.add('liq');
    refresh();
  }));

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 220);
    ctx.clearRect(0, 0, w, h);
    let dt = 0.016;
    if (prevT !== null) dt = Math.min(0.05, Math.max(0, t - prevT));
    prevT = t;
    const r = rate();
    evapPhase += dt * Math.min(3, 0.25 + r * 0.12);

    // ── солнце: размер по температуре ──
    const heat = (state.T - 10) / 30;
    const sx = w * 0.12, sy = h * 0.18, sr = h * 0.06 + heat * h * 0.06;
    for (let i = 0; i < 9; i++) {
      const a = t * 0.3 + (i / 9) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(a) * sr * 1.3, sy + Math.sin(a) * sr * 1.3);
      ctx.lineTo(sx + Math.cos(a) * sr * (1.65 + Math.sin(t * 3 + i) * 0.1), sy + Math.sin(a) * sr * (1.65 + Math.sin(t * 3 + i) * 0.1));
      ctx.strokeStyle = 'rgba(245,185,59,0.9)';
      ctx.lineWidth = 3.5;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = heat > 0.6 ? '#F5B93B' : '#FBD98A';
    ctx.fill();
    ctx.font = '600 ' + Math.round(w * 0.032) + 'px ' + FONT;
    ctx.fillStyle = TXT;
    ctx.textAlign = 'center';
    ctx.fillText(state.T + ' °C', sx, sy + sr + 30);
    ctx.textAlign = 'start';

    // ── ветер ──
    const wk = WIND[state.wind].k;
    if (wk > 1) {
      ctx.strokeStyle = '#8A8F9C';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      const nW = wk;
      for (let i = 0; i < nW; i++) {
        const prog = ((t * (0.3 + wk * 0.12) + i / nW) % 1);
        const wy = h * (0.22 + 0.14 * i);
        const wx = w * 0.3 + prog * w * 0.5;
        ctx.globalAlpha = Math.sin(prog * Math.PI);
        ctx.beginPath();
        ctx.moveTo(wx, wy);
        ctx.quadraticCurveTo(wx + 22, wy - 10, wx + 44, wy);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    // ── стол ──
    const gy = h * 0.8;
    ctx.fillStyle = '#D9DDE7';
    ctx.fillRect(0, gy, w, h - gy);
    ctx.strokeStyle = FRAME;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();

    // ── жидкость: капля или растеклась ──
    const L = LIQ[state.liq];
    const cx = w * 0.52;
    if (state.spread) {
      ctx.beginPath();
      ctx.ellipse(cx, gy, w * 0.3, h * 0.035, 0, Math.PI, 0);
      ctx.closePath();
      ctx.fillStyle = L.color;
      ctx.fill();
      ctx.strokeStyle = L.edge;
      ctx.lineWidth = 2.5;
      ctx.stroke();
    } else {
      const R = h * 0.13;
      ctx.beginPath();
      ctx.moveTo(cx, gy - R * 2.1);
      ctx.bezierCurveTo(cx + R, gy - R * 0.9, cx + R * 0.95, gy, cx, gy);
      ctx.bezierCurveTo(cx - R * 0.95, gy, cx - R, gy - R * 0.9, cx, gy - R * 2.1);
      ctx.fillStyle = L.color;
      ctx.fill();
      ctx.strokeStyle = L.edge;
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }
    ctx.font = '600 ' + Math.round(w * 0.03) + 'px ' + FONT;
    ctx.fillStyle = TXT;
    ctx.textAlign = 'center';
    ctx.fillText(L.n + (state.spread ? ' (растеклась)' : ' (капля)'), cx, gy + 34);
    ctx.textAlign = 'start';

    // ── улетающий пар: плотность по скорости ──
    const nP = Math.max(2, Math.min(12, Math.round(r * 1.6) + 1));
    const spreadW = state.spread ? w * 0.28 : w * 0.06;
    for (let k = 0; k < nP; k++) {
      const prog = ((evapPhase * 0.5 + k / nP) % 1);
      const px = cx + Math.sin(k * 7.7) * spreadW + (wk - 1) * prog * w * 0.06 + Math.sin(prog * 8 + k) * 5;
      const py = gy - h * 0.1 - prog * h * 0.5;
      ctx.beginPath();
      ctx.arc(px, py, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(229,72,77,${0.75 * (1 - prog)})`;
      ctx.fill();
    }
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  refresh();
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ШАГИ УРОКА
   ============================================================ */
const steps = [
  {
    phase: 'theory', type: 'info', visual: 'shirts', big: true,

    text: 'Постирали две одинаковые футболки. Одну расправили на верёвке во дворе, вторую бросили комком в тазу. К вечеру первая сухая, вторая — мокрая. Жидкость одна и та же, температура одна и та же. Значит, у испарения есть <b>ручки скорости</b>. Сейчас покрутим их все.',
  },
  {
    phase: 'theory', type: 'interact', id: 'lab', visual: 'lab',
    title: 'Лаборатория сушки',
    text: 'Перед тобой лужица на столе. Крути все четыре ручки — температуру, ветер, площадь и род жидкости — и смотри, как меняется время высыхания. Попробуй сделать испарение самым быстрым и самым медленным.',
  },
  {
    phase: 'theory', type: 'info', visual: 'four', big: true,
    title: 'Четыре ручки испарения',
    text: 'Испарение идёт быстрее, если: <b>выше температура</b> (быстрых молекул больше), <b>больше площадь поверхности</b> (беглецам больше «выходов»), <b>есть ветер</b> (уносит вылетевшие молекулы, не давая им вернуться) и <b>жидкость «летучая»</b> — молекулы спирта притягиваются слабее, чем у воды, а у масла — сильнее.',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Два вопроса — и все четыре ручки твои.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос 1',
    text: 'Почему расправленная футболка сохнет быстрее, чем скомканная?',
    options: [
      { id: 'a', text: 'У расправленной больше площадь поверхности — молекулам легче вылетать', correct: true },
      { id: 'b', text: 'В расправленной футболке меньше воды', correct: false },
      { id: 'c', text: 'Расправленная футболка сильнее нагревается', correct: false },
    ],
    right: 'Точно! Испарение идёт с поверхности. Чем больше открытая поверхность, тем больше молекул-беглецов вылетает каждую секунду.',
    wrong: 'Воды в них поровну — футболки одинаковые. Разница в площади поверхности: у расправленной она больше, и беглецов вылетает больше.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос 2',
    text: 'Почему на ветру бельё сохнет быстрее, чем в безветрие?',
    options: [
      { id: 'a', text: 'Ветер уносит вылетевшие молекулы и не даёт им вернуться в жидкость', correct: true },
      { id: 'b', text: 'Ветер нагревает бельё трением', correct: false },
      { id: 'c', text: 'Ветер выдавливает воду из ткани', correct: false },
    ],
    right: 'Верно! Часть вылетевших молекул обычно возвращается обратно. Ветер сдувает их прочь — и испарение идёт только «на вылет».',
    wrong: 'Ветер не греет и не выжимает ткань. Он уносит пар от поверхности: вылетевшие молекулы не возвращаются обратно в жидкость.',
  },
];

/* ---------- визуалы шагов ---------- */
const visuals = {
  lab: () => `
    <div class="canvas-panel"><canvas id="labCanvas" height="220"></canvas></div>
    <div class="slider-row">
      <label><span>Температура ☀️</span><b id="tVal">20 °C</b></label>
      <input type="range" id="tSlider" min="10" max="40" value="20" step="1">
    </div>
    <div class="ctl-row"><span class="ctl-name">ветер</span>
      <button class="chip-btn active" data-wind="0">штиль</button>
      <button class="chip-btn" data-wind="1">ветерок</button>
      <button class="chip-btn" data-wind="2">сильный</button>
    </div>

    </div>
    <p class="canvas-hint" id="labHint">Крути ручки — время высыхания пересчитывается честно.</p>`,
  shirts: () => `
    <svg viewBox="0 0 260 150" xmlns="http://www.w3.org/2000/svg">
      <line x1="14" y1="34" x2="150" y2="34" stroke="#8A8F9C" stroke-width="3" stroke-linecap="round"/>
      <path d="M52 38 L92 38 L88 52 L96 102 Q72 112 48 102 L56 52 Z" fill="#8B6FFF" stroke="#6240FF" stroke-width="2">

        <circle cx="84" cy="110" r="3.5"><animate attributeName="cy" values="110;128" dur="2s" repeatCount="indefinite" begin=".6s"/><animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite" begin=".6s"/></circle>

        <circle cx="82" cy="48" r="4"><animateTransform attributeName="transform" type="translate" values="0,0;9,-28" dur="2.5s" repeatCount="indefinite" begin=".8s"/><animate attributeName="opacity" values="1;0" dur="2.5s" repeatCount="indefinite" begin=".8s"/></circle>

      </g>
      <text x="72" y="146" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="13" fill="#6B7180">высохла к вечеру</text>
      <text x="204" y="146" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="13" fill="#6B7180">всё ещё мокрая</text>

        <text x="102" y="92" font-size="12" fill="#6B7180">площадь</text>

/* ---------- интерактивы ---------- */
function onInteract(step, ctx) {
  if (step.id === 'lab') startLab(ctx.root, ctx.done);
}

runLesson({
  lessonId: 'speed',
  storageKey: 'evaporation-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-boiling/',
  steps, visuals, onInteract,
});
</script>
