<script type="module">
import { runLesson } from '/assets/lesson/lesson-engine.js?v=4';
import { voice, stopAll } from '/sound/audio.js?v=1';

/* ============================================================
   ТЕМА 3 «Громкость и интерференция».
   Интерактивы «амплитуда — громкость» и «две волны на 3D-поле»
   перенесены из монолита sound/ в светлую Neuroom-тему.
   ============================================================ */

const VIOLET = '98,64,255';   /* #6240FF */
const ORANGE = '232,89,12';   /* #E8590C */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}

/* ============================================================
   ИНТЕРАКТИВ 1: амплитуда — от шёпота до крика
   ============================================================ */
function startAmp(root, done) {
  const canvas = root.querySelector('#ampCanvas');
  const slider = root.querySelector('#ampSlider');
  const valEl = root.querySelector('#ampVal');
  const playBtn = root.querySelector('#ampPlayBtn');
  const emojiEl = root.querySelector('#loudEmoji');
  const labelEl = root.querySelector('#loudLabel');
  const ctx = canvas.getContext('2d');

  let voiceH = null, played = false, moved = false;
  const maybeDone = () => { if (played && moved) done(); };

  playBtn.addEventListener('click', () => {
    if (voiceH) {
      voiceH.stop(); voiceH = null;
      playBtn.textContent = '▶ Послушать';
      return;
    }
    voiceH = voice({ freq: 300, type: 'triangle', gain: (+slider.value / 100) * 0.25 });
    playBtn.textContent = '■ Остановить';
    played = true;
    maybeDone();
  });

  slider.addEventListener('input', () => {
    const v = +slider.value;
    valEl.textContent = v + '%';
    if (voiceH) voiceH.setGain((v / 100) * 0.25);
    if (v < 30) { emojiEl.textContent = '🤫'; labelEl.textContent = 'Шёпот'; }
    else if (v < 70) { emojiEl.textContent = '🗣'; labelEl.textContent = 'Обычный разговор'; }
    else { emojiEl.textContent = '📢'; labelEl.textContent = 'Крик!'; }
    emojiEl.style.transform = `scale(${0.8 + v / 200})`;
    moved = true;
    maybeDone();
  });

  function draw(t) {
    if (!canvas.isConnected) { stopAll(); return; }
    const { w, h } = fit(canvas, 120);
    ctx.clearRect(0, 0, w, h);
    const amp = +slider.value / 100;

    ctx.beginPath();
    ctx.strokeStyle = '#C9CEDA';
    ctx.lineWidth = 1.5;
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.strokeStyle = '#6240FF';
    ctx.lineWidth = 3;
    for (let x = 0; x <= w; x += 2) {
      const y = h / 2 + Math.sin(2 * Math.PI * 3 * (x / w) - t * 5) * (h * 0.42 * amp);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // пунктир «размаха»
    ctx.setLineDash([6, 6]);
    ctx.strokeStyle = 'rgba(232,89,12,0.6)';
    ctx.lineWidth = 1.5;
    [-1, 1].forEach(s => {
      ctx.beginPath();
      ctx.moveTo(0, h / 2 + s * h * 0.42 * amp);
      ctx.lineTo(w, h / 2 + s * h * 0.42 * amp);
      ctx.stroke();
    });
    ctx.setLineDash([]);
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ИНТЕРАКТИВ 2: интерференция — две волны на 3D-поле
   ============================================================ */
function startInterference(root, done) {
  const canvas = root.querySelector('#intCanvas');
  const btnCon = root.querySelector('#intCon');
  const btnDes = root.querySelector('#intDes');
  const label = root.querySelector('#intLabel');
  const hearBtn = root.querySelector('#hearBtn');
  const hearLabel = root.querySelector('#hearLabel');
  const ctx = canvas.getContext('2d');

  let mode = 'constructive';
  let token = 0;

  function setMode(m) {
    mode = m;
    btnCon.classList.toggle('active', m === 'constructive');
    btnDes.classList.toggle('active', m === 'destructive');
    label.textContent = m === 'constructive'
      ? 'Пики совпадают: волны усиливают друг друга'
      : 'Противофаза: по средней линии волны гасят друг друга';
  }
  btnCon.addEventListener('click', () => setMode('constructive'));
  btnDes.addEventListener('click', () => setMode('destructive'));

  hearBtn.addEventListener('click', () => {
    const my = ++token;
    const alive = () => my === token && hearBtn.isConnected;
    hearBtn.disabled = true;
    const F = 330;

    hearLabel.textContent = '🔊 Волна 1...';
    const v1 = voice({ freq: F, type: 'sine', gain: 0.18 });
    setTimeout(() => {
      v1.stop();
      if (!alive()) return;
      hearLabel.textContent = '🔊 Волна 2 — точно такая же...';
      const v2 = voice({ freq: F, type: 'sine', gain: 0.18 });
      setTimeout(() => {
        v2.stop();
        if (!alive()) return;
        hearLabel.textContent = mode === 'destructive'
          ? '🤫 Обе вместе в противофазе: тишина!'
          : '📢 Обе вместе, пики совпадают: громче!';
        const a = voice({ freq: F, type: 'sine', gain: 0.18 });
        const b = voice({ freq: F, type: 'sine', gain: 0.18, invert: mode === 'destructive' });
        setTimeout(() => {
          a.stop(); b.stop();
          if (!alive()) return;
          hearBtn.disabled = false;
          hearLabel.textContent = 'Переключи режим и нажми ещё раз — сравни!';
          done();
        }, 1800);
      }, 1100);
    }, 1100);
  });

  function draw(t) {
    if (!canvas.isConnected) { stopAll(); return; }
    const { w, h } = fit(canvas, 240);
    ctx.clearRect(0, 0, w, h);
    const phase = mode === 'destructive' ? Math.PI : 0;

    // ── 3D-поле точек (верхние 60%) ──
    const rows = 14, cols = 40;
    const fieldH = h * 0.60;
    for (let r = 0; r < rows; r++) {
      const v = r / (rows - 1);
      const py = h * 0.06 + Math.pow(v, 1.12) * fieldH;
      const scale = 0.42 + 0.58 * v;
      for (let c = 0; c < cols; c++) {
        const u = c / (cols - 1) - 0.5;
        const px = w / 2 + u * w * 0.94 * scale;
        const X = u * 12, Z = (1 - v) * 9;
        const d1 = Math.hypot(X + 3.4, Z - 4.5);
        const d2 = Math.hypot(X - 3.4, Z - 4.5);
        const val = Math.sin(d1 * 1.5 - t * 4.2) + Math.sin(d2 * 1.5 - t * 4.2 + phase);
        const mag = Math.abs(val) / 2;
        const size = (1.1 + mag * 3.4) * scale;
        const alpha = 0.12 + mag * 0.55;
        ctx.beginPath();
        ctx.arc(px, py + val * 3.2 * scale, size, 0, Math.PI * 2);
        ctx.fillStyle = val > 0 ? `rgba(${VIOLET},${alpha.toFixed(3)})` : `rgba(${ORANGE},${alpha.toFixed(3)})`;
        ctx.fill();
      }
    }
    // источники
    const srcY = h * 0.06 + Math.pow(0.5, 1.12) * fieldH;
    [[-3.4, '#6240FF'], [3.4, '#E8590C']].forEach(([X, col]) => {
      const scale = 0.42 + 0.58 * 0.5;
      const px = w / 2 + (X / 12) * w * 0.94 * scale;
      const pulse = 1 + Math.sin(t * 4.2) * 0.25;
      ctx.beginPath();
      ctx.arc(px, srcY, 7 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();
    });

    // ── сумма волн (низ) ──
    const baseY = h * 0.84;
    const amp = h * 0.075;
    ctx.beginPath();
    ctx.strokeStyle = '#C9CEDA';
    ctx.lineWidth = 1.5;
    ctx.moveTo(0, baseY);
    ctx.lineTo(w, baseY);
    ctx.stroke();

    [[`rgba(${VIOLET},0.45)`, 0], [`rgba(${ORANGE},0.5)`, phase]].forEach(([col, ph]) => {
      ctx.beginPath();
      ctx.strokeStyle = col;
      ctx.lineWidth = 1.6;
      for (let x = 0; x <= w; x += 3) {
        const y = baseY + Math.sin(2 * Math.PI * 3 * (x / w) - t * 4 + ph) * amp;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    });
    ctx.beginPath();
    ctx.strokeStyle = '#2F80ED';
    ctx.lineWidth = 3;
    for (let x = 0; x <= w; x += 3) {
      const xn = x / w;
      const y = baseY + (Math.sin(2 * Math.PI * 3 * xn - t * 4) + Math.sin(2 * Math.PI * 3 * xn - t * 4 + phase)) * amp * 0.5;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.font = `600 ${Math.round(w * 0.042)}px var(--font-display), sans-serif`;
    ctx.fillStyle = '#2F80ED';
    ctx.fillText('Сумма волн', 14, baseY - amp - 10);
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

   ============================================================ */
