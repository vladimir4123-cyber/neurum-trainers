<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 1 «Что такое температура».
   Температура ↔ скорость движения молекул (Пёрышкин, 7 класс).
   ============================================================ */

/* ---------- плоский стиль: хелперы цвета (§8) ---------- */
function tint(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * t);
  g = Math.round(g + (255 - g) * t);
  b = Math.round(b + (255 - b) * t);
  return `rgb(${r},${g},${b})`;
}
function shade(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}
const COLD = '#2F80ED', HOT = '#E5484D';
function mix(a, b, t) {
  const na = parseInt(a.slice(1), 16), nb = parseInt(b.slice(1), 16);
  const r = Math.round((na >> 16) + (((nb >> 16) & 255) - (na >> 16)) * t);
  const g = Math.round(((na >> 8) & 255) + (((nb >> 8) & 255) - ((na >> 8) & 255)) * t);
  const bl = Math.round((na & 255) + ((nb & 255) - (na & 255)) * t);
  return '#' + ((r << 16) | (g << 8) | bl).toString(16).padStart(6, '0');
}

/* Молекулы-кружки с дрожанием для SVG-иллюстраций */
function jitterDots(cx, cy, w, h, n, color, speed, seed) {
  let out = '';
  for (let i = 0; i < n; i++) {
    const px = cx - w / 2 + ((i * 61 + seed * 37) % 100) / 100 * w;
    const py = cy - h / 2 + ((i * 43 + seed * 53) % 100) / 100 * h;
    const a = 3 + (i % 3) * (speed * 2);
    const dur = (1.3 - speed * 0.9 + (i % 4) * 0.08).toFixed(2);
    out += `
      <circle cx="${px.toFixed(0)}" cy="${py.toFixed(0)}" r="9" fill="${color}" stroke="${shade(color, 0.25)}" stroke-width="1.6">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; ${a} ${-a}; ${-a} ${a}; ${a * 0.6} ${a}; 0 0" dur="${dur}s" repeatCount="indefinite"/>
      </circle>`;
  }
  return out;
}

/* =================== ШАГИ ТЕМЫ =================== */
const STEPS = [
  {

  },
  {
    phase: 'theory', type: 'interact', id: 'heat', visual: 'heatBox',
    title: 'Нагрей молекулы сам',
    text: 'Двигай ползунок нагрева и смотри на частицы. <b>Температура — это мера того, насколько быстро движутся молекулы тела.</b>',
  },
  {
    phase: 'theory', type: 'info', visual: 'bowls', big: true,
    title: 'Почему рукам верить нельзя',
    text: 'Подержи одну руку в холодной воде, другую — в горячей, а потом обе опусти в тёплую. Одной руке она покажется <b>горячей</b>, другой — <b>холодной</b>. Одна и та же вода! Ощущения обманывают.',
  },
  {
    phase: 'theory', type: 'info', visual: 'why',
    title: 'Поэтому температуру измеряют прибором',
    text: 'Врач не скажет «лоб вроде тёплый» — он измерит: <b>38,2 °C</b>. Синоптик не скажет «на улице свежо» — он назовёт число. Прибор для измерения температуры — <b>термометр</b>.',
  },

  { phase: 'check', type: 'splash', title: 'Проверь себя', text: 'Два вопроса — и тема твоя.' },

  {
    phase: 'check', type: 'question',
    title: 'Что показывает температура?',
    text: 'Вспомни частицы в коробке из опыта с нагревом.',
    options: [
      { id: 'a', text: 'Сколько молекул в теле', correct: false },
      { id: 'b', text: 'Насколько быстро движутся молекулы тела', correct: true },
      { id: 'c', text: 'Размер молекул тела', correct: false },
      { id: 'd', text: 'Цвет и блеск тела', correct: false },
    ],
    right: 'Именно! Чем быстрее движутся молекулы, тем выше температура. При нагревании движение ускоряется.',

  },
  {
    phase: 'check', type: 'question',
    title: 'Зачем нужен термометр, если есть руки?',
    text: 'Вспомни опыт с тремя мисками воды.',
    options: [
      { id: 'a', text: 'Ощущения обманывают: одна и та же вода кажется то горячей, то холодной', correct: true },
      { id: 'b', text: 'Руками можно измерить только воду, а термометром — что угодно', correct: false },
      { id: 'c', text: 'Термометр не нужен — руки точнее', correct: false },
      { id: 'd', text: 'Руками нельзя трогать тёплое', correct: false },
    ],
    right: 'Верно! После холодной воды тёплая кажется горячей, после горячей — холодной. Поэтому нужен прибор, который даёт число.',
    wrong: 'Дело в другом: одна и та же тёплая вода кажется разным рукам разной. Ощущениям нельзя доверять — нужен прибор с числом.',
  },
];

/* =================== ВИЗУАЛЫ =================== */
const visuals = {
  /* Два стакана: горячий чай и холодная вода, молекулы дрожат с разной скоростью */
  cups() {
    const cup = (x, liquid, label, labelColor, molecules, steam) => `
      <g transform="translate(${x},0)">
        ${steam}
        <path d="M40 90 L48 236 Q49 250 62 250 L138 250 Q151 250 152 236 L160 90"
              fill="#F4F8FE" stroke="#C9CEDA" stroke-width="3" stroke-linejoin="round"/>
        <path d="M47 118 Q100 126 153 118 L148 233 Q147 245 136 245 L64 245 Q53 245 52 233 Z" fill="${tint(liquid, 0.72)}"/>
        <path d="M47 118 Q100 126 153 118" fill="none" stroke="${tint(liquid, 0.4)}" stroke-width="3" stroke-linecap="round"/>
        ${molecules}
        <text x="100" y="292" text-anchor="middle" font-family="var(--font-display), sans-serif"
              font-weight="500" font-size="24" fill="${labelColor}" dominant-baseline="central">${label}</text>
      </g>`;
    const steamHot = `
      <g stroke="${tint(HOT, 0.55)}" stroke-width="5" stroke-linecap="round" fill="none">
        <path d="M75 70 q8 -14 0 -28 q-7 -12 1 -24"><animate attributeName="opacity" values=".2;.9;.2" dur="2.2s" repeatCount="indefinite"/></path>
        <path d="M102 74 q9 -15 0 -30 q-8 -13 1 -26"><animate attributeName="opacity" values=".9;.2;.9" dur="2.2s" repeatCount="indefinite"/></path>
        <path d="M128 70 q8 -14 0 -28 q-7 -12 1 -24"><animate attributeName="opacity" values=".2;.9;.2" dur="2.2s" begin=".7s" repeatCount="indefinite"/></path>
      </g>`;
    return `
      <svg viewBox="0 0 620 310" class="circuit-svg">
        ${cup(10, HOT, 'горячо · молекулы быстрые', shade(HOT, 0.1), jitterDots(100, 180, 88, 100, 6, HOT, 1, 1), steamHot)}
        ${cup(410, COLD, 'холодно · молекулы медленные', shade(COLD, 0.1), jitterDots(100, 180, 88, 100, 6, COLD, 0.15, 2), '')}
      </svg>`;
  },

  /* Интерактив: коробка с частицами + слайдер нагрева */
  heatBox() {
    return `
      <div class="canvas-panel"><canvas id="heatCanvas" height="300"></canvas></div>
      <div class="heat-slider">
        <div class="heat-slider__val"><span id="heatLabel">прохладно</span></div>
        <input type="range" id="heatRange" class="heat-slider__input" min="0" max="100" step="1" value="20" aria-label="Нагрев">
      </div>
      <p class="canvas-hint" id="heatHint">Двигай ползунок: <b>грей</b> и <b>охлаждай</b> частицы.</p>`;
  },

  /* Опыт с тремя мисками */
  bowls() {
    const bowl = (x, color, label) => `
      <g transform="translate(${x},150)">
        <path d="M-88 0 Q-88 76 0 76 Q88 76 88 0 Z" fill="#F4F8FE" stroke="#C9CEDA" stroke-width="3"/>
        <path d="M-78 6 Q-74 62 0 62 Q74 62 78 6 Q0 22 -78 6 Z" fill="${tint(color, 0.66)}"/>
        <ellipse cx="0" cy="6" rx="78" ry="10" fill="${tint(color, 0.5)}"/>
        <text x="0" y="108" text-anchor="middle" font-family="var(--font-display), sans-serif"
              font-weight="500" font-size="22" fill="${shade(color, 0.15)}" dominant-baseline="central">${label}</text>
      </g>`;
    // ладонь: плоская, из скруглённых прямоугольников
    const hand = (x, flip, dur, begin) => `
      <g transform="translate(${x},34) scale(${flip},1)">
        <g>
          <rect x="-26" y="6" width="52" height="58" rx="18" fill="#F3C89E" stroke="#D9A876" stroke-width="2.5"/>
          <rect x="-24" y="-16" width="11" height="34" rx="5.5" fill="#F3C89E" stroke="#D9A876" stroke-width="2.2"/>
          <rect x="-10" y="-22" width="11" height="40" rx="5.5" fill="#F3C89E" stroke="#D9A876" stroke-width="2.2"/>
          <rect x="4"  y="-19" width="11" height="37" rx="5.5" fill="#F3C89E" stroke="#D9A876" stroke-width="2.2"/>
          <rect x="17" y="-12" width="10" height="30" rx="5" fill="#F3C89E" stroke="#D9A876" stroke-width="2.2"/>
          <animateTransform attributeName="transform" type="translate" values="0 0; 0 46; 0 46; 0 0" keyTimes="0;.3;.7;1" dur="${dur}s" begin="${begin}s" repeatCount="indefinite"/>
        </g>
      </g>`;
    return `
      <svg viewBox="0 0 620 300" class="circuit-svg">
        ${bowl(110, COLD, 'холодная')}
        ${bowl(310, '#9A63E8', 'тёплая')}
        ${bowl(510, HOT, 'горячая')}
        ${hand(110, 1, 5, 0)}
        ${hand(510, -1, 5, 0)}
        ${hand(310, 1, 5, 2.5)}
        <text x="310" y="24" text-anchor="middle" font-family="var(--font-sans), sans-serif"
              font-size="19" fill="#6B7180" dominant-baseline="central">руки из крайних мисок → в среднюю</text>
      </svg>`;
  },

  /* Зачем измерять: погода, больной, духовка */
  why() {
    const card = (x, inner, value, label) => `
      <g transform="translate(${x},0)">
        <rect x="-86" y="20" width="172" height="250" rx="20" fill="#fff" stroke="#E3E6F0" stroke-width="2"/>
        ${inner}
        <text x="0" y="216" text-anchor="middle" font-family="var(--font-display), sans-serif"
              font-weight="500" font-size="31" fill="#6240FF" dominant-baseline="central">${value}</text>
        <text x="0" y="248" text-anchor="middle" font-family="var(--font-sans), sans-serif"
              font-size="16" fill="#6B7180" dominant-baseline="central">${label}</text>
      </g>`;
    const snow = `
      <g stroke="${COLD}" stroke-width="4" stroke-linecap="round">
        <g transform="translate(0,110)">
          <line x1="0" y1="-34" x2="0" y2="34"/><line x1="-30" y1="-17" x2="30" y2="17"/><line x1="-30" y1="17" x2="30" y2="-17"/>
          <line x1="-8" y1="-26" x2="0" y2="-18"/><line x1="8" y1="-26" x2="0" y2="-18"/>
          <line x1="-8" y1="26" x2="0" y2="18"/><line x1="8" y1="26" x2="0" y2="18"/>
          <animateTransform attributeName="transform" type="rotate" from="0 0 110" to="60 0 110" dur="6s" repeatCount="indefinite" additive="sum"/>
        </g>
      </g>`;
    const face = `
      <g transform="translate(0,110)">
        <circle r="44" fill="#F3C89E" stroke="#D9A876" stroke-width="2.5"/>
        <circle cx="-15" cy="-8" r="4.5" fill="${shade('#D9A876', 0.35)}"/>
        <circle cx="15" cy="-8" r="4.5" fill="${shade('#D9A876', 0.35)}"/>
        <path d="M-14 20 Q0 12 14 20" fill="none" stroke="${shade('#D9A876', 0.35)}" stroke-width="3.5" stroke-linecap="round"/>
        <g fill="${tint(HOT, 0.35)}">
          <circle cx="-34" cy="-42" r="5"><animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"/></circle>
          <circle cx="36" cy="-38" r="4"><animate attributeName="opacity" values="0;1;0" dur="1.8s" begin=".6s" repeatCount="indefinite"/></circle>
          <circle cx="44" cy="-16" r="3.5"><animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="1.2s" repeatCount="indefinite"/></circle>
        </g>
      </g>`;
    const oven = `
      <g transform="translate(0,110)">
        <rect x="-46" y="-42" width="92" height="84" rx="10" fill="#EDEFF5" stroke="#C9CEDA" stroke-width="2.5"/>
        <rect x="-34" y="-16" width="68" height="46" rx="7" fill="${tint('#F5B93B', 0.55)}" stroke="#D97A1F" stroke-width="2"/>
        <circle cx="-30" cy="-30" r="5" fill="#6B7180"/>
        <circle cx="-12" cy="-30" r="5" fill="#6B7180"/>
        <path d="M-12 16 q-8 -7 -4 -14 q3 -4 2 -8 q8 5 7 12 q6 -6 3 -12 q7 8 2 16 q-4 7 -10 6" fill="#F5B93B" stroke="#D97A1F" stroke-width="1.4">
          <animateTransform attributeName="transform" type="scale" values="1 1; 1.12 1.16; 1 1" dur="0.9s" repeatCount="indefinite" additive="sum"/>
        </path>
      </g>`;
    return `
      <svg viewBox="0 0 620 290" class="circuit-svg">
        ${card(110, snow, '−5 °C', 'прогноз погоды')}
        ${card(310, face, '38,2 °C', 'болезнь')}
        ${card(510, oven, '180 °C', 'духовка')}
      </svg>`;
  },
};

/* =================== ИНТЕРАКТИВ: частицы =================== */
function startHeatBox(root) {
  const canvas = root.querySelector('#heatCanvas');
  const range = root.querySelector('#heatRange');
  const label = root.querySelector('#heatLabel');
  const ctx = canvas.getContext('2d');
  const N = 26;
  let heat = parseFloat(range.value) / 100;   // 0..1
  let parts = null;

  function fit() {
    const cssW = canvas.offsetWidth || 540;
    const w = cssW * 2, h = 300 * 2;
    if (canvas.width !== w) canvas.width = w;
    if (canvas.height !== h) { canvas.height = h; canvas.style.height = '300px'; }
    return { w, h };
  }
  function initParts(w, h) {
    parts = [];
    for (let i = 0; i < N; i++) {
      const a = Math.random() * Math.PI * 2;
      parts.push({
        x: 40 + Math.random() * (w - 80),
        y: 40 + Math.random() * (h - 80),
        dx: Math.cos(a), dy: Math.sin(a),
        r: 13 + Math.random() * 5,
      });
    }
  }
  const LABELS = [[0.15, 'холодно'], [0.4, 'прохладно'], [0.7, 'тепло'], [1.01, 'горячо']];
  function updateLabel() {
    label.textContent = LABELS.find(l => heat < l[0])[1];
  }
  updateLabel();

  let last = performance.now();
  function draw(now) {
    if (!canvas.isConnected) return;            // шаг сменился — глушим цикл
    const dt = Math.min(40, now - last) / 16.7;
    last = now;
    const { w, h } = fit();
    if (!parts) initParts(w, h);
    ctx.clearRect(0, 0, w, h);

    // рамка «сосуда» — плоская, тонкий край
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#C9CEDA';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(8, 8, w - 16, h - 16, 24); else ctx.rect(8, 8, w - 16, h - 16);
    ctx.stroke();

    const speed = (0.35 + heat * 6.2) * dt;
    const color = mix(COLD, HOT, heat);
    const edge = shade(color, 0.25);
    parts.forEach(p => {
      p.x += p.dx * speed; p.y += p.dy * speed;
      if (p.x < 16 + p.r) { p.x = 16 + p.r; p.dx = Math.abs(p.dx); }
      if (p.x > w - 16 - p.r) { p.x = w - 16 - p.r; p.dx = -Math.abs(p.dx); }
      if (p.y < 16 + p.r) { p.y = 16 + p.r; p.dy = Math.abs(p.dy); }
      if (p.y > h - 16 - p.r) { p.y = h - 16 - p.r; p.dy = -Math.abs(p.dy); }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = edge;
      ctx.stroke();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  return { range, updateLabel, set(v) { heat = v; } };
}

/* =================== ЗАПУСК =================== */
runLesson({
  lessonId: 'temperature',
  storageKey: 'thermometer-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-device/',
  steps: STEPS,
  visuals,
  onInteract(step, ctx) {
    if (step.id === 'heat') {
      const box = startHeatBox(ctx.root);
      const hint = ctx.root.querySelector('#heatHint');
      let touched = false;
      box.range.addEventListener('input', () => {
        box.set(parseFloat(box.range.value) / 100);
        box.updateLabel();
        if (!touched) {
          touched = true;
          hint.innerHTML = 'Видишь? <b>Быстрые молекулы = высокая температура</b>, медленные = низкая.';
          ctx.done();
        }
      });
    }
  },
});
</script>
