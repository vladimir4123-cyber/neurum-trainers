<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Цена деления и правила измерения · Термометр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌡️</text></svg>">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="../../assets/lesson/lesson.css?v=3">
<style>
  .step-visual{ flex-direction: column; }
  .svg-panel{
    width: 100%; max-width: 560px; margin: 0 auto;
    border-radius: var(--radius-xl);
    background: linear-gradient(160deg, #F6F3FF, #EEF0FF);
    padding: 10px;
  }
  .svg-panel svg{ width: 100%; height: auto; display: block; }
  .canvas-hint{
    margin: 14px 0 0; text-align: center;
    font-size: 17px; color: var(--fg-2); text-wrap: pretty;
  }
  .canvas-hint b{ color: var(--purple-1); font-weight: 500; }
  /* чипы-ответы интерактива — белые (фиолетовая только «Дальше») */
  .mini-actions{ display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .chip-btn{
    padding: 12px 22px; border: 1px solid var(--purple-4); border-radius: var(--radius-md);
    background: var(--white); color: var(--fg-1); cursor: pointer;
    font-family: var(--font-display); font-size: 18px; font-weight: 500;
    font-variant-numeric: tabular-nums;
    transition: background-color 120ms var(--ease-standard), transform 120ms var(--ease-standard);
  }
  .chip-btn:hover:not(:disabled){ background: var(--purple-4); }
  .chip-btn:active:not(:disabled){ transform: scale(0.96); }
  .chip-btn.ok{ background: var(--success); border-color: var(--success); color: #fff; }
  .chip-btn.bad{ background: var(--danger); border-color: var(--danger); color: #fff; }
  .chip-btn:disabled{ cursor: default; }
</style>
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Закрыть">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">1</span></span>
</div>

<main id="stepHost"></main>

<div class="feedback" id="feedback">
  <div class="fb-icon" id="fbIcon">✓</div>
  <div class="fb-body">
    <p class="fb-title" id="fbTitle"></p>
    <p class="fb-hint" id="fbHint"></p>
  </div>
</div>

<div class="bottom">
  <button class="btn-back" id="backBtn" hidden>← Назад</button>
  <button class="btn-continue" id="continueBtn" disabled>Дальше</button>
</div>

<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 3 «Цена деления и правила измерения».
   Цена деления = (разность соседних подписанных значений) /
   (число делений между ними). Правила: полное погружение,
   тепловое равновесие, не вынимать при чтении.
   ============================================================ */

const RED = '#E5484D', GLASS = '#C9CEDA';

/* Горизонтальный фрагмент шкалы: labels[а, б] и n делений между ними */
function scaleFragment({ a = 10, b = 20, n = 5, y = 60, showBrace = true } = {}) {
  const x0 = 90, x1 = 530;
  const ticks = [];
  for (let i = 0; i <= n; i++) {
    const x = x0 + (x1 - x0) * (i / n);
    const major = i === 0 || i === n;
    ticks.push(`<line x1="${x.toFixed(1)}" y1="${y}" x2="${x.toFixed(1)}" y2="${y + (major ? 34 : 22)}"
      stroke="#2B2B33" stroke-width="${major ? 3 : 2.4}" stroke-linecap="round"/>`);
  }
  const braceY = y + 48;
  return `
    <rect x="${x0 - 34}" y="${y - 14}" width="${x1 - x0 + 68}" height="62" rx="12" fill="#fff" stroke="${GLASS}" stroke-width="2"/>
    ${ticks.join('')}
    <text x="${x0}" y="${y + 66}" text-anchor="middle" font-family="var(--font-display), sans-serif"
          font-weight="500" font-size="26" fill="#2B2B33" dominant-baseline="central">${a}</text>
    <text x="${x1}" y="${y + 66}" text-anchor="middle" font-family="var(--font-display), sans-serif"
          font-weight="500" font-size="26" fill="#2B2B33" dominant-baseline="central">${b}</text>
    ${showBrace ? `
      <path d="M${x0} ${braceY + 40} Q${x0} ${braceY + 54} ${x0 + 14} ${braceY + 54}
               L${(x0 + x1) / 2 - 14} ${braceY + 54} Q${(x0 + x1) / 2} ${braceY + 54} ${(x0 + x1) / 2} ${braceY + 68}
               Q${(x0 + x1) / 2} ${braceY + 54} ${(x0 + x1) / 2 + 14} ${braceY + 54}
               L${x1 - 14} ${braceY + 54} Q${x1} ${braceY + 54} ${x1} ${braceY + 40}"
            fill="none" stroke="#6240FF" stroke-width="3" stroke-linecap="round"/>` : ''}`;
}

/* =================== ШАГИ ТЕМЫ =================== */
const STEPS = [
  {
    phase: 'theory', type: 'info', visual: 'price', big: true,
    title: 'Сколько «стоит» одно деление?',
    text: 'Подписаны не все штрихи — только некоторые. <b>Цена деления</b> — сколько градусов приходится на один маленький шаг шкалы. Считаем так: берём два соседних подписанных числа, <b>вычитаем</b> и <b>делим на число делений</b> между ними.',
  },
  {
    phase: 'theory', type: 'interact', id: 'price', visual: 'priceQuiz',
    title: 'Определи цену деления сам',
    text: 'Между подписями <b>20</b> и <b>30</b> на этой шкале пять делений. Посчитай: (30 − 20) : 5 — и выбери ответ.',
  },
  {
    phase: 'theory', type: 'info', visual: 'rules', big: true,
    title: 'Три правила измерения',
    text: 'Чтобы термометр не соврал: <b>1)</b> резервуар полностью погружён в жидкость и не касается стенок и дна, <b>2)</b> ждём, пока столбик остановится, <b>3)</b> читаем показания, <b>не вынимая</b> термометр из жидкости.',
  },
  {
    phase: 'theory', type: 'info', visual: 'equilibrium',
    title: 'Почему нужно ждать: тепловое равновесие',
    text: 'Опустили термометр в воду — сначала он показывает свою температуру, а не воды. Пока термометр нагревается, столбик ползёт. Когда их температуры сравняются — наступит <b>тепловое равновесие</b>, столбик замрёт. Вот теперь читаем.',
  },

  { phase: 'check', type: 'splash', title: 'Проверь себя', text: 'Шкала и правила — два вопроса.' },

  {
    phase: 'check', type: 'question',
    title: 'Какова цена деления этой шкалы?',
    text: 'Между подписями <b>0</b> и <b>20</b> — четыре деления.',
    options: [
      { id: 'a', text: '4 °C', correct: false },
      { id: 'b', text: '5 °C', correct: true },
      { id: 'c', text: '20 °C', correct: false },
      { id: 'd', text: '2 °C', correct: false },
    ],
    right: 'Точно: (20 − 0) : 4 = 5 °C на одно деление.',
    wrong: 'Считаем по правилу: разность подписей (20 − 0) делим на число делений (4). Получается 5 °C.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Почему нельзя вынимать термометр из воды, чтобы прочитать показания?',
    text: 'Классическая ошибка на лабораторной работе.',
    options: [
      { id: 'a', text: 'На воздухе термометр сразу начнёт менять показания', correct: true },
      { id: 'b', text: 'Мокрый термометр скользит в руках', correct: false },
      { id: 'c', text: 'Вынимать можно — показания застынут', correct: false },
      { id: 'd', text: 'Стекло на воздухе может лопнуть', correct: false },
    ],
    right: 'Верно! Вынутый термометр тут же вступает в теплообмен с воздухом — столбик поползёт, и ты прочитаешь неправду.',
    wrong: 'Дело не в стекле и не в руках: на воздухе термометр сразу начинает измерять воздух, столбик ползёт — показания испорчены.',
  },
];

/* =================== ВИЗУАЛЫ =================== */
const visuals = {
  price() {
    return `
      <svg viewBox="0 0 620 260" class="circuit-svg">
        ${scaleFragment({ a: 10, b: 20, n: 5, y: 40 })}
        <circle cx="222" cy="26" r="7" fill="#6240FF">
          <animate attributeName="cx" values="90;530;90" dur="5s" repeatCount="indefinite"/>
        </circle>
        <text x="310" y="216" text-anchor="middle" font-family="var(--font-display), sans-serif"
              font-weight="500" font-size="30" fill="#6240FF" dominant-baseline="central">(20 − 10) : 5 = 2 °C</text>
        <text x="310" y="246" text-anchor="middle" font-family="var(--font-sans), sans-serif"
              font-size="16" fill="#6B7180" dominant-baseline="central">цена деления — два градуса на штрих</text>
      </svg>`;
  },

  priceQuiz() {
    return `
      <div class="svg-panel">
        <svg viewBox="0 0 620 180">
          ${scaleFragment({ a: 20, b: 30, n: 5, y: 36, showBrace: false })}
          <text x="310" y="150" text-anchor="middle" font-family="var(--font-display), sans-serif"
                font-weight="500" font-size="25" fill="#232323" dominant-baseline="central">(30 − 20) : 5 = ?</text>
        </svg>
      </div>
      <div class="mini-actions" id="priceChips">
        <button class="chip-btn" data-v="1">1 °C</button>
        <button class="chip-btn" data-v="2">2 °C</button>
        <button class="chip-btn" data-v="5">5 °C</button>
        <button class="chip-btn" data-v="10">10 °C</button>
      </div>
      <p class="canvas-hint" id="priceHint">Выбери цену деления этой шкалы.</p>`;
  },

  rules() {
    /* три мини-сцены: ✓ полностью погружён; ✕ касается дна; ✕ читают в воздухе */
    const beaker = (inner) => `
      <path d="M-52 -60 L-46 66 Q-46 78 -34 78 L34 78 Q46 78 46 66 L52 -60"
            fill="#F4F8FE" stroke="${GLASS}" stroke-width="3" stroke-linejoin="round"/>
      <path d="M-47 -34 Q0 -26 47 -34 L44 64 Q44 74 34 74 L-34 74 Q-44 74 -44 64 Z" fill="#BFDCF9"/>
      ${inner}`;
    const thermo = (dx, dy, rot, colH) => `
      <g transform="translate(${dx},${dy}) rotate(${rot})">
        <rect x="-9" y="-78" width="18" height="118" rx="9" fill="#fff" stroke="${GLASS}" stroke-width="2.4"/>
        <circle cx="0" cy="50" r="13" fill="${RED}" stroke="#B93840" stroke-width="2.4"/>
        <rect x="-4" y="-70" width="8" height="112" rx="4" fill="#EDEFF5"/>
        <rect x="-4" y="${42 - colH}" width="8" height="${colH + 4}" rx="4" fill="${RED}"/>
      </g>`;
    const mark = (ok) => ok
      ? `<g transform="translate(46,-84)"><circle r="16" fill="#07BE7E"/><path d="M-7 0 L-2 5 L8 -6" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g>`
      : `<g transform="translate(46,-84)"><circle r="16" fill="${RED}"/><path d="M-6 -6 L6 6 M6 -6 L-6 6" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/></g>`;
    return `
      <svg viewBox="0 0 620 320" class="circuit-svg">
        <g transform="translate(115,160)">
          ${beaker(thermo(0, -6, 0, 60))}
          ${mark(true)}
          <text x="0" y="122" text-anchor="middle" font-family="var(--font-sans), sans-serif" font-size="16.5" fill="#3E434C" dominant-baseline="central">резервуар в воде</text>
        </g>
        <g transform="translate(310,160)">
          ${beaker(thermo(0, 18, 0, 66))}
          ${mark(false)}
          <text x="0" y="122" text-anchor="middle" font-family="var(--font-sans), sans-serif" font-size="16.5" fill="#3E434C" dominant-baseline="central">упёрся в дно</text>
        </g>
        <g transform="translate(505,160)">
          ${beaker('')}
          ${thermo(58, -66, 14, 46)}
          ${mark(false)}
          <text x="10" y="122" text-anchor="middle" font-family="var(--font-sans), sans-serif" font-size="16.5" fill="#3E434C" dominant-baseline="central">вынули и читают</text>
        </g>
      </svg>`;
  },

  equilibrium() {
    /* столбик ползёт вверх и замирает; часы рядом */
    return `
      <svg viewBox="0 0 620 320" class="circuit-svg">
        <g transform="translate(250,160)">
          <path d="M-78 -92 L-70 100 Q-70 116 -54 116 L54 116 Q70 116 70 100 L78 -92"
                fill="#F4F8FE" stroke="${GLASS}" stroke-width="3" stroke-linejoin="round"/>
          <path d="M-72 -50 Q0 -40 72 -50 L66 98 Q66 111 54 111 L-54 111 Q-66 111 -66 98 Z" fill="#BFDCF9"/>
          <g transform="translate(0,-10)">
            <rect x="-12" y="-124" width="24" height="180" rx="12" fill="#fff" stroke="${GLASS}" stroke-width="2.6"/>
            <circle cx="0" cy="74" r="17" fill="${RED}" stroke="#B93840" stroke-width="2.6"/>
            <rect x="-5" y="-112" width="10" height="170" rx="5" fill="#EDEFF5"/>
            <rect x="-5" y="0" width="10" height="62" rx="5" fill="${RED}">
              <animate attributeName="y" values="10;-58;-58;10" keyTimes="0;.45;.9;1" dur="6s" repeatCount="indefinite"/>
              <animate attributeName="height" values="52;120;120;52" keyTimes="0;.45;.9;1" dur="6s" repeatCount="indefinite"/>
            </rect>
            <g stroke="#5D6472" stroke-width="2" stroke-linecap="round">
              <line x1="-34" y1="-104" x2="-18" y2="-104"/><line x1="-28" y1="-76" x2="-18" y2="-76"/>
              <line x1="-34" y1="-48" x2="-18" y2="-48"/><line x1="-28" y1="-20" x2="-18" y2="-20"/>
              <line x1="-34" y1="8" x2="-18" y2="8"/>
            </g>
          </g>
        </g>
        <g transform="translate(470,120)">
          <circle r="52" fill="#fff" stroke="#6240FF" stroke-width="3.5"/>
          <g stroke="#C9CEDA" stroke-width="3" stroke-linecap="round">
            <line x1="0" y1="-44" x2="0" y2="-36"/><line x1="44" y1="0" x2="36" y2="0"/>
            <line x1="0" y1="44" x2="0" y2="36"/><line x1="-44" y1="0" x2="-36" y2="0"/>
          </g>
          <line x1="0" y1="0" x2="0" y2="-32" stroke="#6240FF" stroke-width="4" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
          </line>
          <line x1="0" y1="0" x2="20" y2="12" stroke="#2B2B33" stroke-width="4" stroke-linecap="round"/>
          <circle r="4" fill="#2B2B33"/>
          <text x="0" y="86" text-anchor="middle" font-family="var(--font-sans), sans-serif"
                font-size="17" fill="#3E434C" dominant-baseline="central">подожди пару минут</text>
        </g>
      </svg>`;
  },
};

/* =================== ЗАПУСК =================== */
runLesson({
  lessonId: 'measure',
  storageKey: 'thermometer-progress',
  homeHref: '../demo/',
  steps: STEPS,
  visuals,
  onInteract(step, ctx) {
    if (step.id === 'price') {
      const chips = [...ctx.root.querySelectorAll('#priceChips .chip-btn')];
      const hint = ctx.root.querySelector('#priceHint');
      chips.forEach(ch => ch.addEventListener('click', () => {
        const v = +ch.dataset.v;
        if (v === 2) {
          chips.forEach(c => { c.disabled = true; });
          ch.classList.add('ok');
          hint.innerHTML = '<b>Верно: 2 °C.</b> Десять градусов разницы делим на пять делений.';
          ctx.done();
        } else {
          ch.classList.add('bad');
          ch.disabled = true;
          hint.innerHTML = 'Не то. Разность подписей — <b>10</b>, делений — <b>5</b>. Дели!';
          setTimeout(() => ch.classList.remove('bad'), 900);
        }
      }));
    }
  },
});
</script>

</body>
</html>
