<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Как устроен термометр · Термометр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌡️</text></svg>">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="../../assets/lesson/lesson.css?v=3">
<style>
  .step-visual{ flex-direction: column; }
  .svg-panel{
    width: 100%; max-width: 560px; margin: 0 auto;
    border-radius: var(--radius-xl);
    background: linear-gradient(160deg, #F6F3FF, #EEF0FF);
    padding: 10px;
  }
  .svg-panel svg{ width: 100%; height: auto; display: block; }
  .canvas-hint{
    margin: 14px 0 0; text-align: center;
    font-size: 17px; color: var(--fg-2); text-wrap: pretty;
  }
  .canvas-hint b{ color: var(--purple-1); font-weight: 500; }
  .heat-slider{ width: 100%; max-width: 460px; margin: 16px auto 0; text-align: center; }
  .heat-slider__val{
    font-family: var(--font-display); font-weight: 500; font-size: 26px;
    color: var(--fg-1); font-variant-numeric: tabular-nums; margin-bottom: 8px;
  }
  .heat-slider__input{ width: 100%; accent-color: var(--purple-1); height: 34px; cursor: pointer; }
</style>
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Закрыть">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">1</span></span>
</div>

<main id="stepHost"></main>

<div class="feedback" id="feedback">
  <div class="fb-icon" id="fbIcon">✓</div>
  <div class="fb-body">
    <p class="fb-title" id="fbTitle"></p>
    <p class="fb-hint" id="fbHint"></p>
  </div>
</div>

<div class="bottom">
  <button class="btn-back" id="backBtn" hidden>← Назад</button>
  <button class="btn-continue" id="continueBtn" disabled>Дальше</button>
</div>

<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 2 «Как устроен термометр».
   Жидкостный термометр: резервуар, капилляр, шкала.
   Жидкость расширяется при нагревании → столбик растёт.
   ============================================================ */

const RED = '#E5484D', RED_EDGE = '#B93840', GLASS = '#C9CEDA', CH = '#EDEFF5';

/* Термометр для схем. t: 0..1 — доля высоты столбика. */
function thermoSVG({ x = 0, t = 0.4, columnId = '', scaleLabels = null } = {}) {
  const topY = 30, botY = 258;                 // рабочая зона капилляра
  const colY = botY - (botY - topY) * t;
  const ticks = [];
  for (let i = 0; i <= 8; i++) {
    const y = botY - (botY - topY) * (i / 8);
    const major = i % 2 === 0;
    ticks.push(`<line x1="${major ? -46 : -40}" y1="${y.toFixed(1)}" x2="-32" y2="${y.toFixed(1)}"
      stroke="#5D6472" stroke-width="2" stroke-linecap="round"/>`);
    if (scaleLabels && major) {
      ticks.push(`<text x="-54" y="${y.toFixed(1)}" text-anchor="end" font-family="var(--font-display), sans-serif"
        font-weight="500" font-size="17" fill="#3E434C" dominant-baseline="central">${scaleLabels[i / 2]}</text>`);
    }
  }
  return `
    <g transform="translate(${x},0)">
      <rect x="-21" y="8" width="42" height="266" rx="21" fill="#F4F8FE" stroke="${GLASS}" stroke-width="3"/>
      <circle cx="0" cy="292" r="30" fill="${RED}" stroke="${RED_EDGE}" stroke-width="3"/>
      <rect x="-6" y="24" width="12" height="248" rx="6" fill="${CH}"/>
      <rect ${columnId ? `id="${columnId}"` : ''} x="-6" y="${colY.toFixed(1)}" width="12" height="${(botY + 30 - colY).toFixed(1)}" rx="6" fill="${RED}"/>
      ${ticks.join('')}
    </g>`;
}

/* =================== ШАГИ ТЕМЫ =================== */
const STEPS = [
  {
    phase: 'theory', type: 'info', visual: 'parts', big: true,
    title: 'Три части термометра',
    text: 'Жидкостный термометр прост: <b>резервуар</b> с подкрашенной жидкостью внизу, тонкая трубочка-<b>капилляр</b>, по которой жидкость поднимается, и <b>шкала</b> с делениями, по которой читают ответ.',
  },
  {
    phase: 'theory', type: 'interact', id: 'bulb', visual: 'heatBulb',
    title: 'Грей резервуар — столбик растёт',
    text: 'Придвинь пламя ползунком. При нагревании <b>жидкость расширяется</b> — ей становится тесно в резервуаре, и она поднимается по капилляру. Остудишь — сожмётся и опустится.',
  },
  {
    phase: 'theory', type: 'info', visual: 'expand', big: true,
    title: 'Почему жидкость расширяется',
    text: 'Молекулы нагретой жидкости движутся быстрее и <b>сильнее расталкивают друг друга</b> — тем же молекулам нужно больше места. Капилляр специально сделан тонким: даже крошечное расширение даёт заметный подъём столбика.',
  },
  {
    phase: 'theory', type: 'info', visual: 'celsius', big: true,
    title: 'Откуда взялись градусы: шкала Цельсия',
    text: 'Швед <b>Андерс Цельсий</b> предложил две опорные точки: <b>0 °C</b> — тает лёд, <b>100 °C</b> — кипит вода. Промежуток разделили на 100 равных частей — градусов. Есть и другие шкалы: у <b>Фаренгейта</b> (США) лёд тает при 32 °F, а вода кипит при 212 °F.',
  },

  { phase: 'check', type: 'splash', title: 'Проверь себя', text: 'Разобрал устройство? Докажи.' },

  {
    phase: 'check', type: 'question',
    title: 'Почему столбик поднимается при нагревании?',
    text: 'Термометр опустили в тёплую воду — столбик пополз вверх.',
    options: [
      { id: 'a', text: 'Жидкость в резервуаре расширяется, и ей приходится подниматься по капилляру', correct: true },
      { id: 'b', text: 'Тёплая вода давит на резервуар и выжимает жидкость вверх', correct: false },
      { id: 'c', text: 'Жидкость становится легче и всплывает', correct: false },
      { id: 'd', text: 'Внутри термометра есть пружина, которая толкает жидкость', correct: false },
    ],
    right: 'Точно! При нагревании жидкость расширяется — в узком капилляре это видно как рост столбика.',
    wrong: 'Ни давления воды, ни пружин. Жидкость при нагревании расширяется, и лишний объём выталкивается в тонкий капилляр.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Что означает 0 °C на шкале Цельсия?',
    text: 'Цельсий выбрал эту точку не случайно — её легко воспроизвести в любой лаборатории.',
    options: [
      { id: 'a', text: 'Самая низкая температура на Земле', correct: false },
      { id: 'b', text: 'Температура таяния льда', correct: true },
      { id: 'c', text: 'Температура кипения воды', correct: false },
      { id: 'd', text: 'Температура человеческого тела', correct: false },
    ],
    right: 'Верно! 0 °C — тает лёд, 100 °C — кипит вода. Между ними ровно 100 градусов.',
    wrong: 'Ниже 0 °C бывает сколько угодно — вспомни мороз. 0 °C — это температура таяния льда, вторая опорная точка (100 °C) — кипение воды.',
  },
];

/* =================== ВИЗУАЛЫ =================== */
const visuals = {
  /* Схема с подписями частей */
  parts() {
    const callout = (x1, y1, x2, y2, tx, ty, label) => `
      <path d="M${x1} ${y1} L${x2} ${y2}" stroke="#6240FF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 7"/>
      <text x="${tx}" y="${ty}" font-family="var(--font-display), sans-serif" font-weight="500"
            font-size="24" fill="#6240FF" dominant-baseline="central">${label}</text>`;
    return `
      <svg viewBox="0 0 620 340" class="circuit-svg">
        <g transform="translate(285,4)">${thermoSVG({ t: 0.45 })}</g>
        <text x="285" y="332" text-anchor="middle" font-family="var(--font-sans), sans-serif"
              font-size="16" fill="#6B7180" dominant-baseline="central">жидкостный термометр</text>
        ${callout(238, 130, 160, 130, 60, 130, 'шкала')}
        ${callout(292, 190, 400, 190, 408, 190, 'капилляр')}
        ${callout(308, 296, 400, 296, 408, 296, 'резервуар')}
        <circle cx="285" cy="296" r="30" fill="none" stroke="#6240FF" stroke-width="2" stroke-dasharray="4 6" opacity=".7">
          <animate attributeName="r" values="30;36;30" dur="2.4s" repeatCount="indefinite"/>
        </circle>
      </svg>`;
  },

  /* Интерактив: слайдер-пламя греет резервуар */
  heatBulb() {
    return `
      <div class="svg-panel">
        <svg viewBox="0 0 620 360" id="bulbScene">
          <g transform="translate(310,10)">
            ${thermoSVG({ t: 0.12, columnId: 'bulbCol', scaleLabels: ['0°', '20°', '40°', '60°', '80°'] })}
          </g>
          <!-- пламя под резервуаром -->
          <g id="flameG" transform="translate(310,352)" opacity="0.35">
            <path d="M0 0 q-22 -16 -10 -34 q6 -9 5 -17 q16 10 15 25 q9 -5 8 -15 q12 15 3 30 q-8 13 -21 11"
                  fill="#F5B93B" stroke="#D97A1F" stroke-width="2">
              <animateTransform attributeName="transform" type="scale" values="1 1; 1.1 1.14; 1 1" dur="0.7s" repeatCount="indefinite"/>
            </path>
          </g>
          <text id="bulbVal" x="470" y="60" font-family="var(--font-display), sans-serif" font-weight="500"
                font-size="44" fill="#232323" style="font-variant-numeric: tabular-nums" dominant-baseline="central">10 °C</text>
        </svg>
      </div>
      <div class="heat-slider">
        <input type="range" id="bulbRange" class="heat-slider__input" min="0" max="80" step="1" value="10" aria-label="Нагрев резервуара">
      </div>
      <p class="canvas-hint" id="bulbHint">Тяни ползунок вправо — <b>грей резервуар</b>.</p>`;
  },

  /* Расширение: холодная и горячая колбы */
  expand() {
    const flask = (x, color, level, label, dots) => {
      // ширина сосуда на высоте level: горлышко ±21 до y=120, ниже стенки расходятся к ±60 на y=210
      const half = level <= 120 ? 21 : 21 + (level - 120) * (39 / 90);
      // контур жидкости от уровня вниз по стенкам к дну
      const liquid = level <= 120
        ? `M${-half} ${level} L${half} ${level} L21 120 L61 210 Q70 246 40 246 L-40 246 Q-70 246 -61 210 L-21 120 Z`
        : `M${-half.toFixed(1)} ${level} L${half.toFixed(1)} ${level} L61 210 Q70 246 40 246 L-40 246 Q-70 246 -61 210 Z`;
      return `
      <g transform="translate(${x},0)">
        <path d="M-24 30 L-24 120 L-64 210 Q-76 250 -40 250 L40 250 Q76 250 64 210 L24 120 L24 30"
              fill="#F4F8FE" stroke="${GLASS}" stroke-width="3" stroke-linejoin="round"/>
        <path d="M-24 30 L24 30" stroke="${GLASS}" stroke-width="3" stroke-linecap="round"/>
        <!-- жидкость: уровень выше в горячей -->
        <path d="${liquid}" fill="${color}22"/>
        ${dots}
        <line x1="${(-half).toFixed(1)}" y1="${level}" x2="${half.toFixed(1)}" y2="${level}" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
        <text x="0" y="288" text-anchor="middle" font-family="var(--font-display), sans-serif"
              font-weight="500" font-size="23" fill="${color}" dominant-baseline="central">${label}</text>
      </g>`;
    };
    const dotsFor = (color, n, cy, spread, amp, dur) => {
      let s = '';
      for (let i = 0; i < n; i++) {
        const px = -40 + ((i * 47) % 80);
        const py = cy + ((i * 31) % spread);
        s += `<circle cx="${px}" cy="${py}" r="8" fill="${color}" stroke="#00000022" stroke-width="1.4">
          <animateTransform attributeName="transform" type="translate"
            values="0 0; ${amp} ${-amp}; ${-amp} ${amp}; 0 0" dur="${(dur + i * 0.07).toFixed(2)}s" repeatCount="indefinite"/>
        </circle>`;
      }
      return s;
    };
    return `
      <svg viewBox="0 0 620 310" class="circuit-svg">
        ${flask(170, '#2F80ED', 150, 'холодная · молекулы ближе', dotsFor('#2F80ED', 8, 165, 70, 2, 1.4))}
        ${flask(450, RED, 96, 'горячая · молекулы дальше', dotsFor(RED, 8, 130, 100, 6, 0.55))}
        <path d="M292 150 L348 150" stroke="#6B7180" stroke-width="4" stroke-linecap="round" marker-end="url(#arr)"/>
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 Z" fill="#6B7180"/>
          </marker>
        </defs>
      </svg>`;
  },

  /* Шкала Цельсия: 0 и 100, сбоку Фаренгейт */
  celsius() {
    return `
      <svg viewBox="0 0 620 340" class="circuit-svg">
        <g transform="translate(270,4)">${thermoSVG({ t: 0.5, scaleLabels: ['0°', '25°', '50°', '75°', '100°'] })}</g>
        <!-- 0°: лёд -->
        <g transform="translate(90,258)">
          <path d="M0 -26 L23 -13 L23 13 L0 26 L-23 13 L-23 -13 Z" fill="#D8EBFC" stroke="#2F80ED" stroke-width="2.5" stroke-linejoin="round"/>
          <path d="M0 -26 L0 26 M-23 -13 L23 13 M-23 13 L23 -13" stroke="#2F80ED" stroke-width="1.6" opacity=".5"/>
          <text x="0" y="48" text-anchor="middle" font-family="var(--font-sans), sans-serif" font-size="16" fill="#3E434C" dominant-baseline="central">лёд тает</text>
        </g>
        <path d="M120 258 L206 258" stroke="#2F80ED" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 7"/>
        <!-- 100°: кипение -->
        <g transform="translate(90,30)">
          <path d="M-26 4 Q-26 26 0 26 Q26 26 26 4 Z" fill="#F4F8FE" stroke="${GLASS}" stroke-width="2.5"/>
          <path d="M-22 4 Q0 10 22 4 L20 12 Q17 22 0 22 Q-17 22 -20 12 Z" fill="#BFDCF9"/>
          <g fill="#E3F0FC" stroke="#5D9BE0" stroke-width="1.2">
            <circle cx="-8" cy="14" r="3.4"><animate attributeName="cy" values="16;6" dur="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite"/></circle>
            <circle cx="7" cy="15" r="2.8"><animate attributeName="cy" values="17;7" dur="0.8s" begin=".3s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="0.8s" begin=".3s" repeatCount="indefinite"/></circle>
          </g>
          <g stroke="#9AA7C7" stroke-width="3.5" stroke-linecap="round" fill="none">
            <path d="M-10 -6 q5 -9 0 -18"><animate attributeName="opacity" values=".2;.9;.2" dur="1.8s" repeatCount="indefinite"/></path>
            <path d="M8 -6 q5 -9 0 -18"><animate attributeName="opacity" values=".9;.2;.9" dur="1.8s" repeatCount="indefinite"/></path>
          </g>
          <text x="0" y="48" text-anchor="middle" font-family="var(--font-sans), sans-serif" font-size="16" fill="#3E434C" dominant-baseline="central">вода кипит</text>
        </g>
        <path d="M126 30 L206 30" stroke="${RED}" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 7"/>
        <!-- Фаренгейт сбоку -->
        <g font-family="var(--font-display), sans-serif" font-weight="500" fill="#6B7180">
          <text x="420" y="30" font-size="21" dominant-baseline="central">= 212 °F</text>
          <text x="420" y="258" font-size="21" dominant-baseline="central">= 32 °F</text>
          <text x="420" y="140" font-size="17" fill="#9AA0AC" dominant-baseline="central">шкала Фаренгейта</text>
        </g>
      </svg>`;
  },
};

/* =================== ЗАПУСК =================== */
runLesson({
  lessonId: 'device',
  storageKey: 'thermometer-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-measure/',
  steps: STEPS,
  visuals,
  onInteract(step, ctx) {
    if (step.id === 'bulb') {
      const range = ctx.root.querySelector('#bulbRange');
      const col = ctx.root.querySelector('#bulbCol');
      const val = ctx.root.querySelector('#bulbVal');
      const flame = ctx.root.querySelector('#flameG');
      const hint = ctx.root.querySelector('#bulbHint');
      const topY = 30, botY = 258;
      let touched = false;
      const apply = () => {
        const t = parseFloat(range.value);          // 0..80 °C
        const frac = t / 80;
        const y = botY - (botY - topY) * frac;
        col.setAttribute('y', y.toFixed(1));
        col.setAttribute('height', (botY + 30 - y).toFixed(1));
        val.textContent = Math.round(t) + ' °C';
        flame.setAttribute('opacity', (0.2 + frac * 0.8).toFixed(2));
      };
      apply();
      range.addEventListener('input', () => {
        apply();
        if (!touched) {
          touched = true;
          hint.innerHTML = 'Работает! Жидкость <b>расширилась</b> — столбик поднялся по капилляру.';
          ctx.done();
        }
      });
    }
  },
});
</script>

</body>
</html>
