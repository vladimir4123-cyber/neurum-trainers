<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Цена деления мензурки · Мензурка</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📏</text></svg>">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="../../assets/lesson/lesson.css?v=3">
<style>
  .step-visual{ flex-direction: column; }
  .trio{ width: 100%; max-width: 640px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 560px){ .trio{ grid-template-columns: 1fr; } }
  .trio-cell{
    background: #fff; border-radius: var(--radius-xl);
    border: 1px solid var(--purple-4);
    padding: 12px 10px 14px; display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .trio-cell.is-done{ border-color: var(--success); box-shadow: 0 0 0 1px var(--success); }
  .trio-cell svg{ width: 100%; max-width: 150px; height: auto; display: block; }
  .trio-q{ font-size: 14.5px; color: var(--fg-2); text-align: center; }
  .trio-chips{ display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .chip{
    border: 0; cursor: pointer;
    font-family: var(--font-display); font-size: 16px; font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--fg-1); background: var(--purple-4);
    padding: 8px 14px; border-radius: 9999px;
    transition: background-color 120ms var(--ease-standard), transform 120ms var(--ease-standard), color 120ms;
  }
  .chip:hover{ background: var(--purple-5); }
  .chip:active{ transform: scale(0.95); }
  .chip.ok{ background: var(--success); color: #fff; }
  .chip.bad{ background: var(--danger-surface); color: var(--danger); }
  .chip:disabled{ cursor: default; }
  .canvas-hint{ margin: 12px 0 0; text-align: center; font-size: 17px; color: var(--fg-2); text-wrap: pretty; }
</style>
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Закрыть">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">1</span></span>
</div>

<main id="stepHost"></main>

<div class="feedback" id="feedback">
  <div class="fb-icon" id="fbIcon">✓</div>
  <div class="fb-body">
    <p class="fb-title" id="fbTitle"></p>
    <p class="fb-hint" id="fbHint"></p>
  </div>
</div>

<div class="bottom">
  <button class="btn-back" id="backBtn" hidden>← Назад</button>
  <button class="btn-continue" id="continueBtn" disabled>Дальше</button>
</div>

<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ---------- Плоская мензурка (стиль §8) ---------- */
const fmtV = v => String(Math.round(v * 100) / 100).replace('.', ',');
function beakerBody({ max, label, minor, level = 0 }) {
  const yZero = 284, yTop = 66;
  const price = label / minor;
  const y = v => yZero - (v / max) * (yZero - yTop);
  let ticks = '';
  const n = Math.round(max / price);
  for (let i = 0; i <= n; i++) {
    const v = i * price;
    const major = Math.round(v * 100) % Math.round(label * 100) === 0;
    const len = major ? 20 : 12;
    const yy = y(v).toFixed(1);
    ticks += `<line x1="69" y1="${yy}" x2="${69 + len}" y2="${yy}" stroke="#5D6472" stroke-width="${major ? 2.4 : 1.5}" stroke-linecap="round"/>`;
    if (major) ticks += `<text x="${69 + len + 5}" y="${yy}" dominant-baseline="central" font-family="var(--font-display), sans-serif" font-weight="500" font-size="14" fill="#3E434C">${fmtV(v)}</text>`;
  }
  const yL = y(level);
  const liquid = level > 0 ? `
    <path d="M69 ${(yL - 4).toFixed(1)} Q110 ${(yL + 4).toFixed(1)} 151 ${(yL - 4).toFixed(1)} L151 283 Q151 299 135 299 L85 299 Q69 299 69 283 Z" fill="#BFDCF9"/>
    <path d="M69 ${(yL - 4).toFixed(1)} Q110 ${(yL + 4).toFixed(1)} 151 ${(yL - 4).toFixed(1)}" fill="none" stroke="#5D9BE0" stroke-width="2.6" stroke-linecap="round"/>` : '';
  return `
    <path d="M66 36 L66 284 Q66 302 84 302 L136 302 Q154 302 154 284 L154 36" fill="#F4F8FE" stroke="#C9CEDA" stroke-width="3" stroke-linecap="round"/>
    <path d="M66 36 L57 28" stroke="#C9CEDA" stroke-width="3" stroke-linecap="round"/>
    <path d="M154 36 L160 31" stroke="#C9CEDA" stroke-width="3" stroke-linecap="round"/>
    ${liquid}
    ${ticks}`;
}
const beakerSVG = cfg => `<svg viewBox="0 0 220 340" xmlns="http://www.w3.org/2000/svg">${beakerBody(cfg)}</svg>`;

/* ---------- случайные шкалы для интерактива ---------- */
const POOL = [
  { max: 50,  label: 10, minor: 5 },   // 2 мл
  { max: 30,  label: 10, minor: 5 },   // 2 мл
  { max: 100, label: 20, minor: 4 },   // 5 мл
  { max: 100, label: 25, minor: 5 },   // 5 мл
  { max: 60,  label: 20, minor: 4 },   // 5 мл
  { max: 200, label: 50, minor: 5 },   // 10 мл
  { max: 250, label: 50, minor: 5 },   // 10 мл
  { max: 100, label: 50, minor: 5 },   // 10 мл
];
const priceOf = s => s.label / s.minor;
function pickThree() {
  const byPrice = { 2: [], 5: [], 10: [] };
  POOL.forEach(s => byPrice[priceOf(s)].push(s));
  return [2, 5, 10]
    .map(p => byPrice[p][Math.floor(Math.random() * byPrice[p].length)])
    .sort(() => Math.random() - 0.5);
}
function chipValues(s) {
  const price = priceOf(s);
  const cands = [s.label, price * 2, price / 2, s.label * 2, price * 5];
  const distract = [];
  for (const c of cands) {
    if (c !== price && !distract.includes(c)) distract.push(c);
    if (distract.length === 3) break;
  }
  return [price, ...distract].sort(() => Math.random() - 0.5);
}

/* =================== ШАГИ =================== */
const STEPS = [
  {
    phase: 'theory', type: 'info', visual: 'whyScale',
    title: 'Шкала и деления',
    text: 'На мензурке подписаны не все числа — иначе они бы не поместились. Между подписями стоят <b>штрихи</b>, а промежуток между двумя соседними штрихами — это <b>деление</b>. Сколько миллилитров «стоит» одно деление?',
  },
  {
    phase: 'theory', type: 'info', visual: 'rule', big: true,
    title: 'Правило цены деления',
    text: 'Возьми <b>два соседних подписанных числа</b>, найди их разность и <b>раздели на число делений</b> между ними. Например: между 20 и 40 четыре деления, значит (40 − 20) : 4 = <b>5 мл</b>.',
  },
  {
    phase: 'theory', type: 'interact', id: 'three', visual: 'three',
    title: 'Три мензурки — три цены деления',
    text: 'У каждой мензурки шкала своя. Посчитай цену деления каждой и выбери ответ под ней.',
  },
  {
    phase: 'theory', type: 'info', visual: 'accuracy',
    title: 'Чем меньше цена деления — тем точнее',
    text: 'Мензурка с ценой деления <b>1 мл</b> заметит даже чайную ложку воды, а с ценой деления <b>10 мл</b> — нет. Поэтому прибор выбирают под задачу: для лекарства — точный, для ведра воды сойдёт и грубый.',
  },

  { phase: 'check', type: 'splash', title: 'Проверь себя', text: 'Считаем цену деления без подсказок.' },

  {
    phase: 'check', type: 'question',
    title: 'Посчитай цену деления',
    text: 'На шкале подписаны 0, 10, 20, 30, 40, 50, а между соседними подписями — 5 делений. Какова цена деления?',
    options: [
      { id: 'a', text: '10 мл', correct: false },
      { id: 'b', text: '5 мл',  correct: false },
      { id: 'c', text: '2 мл',  correct: true },
      { id: 'd', text: '1 мл',  correct: false },
    ],
    right: 'Точно: (20 − 10) : 5 = 2 мл. Разность соседних подписей делим на число делений.',
    wrong: 'Считаем по правилу: разность соседних подписей (20 − 10 = 10) делим на 5 делений — получается 2 мл.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Какая мензурка точнее?',
    text: 'Нужно отмерить 3 мл лекарства. Какую мензурку взять?',
    options: [
      { id: 'a', text: 'С ценой деления 1 мл',  correct: true },
      { id: 'b', text: 'С ценой деления 10 мл', correct: false },
      { id: 'c', text: 'С ценой деления 25 мл', correct: false },
      { id: 'd', text: 'Любую — они одинаковые', correct: false },
    ],
    right: 'Верно! Чем меньше цена деления, тем точнее измерение — 3 мл видно только на шкале «по 1 мл».',
    wrong: 'На шкале «по 10 мл» отметки 3 мл просто нет. Точнее та мензурка, у которой цена деления меньше.',
  },
];

/* =================== ВИЗУАЛЫ =================== */
const visuals = {
  whyScale() {
    return `
      <svg viewBox="0 0 620 340" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(150,0)">${beakerBody({ max: 100, label: 20, minor: 4, level: 65 })}</g>
        <!-- стрелка к уровню и вопрос -->
        <path d="M310 140 L390 140" stroke="#6240FF" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 7"/>
        <text x="402" y="134" font-family="var(--font-display), sans-serif" font-weight="500" font-size="28" fill="#6240FF">?
          <animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/>
        </text>
        <text x="402" y="162" font-family="var(--font-sans), sans-serif" font-size="16" fill="#6B7180">сколько налито?</text>
        <!-- подпись «одно деление» слева, скобка на промежуток 45–50 -->
        <path d="M206 175 Q196 175 196 180.5 Q196 186 206 186" fill="none" stroke="#E5484D" stroke-width="2.4" stroke-linecap="round"/>
        <text x="186" y="180.5" text-anchor="end" dominant-baseline="central" font-family="var(--font-sans), sans-serif" font-size="16" fill="#E5484D">одно деление</text>
      </svg>`;
  },

  rule() {
    /* Крупный фрагмент шкалы: 20 → 40, четыре деления, формула */
    const y0 = 268, dy = 46;
    let marks = '';
    for (let i = 0; i <= 4; i++) {
      const yy = y0 - i * dy;
      const major = i === 0 || i === 4;
      marks += `<line x1="190" y1="${yy}" x2="${major ? 260 : 240}" y2="${yy}" stroke="#2B2B33" stroke-width="${major ? 4 : 2.6}" stroke-linecap="round"/>`;
      if (major) marks += `<text x="170" y="${yy}" text-anchor="end" dominant-baseline="central" font-family="var(--font-display), sans-serif" font-weight="500" font-size="30" fill="#2B2B33">${i === 0 ? 20 : 40}</text>`;
    }
    let pulses = '';
    for (let i = 0; i < 4; i++) {
      const yy = y0 - i * dy - dy / 2;
      pulses += `
        <circle cx="286" cy="${yy}" r="9" fill="#6240FF" opacity="0">
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.7;1" dur="4s" begin="${i * 0.55}s" repeatCount="indefinite"/>
        </circle>
        <text x="306" y="${yy}" dominant-baseline="central" font-family="var(--font-display), sans-serif" font-weight="500" font-size="21" fill="#6240FF" opacity="0">${i + 1}
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.7;1" dur="4s" begin="${i * 0.55}s" repeatCount="indefinite"/>
        </text>`;
    }
    return `
      <svg viewBox="0 0 620 340" xmlns="http://www.w3.org/2000/svg">
        <rect x="120" y="40" width="230" height="270" rx="20" fill="#F4F8FE" stroke="#C9CEDA" stroke-width="2.5"/>
        ${marks}
        ${pulses}
        <text x="480" y="140" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="30" fill="#2B2B33">(40 − 20) : 4</text>
        <text x="480" y="192" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="500" font-size="36" fill="#6240FF">= 5 мл</text>
        <text x="480" y="232" text-anchor="middle" font-family="var(--font-sans), sans-serif" font-size="16" fill="#6B7180">цена деления</text>
      </svg>`;
  },

  three() {
    const scales = pickThree();
    const cells = scales.map((s, i) => {
      const chips = chipValues(s).map(v =>
        `<button class="chip" data-b="${i}" data-v="${v}">${fmtV(v)} мл</button>`).join('');
      return `
        <div class="trio-cell" data-cell="${i}" data-price="${priceOf(s)}">
          ${beakerSVG({ ...s, level: 0 })}
          <div class="trio-q">Цена деления?</div>
          <div class="trio-chips">${chips}</div>
        </div>`;
    }).join('');
    return `
      <div style="width:100%">
        <div class="trio">${cells}</div>
        <div class="canvas-hint" id="trioHint">Разность соседних подписей ÷ число делений между ними.</div>
      </div>`;
  },

  accuracy() {
    return `
      <svg viewBox="0 0 620 340" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(80,0) scale(0.94)">${beakerBody({ max: 20, label: 5, minor: 5, level: 13 })}</g>
        <text x="185" y="330" text-anchor="middle" font-family="var(--font-sans), sans-serif" font-size="16" fill="#07BE7E">цена деления 1 мл — точная</text>
        <g transform="translate(320,0) scale(0.94)">${beakerBody({ max: 250, label: 50, minor: 5, level: 160 })}</g>
        <text x="425" y="330" text-anchor="middle" font-family="var(--font-sans), sans-serif" font-size="16" fill="#6B7180">цена деления 10 мл — грубая</text>
      </svg>`;
  },
};

/* =================== ЗАПУСК =================== */
runLesson({
  lessonId: 'price',
  storageKey: 'beaker-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-level/',
  steps: STEPS,
  visuals,
  onInteract(step, ctx) {
    if (step.id !== 'three') return;
    const cells = [...ctx.root.querySelectorAll('.trio-cell')];
    const hint = document.getElementById('trioHint');
    const solved = new Set();
    cells.forEach(cell => {
      const price = parseFloat(cell.dataset.price);
      cell.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          if (cell.classList.contains('is-done')) return;
          const v = parseFloat(chip.dataset.v);
          if (Math.abs(v - price) < 1e-9) {
            chip.classList.add('ok');
            cell.classList.add('is-done');
            cell.querySelectorAll('.chip').forEach(c => { c.disabled = true; });
            solved.add(cell.dataset.cell);
            if (solved.size === cells.length) {
              hint.innerHTML = '<b>Все три!</b> Видишь: у разных мензурок цена деления разная — всегда проверяй её первой.';
              ctx.done();
            }
          } else {
            chip.classList.add('bad');
            chip.disabled = true;
            hint.textContent = 'Не то. Возьми два соседних подписанных числа и раздели их разность на число делений между ними.';
          }
        });
      });
    });
  },
});
</script>

</body>
</html>
