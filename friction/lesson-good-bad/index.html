<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Полезное и вредное · Сила трения</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛷</text></svg>">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="../../assets/lesson/lesson.css?v=3">
<style>
  .step-visual{ flex-direction: column; }

  /* карточка-ситуация + две корзины */
  .sort-panel{
    width: 100%; max-width: 560px; margin: 0 auto;
    border-radius: var(--radius-xl);
    background: linear-gradient(160deg, #F6F3FF, #EEF0FF);
    padding: 22px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .sort-card{
    background: var(--white); border-radius: var(--radius-xl);
    box-shadow: 0 6px 20px rgba(24,12,34,.10);
    padding: 18px 22px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    min-height: 118px; justify-content: center; max-width: 380px;
  }
  .sort-card .emo{ font-size: 44px; line-height: 1; }
  .sort-card .txt{ font-size: 17px; color: var(--fg-1); text-wrap: balance; }
  .sort-btns{ display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .sort-btn{
    padding: 12px 20px; border: 0; border-radius: var(--radius-md);
    cursor: pointer; font-family: var(--font-sans); font-size: 15px; font-weight: 500;
    transition: transform 120ms var(--ease-standard), opacity 120ms var(--ease-standard);
  }
  .sort-btn:active:not(:disabled){ transform: scale(0.96); }
  .sort-btn:disabled{ opacity: .55; cursor: default; }
  .sort-btn.good{ background: var(--fg-1); color: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
  .sort-btn.bad{ background: var(--white); color: var(--fg-1); border: 1px solid var(--purple-4); }
  .sort-fb{ min-height: 44px; font-size: 15.5px; line-height: 1.35; text-align: center; color: var(--fg-2); text-wrap: pretty; max-width: 420px; }
  .sort-fb.ok{ color: var(--success); font-weight: 500; }
  .sort-fb.err{ color: var(--danger); }
  .sort-score{ font-size: 14px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Закрыть">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">1</span></span>
</div>

<main id="stepHost"></main>

<div class="feedback" id="feedback">
  <div class="fb-icon" id="fbIcon">✓</div>
  <div class="fb-body">
    <p class="fb-title" id="fbTitle"></p>
    <p class="fb-hint" id="fbHint"></p>
  </div>
</div>

<div class="bottom">
  <button class="btn-back" id="backBtn" hidden>← Назад</button>
  <button class="btn-continue" id="continueBtn" disabled>Дальше</button>
</div>

<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 3 «Полезное и вредное трение» (Пёрышкин §15).
   Интерактив: сортировка жизненных ситуаций —
   где трение помогает, а где с ним борются.
   ============================================================ */

const CARDS = [
  { emo: '🚲', txt: 'Тормоза велосипеда прижимают колодки к колесу', good: true,
    why: 'Тормоза работают только благодаря трению: колодки трутся о колесо и гасят скорость.' },
  { emo: '👟', txt: 'Рифлёная подошва кроссовок на мокрой плитке', good: true,
    why: 'Подошву делают рифлёной, чтобы УВЕЛИЧИТЬ трение — иначе поскользнёшься.' },
  { emo: '🔥', txt: 'Спичка чиркает о коробок и загорается', good: true,
    why: 'Трение нагревает головку спички до вспышки. Без трения — ни огня, ни костра.' },
  { emo: '⚙️', txt: 'Подшипник в колесе велосипеда', good: false,
    why: 'Подшипник заменяет скольжение качением шариков — трение падает в десятки раз. С трением тут борются.' },
  { emo: '🛢', txt: 'Масло между деталями двигателя', good: false,
    why: 'Смазка разделяет трущиеся детали плёнкой — иначе они греются и стираются. Трение тут враг.' },
  { emo: '🎿', txt: 'Лыжи смазывают скользящей мазью', good: false,
    why: 'Лыжнику трение мешает ехать — мазь делает скольжение ещё лучше.' },
];

function startSort(root, done) {
  const card = root.querySelector('#sortCard');
  const fb = root.querySelector('#sortFb');
  const score = root.querySelector('#sortScore');
  const btnGood = root.querySelector('#btnGood');
  const btnBad = root.querySelector('#btnBad');
  let i = 0, answered = false;

  function show() {
    const c = CARDS[i];
    card.innerHTML = `<div class="emo">${c.emo}</div><div class="txt">${c.txt}</div>`;
    fb.className = 'sort-fb';
    fb.textContent = 'Трение здесь помогает — или с ним борются?';
    score.textContent = 'Ситуация ' + (i + 1) + ' из ' + CARDS.length;
    btnGood.disabled = false; btnBad.disabled = false;
    answered = false;
  }
  function answer(saidGood) {
    if (answered) return;
    answered = true;
    const c = CARDS[i];
    btnGood.disabled = true; btnBad.disabled = true;
    const ok = saidGood === c.good;
    fb.className = 'sort-fb ' + (ok ? 'ok' : 'err');
    fb.textContent = (ok ? '✓ Верно! ' : '✕ Не совсем. ') + c.why;
    setTimeout(() => {
      i++;
      if (i < CARDS.length) { show(); }
      else {
        card.innerHTML = `<div class="emo">🏆</div><div class="txt">Все ситуации разобраны! Трение бывает и другом, и врагом — важно уметь им управлять.</div>`;
        score.textContent = '';
        fb.className = 'sort-fb';
        fb.textContent = '';
        done();
      }
    }, ok ? 1900 : 3000);
  }
  btnGood.addEventListener('click', () => answer(true));
  btnBad.addEventListener('click', () => answer(false));
  show();
}

/* ============================================================
   ШАГИ УРОКА
   ============================================================ */
const steps = [
  {
    phase: 'theory', type: 'info', visual: 'friend', big: true,
    title: 'Трение-друг',
    text: 'Мы ходим, ездим и даже завязываем шнурки благодаря трению. <b>Тормоза</b> останавливают машину трением колодок. <b>Подошвы</b> и протектор шин цепляются за дорогу. <b>Спичка</b> загорается от трения о коробок. Даже гвоздь держится в доске силой трения!',
  },
  {
    phase: 'theory', type: 'info', visual: 'enemy', big: true,
    title: 'Трение-враг',
    text: 'Но то же трение стирает подошвы, греет и изнашивает детали машин, мешает лыжнику и конькобежцу. С ним борются: детали <b>смазывают</b> маслом, скольжение заменяют качением с помощью <b>подшипников</b>, поверхности шлифуют, лыжи мажут скользящей мазью.',
  },
  {
    phase: 'theory', type: 'interact', id: 'sort', visual: 'sort',
    title: 'Друг или враг? Разбери сам',
    text: 'Шесть жизненных ситуаций. Реши для каждой: трение здесь <b>помогает</b> — или с ним <b>борются</b>?',
  },
  {
    phase: 'theory', type: 'info', visual: 'winter', big: true,
    title: 'Зимой трением управляют',
    text: 'Гололёд — это исчезнувшее трение. Поэтому дорожки <b>посыпают песком</b>: μ сразу вырастает в несколько раз, и подошва снова цепляется. Машины «переобувают» в зимнюю резину с <b>шипами</b>, которые впиваются в лёд. А вот на катке всё наоборот — лёд специально заливают гладким!',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Последний рывок — и вся тема твоя.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос',
    text: 'Зимой обледеневшие дорожки посыпают песком. Зачем?',
    options: [
      { id: 'a', text: 'Песок утепляет лёд, и он быстрее тает', correct: false },
      { id: 'b', text: 'Песок увеличивает трение между подошвой и льдом', correct: true },
      { id: 'c', text: 'Песок уменьшает трение, чтобы легче было идти', correct: false },
    ],
    right: 'Песок делает скользкую поверхность шершавой: μ растёт, трение растёт — подошва не проскальзывает.',
    wrong: 'На льду трение слишком МАЛЕНЬКОЕ — потому и скользко. Песок его увеличивает, и идти безопасно.',
  },
];

/* ---------- визуалы шагов ---------- */
const visuals = {
  friend: () => `
    <svg viewBox="0 0 260 150" xmlns="http://www.w3.org/2000/svg">
      <!-- спичка -->
      <g transform="translate(52,72)">
        <rect x="-34" y="26" width="72" height="26" rx="5" fill="#C49A62"/>
        <rect x="-34" y="26" width="72" height="8" rx="4" fill="#8A6A42"/>
        <g>
          <rect x="-20" y="-10" width="44" height="7" rx="3.5" fill="#E8C797" transform="rotate(-24)"/>
          <circle cx="14" cy="-16" r="8" fill="#E5484D"/>
          <animateTransform attributeName="transform" type="translate" values="0,0;8,-4;0,0" dur="1.3s" repeatCount="indefinite"/>
        </g>
        <path d="M46 -34 Q52 -46 44 -54 Q56 -50 54 -38 Q52 -30 46 -34 Z" fill="#F5B93B">
          <animate attributeName="opacity" values="0;1;.6;1;0" dur="2.6s" repeatCount="indefinite"/>
        </path>
      </g>
      <!-- ботинок на дороге -->
      <g transform="translate(178,60)">
        <rect x="-44" y="44" width="96" height="10" rx="5" fill="#C9CEDA"/>
        <path d="M-30 20 L-30 38 Q-30 44 -24 44 L34 44 Q42 44 42 36 Q42 28 32 26 L6 22 L2 8 Q0 2 -8 2 L-22 2 Q-30 2 -30 10 Z" fill="#6240FF"/>
        <g stroke="#4A2FD9" stroke-width="3" stroke-linecap="round">
          <line x1="-24" y1="44" x2="-20" y2="38"/>
          <line x1="-12" y1="44" x2="-8" y2="38"/>
          <line x1="0" y1="44" x2="4" y2="38"/>
          <line x1="12" y1="44" x2="16" y2="38"/>
        </g>
        <animateTransform attributeName="transform" type="translate" values="178,60;178,58;178,60" dur="1.8s" repeatCount="indefinite"/>
      </g>
      <text x="52" y="140" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="14" fill="#6B7180">огонь — от трения</text>
      <text x="178" y="140" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="14" fill="#6B7180">подошва держит</text>
    </svg>`,
  enemy: () => `
    <svg viewBox="0 0 260 150" xmlns="http://www.w3.org/2000/svg">
      <!-- подшипник -->
      <g transform="translate(70,72)">
        <circle r="44" fill="none" stroke="#6B7180" stroke-width="7"/>
        <circle r="18" fill="none" stroke="#6B7180" stroke-width="7"/>
        <g fill="#9AA0AA">
          <circle cx="0" cy="-31" r="7"/><circle cx="27" cy="-15.5" r="7"/><circle cx="27" cy="15.5" r="7"/>
          <circle cx="0" cy="31" r="7"/><circle cx="-27" cy="15.5" r="7"/><circle cx="-27" cy="-15.5" r="7"/>
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4.5s" repeatCount="indefinite"/>
        </g>
      </g>
      <!-- маслёнка -->
      <g transform="translate(186,66)">
        <path d="M-24 30 L24 30 L16 -6 Q14 -14 4 -14 L-4 -14 Q-14 -14 -16 -6 Z" fill="#F0B23C" stroke="#C98A2E" stroke-width="2.5"/>
        <path d="M8 -14 L34 -34 L38 -30 L14 -8 Z" fill="#C98A2E"/>
        <circle cx="40" cy="-24" r="4" fill="#8A6A1A">
          <animate attributeName="cy" values="-24;-4;12" dur="1.6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;1;0" dur="1.6s" repeatCount="indefinite"/>
        </circle>
      </g>
      <text x="70" y="140" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="14" fill="#6B7180">качение вместо скольжения</text>
      <text x="192" y="140" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="14" fill="#6B7180">смазка</text>
    </svg>`,
  sort: () => `
    <div class="sort-panel">
      <span class="sort-score" id="sortScore"></span>
      <div class="sort-card" id="sortCard"></div>
      <div class="sort-btns">
        <button class="sort-btn good" id="btnGood">💪 Трение помогает</button>
        <button class="sort-btn bad" id="btnBad">🚫 С трением борются</button>
      </div>
      <div class="sort-fb" id="sortFb"></div>
    </div>`,
  winter: () => `
    <svg viewBox="0 0 260 150" xmlns="http://www.w3.org/2000/svg">
      <rect x="12" y="108" width="236" height="14" rx="7" fill="#BFDCF9" stroke="#8FBDEB" stroke-width="2"/>
      <!-- песок сыплется -->
      <g transform="translate(64,40)">
        <path d="M-16 0 L16 0 L10 22 L-10 22 Z" fill="#E8C797" stroke="#C49A62" stroke-width="2.5"/>
        <g fill="#C49A62">
          <circle cx="-4" cy="34" r="3"><animate attributeName="cy" values="30;62" dur="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="1.1s" repeatCount="indefinite"/></circle>
          <circle cx="4" cy="40" r="2.6"><animate attributeName="cy" values="34;64" dur="1.3s" repeatCount="indefinite" begin=".3s"/><animate attributeName="opacity" values="1;0" dur="1.3s" repeatCount="indefinite" begin=".3s"/></circle>
          <circle cx="0" cy="36" r="2.2"><animate attributeName="cy" values="32;62" dur="0.9s" repeatCount="indefinite" begin=".6s"/><animate attributeName="opacity" values="1;0" dur="0.9s" repeatCount="indefinite" begin=".6s"/></circle>
        </g>
        <g fill="#C49A62">
          <circle cx="-14" cy="66" r="2.4"/><circle cx="-4" cy="69" r="2.2"/><circle cx="6" cy="66" r="2.6"/><circle cx="14" cy="69" r="2"/>
        </g>
      </g>
      <!-- шина с шипами -->
      <g transform="translate(186,78)">
        <circle r="30" fill="#2B2B33"/>
        <circle r="13" fill="#8A8F9C"/>
        <g fill="#C9CEDA">
          <rect x="-2" y="-36" width="4" height="7" rx="1.5"/>
          <rect x="-2" y="29" width="4" height="7" rx="1.5"/>
          <rect x="-36" y="-2" width="7" height="4" rx="1.5"/>
          <rect x="29" y="-2" width="7" height="4" rx="1.5"/>
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
        </g>
      </g>
      <text x="64" y="142" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="14" fill="#6B7180">песок на лёд</text>
      <text x="186" y="142" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="14" fill="#6B7180">шипы</text>
    </svg>`,
};

/* ---------- интерактивы ---------- */
function onInteract(step, ctx) {
  if (step.id === 'sort') startSort(ctx.root, ctx.done);
}

runLesson({
  lessonId: 'good-bad',
  storageKey: 'friction-progress',
  homeHref: '../demo/',
  steps, visuals, onInteract,
});
</script>

</body>
</html>
