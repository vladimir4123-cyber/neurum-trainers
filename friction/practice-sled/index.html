<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Довези санки · Практика</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛷</text></svg>">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="../../assets/lesson/lesson.css?v=3">
<link rel="stylesheet" href="../../assets/lesson/practice.css?v=4">
<style>
  .sled-panel{
    width: 100%; max-width: 620px; margin: 0 auto;
    border-radius: var(--radius-xl);
    background: linear-gradient(160deg, #F6F3FF, #EEF0FF);
    padding: 12px;
  }
  .sled-panel canvas{ width: 100%; display: block; }
  .sled-ctl{ display: flex; flex-direction: column; gap: 10px; margin: 14px auto 0; max-width: 620px; }
  .sled-row{ display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .sled-row .lbl{ font-size: 14px; color: var(--fg-3); min-width: 96px; text-align: right; }
  .chip-btn{
    padding: 11px 16px; border: 1px solid var(--purple-4); border-radius: var(--radius-md);
    background: var(--white); color: var(--fg-2); cursor: pointer;
    font-family: var(--font-sans); font-size: 15px; font-weight: 500;
    transition: background-color 120ms var(--ease-standard), transform 120ms var(--ease-standard), color 120ms var(--ease-standard);
  }
  .chip-btn:hover{ background: var(--purple-4); }
  .chip-btn:active{ transform: scale(0.96); }
  .chip-btn.on{ background: var(--fg-1); color: #fff; border-color: var(--fg-1); }
  .push-count{
    font-family: var(--font-display); font-weight: 500; font-size: 22px;
    color: var(--fg-1); min-width: 120px; text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .step-btn{
    width: 44px; height: 44px; border: 1px solid var(--purple-4); border-radius: 50%;
    background: var(--white); color: var(--fg-1); cursor: pointer;
    font-size: 20px; font-weight: 500; font-family: var(--font-sans);
    transition: background-color 120ms var(--ease-standard), transform 120ms var(--ease-standard);
  }
  .step-btn:hover{ background: var(--purple-4); }
  .step-btn:active{ transform: scale(0.94); }
  .go-btn{
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 26px; border: 0; border-radius: var(--radius-md);
    background: var(--fg-1); color: #fff; cursor: pointer;
    font-family: var(--font-sans); font-size: 15px; font-weight: 500;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
    transition: background-color 120ms var(--ease-standard), transform 120ms var(--ease-standard);
  }
  .go-btn:hover:not(:disabled){ background: #3a3a3f; }
  .go-btn:active:not(:disabled){ transform: scale(0.96); }
  .go-btn:disabled{ opacity: .55; cursor: default; }
</style>
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Выйти">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">3</span></span>
</div>

<main id="stage"></main>
<div class="bottom" id="bottom"></div>

<script type="module">
import { runPractice } from '../../assets/lesson/practice-engine.js?v=4';

/* ============================================================
   ПРАКТИКА «Довези санки».
   Игра-лаборатория: подбери поверхность и число толчков,
   чтобы санки остановились ровно у флажка. Физика честная:
   каждый толчок +1 м/с, дальше только трение: a = μ·g,
   путь s = v²/(2·μ·g). Затем — расчёт силы трения F = μ·m·g.
   ============================================================ */

const G = 10;
const DV = 1;                                   // м/с за один толчок
const SURFACES = [
  { key: 'ice',   name: 'лёд',          mu: 0.05, base: '#BFDCF9', edge: '#8FBDEB' },
  { key: 'pack',  name: 'плотный снег', mu: 0.125, base: '#EEF0FF', edge: '#C9CEDA' },
  { key: 'loose', name: 'рыхлый снег',  mu: 0.25, base: '#E3E7FA', edge: '#B9BFD6' },
];
const pick = (arr, rnd) => arr[Math.floor(rnd() * arr.length)];
const fmt = v => (Math.round(v * 10) / 10).toFixed(1).replace('.', ',');
const fmtMu = mu => String(mu).replace('.', ',');
const dist = (v0, mu) => v0 * v0 / (2 * mu * G);
/* canvas не умеет var() в ctx.font — резолвим токен один раз */
const CANVAS_FONT = ((getComputedStyle(document.body).getPropertyValue('--font-display') || '').trim() || '"Aeonik Pro"') + ', sans-serif';

/* ---------- игровой шаг: довези санки до флажка ---------- */
function sledTask(rnd, n, total, opts) {
  // цель генерируем из достижимой комбинации → задача всегда решаема
  const tSurf = pick(SURFACES, rnd);
  const tN = opts.nMin + Math.floor(rnd() * (opts.nMax - opts.nMin + 1));
  const exact = dist(tN * DV, tSurf.mu);
  // допуск: пропорционален цели, но не «съедает» её на коротких дистанциях
  const tol = Math.round(Math.max(0.3, exact * opts.tolFrac) * 10) / 10;
  const target = Math.round((exact + (rnd() - 0.5) * tol * 0.6) * 10) / 10;

  return {
    type: 'action',
    title: `Заезд ${n} из ${total}: довези санки до флажка`,
    text: `Флажок на отметке <b>${fmt(target)} м</b> (зона ±${fmt(tol)} м). Каждый толчок добавляет санкам ${DV} м/с, дальше их тормозит только трение. Подбери поверхность и число толчков — и запускай, попыток сколько угодно.`,
    render(host, ctx) {
      host.innerHTML = `
        <div class="sled-panel"><canvas id="sledCanvas" height="240"></canvas></div>
        <div class="sled-ctl">
          <div class="sled-row"><span class="lbl">поверхность:</span>
            ${SURFACES.map((s, i) => `<button class="chip-btn${i === 0 ? ' on' : ''}" data-surf="${s.key}">${s.name} · μ = ${fmtMu(s.mu)}</button>`).join('')}
          </div>
          <div class="sled-row"><span class="lbl">разгон:</span>
            <button class="step-btn" id="nMinus">−</button>
            <span class="push-count" id="nVal">2 толчка</span>
            <button class="step-btn" id="nPlus">+</button>
            <button class="go-btn" id="goBtn">🛷 Запустить</button>
          </div>
        </div>`;

      const canvas = host.querySelector('#sledCanvas');
      const cx2 = canvas.getContext('2d');
      let surf = SURFACES[0];
      let pushes = 2;
      let sled = { x: 0, v: 0, running: false };
      let lastStop = null;
      let won = false;

      const plural = k => k === 1 ? 'толчок' : k < 5 ? 'толчка' : 'толчков';
      const nVal = host.querySelector('#nVal');
      const refreshN = () => { nVal.textContent = pushes + ' ' + plural(pushes); };

      host.querySelectorAll('[data-surf]').forEach(b => b.addEventListener('click', () => {
        if (sled.running) return;
        surf = SURFACES.find(s => s.key === b.dataset.surf);
        host.querySelectorAll('[data-surf]').forEach(x => x.classList.toggle('on', x === b));
        sled = { x: 0, v: 0, running: false }; lastStop = null;
      }));
      host.querySelector('#nMinus').addEventListener('click', () => { if (!sled.running && pushes > 1) { pushes--; refreshN(); } });
      host.querySelector('#nPlus').addEventListener('click', () => { if (!sled.running && pushes < 6) { pushes++; refreshN(); } });
      host.querySelector('#goBtn').addEventListener('click', () => {
        if (sled.running || won) return;
        sled = { x: 0, v: pushes * DV, running: true };
        lastStop = null;
        ctx.fb('', '');
      });
      refreshN();

      const trackM = Math.max(target * 1.3, target + tol + 0.5) + 1;

      function finish() {
        const s = sled.x;
        lastStop = s;
        if (Math.abs(s - target) <= tol) {
          won = true;
          ctx.fb(`<span class="p-fb__title"><span class="p-fb__badge">✓</span>Точно у флажка!</span><span class="p-fb__why">Остановка на ${fmt(s)} м — в зоне. Путь честный: s = v²/(2μg) = ${fmt(dist(pushes * DV, surf.mu))} м.</span>`, 'ok');
          ctx.done();
        } else {
          ctx.miss();
          const under = s < target;
          ctx.fb(under
            ? `Недолёт: санки встали на ${fmt(s)} м из ${fmt(target)} м. Добавь толчок — или выбери поверхность более скользкую (меньше μ).`
            : `Перелёт: санки укатились на ${fmt(s)} м${s > trackM ? ' (за край!)' : ''}. Убавь разгон — или возьми поверхность с бо́льшим μ.`, 'hint');
        }
      }

      let prev = null;
      function loop(tsMs) {
        if (!canvas.isConnected) return;
        const ts = tsMs / 1000;
        if (prev === null) prev = ts;
        const dt = Math.min(0.04, ts - prev) * 2.2;   // ускоряем показ
        prev = ts;
        if (sled.running) {
          const a = surf.mu * G;
          const vNew = Math.max(0, sled.v - a * dt);
          sled.x += (sled.v + vNew) / 2 * dt;
          sled.v = vNew;
          if (sled.v === 0) { sled.running = false; finish(); }
          else if (sled.x > trackM * 1.15) {
            // укатились за край: досчитываем честный полный путь аналитически
            sled.running = false;
            sled.x = dist(pushes * DV, surf.mu);
            sled.v = 0;
            finish();
          }
        }
        render();
        requestAnimationFrame(loop);
      }

      function fit(c, cssH) {
        const cssW = c.offsetWidth || 320;
        const w = cssW * 2, h = cssH * 2;
        if (c.width !== w) c.width = w;
        if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
        return { w: c.width, h: c.height };
      }

      function render() {
        const { w, h } = fit(canvas, 240);
        cx2.clearRect(0, 0, w, h);
        const padL = w * 0.06, padR = w * 0.04;
        const trackW = w - padL - padR;
        const m2px = trackW / trackM;
        const gy = h * 0.68;

        // зона попадания
        const zx = padL + (target - tol) * m2px, zw = 2 * tol * m2px;
        cx2.fillStyle = 'rgba(48,164,108,.18)';
        cx2.fillRect(zx, gy - h * 0.30, zw, h * 0.30);

        // поверхность
        cx2.beginPath();
        cx2.moveTo(padL, gy + 8);
        cx2.lineTo(padL + trackW, gy + 8);
        cx2.lineWidth = 10;
        cx2.strokeStyle = surf.base;
        cx2.lineCap = 'round';
        cx2.stroke();
        cx2.lineWidth = 2;
        cx2.strokeStyle = surf.edge;
        cx2.beginPath();
        cx2.moveTo(padL, gy + 14);
        cx2.lineTo(padL + trackW, gy + 14);
        cx2.stroke();

        // разметка (метры)
        const stepM = trackM > 22 ? 5 : trackM > 9 ? 2 : 1;
        cx2.font = '500 ' + Math.round(w * 0.022) + 'px ' + CANVAS_FONT;
        cx2.fillStyle = '#9AA0AA';
        cx2.textAlign = 'center';
        for (let mM = 0; mM <= trackM; mM += stepM) {
          const x = padL + mM * m2px;
          cx2.beginPath();
          cx2.moveTo(x, gy + 18);
          cx2.lineTo(x, gy + 26);
          cx2.strokeStyle = '#C9CEDA';
          cx2.lineWidth = 2;
          cx2.stroke();
          cx2.fillText(mM + ' м', x, gy + 46);
        }

        // флажок
        const fx = padL + target * m2px;
        cx2.beginPath();
        cx2.moveTo(fx, gy + 4);
        cx2.lineTo(fx, gy - h * 0.30);
        cx2.strokeStyle = '#30A46C';
        cx2.lineWidth = 3.5;
        cx2.stroke();
        cx2.beginPath();
        cx2.moveTo(fx, gy - h * 0.30);
        cx2.lineTo(fx + w * 0.045, gy - h * 0.245);
        cx2.lineTo(fx, gy - h * 0.19);
        cx2.closePath();
        cx2.fillStyle = '#30A46C';
        cx2.fill();

        // санки
        const sx = padL + Math.min(sled.x, trackM * 1.12) * m2px;
        cx2.font = Math.round(h * 0.16) + 'px ' + CANVAS_FONT;
        cx2.textAlign = 'center';
        cx2.fillText('🛷', sx, gy - 2);

        // статус
        cx2.font = '500 ' + Math.round(w * 0.026) + 'px ' + CANVAS_FONT;
        cx2.textAlign = 'left';
        cx2.fillStyle = '#6B7180';
        const status = sled.running
          ? 'скорость: ' + fmt(sled.v) + ' м/с'
          : lastStop !== null
            ? 'остановка: ' + fmt(lastStop) + ' м'
            : 'старт: v = ' + (pushes * DV) + ' м/с после ' + pushes + ' ' + plural(pushes);
        cx2.fillText(status, padL, h * 0.12);
        cx2.textAlign = 'start';
      }

      requestAnimationFrame(loop);
    },
  };
}

/* ---------- расчётный шаг: сила трения по данным ---------- */
function forceTask(rnd, n, total, hardMode) {
  if (!hardMode) {
    const mu = pick([0.1, 0.2, 0.25], rnd);
    const ms = mu === 0.25 ? [20, 40, 60] : [20, 30, 40, 50];
    const m = pick(ms, rnd);
    const F = Math.round(mu * m * G * 100) / 100;
    return {
      type: 'reading',
      title: `Задача ${n} из ${total}: посчитай трение`,
      text: `Санки с грузом массой ${m} кг равномерно тянут по снегу. Коэффициент трения μ = ${fmtMu(mu)}, g = 10 Н/кг. Чему равна сила трения?`,
      render: host => { host.innerHTML = dataScene('🛷', [`m = ${m} кг`, `μ = ${fmtMu(mu)}`, 'g = 10 Н/кг'], '? Н'); },
      answer: F,
      tolerance: 0.5,
      unit: 'Н',
      hints: [
        'При равномерном движении сила тяги равна силе трения: F = μ · N, где N = m · g.',
        `N = ${m} · 10 = ${m * G} Н. Осталось умножить на μ = ${fmtMu(mu)}.`,
      ],
      right: `✓ Верно! F = μ·m·g = ${fmtMu(mu)} · ${m} · 10 = ${String(F).replace('.', ',')} Н.`,
    };
  }
  // обратная задача: известна сила — найди массу
  const mu = pick([0.2, 0.25, 0.5], rnd);
  const m = pick([20, 30, 40, 60], rnd);
  const F = Math.round(mu * m * G * 100) / 100;
  return {
    type: 'reading',
    title: `Задача ${n} из ${total}: обратный ход`,
    text: `Динамометр при равномерной протяжке санок по снегу показывает ${String(F).replace('.', ',')} Н. Коэффициент трения μ = ${fmtMu(mu)}, g = 10 Н/кг. Какова масса санок с грузом?`,
    render: host => { host.innerHTML = dataScene('🛷', [`F = ${String(F).replace('.', ',')} Н`, `μ = ${fmtMu(mu)}`, 'g = 10 Н/кг'], '? кг'); },
    answer: m,
    tolerance: 0.5,
    unit: 'кг',
    hints: [
      'Из F = μ·m·g вырази массу: m = F / (μ·g).',
      `Считаем: m = ${String(F).replace('.', ',')} / (${fmtMu(mu)} · 10) = ${String(F).replace('.', ',')} / ${String(mu * G).replace('.', ',')}.`,
    ],
    right: `✓ Верно! m = F/(μ·g) = ${String(F).replace('.', ',')} / ${String(mu * G).replace('.', ',')} = ${m} кг.`,
  };
}

function dataScene(emoji, chips, ask) {
  return `
    <div class="sled-panel">
      <svg viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="104" width="560" height="12" rx="6" fill="#EEF0FF" stroke="#C9CEDA" stroke-width="2"/>
        <text x="140" y="88" text-anchor="middle" font-size="44">${emoji}</text>
        <line x1="188" y1="80" x2="244" y2="80" stroke="#9AA0AA" stroke-width="4" stroke-linecap="round"/>
        <rect x="244" y="64" width="120" height="32" rx="16" fill="#F4F1FF" stroke="#C9CEDA" stroke-width="2.5"/>
        <text x="304" y="85" text-anchor="middle" font-family="var(--font-display), sans-serif" font-weight="700" font-size="20" fill="#6240FF">${ask}</text>
        <g font-family="var(--font-display), sans-serif" font-size="17" fill="#6B7180">
          ${chips.map((c, i) => `<text x="420" y="${44 + i * 26}">${c}</text>`).join('')}
        </g>
        <text x="140" y="140" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="14" fill="#9AA0AA">движение равномерное: тяга = трение</text>
      </svg>
    </div>`;
}

/* ---------- сборка уровней ---------- */
function buildSteps(level, rnd) {
  if (level === 'easy') {
    return [
      sledTask(rnd, 1, 2, { nMin: 2, nMax: 3, tolMin: 0.8, tolFrac: 0.14 }),
      forceTask(rnd, 2, 2, false),
    ];
  }
  if (level === 'medium') {
    return [
      sledTask(rnd, 1, 3, { nMin: 2, nMax: 4, tolMin: 0.6, tolFrac: 0.10 }),
      sledTask(rnd, 2, 3, { nMin: 3, nMax: 5, tolMin: 0.6, tolFrac: 0.10 }),
      forceTask(rnd, 3, 3, false),
    ];
  }
  return [
    sledTask(rnd, 1, 4, { nMin: 3, nMax: 5, tolMin: 0.5, tolFrac: 0.07 }),
    sledTask(rnd, 2, 4, { nMin: 4, nMax: 6, tolMin: 0.5, tolFrac: 0.07 }),
    forceTask(rnd, 3, 4, false),
    forceTask(rnd, 4, 4, true),
  ];
}

runPractice({
  practiceId: 'sled',
  storageKey: 'friction-progress',
  homeHref: '../demo/',
  title: 'Довези санки',
  subtitle: 'Флажок ждёт. Каждый толчок даёт +1 м/с, а дальше санки честно тормозит трение: s = v²/(2μg). Подбери поверхность и разгон — и попади в зону.',
  levels: {
    easy:   { label: 'Первый снег', desc: '1 заезд с широкой зоной + простой расчёт.', xp: 30 },
    medium: { label: 'Гонщик',      desc: '2 заезда точнее + расчёт силы трения.', xp: 45 },
    hard:   { label: 'Чемпион',     desc: '2 узких заезда + расчёты, включая обратный.', xp: 60 },
  },
  buildSteps,
});
</script>

</body>
</html>
