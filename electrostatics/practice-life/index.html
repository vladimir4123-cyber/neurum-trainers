<body>

<div class="top">

  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">5</span></span>
</div>

<main id="stage"></main>
<div class="bottom" id="bottom"></div>

<script type="module">
import { runPractice } from '/assets/lesson/practice-engine.js?v=4';

/* ============================================================
   ПРАКТИКА «Статика вокруг нас» — жизненные ситуации,
   которые надо объяснить как физик. Задачи выбираются
   случайно из пула, варианты перемешивает движок.
   ============================================================ */

const TASKS = [
  { icon: '🪮',
    text: 'Расчёска, которой причесались, начинает притягивать мелкие бумажки. Почему?',
    options: [
      { text: 'Бумажки заранее заряжены от стола', correct: false },
      { text: 'Расчёска зарядилась трением о волосы — и притягивает даже нейтральные бумажки', correct: true },
      { text: 'Расчёска намагнитилась от волос', correct: false },
      { text: 'Бумажки прилипают из-за влажности воздуха', correct: false },
    ],
    right: '✓ Именно! Трение зарядило расчёску, а нейтральные бумажки притянулись через индукцию: заряды внутри них сдвинулись.',
    wrong: 'Бумажки обычные, нейтральные, и магнетизм ни при чём. Расчёска зарядилась трением — а нейтральное само тянется к заряженному (индукция).' },
  { icon: '📺',
    text: 'Экран старого телевизора собирает пыль быстрее, чем стена рядом с ним. Почему?',
    options: [
      { text: 'Экран тёплый, а пыль липнет к теплу', correct: false },
      { text: 'Пыль магнитится к металлу внутри', correct: false },
      { text: 'Экран шершавый — пыль цепляется за неровности', correct: false },
      { text: 'Экран накапливает статический заряд и притягивает нейтральные пылинки', correct: true },
    ],
    right: '✓ Верно! Экран электризуется, и пылинки летят к нему точно так же, как бумажки к расчёске.',
    wrong: 'Ни тепло, ни магнетизм. Экран накапливает статический заряд и притягивает пыль — та же индукция.' },
  { icon: '✈️',
    text: 'Перед заправкой самолёт обязательно соединяют металлическим тросом с землёй. Зачем?',
    options: [
      { text: 'Чтобы самолёт не укатился со стоянки', correct: false },
      { text: 'Топливо при перекачке электризуется трением — заземление отводит заряд, чтобы не проскочила искра', correct: true },
      { text: 'Чтобы топливо текло по шлангу быстрее', correct: false },
      { text: 'Трос — это антенна для связи с диспетчером', correct: false },
    ],
    right: '✓ Точно! Топливо трётся о стенки шланга и электризуется. Одна искра в парах топлива — пожар. Трос отводит заряд в землю.',
    wrong: 'Опасная версия! Топливо электризуется трением о шланг, и искра могла бы поджечь пары. Заземление снимает заряд заранее.' },
  { icon: '🌩',
    text: 'Что такое молния с точки зрения физики?',
    options: [
      { text: 'Гигантский искровой разряд: облака электризуются, и накопленный заряд пробивает воздух', correct: true },
      { text: 'Свечение воздуха от трения тёплого фронта о холодный', correct: false },
      { text: 'Отражение солнечного света от ледяных кристаллов в туче', correct: false },
      { text: 'Горение водорода, накопившегося в туче', correct: false },
    ],
    right: '✓ Да! Капли и льдинки в туче электризуются при столкновениях, заряд копится и пробивает километры воздуха. Это доказал Франклин в 1752 году.',
    wrong: 'Молния — колоссальный разряд статического электричества между тучей и землёй. Франклин доказал это опытом со змеем (не повторяй!).' },
  { icon: '🧴',
    text: 'Как работает антистатик для одежды?',
    options: [
      { text: 'Он намагничивает ткань в обратную сторону', correct: false },
      { text: 'Он делает ткань чуть проводящей — заряд стекает и не накапливается', correct: true },
      { text: 'Он охлаждает ткань, а холодная ткань не электризуется', correct: false },
      { text: 'Он склеивает волокна, чтобы они не тёрлись друг о друга', correct: false },
    ],
    right: '✓ Верно! Антистатик делает поверхность слегка проводящей: заряд стекает, не успевая накопиться. Ни треска, ни прилипшей одежды.',
    wrong: 'Секрет проще: антистатик делает ткань слегка проводящей, и заряд стекает, не накапливаясь.' },
];

/* бонус-задачи для сложного уровня */
const HARD_TASKS = [
  { icon: '🛢',
    text: 'Раньше у бензовозов к заднему бамперу крепили металлическую цепь, волочившуюся по асфальту. Зачем?',
    options: [
      { text: 'Цепь отводила в землю заряд, который топливо накапливает от тряски и трения', correct: true },
      { text: 'Цепь тормозила машину на спуске', correct: false },
      { text: 'Цепью проверяли глубину луж', correct: false },
      { text: 'Цепь звенела и предупреждала пешеходов', correct: false },
    ],
    right: '✓ Да! Это то же заземление, что и у самолёта: заряд стекает по цепи в землю и искра не возникает.',
    wrong: 'Это заземление на ходу: топливо электризуется от тряски, а цепь непрерывно отводит заряд в землю.' },
  { icon: '🧤',
    text: 'Сняв шерстяной свитер в темноте, можно увидеть маленькие искры и услышать треск. Что это?',
    options: [
      { text: 'Волокна ткани рвутся и вспыхивают', correct: false },
      { text: 'Микромолнии: свитер и рубашка зарядились трением, и заряд пробивает воздух между ними', correct: true },
      { text: 'Свечение от нагрева ткани', correct: false },
      { text: 'Это блики от синтетических волокон', correct: false },
    ],
    right: '✓ Именно! Это те же молнии, только крошечные: трение развело заряды, и они пробивают миллиметры воздуха.',
    wrong: 'Ничего не рвётся и не горит: это крошечные искровые разряды — та же физика, что у молнии, только в масштабе свитера.' },
];

function pickRandom(arr, n, rnd) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rnd() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, n);
}

function buildSteps(level, rnd) {
  let pool;
  if (level === 'easy') pool = pickRandom(TASKS, 3, rnd);
  else if (level === 'medium') pool = pickRandom(TASKS, 5, rnd);
  else pool = [...pickRandom(TASKS, 5, rnd), ...pickRandom(HARD_TASKS, 2, rnd)];

  return pool.map((t, i) => ({
    type: 'choice',
    title: `Задача ${i + 1} из ${pool.length}`,
    text: t.text,
    render: host => { host.innerHTML = `<div class="task-icon">${t.icon}</div>`; },
    options: t.options.map(o => ({ text: o.text, correct: o.correct })),
    right: t.right,
    wrong: t.wrong,
  }));
}

runPractice({
  practiceId: 'life',
  storageKey: 'electrostatics-progress',
  homeHref: '../demo/',
  title: 'Статика вокруг нас',
  subtitle: 'Каждая ситуация — настоящая: расчёска, пыльный экран, заправка самолёта, молния. Объясни их как физик.',
  levels: {
    easy:   { label: 'Разминка',  desc: '3 случайные задачи из пяти.', xp: 25 },
    medium: { label: 'Уверенный', desc: 'Все 5 жизненных задач подряд.', xp: 40 },
    hard:   { label: 'Физик',     desc: '5 задач + 2 бонусные с подвохом.', xp: 60 },
  },
  buildSteps,
});
</script>

</body>
</html>
