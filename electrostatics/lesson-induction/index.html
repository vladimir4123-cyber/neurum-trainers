import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 3 «Индукция и электроскоп».
   Интерактивы: янтарная палочка ↔ струя воды и бумажки;
   электроскоп со слайдером. Перенос из монолита, светлая тема.
   ============================================================ */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
function rr(ctx, x, y, w2, h2, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w2, y, x + w2, y + h2, r);
  ctx.arcTo(x + w2, y + h2, x, y + h2, r);
  ctx.arcTo(x, y + h2, x, y, r);
  ctx.arcTo(x, y, x + w2, y, r);
  ctx.closePath();
}
/* Плоский стиль: сплошные заливки, БЕЗ градиентов и свечения, БЕЗ чёрного
   контура. Края — тонкие, того же цвета, но темнее (shade). */
function tint(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * t);
  g = Math.round(g + (255 - g) * t);
  b = Math.round(b + (255 - b) * t);
  return `rgb(${r},${g},${b})`;
}
function shade(hex, t) {   // темнее к чёрному на долю t
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}
function chargeDot(ctx, x, y, r, sign, color) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = tint(color, 0.66);
  ctx.fill();
  ctx.lineWidth = 1.6;
  ctx.strokeStyle = color;
  ctx.stroke();
  ctx.font = '700 ' + Math.round(r * 1.4) + 'px var(--font-display), sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = shade(color, 0.15);
  ctx.fillText(sign, x, y + 0.5);
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}
const PLUS = '#E5484D', MINUS = '#2F80ED', AMBER = '#F0B23C';

/* ---------- интерактив 1: палочка, струя и бумажки ---------- */
function startWater(root, done) {
  const canvas = root.querySelector('#waterCanvas');
  const ctx = canvas.getContext('2d');
  const rodN = { x: 0.62, y: 0.38 };
  let drops = [], papers = null, bentFrames = 0, doneFired = false;

  const ptr = e => {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
  };
  const moveRod = e => {
    const p = ptr(e);
    rodN.x = Math.min(0.95, Math.max(0.05, p.x));
    rodN.y = Math.min(0.9, Math.max(0.05, p.y));
  };
  canvas.addEventListener('pointermove', moveRod);
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    moveRod(e);
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  });

  function draw() {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 250);
    ctx.clearRect(0, 0, w, h);
    const spX = w * 0.20, spY = h * 0.14;

    // кран
    ctx.fillStyle = '#8A8F9C';
    rr(ctx, -10, h * 0.02, spX + w * 0.02 + 10, h * 0.06, 8);
    ctx.fill();
    rr(ctx, spX - w * 0.018, h * 0.05, w * 0.036, h * 0.09, 6);
    ctx.fill();

    const tipX = rodN.x * w, tipY = rodN.y * h;

    // вода
    for (let k = 0; k < 2; k++) {
      drops.push({ x: spX + (Math.random() - 0.5) * w * 0.012, y: spY, vx: 0, vy: 2.2 + Math.random() * 0.8 });
    }
    drops = drops.filter(d => {
      const dx = tipX - d.x, dy = tipY - d.y;
      const d2 = dx * dx + dy * dy;
      const dd = Math.sqrt(d2) + 1;
      const F = Math.min(0.3, 9000 / (d2 + 3000));
      d.vx += F * dx / dd;
      d.vy += F * dy / dd * 0.35 + 0.13;
      d.vx *= 0.99;
      d.x += d.vx;
      d.y += d.vy;
      ctx.beginPath();
      ctx.arc(d.x, d.y, 2.6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(47,128,237,0.75)';
      ctx.fill();
      return d.y < h + 10 && d.x > -10 && d.x < w + 10;
    });
    if (drops.length > 420) drops.splice(0, drops.length - 420);

    // струя заметно изогнулась? считаем прогресс к done()
    const nearJet = Math.abs(tipX - spX) < w * 0.22 && tipY > h * 0.2 && tipY < h * 0.85;
    if (nearJet && !doneFired) {
      bentFrames++;
      if (bentFrames > 70) { doneFired = true; done(); }
    }

    // стол и бумажки
    ctx.fillStyle = '#C9CEDA';
    rr(ctx, w * 0.46, h * 0.93, w * 0.50, h * 0.05, 6);
    ctx.fill();
    if (!papers || papers.w !== w) {
      papers = { w, list: [] };
      for (let i = 0; i < 7; i++) {
        const hx = w * (0.52 + 0.058 * i) + (i % 2) * 8;
        const hy = h * 0.905 - (i % 3) * 5;
        papers.list.push({ hx, hy, x: hx, y: hy, vx: 0, vy: 0, ang: Math.random() * 3 });
      }
    }
    papers.list.forEach(p => {
      const dx = tipX - p.x, dy = tipY - p.y;
      const d = Math.hypot(dx, dy) + 1;
      if (d < h * 0.55) {
        p.vx += dx / d * 0.5;
        p.vy += dy / d * 0.5;
      } else {
        p.vx += (p.hx - p.x) * 0.01;
        p.vy += (p.hy - p.y) * 0.01 + 0.2;
      }
      p.vx *= 0.90; p.vy *= 0.90;
      p.x += p.vx; p.y += p.vy;
      if (p.y > p.hy) { p.y = p.hy; p.vy = 0; }
      p.ang += p.vx * 0.02;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.ang);
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#C9CEDA';
      ctx.lineWidth = 1;
      ctx.fillRect(-7, -5, 14, 10);
      ctx.strokeRect(-7, -5, 14, 10);
      ctx.restore();
    });

    // янтарная палочка
    const rodAng = -0.7, rl = w * 0.20, rw = Math.max(10, h * 0.035);
    ctx.save();
    ctx.translate(tipX, tipY);
    ctx.rotate(rodAng);
    rr(ctx, -rw * 0.4, -rw / 2, rl, rw, rw / 2);
    ctx.fillStyle = AMBER;
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = shade(AMBER, 0.2);
    ctx.stroke();
    ctx.restore();
    for (let i = 0; i < 3; i++) {
      const f = 0.14 + i * 0.3;
      chargeDot(ctx, tipX + Math.cos(rodAng) * rl * f, tipY + Math.sin(rodAng) * rl * f, 8, '−', '#5A3C0A');
    }

    ctx.font = '600 ' + Math.round(w * 0.036) + 'px var(--font-display), sans-serif';
    ctx.fillStyle = '#8A8F9C';
    ctx.textAlign = 'right';
    ctx.fillText('янтарная палочка, заряд «−»', w * 0.97, h * 0.08);
    ctx.textAlign = 'start';
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ---------- интерактив 2: электроскоп ---------- */
function startScope(root, done) {
  const canvas = root.querySelector('#scopeCanvas');
  const slider = root.querySelector('#scopeSlider');
  const val = root.querySelector('#scopeVal');
  const ctx = canvas.getContext('2d');
  let scopeAng = 0.1, doneFired = false;

  const setLabel = () => { val.textContent = Math.round(1 + 0.29 * (+slider.value)) + ' см'; };
  slider.addEventListener('input', () => {
    setLabel();
    if (+slider.value < 30 && !doneFired) { doneFired = true; done(); }
  });
  setLabel();

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 250);
    ctx.clearRect(0, 0, w, h);
    const sx = w * 0.62;
    const ballY = h * 0.14, ballR = h * 0.055;
    const stemBot = h * 0.52;
    const v = +slider.value;
    const strength = Math.pow((100 - v) / 100, 1.7);
    const target = 0.06 + 0.72 * strength;
    scopeAng += (target - scopeAng) * 0.09;
    const wob = Math.sin(t * 6) * 0.012 * strength;

    // колба
    rr(ctx, sx - w * 0.17, h * 0.30, w * 0.34, h * 0.62, 24);
    ctx.fillStyle = 'rgba(98,64,255,0.04)';
    ctx.fill();
    ctx.strokeStyle = '#C9CEDA';
    ctx.lineWidth = 3;
    ctx.stroke();

    // стержень
    ctx.strokeStyle = '#8A8F9C';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sx, ballY + ballR);
    ctx.lineTo(sx, stemBot);
    ctx.stroke();

    // листочки с зарядами
    const leafL = h * 0.30;
    const nCh = Math.round(strength * 3);
    [-1, 1].forEach(s => {
      const a = (scopeAng + wob) * s;
      const lx = sx + Math.sin(a) * leafL;
      const ly = stemBot + Math.cos(a) * leafL;
      ctx.beginPath();
      ctx.moveTo(sx, stemBot);
      ctx.lineTo(lx, ly);
      ctx.strokeStyle = '#B9BFD0';
      ctx.lineWidth = 5;
      ctx.stroke();
      const fr = [0.45, 0.68, 0.9];
      for (let i = 0; i < nCh; i++) {
        chargeDot(ctx, sx + Math.sin(a) * leafL * fr[i], stemBot + Math.cos(a) * leafL * fr[i], 7, '−', MINUS);
      }
    });

    // шар с наведёнными «плюсами» — плоская заливка + тонкий край
    ctx.beginPath();
    ctx.arc(sx, ballY, ballR, 0, Math.PI * 2);
    ctx.fillStyle = '#C9CEDA';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = shade('#C9CEDA', 0.2);
    ctx.stroke();
    const nPl = Math.max(0, Math.min(3, 1 + Math.round(strength * 2)));
    for (let i = 0; i < nPl; i++) {
      const aa = Math.PI + (i - (nPl - 1) / 2) * 0.7;
      chargeDot(ctx, sx + Math.cos(aa) * ballR * 0.62, ballY + Math.sin(aa) * ballR * 0.62, 7, '+', PLUS);
    }

    // палочка слева
    const closeX = sx - ballR - 16;
    const farX = w * 0.04;
    const tipX = closeX - (v / 100) * (closeX - farX);
    const rw = Math.max(10, h * 0.04), rl = w * 0.30;
    rr(ctx, tipX - rl, ballY - rw / 2, rl, rw, rw / 2);
    ctx.fillStyle = AMBER;
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = shade(AMBER, 0.2);
    ctx.stroke();
    for (let i = 0; i < 3; i++) {
      chargeDot(ctx, tipX - rl * (0.15 + i * 0.3), ballY, 7, '−', '#5A3C0A');
    }

    ctx.font = '600 ' + Math.round(w * 0.036) + 'px var(--font-display), sans-serif';
    ctx.fillStyle = '#8A8F9C';
    ctx.textAlign = 'center';
    ctx.fillText('листочки заряжены одинаково — и отталкиваются', sx, h * 0.97);
    ctx.textAlign = 'start';
    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ШАГИ
   ============================================================ */
const steps = [
  {
    phase: 'theory', type: 'interact', id: 'water', visual: 'water',
    title: 'Притяжение без заряда? Индукция!',
    text: 'Самое хитрое: заряженное тело притягивает даже <b>нейтральное</b>. Заряды внутри него сдвигаются — «плюсы» оказываются ближе к палочке, и притяжение побеждает. Поднеси палочку к струе воды и к бумажкам.',
  },
  {
    phase: 'theory', type: 'info', visual: 'why', big: true,
    title: 'Вот почему это работает',
    text: 'Именно поэтому натёртая расчёска поднимает бумажки, а шарик прилипает к стене: им <b>не нужен</b> «встречный» заряд. Достаточно того, что заряды внутри нейтрального тела чуть-чуть сдвигаются.',
  },
  {
    phase: 'theory', type: 'interact', id: 'scope', visual: 'scope',
    title: 'Электроскоп — прибор, который видит заряд',
    text: 'Внутри — стержень с двумя лёгкими листочками. Поднеси палочку ползунком: электроны в стержне сбегут вниз, листочки зарядятся <b>одинаково</b> — и разойдутся. Чем ближе палочка, тем шире угол.',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Два вопроса с подвохом — думай как детектив.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос 1 из 2',
    text: 'Заряженная палочка притянула лёгкую бумажную гильзу. Значит ли это, что гильза заряжена противоположно палочке?',
    options: [
      { id: 'a', text: 'Да: притяжение бывает только между разными зарядами', correct: false },
      { id: 'b', text: 'Нет: гильза может быть и нейтральной — заряды в ней просто перераспределились', correct: true },
      { id: 'c', text: 'Да, но только если палочка заряжена положительно', correct: false },
    ],
    right: 'Притяжение — не улика: нейтральная гильза притягивается через индукцию точно так же.',
    wrong: 'Вспомни струю воды: она нейтральна, а палочка её изгибает. Притяжение не доказывает заряд — это индукция.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос 2 из 2',
    text: 'Стеклянную палочку потёрли о шёлк — она зарядилась «+». Что произошло с электронами и с общим зарядом системы «палочка + шёлк»?',
    options: [
      { id: 'a', text: 'Часть электронов перешла на шёлк; общий заряд системы не изменился', correct: true },
      { id: 'b', text: 'Электроны исчезли, поэтому общий заряд стал положительным', correct: false },
      { id: 'c', text: 'На шёлк перешли протоны, поэтому палочка стала «+»', correct: false },
    ],
    right: 'Заряды не рождаются и не исчезают — они только перебегают. Сумма всегда сохраняется.',
    wrong: 'Электроны не исчезают, а протоны не бегают. «−» перешли на шёлк, палочка осталась с избытком «+», а сумма — нулевая.',
  },
];

const visuals = {
  water: () => `
    <div class="canvas-panel"><canvas id="waterCanvas" height="250"></canvas></div>
    <p class="canvas-hint">Води пальцем или мышью — палочка следует за тобой. Поднеси её к <b>струе</b> и к <b>бумажкам</b></p>`,
  scope: () => `
    <div class="canvas-panel"><canvas id="scopeCanvas" height="250"></canvas></div>
    <div class="mini-control">
      <div class="mini-control-label">
        <span>Расстояние до палочки</span>
        <span class="mc-value" id="scopeVal">26 см</span>
      </div>
      <input type="range" class="mc-slider" id="scopeSlider" min="0" max="100" value="85" step="1">
    </div>`,
  why: () => `
    <svg viewBox="0 0 280 150" xmlns="http://www.w3.org/2000/svg">
      <rect x="24" y="30" width="150" height="14" rx="7" fill="#F0B23C" transform="rotate(-12 99 37)"/>
      <text x="60" y="26" font-family="var(--font-display), sans-serif" font-weight="700" font-size="15" fill="#5A3C0A">− − −</text>
      <rect x="150" y="66" width="104" height="60" rx="14" fill="#fff" stroke="#C9CEDA" stroke-width="2.5"/>
      <g font-family="var(--font-display), sans-serif" font-weight="700" font-size="16" text-anchor="middle">
        <text x="172" y="92" fill="#E5484D">+</text>
        <text x="172" y="114" fill="#E5484D">+</text>
        <text x="232" y="92" fill="#2F80ED">−</text>
        <text x="232" y="114" fill="#2F80ED">−</text>
      </g>
      <text x="202" y="144" text-anchor="middle" font-family="var(--font-display), sans-serif" font-size="13" fill="#6B7180">нейтральное тело</text>
      <g stroke="#6240FF" stroke-width="3" fill="#6240FF">
        <line x1="120" y1="80" x2="142" y2="72"/>
        <path d="M146 71 l-9 -3 l3 9 z"/>
      </g>
    </svg>`,
};

function onInteract(step, ctx) {
  if (step.id === 'water') startWater(ctx.root, ctx.done);
  if (step.id === 'scope') startScope(ctx.root, ctx.done);
}

runLesson({
  lessonId: 'induction',
  storageKey: 'electrostatics-progress',
  homeHref: '../demo/',
  steps, visuals, onInteract,
});
</script>
