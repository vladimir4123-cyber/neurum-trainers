<!doctype html>

<head>
<meta charset="utf-8">

<title>Кто притягивается, кто нет · Электризация</title>

<style>
  /* панель+подсказка+кнопки визуала — колонкой, а не в ряд */
  .step-visual{ flex-direction: column; }
  .canvas-panel{
    width: 100%; max-width: 560px; margin: 0 auto;
    border-radius: var(--radius-xl);
    background: linear-gradient(160deg, #F6F3FF, #EEF0FF);
    padding: 10px;
  }
  .canvas-panel canvas{ width: 100%; display: block; touch-action: none; }
  .canvas-hint{
    margin: 10px 0 0; text-align: center; min-height: 22px;
    font-size: 17px; color: var(--fg-2); text-wrap: pretty;
  }
  .canvas-hint b{ color: var(--purple-1); font-weight: 500; }

  .charge-row{
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-top: 12px;
  }
  .cr-label{ font-size: 15px; color: var(--fg-2); min-width: 110px; text-align: right; }
  .charge-chips{ display: flex; gap: 8px; }
  .charge-chip{
    width: 46px; height: 42px; border-radius: 12px;
    border: 1.5px solid var(--purple-4); background: var(--white);
    font-family: var(--font-display); font-size: 20px; font-weight: 500; color: var(--fg-2);
    cursor: pointer;
    transition: background-color 120ms var(--ease-standard), transform 120ms var(--ease-standard), border-color 120ms var(--ease-standard);
  }
  .charge-chip:hover{ background: var(--purple-4); }
  .charge-chip:active{ transform: scale(0.94); }
  .charge-chip.active-plus{ background: #FFE3DC; border-color: #E5484D; color: #C2372F; }
  .charge-chip.active-minus{ background: #DCEBFF; border-color: #2F80ED; color: #1E62C4; }
  .charge-chip.active-zero{ background: #EDEFF5; border-color: #9AA0AA; color: #5A5F6E; }

  /* задание-цели над интерактивом */
  .goals{ display: flex; gap: 10px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
  .goal-pill{
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 9999px;
    background: var(--white); border: 1px solid var(--purple-4);
    font-size: 14px; color: var(--fg-2); font-weight: 500;
  }
  .goal-pill.done{ background: #E3F8EF; border-color: #07BE7E; color: #067A54; }
</style>
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Закрыть">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="feedback" id="feedback">
  <div class="fb-icon" id="fbIcon">✓</div>
  <div class="fb-body">

    <p class="fb-hint" id="fbHint"></p>
  </div>
</div>

<div class="bottom">
  <button class="btn-back" id="backBtn" hidden>← Назад</button>
  <button class="btn-continue" id="continueBtn" disabled>Дальше</button>
</div>

<script type="module">
import { runLesson } from '/assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 2 «Кто притягивается, кто нет» — два маятника,
   ученик задаёт заряды и добивается обеих целей:
   оттолкнуть и притянуть. Перенос из монолита, светлая тема.
   ============================================================ */

function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
const PLUS = '#E5484D', MINUS = '#2F80ED';
/* Плоский стиль: сплошная заливка + тонкий край того же цвета, но темнее. */
function shade(hex, t) {   // мешаем цвет к чёрному на долю t
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}
function chargeColors(q) {
  if (q > 0) return { m: PLUS };
  if (q < 0) return { m: MINUS };
  return { m: '#8A8F9C' };
}
function drawBall(ctx, x, y, r, cols, sign) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = cols.m;
  ctx.fill();
  ctx.lineWidth = Math.max(1.5, r * 0.05);
  ctx.strokeStyle = shade(cols.m, 0.2);
  ctx.stroke();
  if (sign) {
    ctx.font = '700 ' + Math.round(r * 0.95) + 'px var(--font-display), sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = shade(cols.m, 0.45);
    ctx.fillText(sign, x, y + 1);
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
  }
}
function drawArrow(ctx, x, y, dir, len, color) {
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + dir * len, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + dir * len, y);
  ctx.lineTo(x + dir * (len - 9), y - 6);
  ctx.lineTo(x + dir * (len - 9), y + 6);
  ctx.closePath();
  ctx.fill();
}

/* ---------- интерактив: два маятника ---------- */
function startPend(root, done) {
  const canvas = root.querySelector('#pendCanvas');
  const status = root.querySelector('#pendStatus');
  const ctx = canvas.getContext('2d');
  let q1 = 0, q2 = 0, pa1 = 0, pa2 = 0, pv1 = 0, pv2 = 0;
  const goals = { repel: false, attract: false };

  const refreshGoals = () => {
    root.querySelector('#goalRepel').classList.toggle('done', goals.repel);
    root.querySelector('#goalAttract').classList.toggle('done', goals.attract);
    if (goals.repel && goals.attract) done();
  };

  root.querySelectorAll('.charge-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const side = +btn.dataset.side, val = +btn.dataset.val;
      if (side === 1) q1 = val; else q2 = val;
      btn.parentElement.querySelectorAll('.charge-chip').forEach(c =>
        c.classList.remove('active-plus', 'active-minus', 'active-zero'));
      btn.classList.add(val > 0 ? 'active-plus' : val < 0 ? 'active-minus' : 'active-zero');

      const prod = q1 * q2;
      if (prod > 0) {
        goals.repel = true;
        status.innerHTML = 'Заряды <b>одного знака</b> — шарики отталкиваются';
      } else if (prod < 0) {
        goals.attract = true;
        status.innerHTML = 'Заряды <b>разных знаков</b> — притягиваются!';
      } else if (q1 !== 0 || q2 !== 0) {
        status.innerHTML = 'Заряженный шарик <b>чуть-чуть притягивает</b> даже нейтральный — почему, узнаешь в следующей теме';
      } else {
        status.textContent = 'Оба нейтральны — висят спокойно. Задай заряды кнопками ниже';
      }
      refreshGoals();
    });
  });

  function draw() {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 250);
    ctx.clearRect(0, 0, w, h);
    const p1x = w * 0.38, p2x = w * 0.62, py = h * 0.06;
    const L = Math.min(h * 0.58, w * 0.34);
    const r = Math.min(h * 0.115, w * 0.075);
    const gapHalf = (p2x - p1x) / 2;
    const aIn = Math.asin(Math.min(0.6, Math.max(0.02, (gapHalf - r * 1.05) / L)));
    const prod = q1 * q2;
    let tg;
    if (prod > 0) tg = 0.42;
    else if (prod < 0) tg = -aIn;
    else if (q1 !== 0 || q2 !== 0) tg = -aIn * 0.35;
    else tg = 0;
    pv1 += (tg - pa1) * 0.015; pv1 *= 0.93; pa1 += pv1;
    pv2 += (tg - pa2) * 0.015; pv2 *= 0.93; pa2 += pv2;

    // потолок
    ctx.strokeStyle = '#C9CEDA';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(w * 0.22, py);
    ctx.lineTo(w * 0.78, py);
    ctx.stroke();
    ctx.lineWidth = 2;
    for (let hx = w * 0.24; hx < w * 0.78; hx += w * 0.045) {
      ctx.beginPath();
      ctx.moveTo(hx, py);
      ctx.lineTo(hx - 8, py - 10);
      ctx.stroke();
    }

    const b1x = p1x - Math.sin(pa1) * L, b1y = py + Math.cos(pa1) * L;
    const b2x = p2x + Math.sin(pa2) * L, b2y = py + Math.cos(pa2) * L;

    ctx.strokeStyle = '#9AA0AA';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(p1x, py); ctx.lineTo(b1x, b1y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p2x, py); ctx.lineTo(b2x, b2y); ctx.stroke();

    drawBall(ctx, b1x, b1y, r, chargeColors(q1), q1 > 0 ? '+' : q1 < 0 ? '−' : '');
    drawBall(ctx, b2x, b2y, r, chargeColors(q2), q2 > 0 ? '+' : q2 < 0 ? '−' : '');

    if (prod !== 0 || (q1 !== 0) !== (q2 !== 0)) {
      const attract = prod <= 0;
      const ay = (b1y + b2y) / 2;
      const alen = prod === 0 ? r * 0.55 : r * 0.95;
      const col = attract ? MINUS : '#E8590C';
      drawArrow(ctx, attract ? b1x + r * 1.15 : b1x - r * 1.15, ay, attract ? 1 : -1, alen, col);
      drawArrow(ctx, attract ? b2x - r * 1.15 : b2x + r * 1.15, ay, attract ? -1 : 1, alen, col);
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

/* ============================================================
   ШАГИ
   ============================================================ */
const steps = [
  {
    phase: 'theory', type: 'interact', id: 'pend', visual: 'pend',
    title: 'Кто притягивается, а кто отталкивается?',
    text: 'Правило простое: <b>одноимённые отталкиваются, разноимённые притягиваются</b>. Проверь сам — выполни обе цели.',
  },
  {
    phase: 'theory', type: 'info', visual: 'rule', big: true,
    title: 'Правило, которое работает всегда',
    text: 'Заметь: сила действует <b>на оба шарика сразу</b> — они отклоняются одинаково, просто в разные стороны. А ещё ты видел странность: заряженный шарик чуть-чуть тянет даже нейтральный. Это не ошибка — это индукция, и о ней следующая тема.',
  },
  {
    phase: 'check', type: 'splash',
    title: 'Проверь себя',
    text: 'Один вопрос — отвечай как физик.',
  },
  {
    phase: 'check', type: 'question',
    title: 'Вопрос',
    text: 'Два шарика подвесили рядом на нитях — и они оттолкнулись друг от друга. Что можно сказать об их зарядах?',
    options: [
      { id: 'a', text: 'Заряды разных знаков', correct: false },
      { id: 'b', text: 'Один заряжен, второй нейтральный', correct: false },
      { id: 'c', text: 'Оба заряжены, и заряды одного знака', correct: true },
    ],
    right: 'Отталкивание — самая надёжная улика: так ведут себя только два заряда одного знака.',
    wrong: 'Отталкиваются только одноимённые заряды — значит, заряжены точно оба, и знак у них одинаковый.',
  },
];

const visuals = {
  pend: () => `
    <div class="canvas-panel"><canvas id="pendCanvas" height="250"></canvas></div>
    <div class="goals">
      <span class="goal-pill" id="goalRepel">🎯 Заставь их оттолкнуться</span>
      <span class="goal-pill" id="goalAttract">🎯 Заставь их притянуться</span>
    </div>
    <div class="charge-row">
      <span class="cr-label">Левый шарик:</span>
      <div class="charge-chips">
        <button class="charge-chip" data-side="1" data-val="-1">−</button>
        <button class="charge-chip active-zero" data-side="1" data-val="0">0</button>
        <button class="charge-chip" data-side="1" data-val="1">+</button>
      </div>
    </div>
    <div class="charge-row">
      <span class="cr-label">Правый шарик:</span>
      <div class="charge-chips">
        <button class="charge-chip" data-side="2" data-val="-1">−</button>
        <button class="charge-chip active-zero" data-side="2" data-val="0">0</button>
        <button class="charge-chip" data-side="2" data-val="1">+</button>
      </div>
    </div>
    <p class="canvas-hint" id="pendStatus">Оба нейтральны — висят спокойно. Задай заряды кнопками выше</p>`,
  rule: () => `
    <svg viewBox="0 0 280 150" xmlns="http://www.w3.org/2000/svg">
      <g font-family="var(--font-display), sans-serif" font-weight="700" text-anchor="middle">
        <circle cx="60" cy="46" r="20" fill="#FFD2C5" stroke="#E5484D" stroke-width="2.5"/>
        <text x="60" y="53" font-size="20" fill="#C2372F">+</text>
        <circle cx="130" cy="46" r="20" fill="#FFD2C5" stroke="#E5484D" stroke-width="2.5"/>
        <text x="130" y="53" font-size="20" fill="#C2372F">+</text>
        <g stroke="#E8590C" stroke-width="3" fill="#E8590C">
          <line x1="34" y1="46" x2="18" y2="46"/><path d="M14 46 l8 -5 v10 z"/>
          <line x1="156" y1="46" x2="172" y2="46"/><path d="M176 46 l-8 -5 v10 z"/>
        </g>
        <circle cx="60" cy="112" r="20" fill="#FFD2C5" stroke="#E5484D" stroke-width="2.5"/>
        <text x="60" y="119" font-size="20" fill="#C2372F">+</text>
        <circle cx="130" cy="112" r="20" fill="#CFE6FF" stroke="#2F80ED" stroke-width="2.5"/>
        <text x="130" y="118" font-size="22" fill="#1E62C4">−</text>
        <g stroke="#2F80ED" stroke-width="3" fill="#2F80ED">
          <line x1="84" y1="112" x2="96" y2="112"/><path d="M100 112 l-8 -5 v10 z"/>
          <line x1="106" y1="112" x2="98" y2="112"/>
        </g>
        <text x="228" y="52" font-size="14" font-weight="500" fill="#6B7180">отталкиваются</text>
        <text x="228" y="118" font-size="14" font-weight="500" fill="#6B7180">притягиваются</text>
      </g>
    </svg>`,
};

function onInteract(step, ctx) {
  if (step.id === 'pend') startPend(ctx.root, ctx.done);
}

runLesson({
  lessonId: 'forces',
  storageKey: 'electrostatics-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-induction/',
  steps, visuals, onInteract,
});
</script>
