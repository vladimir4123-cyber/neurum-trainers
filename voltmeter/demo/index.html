<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Вольтметр · Урок для класса</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔋</text></svg>">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL@48,500,1&display=block">
<style>
  *{ box-sizing: border-box; }
  body{
    margin: 0; font-family: var(--font-sans);
    background: var(--white); color: var(--fg-1);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .ms{ font-family: 'Material Symbols Rounded'; font-variation-settings: 'FILL' 1, 'wght' 500; line-height: 1; }

  /* ============ TOP BAR (sticky) ============ */
  .topbar{
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1120px; margin: 0 auto; padding: 18px 24px;
    background: var(--white);
  }
  .home-link, .ctx-chip{
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 16px; border-radius: 9999px;
    background: var(--white); color: var(--fg-1);
    text-decoration: none; font-weight: 500; font-size: 14px;
    box-shadow: 0 1px 2px rgba(35,35,35,.05), 0 4px 12px rgba(35,35,35,.06), inset 0 0 0 1px rgba(101,31,255,.06);
    transition: background-color 140ms var(--ease-standard), transform 140ms var(--ease-standard);
  }
  .home-link:hover{ background: var(--purple-3); }
  .home-link:active{ transform: scale(0.96); }
  .ctx-chip{ color: var(--fg-2); cursor: default; }
  .ctx-chip .ms{ font-size: 18px; color: var(--purple-1); }

  main.kit{ max-width: 1120px; margin: 0 auto; padding: 8px 24px 120px; }

  /* ============ HERO ============ */
  .hero{
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
    gap: 40px; align-items: stretch;
    background: var(--white); border-radius: var(--radius-3xl);
    padding: 28px; margin-top: 8px;
    box-shadow: 0 1px 2px rgba(35,35,35,.05), 0 14px 34px rgba(35,35,35,.09), inset 0 0 0 1px rgba(35,35,35,.05);
  }
  @media (max-width: 860px){ .hero{ grid-template-columns: 1fr; gap: 24px; } }
  .hero-preview{
    width: 100%; aspect-ratio: 4 / 3;
    border-radius: var(--radius-2xl); overflow: hidden;
    background: linear-gradient(180deg, #EEF0FF, #FBF8FF);
  }
  .hero-preview iframe{ width: 100%; height: 100%; border: 0; display: block; }
  .hero-body{ display: flex; flex-direction: column; padding: 16px 0; }
  .hero h1{
    font-family: var(--font-display); font-weight: 500;
    font-size: clamp(28px, 3.4vw, 40px); line-height: 1.05;
    letter-spacing: -0.02em; margin: 0 0 12px; text-wrap: balance;
  }
  .hero-value{
    font-size: var(--t-base); line-height: var(--lh-base); color: var(--fg-2);
    margin: 0 0 18px; text-wrap: pretty; max-width: 42ch;
  }
  .hero-meta{
    display: flex; flex-wrap: wrap; gap: 18px;
    margin: 0 0 22px;
  }
  .hero-meta .meta-item{ display: inline-flex; align-items: center; gap: 7px; color: var(--fg-2); font-size: 14px; font-weight: 500; }
  .hero-meta .meta-item .ms{ font-size: 19px; color: var(--purple-1); }
  .hero-cta{ display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: auto; }
  .btn-primary{
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 24px; border-radius: 9999px;
    background: linear-gradient(90deg, var(--purple-1), var(--purple-2));
    color: var(--white); text-decoration: none;
    font-family: var(--font-display); font-weight: 500; font-size: 18px;
    box-shadow: 0 10px 24px rgba(101,31,255,.32);
    transition: transform 140ms var(--ease-standard), box-shadow 140ms var(--ease-standard);
  }
  .btn-primary .ms{ font-size: 22px; }
  .btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 14px 30px rgba(101,31,255,.4); }
  .btn-primary:active{ transform: scale(0.97); }
  .btn-text{
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 24px; border-radius: 9999px;
    background: transparent; border: 0;
    color: var(--fg-1); text-decoration: none;
    font-family: var(--font-display); font-weight: 500; font-size: 18px;
    transition: background-color 140ms var(--ease-standard), transform 140ms var(--ease-standard);
  }
  .btn-text .ms{ font-size: 22px; }
  .btn-text:hover{ background: var(--purple-4); }
  .btn-text:active{ transform: scale(0.97); }

  /* ============ SECTIONS ============ */
  .sec{ margin-top: 44px; }
  .sec-head{ margin-bottom: 18px; }
  .sec-head h2{
    font-family: var(--font-display); font-weight: 500;
    font-size: clamp(24px, 3.4vw, 32px); letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .sec-head p{ margin: 0; color: var(--fg-3); font-size: var(--t-md); text-wrap: pretty; }

  .kit-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(258px, 1fr)); gap: 18px; }

  .kit-card{
    display: flex; flex-direction: column; gap: 12px;
    padding: 22px; border-radius: var(--radius-2xl);
    background: var(--white); text-decoration: none; color: var(--fg-1);
    box-shadow: 0 1px 2px rgba(35,35,35,.05), 0 8px 22px rgba(35,35,35,.07), inset 0 0 0 1px rgba(35,35,35,.05);
    transition: transform 160ms var(--ease-standard), box-shadow 160ms var(--ease-standard);
  }
  .kit-card:hover{ transform: translateY(-4px); box-shadow: 0 1px 2px rgba(35,35,35,.05), 0 18px 36px rgba(35,35,35,.12), inset 0 0 0 1px rgba(35,35,35,.08); }
  .kit-card:active{ transform: translateY(-1px) scale(0.99); }
  .kit-top{ display: flex; align-items: center; justify-content: space-between; }
  .kit-ic{
    width: 54px; height: 54px; border-radius: 15px;
    display: grid; place-items: center; color: var(--white);
    background: linear-gradient(150deg, #8B6FFF, #6240FF);
    box-shadow: 0 6px 14px rgba(101,31,255,.28);
  }
  .kit-ic .ms{ font-size: 28px; }
  .kit-ic--practice{ background: linear-gradient(150deg, #7C5CFF, #5A37E6); }
  .kit-xp{
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 500; color: var(--purple-1);
    background: var(--purple-4); padding: 6px 12px; border-radius: 9999px;
  }
  .kit-xp .ms{ font-size: 16px; }
  .kit-title{ font-family: var(--font-display); font-weight: 500; font-size: 20px; line-height: 1.15; margin: 4px 0 0; text-wrap: balance; }
  .kit-desc{ margin: 0; color: var(--fg-2); font-size: 15px; line-height: 1.4; text-wrap: pretty; flex: 1; }
  .kit-cta{
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--purple-1); font-weight: 500; font-size: 16px; margin-top: 4px;
  }
  .kit-cta .ms{ font-size: 20px; transition: transform 160ms var(--ease-standard); }
  .kit-card:hover .kit-cta .ms{ transform: translateX(3px); }

</style>
</head>
<body>

<div class="topbar">
  <a class="home-link" href="../../">← Все тренажёры</a>
  <span class="ctx-chip"><span class="ms">school</span> Физика · 8 класс</span>
</div>

<main class="kit">

  <!-- ============ HERO ============ -->
  <section class="hero">
    <div class="hero-preview">
      <iframe src="../?embed=1" title="3D-вольтметр" loading="lazy"></iframe>
    </div>
    <div class="hero-body">
      <h1>Вольтметр</h1>
      <p class="hero-value">Увлеките класс и покажите тему наглядно — на живом приборе, с анимациями и практикой.</p>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-cta">
        <a class="btn-primary" id="startBtn" href="../lesson-voltage/"><span class="ms">play_arrow</span> Провести урок</a>
        <a class="btn-text" href="../?embed=1&back=1&panel=1"><span class="ms">360</span> Показать прибор</a>
      </div>
    </div>
  </section>

  <!-- ============ ТЕМЫ УРОКА ============ -->
  <section class="sec">
    <div class="sec-head">
      <h2>Темы урока</h2>
    </div>
    <div class="kit-grid" id="lessonGrid"></div>
  </section>

  <!-- ============ ПРАКТИКА ============ -->
  <section class="sec">
    <div class="sec-head">
      <h2>Практика для учеников</h2>
    </div>
    <div class="kit-grid" id="practiceGrid"></div>
  </section>


</main>

<script type="module">
const LEVELS = [
  { id: 'voltage',  kind: 'theory',   title: 'Что такое напряжение', desc: 'Откуда берётся «напор» тока и зачем его измерять.', href: '../lesson-voltage/' },
  { id: 'device',   kind: 'theory',   title: 'Устройство прибора',  desc: 'Стрелка, шкала, клеммы — разбираем вольтметр по частям.', href: '../lesson-device/' },
  { id: 'price',    kind: 'theory',   title: 'Цена деления',        desc: 'Как определить, сколько вольт в одном делении шкалы.', href: '../lesson-price/' },
  { id: 'reading',  kind: 'theory',   title: 'Как снять показания',  desc: 'Читаем напряжение по положению стрелки.', href: '../lesson-reading/' },

  { id: 'quiz',     kind: 'practice', stars: 40, title: 'Тест по теории',     desc: 'Разные задания: выбрать ответ, соединить пары, поставить по порядку.', href: '../practice-quiz/' },
  { id: 'garland',  kind: 'practice', stars: 50, title: 'Новогодняя гирлянда', desc: 'Измерить напряжение на лампах и открыть закон U = U₁ + U₂.', href: '../practice-garland/' },
  { id: 'battery',  kind: 'practice', stars: 50, title: 'Аккумулятор авто',  desc: 'Проверить аккумулятор под нагрузкой: заряжен или сел.', href: '../practice-battery/' },
];

const ICONS = {
  voltage: 'bolt', device: 'search', price: 'straighten', reading: 'speed',
  quiz: 'fact_check', garland: 'lightbulb', battery: 'directions_car',
};

const lessons = LEVELS.filter(l => l.kind === 'theory');
const practices = LEVELS.filter(l => l.kind === 'practice');

// склонение
function plural(n, one, few, many){
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

/* ---------- «Провести урок» → первая тема ---------- */
document.getElementById('startBtn').href = lessons[0].href;

/* ---------- Строка тегов в герое ---------- */
const heroMeta = [
  { ic: 'auto_stories', text: `${lessons.length} ${plural(lessons.length, 'интерактивная тема', 'интерактивные темы', 'интерактивных тем')}` },
  { ic: '3d_rotation',  text: 'живой 3D-прибор' },
  { ic: 'construction', text: `${practices.length} ${plural(practices.length, 'практика', 'практики', 'практик')}` },
];
document.getElementById('heroMeta').innerHTML = heroMeta.map(m =>
  `<span class="meta-item"><span class="ms">${m.ic}</span> ${m.text}</span>`
).join('');

/* ---------- Карточки тем ---------- */
document.getElementById('lessonGrid').innerHTML = lessons.map((l) => `
  <a class="kit-card" href="${l.href}">
    <div class="kit-top">
      <div class="kit-ic"><span class="ms">${ICONS[l.id] || 'bolt'}</span></div>
    </div>
    <h3 class="kit-title">${l.title}</h3>
    <p class="kit-desc">${l.desc}</p>
    <span class="kit-cta">Открыть <span class="ms">arrow_forward</span></span>
  </a>`).join('');

/* ---------- Карточки практики ---------- */
document.getElementById('practiceGrid').innerHTML = practices.map(p => `
  <a class="kit-card" href="${p.href}">
    <div class="kit-top">
      <div class="kit-ic kit-ic--practice"><span class="ms">${ICONS[p.id] || 'construction'}</span></div>
      <span class="kit-xp"><span class="ms">bolt</span> +${p.stars} XP</span>
    </div>
    <h3 class="kit-title">${p.title}</h3>
    <p class="kit-desc">${p.desc}</p>
    <span class="kit-cta">Открыть <span class="ms">arrow_forward</span></span>
  </a>`).join('');

</script>

</body>
</html>
