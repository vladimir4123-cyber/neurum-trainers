<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Аккумулятор авто · Практика</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
<link rel="stylesheet" href="/assets/tokens.css">
<link rel="stylesheet" href="/assets/lesson/lesson.css">
<style>
  body{ --mascot-bottom: 108px; }

  .hint-link{
    border: 0; background: none; cursor: pointer;
    font-family: var(--font-sans); font-size: 16px; font-weight: 500;
    color: var(--purple-1); padding: 6px 10px; border-radius: 9999px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background-color 120ms var(--ease-standard);
  }
  .hint-link:hover{ background: var(--purple-4); }
  .hint-link:active{ transform: scale(0.96); }

  main.m-stage{
    max-width: 720px; margin: 0 auto;
    padding: 8px 20px 160px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    text-align: center;
  }
  .m-h1{
    font-family: var(--font-display); font-weight: 500;
    font-size: clamp(26px, 5vw, 38px); line-height: 1.12;
    color: var(--fg-1); letter-spacing: -0.02em; text-wrap: balance;
  }
  .m-lead{
    font-size: var(--t-md); line-height: 1.45; color: var(--fg-2);
    max-width: 34ch; text-wrap: pretty;
  }
  .m-lead b{ color: var(--purple-1); font-weight: 500; }

  .scene-card{
    width: 100%;
    background: #fff; border-radius: var(--radius-2xl);
    box-shadow: 0 8px 26px rgba(24,12,34,.08);
    padding: 20px 16px 12px;
  }
  .scene-svg{ width: 100%; max-width: 620px; height: auto; display: block; margin: 0 auto; }

  /* приборная стрелка */
  #needle{ transition: none; }

  /* вердикт-панель */
  .verdict{
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: 9999px;
    font-family: var(--font-sans); font-size: 18px; font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .verdict.idle{ background: var(--purple-4); color: var(--fg-3); }
  .verdict.ok{ background: var(--success-surface); color: var(--success); }
  .verdict.warn{ background: var(--warning-surface); color: var(--warning-ink); }
  .verdict.bad{ background: var(--danger-surface); color: var(--danger); }

  .act-btn{
    font-family: var(--font-sans); font-size: var(--t-md); font-weight: 500;
    color: #fff; background: var(--purple-1);
    border: 0; border-radius: 9999px; cursor: pointer;
    padding: 14px 30px;
    box-shadow: 0 6px 16px rgba(101,31,255,.28);
    transition: transform 120ms var(--ease-standard), box-shadow 120ms var(--ease-standard), opacity 150ms;
  }
  .act-btn:hover{ box-shadow: 0 8px 22px rgba(101,31,255,.34); }
  .act-btn:active{ transform: scale(0.96); }
  .act-btn:disabled{ opacity: .5; cursor: default; box-shadow: none; }

  /* фары/двигатель */
  .car-glow{ opacity: 0; transition: opacity .5s var(--ease-standard); }
  .car.on .car-glow{ opacity: 1; }
  .car.crank{ animation: shake .12s linear 6; }
  @keyframes shake{ 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(1.5px) } }

  /* финал */
  .m-stats{ display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
  .m-stat{
    background: #fff; border-radius: var(--radius-xl);
    box-shadow: 0 4px 14px rgba(24,12,34,.06);
    padding: 16px 22px; min-width: 120px;
  }
  .m-stat__val{
    font-family: var(--font-display); font-weight: 500; font-size: 32px;
    color: var(--purple-1); font-variant-numeric: tabular-nums;
  }
  .m-stat__lbl{ font-size: 15px; color: var(--fg-3); margin-top: 2px; }
</style>
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Выйти">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">3</span></span>
</div>

<main class="m-stage" id="stage"></main>

<div class="bottom" id="bottom"></div>

<script type="module">

/* ============================================================
   ПРАКТИКА «Аккумулятор авто» — проверка под нагрузкой.
   Автомобильный вольтметр 0–15 В (у авто-аккумулятора 12 В —
   6-вольтовый прибор не подошёл бы).
   Физика: у слабого (подсевшего) аккумулятора в покое напряжение
   выглядит почти нормальным (~12,5 В), но при пуске стартёра
   (большой ток) оно резко проседает (до ~8,6 В) — так его и ловят.
   Хороший аккумулятор под нагрузкой держит выше ~10,5 В.
   ============================================================ */

const V_REST = 12.5;   // напряжение в покое (на глаз норм)
const V_LOAD = 8.6;    // под нагрузкой (проседает в красную зону)
const V_MIN = 8, V_MAX = 16;   // шкала авто-вольтметра
const STORAGE_KEY = 'voltmeter-progress';
const XP = 50;

// Помощник-маскот на практике убран — остаётся только в уроках.
const mascot = { say(){}, setEmotion(){}, hide(){} };
const stageEl = document.getElementById('stage');
const bottomEl = document.getElementById('bottom');
const progressFill = document.getElementById('progressFill');
const stepNow = document.getElementById('stepNow');

const STEP_TOTAL = 3;   // интро · в покое · под нагрузкой
function setProgress(i) {
  progressFill.style.width = (i / STEP_TOTAL) * 100 + '%';
  stepNow.textContent = Math.min(i + 1, STEP_TOTAL);
}

let hintIdx = 0;
const HINTS = [
  'Сначала снимай показания в покое — двигатель заглушен.',
  'В покое напряжение может выглядеть нормальным. Главная проверка — под нагрузкой.',
  'Проверни стартёр и смотри: если напряжение резко падает — аккумулятор слабый.',
];
function showHint() {
  mascot.say(HINTS[hintIdx % HINTS.length], { emotion: 'think', duration: 5000 });
  hintIdx++;
}

/* ---------- геометрия авто-вольтметра ---------- */
const GX = 430, GY = 322, GR = 92;                 // центр и радиус циферблата
const angle = v => -120 + (v - V_MIN) / (V_MAX - V_MIN) * 240;   // 0° = вверх
function arcPath(a0, a1, r) {
  const p0 = [GX + r * Math.sin(a0 * Math.PI / 180), GY - r * Math.cos(a0 * Math.PI / 180)];
  const p1 = [GX + r * Math.sin(a1 * Math.PI / 180), GY - r * Math.cos(a1 * Math.PI / 180)];
  const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
  return `M${p0[0].toFixed(1)} ${p0[1].toFixed(1)} A${r} ${r} 0 ${large} 1 ${p1[0].toFixed(1)} ${p1[1].toFixed(1)}`;
}

function gaugeSVG() {
  // цветные зоны
  const zones = `
    <path d="${arcPath(angle(8), angle(11), GR - 6)}" stroke="#E5484D" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="${arcPath(angle(11), angle(12.4), GR - 6)}" stroke="#F5A623" stroke-width="10" fill="none"/>
    <path d="${arcPath(angle(12.4), angle(15), GR - 6)}" stroke="#07BE7E" stroke-width="10" fill="none" stroke-linecap="round"/>`;
  // деления и числа
  let ticks = '';
  for (let v = V_MIN; v <= V_MAX; v++) {
    const a = angle(v);
    const major = v % 2 === 0;
    const rOut = GR - 14, rIn = rOut - (major ? 15 : 9);
    const s = [GX + rOut * Math.sin(a * Math.PI / 180), GY - rOut * Math.cos(a * Math.PI / 180)];
    const e = [GX + rIn * Math.sin(a * Math.PI / 180), GY - rIn * Math.cos(a * Math.PI / 180)];
    ticks += `<line x1="${s[0].toFixed(1)}" y1="${s[1].toFixed(1)}" x2="${e[0].toFixed(1)}" y2="${e[1].toFixed(1)}" stroke="#EDEFF5" stroke-width="${major ? 3 : 2}"/>`;
    if (major) {
      const rt = rIn - 14;
      const t = [GX + rt * Math.sin(a * Math.PI / 180), GY - rt * Math.cos(a * Math.PI / 180)];
      ticks += `<text x="${t[0].toFixed(1)}" y="${(t[1] + 6).toFixed(1)}" text-anchor="middle" font-family="var(--font-display)" font-weight="500" font-size="16" fill="#EDEFF5">${v}</text>`;
    }
  }
  return `
    <g>
      <circle cx="${GX}" cy="${GY}" r="${GR + 10}" fill="#20242E"/>
      <circle cx="${GX}" cy="${GY}" r="${GR + 4}" fill="#2E323C"/>
      <circle cx="${GX}" cy="${GY}" r="${GR}" fill="#171A21"/>
      ${zones}
      ${ticks}
      <text x="${GX}" y="${GY + 44}" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="22" fill="#8B90A0">V</text>
      <!-- стрелка -->
      <g id="needle" transform="rotate(${angle(V_MIN)} ${GX} ${GY})">
        <line x1="${GX}" y1="${GY}" x2="${GX}" y2="${GY - (GR - 20)}" stroke="#E5484D" stroke-width="4" stroke-linecap="round"/>
        <line x1="${GX}" y1="${GY}" x2="${GX}" y2="${GY + 16}" stroke="#E5484D" stroke-width="5" stroke-linecap="round"/>
      </g>
      <circle cx="${GX}" cy="${GY}" r="9" fill="#EDEFF5"/>
      <circle cx="${GX}" cy="${GY}" r="4" fill="#20242E"/>
    </g>`;
}

/* ---------- машина + аккумулятор + клеммы ---------- */
function carBatterySVG() {
  return `
    <!-- машина (спит / заводится) -->
    <g class="car" id="car">
      <!-- свечение фары -->
      <ellipse class="car-glow" cx="332" cy="92" rx="46" ry="30" fill="url(#headGlow)"/>
      <!-- кузов -->
      <path d="M70 118 Q78 118 84 108 L118 74 Q126 64 142 64 L228 64 Q244 64 252 76 L272 104 L318 110 Q330 112 330 124 L330 128 Q330 138 320 138 L92 138 Q70 138 70 122 Z"
            fill="url(#carBody)"/>
      <!-- крыша-стекло -->
      <path d="M124 78 L142 74 L214 74 Q226 74 232 84 L246 104 L150 104 Q132 104 132 92 Z" fill="#BFE0F5"/>
      <line x1="188" y1="74" x2="196" y2="104" stroke="#8Fb8d6" stroke-width="2.5"/>
      <!-- фара -->
      <circle class="car-glow" cx="322" cy="112" r="9" fill="#FFF3C9"/>
      <circle cx="322" cy="112" r="9" fill="none" stroke="#7B8090" stroke-width="2"/>
      <!-- колёса -->
      <circle cx="130" cy="140" r="22" fill="#20242E"/><circle cx="130" cy="140" r="9" fill="#9AA0AA"/>
      <circle cx="268" cy="140" r="22" fill="#20242E"/><circle cx="268" cy="140" r="9" fill="#9AA0AA"/>
    </g>

    <!-- аккумулятор 12 В -->
    <g id="battery">
      <rect x="96" y="250" width="150" height="86" rx="12" fill="url(#battBody)"/>
      <rect x="96" y="250" width="150" height="26" rx="12" fill="#2B2F39"/>
      <!-- клеммы -->
      <rect x="120" y="238" width="20" height="18" rx="4" fill="#C9402F"/>
      <circle cx="130" cy="238" r="9" fill="#E5484D"/>
      <text x="130" y="243" text-anchor="middle" font-family="var(--font-display)" font-weight="500" font-size="15" fill="#fff">+</text>
      <rect x="202" y="238" width="20" height="18" rx="4" fill="#2B2F39"/>
      <circle cx="212" cy="238" r="9" fill="#3B3F4A"/>
      <text x="212" y="244" text-anchor="middle" font-family="var(--font-display)" font-weight="500" font-size="17" fill="#fff">−</text>
      <text x="171" y="304" text-anchor="middle" font-family="var(--font-display)" font-weight="500" font-size="26" fill="#EDEFF5">12 В</text>
      <text x="171" y="324" text-anchor="middle" font-family="var(--font-sans)" font-size="13" fill="#9AA0AA">аккумулятор</text>
    </g>

    <!-- провода-щупы к прибору -->
    <path d="M130 238 Q150 180 ${GX - 34} 250" fill="none" stroke="#E5484D" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M212 238 Q300 200 ${GX + 30} 246" fill="none" stroke="#2B2B33" stroke-width="4.5" stroke-linecap="round"/>`;
}

function sceneSVG() {
  return `
    <svg class="scene-svg" viewBox="0 0 600 440" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#7C5CFF"/><stop offset="1" stop-color="#5A3FE0"/>
        </linearGradient>
        <linearGradient id="battBody" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#3B3F4A"/><stop offset="1" stop-color="#20242E"/>
        </linearGradient>
        <radialGradient id="headGlow" cx=".5" cy=".5" r=".5">
          <stop offset="0" stop-color="#FFE89C" stop-opacity=".9"/><stop offset="1" stop-color="#FFE89C" stop-opacity="0"/>
        </radialGradient>
      </defs>
      ${carBatterySVG()}
      ${gaugeSVG()}
    </svg>`;
}

/* плавно двигаем стрелку от текущего значения к value */
let curV = V_MIN;
function animateNeedle(toV, dur = 850) {
  const from = curV, to = toV, t0 = performance.now();
  const ease = t => 1 - Math.pow(1 - t, 3);
  function frame(now) {
    const k = Math.min(1, (now - t0) / dur);
    const v = from + (to - from) * ease(k);
    const nd = document.getElementById('needle');
    if (nd) nd.setAttribute('transform', `rotate(${angle(v)} ${GX} ${GY})`);
    if (k < 1) requestAnimationFrame(frame);
    else curV = to;
  }
  requestAnimationFrame(frame);
}

/* ---------- ЭКРАНЫ ---------- */
function renderIntro() {
  setProgress(0);
  curV = V_MIN;
  stageEl.innerHTML = `
    <div class="scene-card">${sceneSVG()}</div>
    <h1 class="m-h1">Машина не заводится</h1>
    <p class="m-lead">Утро, мороз — машина молчит. Подозрение на <b>аккумулятор</b>. Проверим его автомобильным вольтметром: заряжен он или сел?</p>`;
  bottomEl.innerHTML = `<button class="btn-continue" id="go">Взять вольтметр →</button>`;
  document.getElementById('go').onclick = renderRest;
  mascot.say('Проверим аккумулятор — как настоящий механик!', { emotion: 'idle', duration: 4500 });
}

function renderRest() {
  setProgress(1);
  curV = V_MIN;
  stageEl.innerHTML = `
    <div class="scene-card">${sceneSVG()}</div>
    <div class="m-lead" id="restText">Двигатель заглушен. Сними показания — <b>напряжение в покое</b>.</div>
    <span class="verdict idle" id="restVerdict">жду замера</span>
    <button class="act-btn" id="measureBtn">🔌 Снять показания</button>
    <button class="hint-link" id="hintBtn">💡 Нужна подсказка?</button>`;
  bottomEl.innerHTML = `
    <button class="btn-back" id="toHub">← К темам</button>
    <button class="btn-continue" id="next" disabled>Дальше →</button>`;
  document.getElementById('toHub').onclick = () => { location.href = '../demo/'; };
  document.getElementById('next').onclick = renderLoad;
  document.getElementById('hintBtn').onclick = showHint;
  document.getElementById('measureBtn').onclick = () => {
    animateNeedle(V_REST);
    const v = document.getElementById('restVerdict');
    v.className = 'verdict ok';
    v.textContent = '≈ 12,5 В — на глаз заряжен';
    document.getElementById('restText').innerHTML = 'Странно: <b>12,5 В</b> — почти как заряженный. Но машина не заводится… Проверим под нагрузкой.';
    document.getElementById('measureBtn').disabled = true;
    document.getElementById('next').disabled = false;
    mascot.say('12,5 В — вроде норм. Но настоящая проверка — под нагрузкой!', { emotion: 'think', duration: 5000 });
  };
  mascot.say('Приложи прибор к аккумулятору — двигатель заглушен.', { emotion: 'idle', duration: 4500 });
}

function renderLoad() {
  setProgress(2);
  curV = V_REST;
  stageEl.innerHTML = `
    <div class="scene-card">${sceneSVG()}</div>
    <div class="m-lead" id="loadText">Теперь <b>проверни стартёр</b> — при пуске мотор тянет большой ток. Смотри на прибор.</div>
    <span class="verdict ok" id="loadVerdict">сейчас: 12,5 В</span>
    <button class="act-btn" id="crankBtn">🔑 Проверни стартёр</button>
    <button class="hint-link" id="hintBtn">💡 Нужна подсказка?</button>`;
  // стрелка стоит на 12,5 из прошлого шага
  requestAnimationFrame(() => {
    const nd = document.getElementById('needle');
    if (nd) nd.setAttribute('transform', `rotate(${angle(V_REST)} ${GX} ${GY})`);
  });
  bottomEl.innerHTML = `
    <button class="btn-back" id="toHub">← К темам</button>
    <button class="btn-continue" id="next" disabled>Поставить диагноз →</button>`;
  document.getElementById('toHub').onclick = () => { location.href = '../demo/'; };
  document.getElementById('next').onclick = renderFinale;
  document.getElementById('hintBtn').onclick = showHint;
  document.getElementById('crankBtn').onclick = () => {
    const car = document.getElementById('car');
    car.classList.add('crank');
    setTimeout(() => car.classList.remove('crank'), 800);
    animateNeedle(V_LOAD, 700);
    const v = document.getElementById('loadVerdict');
    v.className = 'verdict bad';
    v.textContent = '⚡ просело до 8,6 В — красная зона!';
    document.getElementById('loadText').innerHTML = 'Вот в чём дело! Под нагрузкой напряжение <b>рухнуло до 8,6 В</b> — в красную зону. Аккумулятор слабый и не тянет запуск.';
    document.getElementById('crankBtn').disabled = true;
    document.getElementById('next').disabled = false;
    mascot.say('Видишь? Под нагрузкой напряжение провалилось. Аккумулятор сел!', { emotion: 'wow', duration: 6000 });
  };
  mascot.say('Проверни стартёр и следи за стрелкой!', { emotion: 'idle', duration: 4500 });
}

function renderFinale() {
  progressFill.style.width = '100%';
  stepNow.textContent = STEP_TOTAL;
  saveProgress();
  fireConfetti();
  curV = 12.5;
  mascot.say('Диагноз верный! Зарядили — и машина ожила. С ветерком! 🚗', { emotion: 'wow', duration: 7000 });

  stageEl.innerHTML = `
    <div class="scene-card">${sceneSVG()}</div>
    <h1 class="m-h1">Диагноз поставлен! 🚗</h1>
    <div class="m-lead">
      В покое аккумулятор показывал <b>12,5 В</b> — почти норма. Но <b>под нагрузкой</b> напряжение рухнуло до <b>8,6 В</b>. Значит, аккумулятор сел — его надо зарядить или заменить.
    </div>
    <p class="m-lead" style="color:var(--fg-1);">Главное правило: <b>слабый аккумулятор выдаёт себя под нагрузкой</b> — в покое он может выглядеть нормально.</p>
    <div class="m-stats">
      <div class="m-stat"><div class="m-stat__val">2</div><div class="m-stat__lbl">замера сделано</div></div>
      <div class="m-stat"><div class="m-stat__val">+${XP}</div><div class="m-stat__lbl">XP за практику</div></div>
    </div>`;
  // машина завелась — фары горят, стрелка на «заряжен под зарядкой»
  requestAnimationFrame(() => {
    document.getElementById('car').classList.add('on');
    const nd = document.getElementById('needle');
    if (nd) nd.setAttribute('transform', `rotate(${angle(13.8)} ${GX} ${GY})`);
  });

  bottomEl.innerHTML = `<button class="btn-continue" id="toHub">К темам →</button>`;
  document.getElementById('toHub').onclick = () => { location.href = '../demo/'; };
}

/* ---------- прогресс + конфетти ---------- */
function saveProgress() {
  // ⏸ Сохранение прогресса временно отключено (сбрасывается при обновлении).
  //    Чтобы вернуть — раскомментировать блок ниже.
  // const st = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  // if (typeof st.xp !== 'number') st.xp = 0;
  // if (!st.completed) st.completed = [];
  // if (!st.completed.includes('battery')) { st.completed.push('battery'); st.xp += XP; }
  // localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
}

function fireConfetti() {
  const box = document.createElement('div');
  box.className = 'confetti';
  const colors = ['#6240FF', '#CDFE00', '#FFD769', '#07BE7E', '#FF6B9D', '#149ECA'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('span');
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (2.4 + Math.random() * 1.8) + 's';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    box.appendChild(p);
  }
  document.body.appendChild(box);
  setTimeout(() => box.remove(), 5000);
}

/* ---------- старт ---------- */
renderIntro();
</script>

</body>
</html>
