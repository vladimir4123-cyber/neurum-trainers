<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Аккумулятор авто · Практика</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
<link rel="stylesheet" href="/assets/tokens.css">
<link rel="stylesheet" href="/assets/lesson/lesson.css?v=3">
<link rel="stylesheet" href="/assets/lesson/practice.css?v=4">
<style>
  /* ---------- сцена: машина + аккумулятор + прибор ---------- */
  .car-glow{ opacity: 0; }

  /* клеммы-цели: пульсирующее кольцо приглашает нажать */
  .term{ cursor: pointer; }
  .term-ring{
    transform-box: fill-box; transform-origin: center;
    animation: ringPulse 1.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes ringPulse{
    0%, 100%{ opacity: .9; transform: scale(1); }
    50%    { opacity: .35; transform: scale(1.18); }
  }

  /* тряска машины, пока крутится стартёр */
  #carGroup.crank{ animation: carShake .12s linear infinite; }
  @keyframes carShake{
    0%, 100%{ transform: translateY(0); }
    50%     { transform: translateY(1.6px); }
  }

  /* кнопка «держи стартёр» */
  .hold-btn{
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 14px; padding: 14px 28px;
    border: 0; border-radius: var(--radius-md);
    background: var(--purple-1); color: #fff;
    font-family: var(--font-sans); font-size: 16px; font-weight: 500;
    cursor: pointer; box-shadow: var(--shadow-purple);
    user-select: none; -webkit-user-select: none; touch-action: none;
    transition: background-color 120ms var(--ease-standard), transform 120ms var(--ease-standard);
  }
  .hold-btn.is-on{ background: #4A2FD9; transform: scale(0.97); }

  /* сводка замеров на шаге диагноза */
  .diag-sum{ display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .diag-chip{
    padding: 12px 20px; border-radius: 9999px;
    background: var(--purple-4); color: var(--fg-2); font-size: 16px;
  }
  .diag-chip b{ color: var(--fg-1); font-weight: 500; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Выйти">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">4</span></span>
</div>

<main id="stage"></main>

<div class="bottom" id="bottom"></div>

<script type="module">
import { runPractice } from '/assets/lesson/practice-engine.js?v=4';

/* ============================================================
   ПРАКТИКА «Аккумулятор авто» — проверка под нагрузкой.
   Ученик всё делает сам: подключает щупы (полярность!), читает
   шкалу в покое и под нагрузкой, вписывает значения и ставит
   диагноз. Состояние батареи случайное — каждый запуск другой.
   Физика: у изношенной батареи напряжение в покое выглядит
   нормальным, но при пуске стартёра (большой ток) резко проседает.
   ============================================================ */

/* ---------- авто-вольтметр: шкала 8–16 В ---------- */
const V_MIN = 8, V_MAX = 16;
const GX = 430, GY = 322, GR = 92;
const angle = v => -120 + (v - V_MIN) / (V_MAX - V_MIN) * 240;
const fmt = v => String(v).replace('.', ',');

function arcPath(a0, a1, r) {
  const p0 = [GX + r * Math.sin(a0 * Math.PI / 180), GY - r * Math.cos(a0 * Math.PI / 180)];
  const p1 = [GX + r * Math.sin(a1 * Math.PI / 180), GY - r * Math.cos(a1 * Math.PI / 180)];
  const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
  return `M${p0[0].toFixed(1)} ${p0[1].toFixed(1)} A${r} ${r} 0 ${large} 1 ${p1[0].toFixed(1)} ${p1[1].toFixed(1)}`;
}

function gaugeSVG() {
  const zones = `
    <path d="${arcPath(angle(8), angle(11), GR - 6)}" stroke="#E5484D" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="${arcPath(angle(11), angle(12.4), GR - 6)}" stroke="#F5A623" stroke-width="10" fill="none"/>
    <path d="${arcPath(angle(12.4), angle(15), GR - 6)}" stroke="#07BE7E" stroke-width="10" fill="none" stroke-linecap="round"/>`;
  let ticks = '';
  for (let v = V_MIN; v <= V_MAX; v++) {
    const a = angle(v), major = v % 2 === 0;
    const rOut = GR - 14, rIn = rOut - (major ? 15 : 9);
    const s = [GX + rOut * Math.sin(a * Math.PI / 180), GY - rOut * Math.cos(a * Math.PI / 180)];
    const e = [GX + rIn * Math.sin(a * Math.PI / 180), GY - rIn * Math.cos(a * Math.PI / 180)];
    ticks += `<line x1="${s[0].toFixed(1)}" y1="${s[1].toFixed(1)}" x2="${e[0].toFixed(1)}" y2="${e[1].toFixed(1)}" stroke="#EDEFF5" stroke-width="${major ? 3 : 2}"/>`;
    if (major) {
      const rt = rIn - 14;
      const t = [GX + rt * Math.sin(a * Math.PI / 180), GY - rt * Math.cos(a * Math.PI / 180)];
      ticks += `<text x="${t[0].toFixed(1)}" y="${(t[1] + 6).toFixed(1)}" text-anchor="middle" font-family="var(--font-display)" font-weight="500" font-size="16" fill="#EDEFF5">${v}</text>`;
    }
  }
  return `
    <circle cx="${GX}" cy="${GY}" r="${GR + 10}" fill="#20242E"/>
    <circle cx="${GX}" cy="${GY}" r="${GR + 4}" fill="#2E323C"/>
    <circle cx="${GX}" cy="${GY}" r="${GR}" fill="#171A21"/>
    ${zones}
    ${ticks}
    <text x="${GX}" y="${GY + 44}" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="22" fill="#8B90A0">V</text>
    <g id="needle" transform="rotate(${angle(curV)} ${GX} ${GY})">
      <line x1="${GX}" y1="${GY}" x2="${GX}" y2="${GY - (GR - 20)}" stroke="#E5484D" stroke-width="4" stroke-linecap="round"/>
      <line x1="${GX}" y1="${GY}" x2="${GX}" y2="${GY + 16}" stroke="#E5484D" stroke-width="5" stroke-linecap="round"/>
    </g>
    <circle cx="${GX}" cy="${GY}" r="9" fill="#EDEFF5"/>
    <circle cx="${GX}" cy="${GY}" r="4" fill="#20242E"/>`;
}

/* ---------- состояние сцены ---------- */
let scen = null;            // {kind, rest, load, plusLeft}
let redOn = null;           // 'L' | 'R' — куда встал красный щуп
let blackOn = null;
let curV = V_MIN;
let animId = 0;

const TERM_X = { L: 130, R: 212 }, TERM_Y = 238;
const termPol = t => ((t === 'L') === scen.plusLeft ? '+' : '-');

function setNeedleNow(v) {
  curV = v;
  const nd = document.getElementById('needle');
  if (nd) nd.setAttribute('transform', `rotate(${angle(v)} ${GX} ${GY})`);
}
function animateNeedle(toV, dur = 700) {
  cancelAnimationFrame(animId);
  const from = curV, t0 = performance.now();
  const ease = t => 1 - Math.pow(1 - t, 3);
  const frame = now => {
    const k = Math.min(1, (now - t0) / dur);
    setNeedleNow(from + (toV - from) * ease(k));
    if (k < 1) animId = requestAnimationFrame(frame);
  };
  animId = requestAnimationFrame(frame);
}

function batterySVG() {
  const plusX = scen.plusLeft ? TERM_X.L : TERM_X.R;
  const minusX = scen.plusLeft ? TERM_X.R : TERM_X.L;
  return `
    <rect x="96" y="250" width="150" height="86" rx="12" fill="url(#battBody)"/>
    <rect x="96" y="250" width="150" height="26" rx="12" fill="#2B2F39"/>
    <rect x="${plusX - 10}" y="238" width="20" height="18" rx="4" fill="#C9402F"/>
    <circle cx="${plusX}" cy="${TERM_Y}" r="9" fill="#E5484D"/>
    <text x="${plusX}" y="${TERM_Y + 5}" text-anchor="middle" font-family="var(--font-display)" font-weight="500" font-size="15" fill="#fff">+</text>
    <rect x="${minusX - 10}" y="238" width="20" height="18" rx="4" fill="#2B2F39"/>
    <circle cx="${minusX}" cy="${TERM_Y}" r="9" fill="#3B3F4A"/>
    <text x="${minusX}" y="${TERM_Y + 6}" text-anchor="middle" font-family="var(--font-display)" font-weight="500" font-size="17" fill="#fff">−</text>
    <text x="171" y="304" text-anchor="middle" font-family="var(--font-display)" font-weight="500" font-size="26" fill="#EDEFF5">12 В</text>
    <text x="171" y="324" text-anchor="middle" font-family="var(--font-sans)" font-size="13" fill="#9AA0AA">аккумулятор</text>`;
}

/* щупы: висят свободно или подключены к клеммам */
function leadsSVG(withTargets) {
  const RED_OX = 398, BLK_OX = 462;
  const parts = [];
  const lead = (ox, t, color) => `
    <path d="M${ox} 420 Q ${(ox + TERM_X[t]) / 2} 455, ${TERM_X[t]} 248" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="${TERM_X[t]}" cy="${TERM_Y}" r="8" fill="${color}"/>
    <circle cx="${TERM_X[t]}" cy="${TERM_Y}" r="3" fill="#fff"/>`;
  const tip = (ox, color) => `
    <line x1="${ox}" y1="430" x2="${ox}" y2="414" stroke="${color}" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="${ox}" cy="410" r="6" fill="${color}"/>`;
  parts.push(redOn ? lead(RED_OX, redOn, '#E5484D') : tip(RED_OX, '#E5484D'));
  parts.push(blackOn ? lead(BLK_OX, blackOn, '#2B2B33') : tip(BLK_OX, '#2B2B33'));
  if (withTargets) {
    ['L', 'R'].forEach(t => {
      if (redOn === t || blackOn === t) return;
      parts.push(`
        <circle class="term-ring" cx="${TERM_X[t]}" cy="${TERM_Y}" r="16" fill="none" stroke="#6240FF" stroke-width="2.5" stroke-dasharray="4 5"/>
        <circle class="term" data-t="${t}" cx="${TERM_X[t]}" cy="${TERM_Y}" r="22" fill="transparent"/>`);
    });
  }
  return parts.join('');
}

function sceneSVG(opts = {}) {
  return `
    <svg viewBox="0 0 600 440" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#7C5CFF"/><stop offset="1" stop-color="#5A3FE0"/>
        </linearGradient>
        <linearGradient id="battBody" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#3B3F4A"/><stop offset="1" stop-color="#20242E"/>
        </linearGradient>
      </defs>
      <g id="carGroup">
        <path d="M70 118 Q78 118 84 108 L118 74 Q126 64 142 64 L228 64 Q244 64 252 76 L272 104 L318 110 Q330 112 330 124 L330 128 Q330 138 320 138 L92 138 Q70 138 70 122 Z" fill="url(#carBody)"/>
        <path d="M124 78 L142 74 L214 74 Q226 74 232 84 L246 104 L150 104 Q132 104 132 92 Z" fill="#BFE0F5"/>
        <line x1="188" y1="74" x2="196" y2="104" stroke="#8Fb8d6" stroke-width="2.5"/>
        <circle cx="322" cy="112" r="9" fill="none" stroke="#7B8090" stroke-width="2"/>
        <circle cx="130" cy="140" r="22" fill="#20242E"/><circle cx="130" cy="140" r="9" fill="#9AA0AA"/>
        <circle cx="268" cy="140" r="22" fill="#20242E"/><circle cx="268" cy="140" r="9" fill="#9AA0AA"/>
      </g>
      ${batterySVG()}
      ${gaugeSVG()}
      ${leadsSVG(opts.targets)}
    </svg>`;
}

/* ---------- сценарий (случайный при каждом запуске) ---------- */
function makeScenario(level, rnd) {
  // easy — целые вольты, medium/hard — половинки
  const snap = level === 'easy' ? (v => Math.round(v)) : (v => Math.round(v * 2) / 2);
  const kinds = level === 'easy' ? ['good', 'dead'] : ['good', 'dead', 'surface'];
  const kind = kinds[Math.floor(rnd() * kinds.length)];
  let rest, load;
  if (kind === 'good')    { rest = snap(12.5 + rnd() * 0.5); load = snap(10.6 + rnd() * 0.9); }
  if (kind === 'dead')    { rest = snap(11.0 + rnd() * 0.8); load = snap(8.0 + rnd() * 1.0);  }
  if (kind === 'surface') { rest = snap(12.5 + rnd() * 0.3); load = snap(8.8 + rnd() * 0.7);  }
  const plusLeft = level === 'hard' ? rnd() < 0.5 : true;
  return { kind, rest, load, plusLeft };
}

/* ---------- рендеры сцен по шагам ---------- */
function renderConnect(host, ctx) {
  let locked = false;
  const draw = () => {
    host.innerHTML = sceneSVG({ targets: true }) + `<div class="p-hintline" id="phaseHint"></div>`;
    setNeedleNow(curV);
    const hint = host.querySelector('#phaseHint');
    hint.innerHTML = !redOn
      ? 'Сначала <b>красный</b> щуп: нажми на клемму «+».'
      : (!blackOn ? 'Теперь <b>чёрный</b> щуп — на вторую клемму.' : 'Прибор подключён.');
    if (!locked) {
      host.querySelectorAll('.term').forEach(el =>
        el.addEventListener('click', () => onTerm(el.dataset.t)));
    }
  };
  const onTerm = t => {
    if (locked) return;
    if (!redOn) { redOn = t; draw(); return; }
    if (blackOn || t === redOn) return;
    blackOn = t;
    locked = true;
    draw();
    if (termPol(redOn) === '+') {
      ctx.fb('✓ Полярность верная — вольтметр в цепи, стрелка ожила.', 'ok');
      animateNeedle(scen.rest, 900);
      ctx.done();
    } else {
      ctx.miss();
      ctx.fb('Стрелка легла влево за ноль — полярность перепутана! Красный щуп должен стоять на «+».', 'err');
      animateNeedle(V_MIN - 0.5, 400);
      setTimeout(() => {
        redOn = null; blackOn = null; locked = false; curV = V_MIN;
        draw();
        ctx.fb('Попробуй ещё раз: сначала красный — на «+».', 'hint');
      }, 1400);
    }
  };
  draw();
}

function renderRest(host) {
  host.innerHTML = sceneSVG();
  setNeedleNow(scen.rest);
}

function renderCrank(host) {
  host.innerHTML = sceneSVG() + `
    <div style="text-align:center">
      <button class="hold-btn" id="crankBtn">🔑 Держи — стартёр крутит</button>
    </div>`;
  setNeedleNow(scen.rest);
  const btn = host.querySelector('#crankBtn');
  const down = e => {
    e.preventDefault();
    try { btn.setPointerCapture(e.pointerId); } catch (err) {}
    btn.classList.add('is-on');
    const car = host.querySelector('#carGroup');
    if (car) car.classList.add('crank');
    animateNeedle(scen.load, 450);
  };
  const up = () => {
    if (!btn.isConnected) return;
    btn.classList.remove('is-on');
    const car = host.querySelector('#carGroup');
    if (car) car.classList.remove('crank');
    animateNeedle(scen.rest, 900);
  };
  btn.addEventListener('pointerdown', down);
  btn.addEventListener('pointerup', up);
  btn.addEventListener('pointercancel', up);
}

function renderSummary(host) {
  host.innerHTML = `
    <div class="diag-sum">
      <span class="diag-chip">В покое: <b>${fmt(scen.rest)} В</b></span>
      <span class="diag-chip">Под нагрузкой: <b>${fmt(scen.load)} В</b></span>
    </div>`;
}

/* ---------- шаги миссии ---------- */
function buildSteps(level, rnd) {
  scen = makeScenario(level, rnd);
  redOn = null; blackOn = null; curV = V_MIN;
  const tol = level === 'easy' ? 0.45 : 0.3;

  const near = v => Number.isInteger(v)
    ? `Стрелка стоит ровно на делении <b>${fmt(v)}</b>.`
    : `Стрелка замерла между <b>${Math.floor(v)}</b> и <b>${Math.floor(v) + 1}</b> — посередине.`;

  const explain = scen.kind === 'good'
    ? `в покое ${fmt(scen.rest)} В и под нагрузкой ${fmt(scen.load)} В — выше 10,5 В. Батарея заряжена и держит.`
    : scen.kind === 'dead'
      ? `в покое всего ${fmt(scen.rest)} В, а под нагрузкой ${fmt(scen.load)} В. Батарея разряжена — на зарядку.`
      : `в покое ${fmt(scen.rest)} В — как у заряженной, но под нагрузкой рухнуло до ${fmt(scen.load)} В. Это износ.`;

  return [
    {
      type: 'action',
      title: 'Подключи вольтметр',
      text: level === 'hard'
        ? 'Красный щуп — на «+», чёрный — на «−». Внимательно: клеммы могут стоять с любой стороны.'
        : 'Красный щуп — на «+», чёрный — на «−». Нажимай на клеммы аккумулятора.',
      render: renderConnect,
    },
    {
      type: 'reading',
      title: 'Замер в покое',
      text: 'Двигатель заглушен. Прочитай, что показывает стрелка, и впиши значение.',
      render: renderRest,
      answer: scen.rest, tolerance: tol,
      right: `✓ Точно: в покое ${fmt(scen.rest)} В.`,
      hints: [
        'Цена деления — 1 В: между подписанными числами два деления. Если стрелка встала между делениями — это половина, 0,5.',
        near(scen.rest),
      ],
    },
    {
      type: 'reading',
      title: 'Замер под нагрузкой',
      text: 'Держи кнопку стартёра и следи за стрелкой. Отпусти — и впиши, до скольких вольт она проседала.',
      render: renderCrank,
      answer: scen.load, tolerance: tol,
      right: `✓ Записали: под нагрузкой ${fmt(scen.load)} В.`,
      hints: [
        'Смотри на стрелку, пока держишь кнопку, — нужно самое низкое значение. Можно подержать ещё раз.',
        near(scen.load),
      ],
    },
    {
      type: 'choice',
      title: 'Поставь диагноз',
      text: 'Правило механика: заряженный аккумулятор в покое даёт около <b>12,6 В</b>, а под нагрузкой исправный не проседает ниже <b>10,5 В</b>.',
      render: renderSummary,
      options: [
        { text: 'Заряжен и держит нагрузку — всё в порядке', correct: scen.kind === 'good' },
        { text: 'Разряжен — нужно зарядить', correct: scen.kind === 'dead' },
        { text: 'В покое как заряженный, но под нагрузкой проседает — изношен', correct: scen.kind === 'surface' },
        { text: 'Вольтметр подключён с неправильной полярностью', correct: false },
      ],
      right: '✓ Верно: ' + explain,
      wrong: 'Смотри на числа: ' + explain,
    },
  ];
}

/* ---------- запуск ---------- */
runPractice({
  practiceId: 'battery',
  storageKey: 'voltmeter-progress',
  homeHref: '../demo/',
  title: 'Аккумулятор авто',
  subtitle: 'Утро, мороз — машина не заводится. Проверь аккумулятор вольтметром и поставь диагноз, как настоящий механик.',
  levels: {
    easy:   { label: 'Разминка',  desc: 'Целые значения на шкале и подсказки на каждом шагу.', xp: 30 },
    medium: { label: 'Уверенный', desc: 'Значения с половинками — и случай-ловушка в диагнозе.', xp: 50 },
    hard:   { label: 'Механик',   desc: 'Клеммы стоят как попало, допуск строже, диагноз хитрее.', xp: 80 },
  },
  buildSteps,
});
</script>

</body>
</html>
