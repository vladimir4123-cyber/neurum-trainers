<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Устройство прибора · Вольтметр</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
<link rel="stylesheet" href="/assets/tokens.css">
<link rel="stylesheet" href="/assets/lesson/lesson.css">
</head>
<body>

<div class="top">
  <a class="close-btn" href="../demo/" aria-label="Закрыть">✕</a>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="step-counter"><span id="stepNow">1</span> / <span id="stepTotal">1</span></span>
</div>

<main id="stepHost"></main>

<div class="feedback" id="feedback">
  <div class="fb-icon" id="fbIcon">✓</div>
  <div class="fb-body">
    <p class="fb-title" id="fbTitle"></p>
    <p class="fb-hint" id="fbHint"></p>
  </div>
</div>

<div class="bottom">
  <button class="btn-back" id="backBtn" hidden>← Назад</button>
  <button class="btn-continue" id="continueBtn" disabled>Дальше</button>
</div>

<script type="module">
import { runLesson } from '/assets/lesson/lesson-engine.js';

/* Встроенный 3D-вольтметр со стрелкой на заданном значении */
const meterFrame = (value = 0, max = 6) =>
  `<iframe class="meter-frame" src="../?embed=1&value=${value}&max=${max}" title="Вольтметр"></iframe>`;

/* =================== ШАГИ ТЕМЫ =================== */
const STEPS = [
  /* ---------- ТЕОРИЯ ---------- */
  {
    type: 'intro', phase: 'theory', visual: 'meterFull',
    title: 'Знакомимся с прибором',
    text: 'Вольтметр измеряет <b>напряжение</b>. У него есть циферблат со <b>шкалой</b>, <b>стрелка</b> и две <b>клеммы</b> для подключения к цепи.',
    mascotSay: 'Давайте разберём вольтметр по частям!',
  },
  {
    type: 'interact', phase: 'theory', visual: 'meterSlider',
    title: 'Стрелка и шкала',
    text: 'Двигайте напряжение и смотрите на <b>стрелку</b>. Чем больше вольт — тем дальше она отклоняется по шкале.',
    mascotSay: 'Покрутите напряжение — стрелка оживёт!',
    check: 'meter',
  },
  {
    type: 'reveal', phase: 'theory', visual: 'schemaParallel',
    title: 'На схеме — кружок с V',
    text: 'На электрических схемах вольтметр рисуют <b>кружком с буквой V</b>. И включают его <b>параллельно</b> — рядом с участком, напряжение на котором измеряют.',
    mascotSay: 'Запомним значок: кружок с буквой V!',
  },

  /* ---------- SPLASH ---------- */
  {
    type: 'splash', phase: 'transition',
    title: 'Проверь себя!',
    text: 'Разобрались с устройством — давайте закрепим парой вопросов.',
    mascotSay: 'Давайте проверим, что запомнилось!',
  },

  /* ---------- ПРАКТИКА ---------- */
  {
    type: 'question', phase: 'practice',
    title: 'Как вольтметр обозначают на схеме?',
    text: 'У каждого прибора свой значок. Как рисуют вольтметр?',
    options: [
      { id: 'a', text: 'Кружок с буквой V', correct: true },
      { id: 'b', text: 'Кружок с буквой A', correct: false },
      { id: 'c', text: 'Квадрат с буквой V', correct: false },
      { id: 'd', text: 'Треугольник',        correct: false },
    ],
    right: 'Верно! Кружок с буквой V — так вольтметр рисуют на схемах.',
    wrong: 'Вольтметр — это кружок с буквой V. А кружок с A — это амперметр.',
  },
  {
    type: 'question', phase: 'practice',
    title: 'Как правильно подключить вольтметр?',
    text: 'Прибор подключают к участку, напряжение на котором измеряют.',
    options: [
      { id: 'a', text: 'Параллельно участку',           correct: true },
      { id: 'b', text: 'Последовательно, в разрыв цепи', correct: false },
      { id: 'c', text: 'Всё равно как',                  correct: false },
      { id: 'd', text: 'Только к одной клемме',          correct: false },
    ],
    right: 'Именно! Вольтметр включают параллельно — рядом с участком, а не в разрыв.',
    wrong: 'Параллельно! Последовательно (в разрыв) включают амперметр, а вольтметр — рядом с участком.',
  },
];

/* =================== ВИЗУАЛЫ ТЕМЫ =================== */
const visuals = {
  meterFull() {
    return meterFrame(3.4);
  },
  meterSlider() {
    return `
      <div class="lamp-slider-wrap">
        <div id="meterHost" style="width:100%;max-width:460px;">${meterFrame(0)}</div>
        <div class="big-slider">
          <div class="big-slider__val"><span id="mVal">0</span> В</div>
          <input type="range" id="mSlider" min="0" max="6" step="0.2" value="0" class="big-slider__input">
        </div>
      </div>`;
  },
  schemaParallel() {
    /* Схема: батарейка — лампа в цепи, вольтметр (кружок V) подключён
       ПАРАЛЛЕЛЬНО лампе. Условные обозначения — тема про схему. */
    return `
      <svg viewBox="0 0 440 300" class="circuit-svg">
        <!-- контур цепи -->
        <path d="M60 120 L60 60 L380 60 L380 120 M60 200 L60 250 L380 250 L380 200"
              stroke="#232323" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- батарейка слева (условное обозначение) -->
        <g stroke="#232323" stroke-width="3" stroke-linecap="round">
          <line x1="60" y1="120" x2="60" y2="145"/>
          <line x1="44" y1="145" x2="76" y2="145"/>
          <line x1="52" y1="153" x2="68" y2="153"/>
          <line x1="44" y1="161" x2="76" y2="161"/>
          <line x1="52" y1="169" x2="68" y2="169"/>
          <line x1="60" y1="169" x2="60" y2="200"/>
        </g>
        <text x="30" y="160" text-anchor="middle" font-family="var(--font-sans)" font-size="14" fill="#5A5D66">источник</text>
        <!-- лампа справа (кружок с крестом) -->
        <circle cx="380" cy="160" r="26" fill="#FFF6DC" stroke="#232323" stroke-width="3"/>
        <line x1="362" y1="142" x2="398" y2="178" stroke="#232323" stroke-width="2.5"/>
        <line x1="398" y1="142" x2="362" y2="178" stroke="#232323" stroke-width="2.5"/>
        <line x1="380" y1="120" x2="380" y2="134"/>
        <line x1="380" y1="186" x2="380" y2="200" stroke="#232323" stroke-width="3"/>
        <line x1="380" y1="120" x2="380" y2="134" stroke="#232323" stroke-width="3"/>
        <text x="380" y="212" text-anchor="middle" font-family="var(--font-sans)" font-size="14" fill="#5A5D66">лампа</text>
        <!-- вольтметр параллельно лампе (фиолетовый акцент) -->
        <path d="M300 60 L300 130 M300 190 L300 250" stroke="#6240FF" stroke-width="3" fill="none" stroke-dasharray="6 5"/>
        <circle cx="300" cy="160" r="30" fill="#fff" stroke="#6240FF" stroke-width="3"/>
        <text x="300" y="170" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="30" fill="#6240FF">V</text>
        <text x="300" y="288" text-anchor="middle" font-family="var(--font-sans)" font-weight="500" font-size="15" fill="#6240FF">параллельно лампе</text>
        <!-- бегущий ток -->
        <g fill="#FFD769" stroke="#232323" stroke-width="1">
          <circle r="4"><animateMotion dur="3.4s" repeatCount="indefinite" path="M60 120 L60 60 L380 60 L380 134"/></circle>
          <circle r="4"><animateMotion dur="3.4s" repeatCount="indefinite" begin="1.1s" path="M60 120 L60 60 L380 60 L380 134"/></circle>
          <circle r="4"><animateMotion dur="3.4s" repeatCount="indefinite" begin="2.2s" path="M380 186 L380 250 L60 250 L60 200"/></circle>
        </g>
      </svg>`;
  },
};

/* =================== ЗАПУСК =================== */
runLesson({
  lessonId: 'device',
  storageKey: 'voltmeter-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-price/',
  steps: STEPS,
  visuals,
  onInteract(step, ctx) {
    if (step.check === 'meter') {
      const slider = document.getElementById('mSlider');
      const frame = document.querySelector('#meterHost iframe');
      const mVal = document.getElementById('mVal');
      let moved = false;
      slider.addEventListener('input', () => {
        const v = parseFloat(slider.value);
        mVal.textContent = String(v).replace('.', ',');
        // двигаем стрелку 3D-прибора в реальном времени
        frame.contentWindow.postMessage({ type: 'voltmeter:setNeedle', value: v, max: 6 }, '*');
        if (!moved && v !== 0) {
          moved = true;
          ctx.done();
          ctx.mascot.say('Видите — стрелка идёт за напряжением!', { emotion: 'happy', duration: 3000 });
        }
      });
    }
  },
});
</script>

</body>
</html>
