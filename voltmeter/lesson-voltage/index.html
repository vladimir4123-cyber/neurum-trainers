<script type="module">
import { runLesson } from '/assets/lesson/lesson-engine.js?v=4';
import { SHARED_DEFS, batterySVG, lampSVG, wireSVG, electronLoop } from '/assets/lesson/voltmeter-parts.js';

/* =================== ШАГИ ТЕМЫ =================== */
const STEPS = [
  /* ==========  ТЕОРИЯ  ========== */
  {
    type: 'intro',
    phase: 'theory',
    visual: 'batteryLamp',
    title: 'Что такое напряжение?',
    text: 'Напряжение — это <b>«электрический напор»</b>, который заставляет ток течь по цепи. Чем больше напряжение — тем ярче горит лампочка.',
    mascotSay: 'Давайте разберёмся, что такое напряжение!',
  },
  {
    type: 'reveal',
    phase: 'theory',
    visual: 'waterPump',
    title: 'Как понять напряжение',
    text: 'Представьте батарейку как <b>насос для воды</b>. Чем сильнее насос — тем быстрее течёт вода и мощнее крутит колесо. С током так же: больше напряжение — больше «напор» электронов.',
    mascotSay: 'Смотрите: вода в трубе — как ток в проводе!',
  },
  {
    type: 'interact',
    phase: 'theory',
    visual: 'lampWithSlider',
    title: 'Покрутим напряжение',
    text: 'Двигайте ползунок и смотрите, как меняется <b>яркость лампы</b>. Больше вольт — больше света.',
    mascotSay: 'Давайте покрутим напряжение и посмотрим на лампу!',
    check: 'moved',
  },
  {
    type: 'reveal',
    phase: 'theory',
    visual: 'unitBig',
    title: 'Единица измерения — вольт',
    text: 'Напряжение измеряют в <b>вольтах</b> и обозначают буквой <b>В</b>. Единицу назвали в честь итальянца <b>Алессандро Вольты</b>, который в 1800 году собрал первую батарейку.',
    mascotSay: 'Запомним: напряжение измеряют в вольтах!',
  },
  {
    type: 'reveal',
    phase: 'theory',
    visual: 'battery',
    title: 'Откуда берётся напряжение',
    text: 'Батарейка — это <b>насос для электронов</b>. Внутри химическая реакция разделяет заряды: «+» и «−» на клеммах. Разность их зарядов и есть <b>напряжение</b>.',
    mascotSay: 'Посмотрите, как батарейка разделяет заряды!',
  },
  {
    type: 'reveal',
    phase: 'theory',
    visual: 'voltageAround',
    title: 'Напряжение вокруг нас',
    text: 'Оно повсюду: <b>батарейка</b> в пульте — 1,5 В, зарядка USB — 5 В, домашняя розетка — 220 В, а <b>молния</b> — миллиарды вольт. Разные, но измеряются одной шкалой.',
    mascotSay: 'Напряжение вокруг нас — от пульта до молнии!',
  },

  /* ==========  ПЕРЕХОД: SPLASH ========== */
  {
    type: 'splash',
    phase: 'transition',
    title: 'Проверь себя!',
    text: 'Тему разобрали — давайте закрепим. Пара вопросов, чтобы убедиться, что всё понятно.',
    mascotSay: 'Давайте проверим, что запомнилось!',
  },

  /* ==========  ПРАКТИКА  ========== */
  {
    type: 'question',
    phase: 'practice',
    title: 'В чём измеряется напряжение?',
    text: 'Единица есть у каждой физической величины — сила в ньютонах, ток в амперах, а напряжение?',
    options: [
      { id: 'a', text: 'Ампер (А)', correct: false },
      { id: 'b', text: 'Вольт (В)',  correct: true  },
      { id: 'c', text: 'Ватт (Вт)',  correct: false },
      { id: 'd', text: 'Ом',         correct: false },
    ],
    right: 'Именно! Напряжение измеряют в вольтах — в честь Алессандро Вольты.',
    wrong: 'Не совсем — Ампер это ток, Ватт — мощность, Ом — сопротивление. Напряжение измеряют в вольтах (В).',
  },
  {
    type: 'question',
    phase: 'practice',
    title: 'Что случится с лампой, если увеличить напряжение вдвое?',
    text: 'Мы удвоили батарейку — было 3 В, стало 6 В. Что видит наблюдатель?',
    options: [
      { id: 'a', text: 'Погаснет',        correct: false },
      { id: 'b', text: 'Станет тусклее',  correct: false },
      { id: 'c', text: 'Станет ярче',     correct: true  },
      { id: 'd', text: 'Не изменится',    correct: false },
    ],
    right: 'Точно! Больше вольт → больше энергии на лампе → ярче свет. Но осторожно: если сильно переборщить — лампа перегорит.',
    wrong: 'Наоборот — больше напряжения даёт больше энергии лампе, и она светит ярче. Но перебор её сожжёт!',
  },
];

/* =================== ВИЗУАЛЫ ТЕМЫ =================== */
const visuals = {
  batteryLamp() {
    /* Замкнутая цепь в schematic-стиле: провода прямые угловые (L-образные),
       уходят от клемм батарейки на цоколь лампы. Вдоль проводов —
       подписи напряжения: «9 В» до лампы, «0 В» после (падение напряжения). */
    /* Прямоугольный контур: красный от «+» сверху идёт по верху сцены
       к цоколю лампы, чёрный от «−» снизу идёт по низу к нижнему пину. */
    const wireRed   = 'M 120 74 L 120 18 L 472 18 L 472 250';
    const wireBlack = 'M 120 290 L 120 322 L 500 322 L 500 282';
    return `
      <svg viewBox="0 0 620 340" class="circuit-svg">
        ${SHARED_DEFS}
        ${wireSVG('wRedP',   'wireRed',  wireRed)}
        ${wireSVG('wBlackP', 'wireBlue', wireBlack)}
        <g transform="translate(120,168)">${batterySVG('9 В')}</g>
        <g transform="translate(500,168)">${lampSVG(0.85)}</g>
        <!-- Металлические клеммники-«зажимы» в местах контакта -->
        <g>
          <circle cx="120" cy="74"  r="5" fill="url(#realMetalTerminal)" stroke="#141414" stroke-width=".8"/>
          <circle cx="120" cy="290" r="5" fill="url(#realMetalTerminal)" stroke="#141414" stroke-width=".8"/>
          <circle cx="472" cy="250" r="5" fill="url(#realMetalTerminal)" stroke="#141414" stroke-width=".8"/>
          <circle cx="500" cy="282" r="5" fill="url(#realMetalTerminal)" stroke="#141414" stroke-width=".8"/>
        </g>
        ${electronLoop()}
      </svg>
    `;
  },
  lampWithSlider() {
    /* Полноценный прямоугольный контур:
       красный от «+» сверху батарейки идёт по верху вправо и вниз к цоколю,
       чёрный от «−» снизу идёт по низу вправо и вверх к нижнему пину цоколя. */
    const wireRed   = 'M 120 74 L 120 18 L 472 18 L 472 250';
    const wireBlack = 'M 120 290 L 120 322 L 500 322 L 500 282';
    return `
      <div class="lamp-slider-wrap">
        <svg viewBox="0 0 620 340" class="circuit-svg circuit-svg--large" id="dynLamp">
          ${SHARED_DEFS}
          ${wireSVG('wRedP',   'wireRed',  wireRed)}
          ${wireSVG('wBlackP', 'wireBlue', wireBlack)}
          <g transform="translate(120,168)" id="batteryG">${batterySVG('3 В')}</g>
          <g transform="translate(500,168)" id="lampG">${lampSVG(0.33)}</g>
          <!-- Клеммники в точках контакта (совпадают с концами проводов) -->
          <g>
            <circle cx="120" cy="74"  r="5" fill="url(#realMetalTerminal)" stroke="#141414" stroke-width=".8"/>
            <circle cx="120" cy="290" r="5" fill="url(#realMetalTerminal)" stroke="#141414" stroke-width=".8"/>
            <circle cx="472" cy="250" r="5" fill="url(#realMetalTerminal)" stroke="#141414" stroke-width=".8"/>
            <circle cx="500" cy="282" r="5" fill="url(#realMetalTerminal)" stroke="#141414" stroke-width=".8"/>
          </g>
          <!-- Ток течёт по замкнутому кругу: + → лампа → − → внутри батарейки → + -->
          ${electronLoop()}
        </svg>
        <div class="big-slider">
          <div class="big-slider__val"><span id="vVal">3</span> В</div>
          <input type="range" id="vSlider" min="0" max="9" step="0.5" value="3" class="big-slider__input">
        </div>
      </div>
    `;
  },
  waterPump() {
    /* Аналогия «батарея = насос воды». Насос слева качает жидкость по
       трубе, вода крутит колесо-турбину справа. Синие капли анимированно
       плывут по трубе (аналог электронов). Всё крупное, без мелких подписей. */
    return `
      <svg viewBox="0 0 620 340" class="circuit-svg">
        <defs>
          <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#EEF0FF"/>
            <stop offset=".5" stop-color="#F8F9FE"/>
            <stop offset="1" stop-color="#D4D8EB"/>
          </linearGradient>
          <linearGradient id="pumpBody" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#3a3d46"/>
            <stop offset=".5" stop-color="#5a5d66"/>
            <stop offset="1" stop-color="#3a3d46"/>
          </linearGradient>
          <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#6BB4FF"/>
            <stop offset="1" stop-color="#2B7BE5"/>
          </linearGradient>
          <radialGradient id="drop" cx=".3" cy=".3" r=".7">
            <stop offset="0" stop-color="#B4DAFF"/>
            <stop offset="1" stop-color="#2B7BE5"/>
          </radialGradient>
        </defs>
        <ellipse cx="360" cy="298" rx="280" ry="14" fill="url(#floorShadow)"/>
        <!-- Трубы -->
        <path d="M160 130 L500 130" stroke="url(#pipe)" stroke-width="28" fill="none" stroke-linecap="round"/>
        <path d="M160 240 L500 240" stroke="url(#pipe)" stroke-width="28" fill="none" stroke-linecap="round"/>
        <!-- Насос (батарея-аналог) слева -->
        <rect x="90" y="90" width="90" height="180" rx="16" fill="url(#pumpBody)"/>
        <circle cx="135" cy="180" r="42" fill="#232323"/>
        <circle cx="135" cy="180" r="30" fill="#6240FF"/>
        <!-- вращающиеся лопасти насоса -->
        <g transform="translate(135, 180)">
          <g>
            <rect x="-5" y="-32" width="10" height="64" rx="4" fill="#CDFE00"/>
            <rect x="-32" y="-5" width="64" height="10" rx="4" fill="#CDFE00"/>
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
          </g>
        </g>
        <!-- Водяное колесо (лампа-аналог) справа -->
        <g transform="translate(530, 185)">
          <circle r="70" fill="#232323"/>
          <circle r="60" fill="#6BB4FF" stroke="#2B7BE5" stroke-width="3"/>
          <g>
            <g>
              <rect x="-8" y="-58" width="16" height="35" fill="#fff"/>
              <rect x="-58" y="-8" width="35" height="16" fill="#fff"/>
              <rect x="-8" y="23" width="16" height="35" fill="#fff"/>
              <rect x="23" y="-8" width="35" height="16" fill="#fff"/>
              <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2.4s" repeatCount="indefinite"/>
            </g>
          </g>
          <circle r="10" fill="#232323"/>
        </g>
        <!-- Капли воды текут по трубе -->
        <g>
          <circle r="6" fill="url(#drop)"><animateMotion dur="2.5s" repeatCount="indefinite" path="M180 130 L500 130"/></circle>
          <circle r="6" fill="url(#drop)"><animateMotion dur="2.5s" repeatCount="indefinite" begin=".7s" path="M180 130 L500 130"/></circle>
          <circle r="6" fill="url(#drop)"><animateMotion dur="2.5s" repeatCount="indefinite" begin="1.4s" path="M180 130 L500 130"/></circle>
          <circle r="6" fill="url(#drop)"><animateMotion dur="2.5s" repeatCount="indefinite" path="M500 240 L180 240"/></circle>
          <circle r="6" fill="url(#drop)"><animateMotion dur="2.5s" repeatCount="indefinite" begin="1s" path="M500 240 L180 240"/></circle>
        </g>
      </svg>
    `;
  },

  unitBig() {
    /* Простая ясная подача единицы: крупная буква «В» с градиентом,
       подпись «вольт», лёгкие искорки. Без интерактива и портрета. */
    return `
      <svg viewBox="0 0 620 300" class="circuit-svg">
        <defs>
          <linearGradient id="voltGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#8B6FFF"/>
            <stop offset=".5" stop-color="#6240FF"/>
            <stop offset="1" stop-color="#4A2FD9"/>
          </linearGradient>
        </defs>
        <!-- искорки вокруг -->
        <g fill="#CDFE00">
          <circle cx="150" cy="80" r="6"><animate attributeName="r" values="4;9;4" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx="470" cy="70" r="5"><animate attributeName="r" values="3;7;3" dur="1.6s" repeatCount="indefinite" begin=".4s"/></circle>
          <circle cx="500" cy="210" r="6"><animate attributeName="r" values="4;8;4" dur="2.3s" repeatCount="indefinite" begin=".8s"/></circle>
          <circle cx="130" cy="220" r="5"><animate attributeName="r" values="3;7;3" dur="1.9s" repeatCount="indefinite" begin="1.1s"/></circle>
        </g>
        <!-- крупная В -->
        <text x="310" y="215" text-anchor="middle"
              font-family="var(--font-display)" font-weight="500" font-size="200"
              fill="url(#voltGrad)" letter-spacing="-0.03em">В</text>
        <!-- подпись -->
        <text x="310" y="270" text-anchor="middle"
              font-family="var(--font-display)" font-weight="500" font-size="40"
              fill="#232323">вольт</text>
      </svg>
    `;
  },

  voltageAround() {
    /* Четыре примера напряжения: батарейка AA, зарядка USB, розетка,
       молния. Карточки помещаются в кадр, иконки объёмные, с бликами. */
    // 4 карточки: ширина 132, отступ 16, центрированы в 620
    const cx = [92, 240, 388, 536];  // центры карточек
    const cardY = 46, cardH = 244, cardW = 132;
    const cardX = cx.map(c => c - cardW / 2);
    return `
      <svg viewBox="0 0 620 340" class="circuit-svg">
        <defs>
          <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fff"/>
            <stop offset="1" stop-color="#F8F9FE"/>
          </linearGradient>
          <linearGradient id="aaBody" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#C99A16"/>
            <stop offset=".25" stop-color="#F5C842"/>
            <stop offset=".5" stop-color="#FFE083"/>
            <stop offset=".75" stop-color="#F5C842"/>
            <stop offset="1" stop-color="#C99A16"/>
          </linearGradient>
          <linearGradient id="aaTop" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#0d0d0d"/>
            <stop offset=".5" stop-color="#3a3a3a"/>
            <stop offset="1" stop-color="#0d0d0d"/>
          </linearGradient>
          <radialGradient id="chromeMini" cx=".3" cy=".3" r=".85">
            <stop offset="0" stop-color="#f5f5f5"/>
            <stop offset=".5" stop-color="#b8b8b8"/>
            <stop offset="1" stop-color="#6a6a6a"/>
          </radialGradient>
          <linearGradient id="usbBlock" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#DDE0E8"/>
          </linearGradient>
          <radialGradient id="socketFace" cx=".4" cy=".35" r=".75">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#E4E7EF"/>
          </radialGradient>
          <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFE87A"/>
            <stop offset=".5" stop-color="#FFC72E"/>
            <stop offset="1" stop-color="#F5A623"/>
          </linearGradient>
          <radialGradient id="boltGlow" cx=".5" cy=".5" r=".5">
            <stop offset="0" stop-color="#FFD861" stop-opacity=".55"/>
            <stop offset="1" stop-color="#FFD861" stop-opacity="0"/>
          </radialGradient>
          <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#6240FF" flood-opacity="0.12"/>
          </filter>
        </defs>

        <!-- Четыре карточки -->
        ${cx.map((c, i) => `
          <rect x="${cardX[i]}" y="${cardY}" width="${cardW}" height="${cardH}" rx="18"
                fill="url(#cardBg)" filter="url(#cardShadow)"/>
        `).join('')}

        <!-- Иконка 1: батарейка AA (цилиндр) -->
        <g transform="translate(${cx[0]}, 118)">
          <ellipse cx="2" cy="60" rx="26" ry="5" fill="rgba(0,0,0,.14)"/>
          <!-- + контакт сверху -->
          <rect x="-6" y="-52" width="12" height="8" rx="2" fill="url(#chromeMini)"/>
          <!-- тело -->
          <rect x="-18" y="-44" width="36" height="92" rx="5" fill="url(#aaBody)"/>
          <!-- верхняя тёмная кромка -->
          <rect x="-18" y="-44" width="36" height="12" rx="5" fill="url(#aaTop)"/>
          <!-- нижняя кромка -->
          <rect x="-18" y="40" width="36" height="8" rx="4" fill="url(#aaTop)"/>
          <!-- блик -->
          <rect x="-13" y="-30" width="5" height="70" rx="2.5" fill="#fff" opacity=".45"/>
        </g>

        <!-- Иконка 2: зарядка USB (адаптер с портом) -->
        <g transform="translate(${cx[1]}, 118)">
          <ellipse cx="0" cy="58" rx="30" ry="5" fill="rgba(0,0,0,.12)"/>
          <rect x="-28" y="-30" width="56" height="80" rx="10" fill="url(#usbBlock)" stroke="#C8CCD8" stroke-width="1"/>
          <!-- USB-A порт -->
          <rect x="-16" y="6" width="32" height="18" rx="2" fill="#2A2D34"/>
          <rect x="-11" y="12" width="22" height="6" rx="1" fill="#9AA0AC"/>
          <!-- индикатор -->
          <circle cx="0" cy="-14" r="3.5" fill="#07BE7E"/>
          <circle cx="0" cy="-14" r="3.5" fill="#07BE7E"><animate attributeName="opacity" values="1;.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
        </g>

        <!-- Иконка 3: розетка (евро, с заземлением) -->
        <g transform="translate(${cx[2]}, 118)">
          <ellipse cx="0" cy="56" rx="30" ry="5" fill="rgba(0,0,0,.12)"/>
          <circle cx="0" cy="6" r="42" fill="url(#socketFace)" stroke="#C8CCD8" stroke-width="2"/>
          <circle cx="0" cy="6" r="30" fill="none" stroke="#D4D8E2" stroke-width="1.5"/>
          <circle cx="-13" cy="6" r="5" fill="#2A2D34"/>
          <circle cx="13" cy="6" r="5" fill="#2A2D34"/>
        </g>

        <!-- Иконка 4: молния -->
        <g transform="translate(${cx[3]}, 116)">
          <circle cx="0" cy="6" r="60" fill="url(#boltGlow)">
            <animate attributeName="opacity" values=".6;1;.6" dur="1.4s" repeatCount="indefinite"/>
          </circle>
          <path d="M6 -46 L-20 8 L-2 8 L-10 52 L24 -8 L4 -8 L14 -46 Z"
                fill="url(#boltGrad)" stroke="#B8860B" stroke-width="1.5" stroke-linejoin="round">
            <animate attributeName="opacity" values="1;.75;1" dur="0.5s" repeatCount="indefinite"/>
          </path>
        </g>

        <!-- Значения и подписи -->
        ${[['1,5 В', 'Батарейка'], ['5 В', 'Зарядка USB'], ['220 В', 'Розетка'], ['1 млрд В', 'Молния']].map((d, i) => `
          <text x="${cx[i]}" y="238" text-anchor="middle" font-family="var(--font-display)"
                font-weight="500" font-size="${i === 3 ? 22 : 26}" fill="#6240FF">${d[0]}</text>
          <text x="${cx[i]}" y="266" text-anchor="middle" font-family="var(--font-sans)"
                font-weight="500" font-size="14" fill="#5A5D66">${d[1]}</text>
        `).join('')}
      </svg>
    `;
  },


  battery() {
    /* «Батарейка разделяет заряды». Наглядно и анимированно:
       внутри батарейки плюсы всплывают к «+» полюсу, минусы опускаются
       к «−». Разделённые заряды = напряжение (показано скобкой справа).
       Без электрохимии — только суть для темы «что такое напряжение». */
    // Генерируем заряды: «+» уходят вверх, «−» вниз, разные фазы/дорожки
    const lanes = [-46, -22, 2, 26, 50];
    let plus = '', minus = '';
    lanes.forEach((dx, i) => {
      const begin = (i * 0.5).toFixed(2);
      const x = 310 + dx;
      // «+» заряд всплывает от центра (y 200) к верхнему полюсу (y 90)
      plus += `
        <g opacity="0">
          <circle cx="${x}" cy="200" r="12" fill="#E8433C"/>
          <path d="M${x-6} 200 h12 M${x} 194 v12" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
          <animateTransform attributeName="transform" type="translate"
            values="0 0; 0 -110; 0 -110" keyTimes="0;.7;1" dur="3s" begin="${begin}s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.15;.7;1" dur="3s" begin="${begin}s" repeatCount="indefinite"/>
        </g>`;
      // «−» заряд опускается от центра (y 200) к нижнему полюсу (y 300)
      minus += `
        <g opacity="0">
          <circle cx="${x}" cy="200" r="12" fill="#2B6FE5"/>
          <path d="M${x-6} 200 h12" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
          <animateTransform attributeName="transform" type="translate"
            values="0 0; 0 96; 0 96" keyTimes="0;.7;1" dur="3s" begin="${(i*0.5+0.25).toFixed(2)}s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.15;.7;1" dur="3s" begin="${(i*0.5+0.25).toFixed(2)}s" repeatCount="indefinite"/>
        </g>`;
    });
    return `
      <svg viewBox="0 0 620 360" class="circuit-svg">
        ${SHARED_DEFS}
        <!-- Тень -->
        <ellipse cx="314" cy="344" rx="120" ry="10" fill="rgba(0,0,0,.2)" filter="url(#realSoftShadow)"/>

        <!-- Корпус батарейки (крупный, вертикальный) -->
        <rect x="214" y="54" width="200" height="266" rx="14" fill="url(#realBattBody)"/>
        <path d="M217 55 Q314 57 411 55" stroke="rgba(255,255,255,.25)" stroke-width="1" fill="none"/>

        <!-- + полюс сверху -->
        <rect x="290" y="38" width="48" height="18" rx="3" fill="url(#realMetalTerminal)"/>
        <text x="314" y="30" text-anchor="middle" font-family="var(--font-display)"
              font-weight="500" font-size="40" fill="#E8433C">+</text>
        <!-- Верхняя зона «+»: тёплая подсветка накопленных плюсов -->
        <rect x="226" y="66" width="176" height="94" rx="8" fill="#E8433C" opacity=".1"/>

        <!-- − полюс снизу -->
        <rect x="290" y="320" width="48" height="16" rx="3" fill="url(#realMetalTerminal)"/>
        <text x="314" y="356" text-anchor="middle" font-family="var(--font-display)"
              font-weight="500" font-size="44" fill="#2B6FE5">−</text>
        <!-- Нижняя зона «−» -->
        <rect x="226" y="230" width="176" height="82" rx="8" fill="#2B6FE5" opacity=".1"/>

        <!-- Пунктирная граница разделения зарядов посередине -->
        <line x1="226" y1="196" x2="402" y2="196" stroke="#fff" stroke-width="1.4" stroke-dasharray="5 5" opacity=".35"/>

        <!-- Анимированные заряды -->
        <g>${minus}${plus}</g>

        <!-- Скобка «напряжение» справа: между + и − полюсами -->
        <path d="M446 50 Q460 50 460 64 L460 176 Q460 190 474 190 Q460 190 460 204 L460 316 Q460 330 446 330"
              stroke="#6240FF" stroke-width="3" fill="none" stroke-linecap="round"/>
        <text x="500" y="185" text-anchor="start" font-family="var(--font-display)"
              font-weight="500" font-size="26" fill="#6240FF">U</text>
        <text x="500" y="212" text-anchor="start" font-family="var(--font-sans)"
              font-weight="500" font-size="15" fill="#232323">напряжение</text>
      </svg>
    `;
  },
};

/* =================== ЗАПУСК =================== */
runLesson({
  lessonId: 'voltage',
  storageKey: 'voltmeter-progress',
  homeHref: '../demo/',
  nextHref: '../lesson-device/',
  steps: STEPS,
  visuals,
  onInteract(step, ctx) {
    if (step.check === 'moved') {
      const slider = document.getElementById('vSlider');
      const vVal = document.getElementById('vVal');
      const lampG = document.getElementById('lampG');
      const batteryG = document.getElementById('batteryG');
      let moved = false;
      slider.addEventListener('input', () => {
        const v = parseFloat(slider.value);
        const vStr = String(v).replace('.', ',');
        vVal.textContent = vStr;
        const intensity = v / 9;
        lampG.innerHTML = lampSVG(intensity);
        batteryG.innerHTML = batterySVG(vStr + ' В');
        if (!moved && v !== 3) {
          moved = true;
          ctx.done();
          ctx.mascot.say('Видите, как меняется яркость лампы?', { emotion: 'happy', duration: 3000 });
        }
      });
    }
  },
});
</script>

</body>
</html>
