<script type="module">
import { runLesson } from '../../assets/lesson/lesson-engine.js?v=4';

/* ============================================================
   ТЕМА 1 «Линза собирает свет» (Пёрышкин §50).
   Интерактив 1: лупа зажигает бумагу (двигай лупу по высоте).
   Интерактив 2: параллельный пучок + линза, фокус светится,
   фокусное расстояние F подписано, кривизну можно менять.
   ============================================================ */

/* ---------- общие рисовалки (плоский стиль §8) ---------- */
function fit(c, cssH) {
  const cssW = c.offsetWidth || 320;
  const w = cssW * 2, h = cssH * 2;
  if (c.width !== w) c.width = w;
  if (c.height !== h) { c.height = h; c.style.height = cssH + 'px'; }
  return { w: c.width, h: c.height };
}
function tint(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * t);
  g = Math.round(g + (255 - g) * t);
  b = Math.round(b + (255 - b) * t);
  return `rgb(${r},${g},${b})`;
}
function shade(hex, t) {
  const n = parseInt(hex.slice(1), 16);
  let r = n >> 16, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - t)); g = Math.round(g * (1 - t)); b = Math.round(b * (1 - t));
  return `rgb(${r},${g},${b})`;
}
const RAY = '#F0B23C';                 // луч света
const GLASS = '#DCE9FB', GLASS_E = '#8FB4E8'; // стекло линзы

/* canvas не понимает var() в ctx.font — берём готовый стек из токена */
const FONT_STACK = getComputedStyle(document.documentElement)
  .getPropertyValue('--font-display').trim() || "'Aeonik Pro', 'Inter', sans-serif";

/* горизонтальная линза (лупа) в точке (x,y), полуширина a, «пухлость» c */
function drawLensH(ctx, x, y, a, c) {
  ctx.beginPath();
  ctx.moveTo(x - a, y);
  ctx.quadraticCurveTo(x, y + c * 2, x + a, y);
  ctx.quadraticCurveTo(x, y - c * 2, x - a, y);
  ctx.closePath();
  ctx.fillStyle = GLASS;
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = GLASS_E;
  ctx.stroke();
}
/* вертикальная линза в (x,y), полувысота a, «пухлость» c */
function drawLensV(ctx, x, y, a, c) {
  ctx.beginPath();
  ctx.moveTo(x, y - a);
  ctx.quadraticCurveTo(x + c * 2, y, x, y + a);
  ctx.quadraticCurveTo(x - c * 2, y, x, y - a);
  ctx.closePath();
  ctx.fillStyle = GLASS;
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = GLASS_E;
  ctx.stroke();
}
function labelFont(ctx, w, k) {
  ctx.font = '500 ' + Math.round(w * (k || 0.036)) + 'px ' + FONT_STACK;
}

/* ============================================================
   ИНТЕРАКТИВ 1: лупа зажигает бумагу
   ============================================================ */
function startBurn(root, done) {
  const canvas = root.querySelector('#burnCanvas');
  const hint = root.querySelector('#burnHint');
  const ctx = canvas.getContext('2d');

  let lensY = 0.24;          // доля высоты
  let dragging = false;
  let heat = 0, charR = 0, litMsg = false, prevT = 0;
  let smoke = [];

  const ptr = e => {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
  };
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    dragging = true;
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  });
  canvas.addEventListener('pointermove', e => {
    if (!dragging) return;
    const p = ptr(e);
    lensY = Math.min(0.62, Math.max(0.14, p.y));
  });
  ['pointerup', 'pointercancel'].forEach(ev => canvas.addEventListener(ev, () => { dragging = false; }));

  function draw(t) {
    if (!canvas.isConnected) return;
    const dt = Math.min(0.05, t - prevT); prevT = t;
    const { w, h } = fit(canvas, 320);
    ctx.clearRect(0, 0, w, h);

    const lensX = w * 0.5;
    const A = w * 0.26;                 // апертура лупы
    const F = h * 0.40;                 // фокусное расстояние (в пикселях)
    const ly = lensY * h;
    const paperY = h * 0.86;
    const focusY = ly + F;
    const p = paperY - ly;              // расстояние лупа→бумага
    const spotR = (A / 2) * Math.abs(p - F) / F;

    // солнце
    ctx.beginPath(); ctx.arc(w * 0.10, h * 0.045, w * 0.055, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD769'; ctx.fill();
    ctx.lineWidth = 2.5; ctx.strokeStyle = shade('#FFD769', 0.25); ctx.stroke();

    // бумага
    ctx.fillStyle = '#FDFBF4';
    ctx.fillRect(w * 0.14, paperY, w * 0.72, h * 0.055);
    ctx.lineWidth = 2.5; ctx.strokeStyle = '#D8D3C2';
    ctx.strokeRect(w * 0.14, paperY, w * 0.72, h * 0.055);

    // лучи: параллельные сверху → лупа → сходятся в фокус → дальше расходятся
    const NR = 7;
    ctx.lineWidth = 3;
    for (let i = 0; i < NR; i++) {
      const k = i / (NR - 1) - 0.5;
      const x0 = lensX + k * A;
      ctx.strokeStyle = 'rgba(240,178,60,0.75)';
      ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x0, ly); ctx.stroke();
      // после линзы: прямая из (x0,ly) через фокус (lensX, focusY), до бумаги
      const dy = focusY - ly;
      const slope = (lensX - x0) / dy;      // dx на единицу dy
      const yEnd = Math.min(paperY, h);
      const xEnd = x0 + slope * (yEnd - ly);
      ctx.beginPath(); ctx.moveTo(x0, ly); ctx.lineTo(xEnd, yEnd); ctx.stroke();
    }

    // пятно на бумаге
    const r = Math.max(4, spotR);
    const focused = spotR < 7;
    ctx.beginPath();
    ctx.ellipse(lensX, paperY + 3, r, Math.max(3, r * 0.32), 0, 0, Math.PI * 2);
    ctx.fillStyle = focused ? '#FFDE7A' : 'rgba(240,178,60,0.45)';
    ctx.fill();

    // нагрев и обугливание
    if (focused) heat = Math.min(1.6, heat + dt); else heat = Math.max(0, heat - dt * 1.5);
    if (heat > 0.5) charR = Math.min(26, charR + dt * 22);
    if (charR > 1) {
      ctx.beginPath();
      ctx.ellipse(lensX, paperY + 3, charR, charR * 0.35, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#6B4A2B'; ctx.fill();
      ctx.beginPath();
      ctx.ellipse(lensX, paperY + 3, charR * 0.55, charR * 0.2, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#3A2A1A'; ctx.fill();
    }
    // дым
    if (charR > 6 && Math.random() < 0.3) {
      smoke.push({ x: lensX + (Math.random() - 0.5) * 16, y: paperY - 4, r: 4 + Math.random() * 5, a: 0.4, vy: 40 + Math.random() * 30 });
    }
    smoke = smoke.filter(s => s.a > 0.02);
    smoke.forEach(s => {
      s.y -= s.vy * dt; s.a -= dt * 0.18; s.r += dt * 10;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(122,127,130,${s.a.toFixed(3)})`; ctx.fill();
    });
    if (charR > 18 && !litMsg) {
      litMsg = true;
      hint.innerHTML = '🔥 Бумага задымилась! Весь пучок собрался <b>в одну точку</b> — в фокус.';
      done();
    }

    // скобка F: от лупы до фокуса
    const bx = lensX + A / 2 + w * 0.07;
    ctx.strokeStyle = '#6240FF'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(bx, ly); ctx.lineTo(bx, focusY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx - 7, ly); ctx.lineTo(bx + 7, ly); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx - 7, focusY); ctx.lineTo(bx + 7, focusY); ctx.stroke();
    labelFont(ctx, w, 0.040);
    ctx.fillStyle = '#6240FF';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('F', bx + w * 0.018, (ly + focusY) / 2);

    // точка фокуса подсвечивается
    const pulse = 0.6 + 0.4 * Math.sin(t * 4);
    if (focusY < paperY - 4) {
      ctx.beginPath(); ctx.arc(lensX, focusY, 10 + 5 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(240,178,60,0.30)'; ctx.fill();
      ctx.beginPath(); ctx.arc(lensX, focusY, 5, 0, Math.PI * 2);
      ctx.fillStyle = RAY; ctx.fill();
    }

    // лупа (рисуем поверх лучей): стекло + оправа-ручка
    ctx.strokeStyle = '#5D6472'; ctx.lineWidth = 7; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(lensX + A / 2 + 4, ly); ctx.lineTo(lensX + A / 2 + w * 0.05, ly - h * 0.05); ctx.stroke();
    drawLensH(ctx, lensX, ly, A / 2, h * 0.022);

    // подпись
    labelFont(ctx, w);
    ctx.fillStyle = '#6B7180'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText('лупа', lensX - A / 2 - w * 0.03, ly);
    ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';

    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

/* ============================================================
   ИНТЕРАКТИВ 2: пучок лучей и фокус, F подписано
   ============================================================ */
function startBeam(root, done) {
  const canvas = root.querySelector('#beamCanvas');
  const hint = root.querySelector('#beamHint');
  const ctx = canvas.getContext('2d');
  const btns = [...root.querySelectorAll('[data-f]')];

  let Fcm = 15;                    // фокусное расстояние, см
  let lensX = 0.42;                // доля ширины
  let dragging = false, moved = false;
  const CM = () => 60;             // ширина канваса = 60 см сцены

  btns.forEach(b => b.addEventListener('click', () => {
    Fcm = parseInt(b.dataset.f, 10);
    btns.forEach(x => x.classList.toggle('is-on', x === b));
  }));

  const ptr = e => {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
  };
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault(); dragging = true;
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  });
  canvas.addEventListener('pointermove', e => {
    if (!dragging) return;
    lensX = Math.min(0.66, Math.max(0.18, ptr(e).x));
    if (!moved) {
      moved = true;
      hint.innerHTML = 'Фокус едет <b>вместе с линзой</b>: он всегда на расстоянии F за ней.';
      done();
    }
  });
  ['pointerup', 'pointercancel'].forEach(ev => canvas.addEventListener(ev, () => { dragging = false; }));

  function draw(t) {
    if (!canvas.isConnected) return;
    const { w, h } = fit(canvas, 300);
    ctx.clearRect(0, 0, w, h);

    const axisY = h * 0.46;
    const px = w / CM();               // пикселей в 1 см
    const lx = lensX * w;
    const Fpx = Fcm * px;
    const fx = lx + Fpx;               // точка фокуса
    const A = h * 0.56;                // высота пучка

    // оптическая ось
    ctx.setLineDash([3, 12]);
    ctx.strokeStyle = '#C9CEDA'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(0, axisY); ctx.lineTo(w, axisY); ctx.stroke();
    ctx.setLineDash([]);

    // лучи
    const NR = 5;
    ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(240,178,60,0.85)';
    for (let i = 0; i < NR; i++) {
      const k = i / (NR - 1) - 0.5;
      const y0 = axisY + k * A;
      ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(lx, y0); ctx.stroke();
      // после линзы — через фокус и дальше
      const dydx = (axisY - y0) / Fpx;
      const xEnd = w;
      ctx.beginPath(); ctx.moveTo(lx, y0); ctx.lineTo(xEnd, y0 + dydx * (xEnd - lx)); ctx.stroke();
    }

    // точка фокуса светится
    const pulse = 0.5 + 0.5 * Math.sin(t * 4);
    ctx.beginPath(); ctx.arc(fx, axisY, 12 + 7 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(240,178,60,0.28)'; ctx.fill();
    ctx.beginPath(); ctx.arc(fx, axisY, 6, 0, Math.PI * 2);
    ctx.fillStyle = RAY; ctx.fill();
    ctx.beginPath(); ctx.arc(fx, axisY, 2.6, 0, Math.PI * 2);
    ctx.fillStyle = '#FFE6AE'; ctx.fill();

    // скобка F под осью
    const by = axisY + h * 0.30;
    ctx.strokeStyle = '#6240FF'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(lx, by); ctx.lineTo(fx, by); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx, by - 7); ctx.lineTo(lx, by + 7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx, by - 7); ctx.lineTo(fx, by + 7); ctx.stroke();
    labelFont(ctx, w, 0.038);
    ctx.fillStyle = '#6240FF'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('F = ' + Fcm + ' см', (lx + fx) / 2, by + 10);

    // линза: чем меньше F, тем «пухлее»
    const c = h * (0.055 - (Fcm - 9) * 0.0022);
    drawLensV(ctx, lx, axisY, A / 2 + 14, c);

    labelFont(ctx, w);
    ctx.fillStyle = '#6B7180'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('параллельный пучок', w * 0.03, axisY - A / 2 - 18);
    ctx.textAlign = 'start';

    requestAnimationFrame(ts => draw(ts / 1000));
  }
  requestAnimationFrame(ts => draw(ts / 1000));
}

    </div>
    <p class="canvas-hint" id="beamHint">Тащи линзу влево-вправо и следи за точкой фокуса</p>`,
  focusdef: () => `
    <svg viewBox="0 0 340 190" xmlns="http://www.w3.org/2000/svg">
